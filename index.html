
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Infinite Notes</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Notes">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#121212">
    
    <link id="pwa-manifest" rel="manifest" href="">
    <link id="pwa-icon" rel="apple-touch-icon" href="">

    <!-- Core Editor & Plugins -->
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/paragraph@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/header@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/nested-list@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/checklist@latest"></script>

    <!-- Leaflet for Map Tool -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- 🟢 OPTIMIZATION: Import Map with Bundle Flag for Safari 🟢 -->
    <script type="importmap">
      {
        "imports": {
          "@mlc-ai/web-llm": "https://esm.sh/@mlc-ai/web-llm?bundle"
        }
      }
    </script>

    <style>
        :root {
            --bg-color: #ffffff; --text-color: #000000; --border-color: #e0e0e0;
            --muted-bg: #f5f5f5; --muted-text: #666666; --accent-color: #000000;
            --ai-color: #6366f1; --recall-bg: #fcfcfc; --recall-border: #cccccc;
            --editor-toolbar-bg: #ffffff; --editor-hover-bg: #ebebeb; --overlay-bg: transparent; 
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --keyboard-offset: 0px; --safe-area-top: env(safe-area-inset-top, 0px);
            --std-border-radius: 8px; --std-icon-size: 20px; --std-control-height: 36px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212; --text-color: #ffffff; --border-color: #333333;
                --muted-bg: #1e1e1e; --muted-text: #aaaaaa; --accent-color: #ffffff;
                --ai-color: #a78bfa; --recall-bg: #1a1a1a; --recall-border: #444444;
                --editor-toolbar-bg: #1e1e1e; --editor-hover-bg: #2a2a2a;
            }
        }

        body { background-color: var(--bg-color); color: var(--text-color); font-family: var(--font-main); margin: 0; padding: 0; line-height: 1.6; overflow-x: hidden; }
        .app-container { max-width: 800px; margin: 0 auto; padding: calc(10vh + var(--safe-area-top)) 40px 65vh 40px; }
        #editorjs { min-height: 50vh; }
        ::-webkit-scrollbar { width: 0; }
        svg { flex-shrink: 0; }

        /* Editor.js Overrides */
        .ce-block { z-index: auto !important; } 
        .ce-toolbar { z-index: 10000 !important; }
        .ce-popover, .ce-settings, .tc-popover, .cdx-settings, .ce-tooltip { z-index: 10005 !important; }
        .ce-toolbar__plus, .ce-toolbar__settings-btn { background-color: transparent; color: var(--text-color); }
        .ce-toolbar__plus:hover, .ce-toolbar__settings-btn:hover { background-color: var(--editor-hover-bg); }
        .ce-popover-item__icon svg { width: var(--std-icon-size); height: var(--std-icon-size); }

        @media (prefers-color-scheme: dark) {
            .ce-popover, .ce-settings, .ce-inline-toolbar, .ce-conversion-toolbar { background: var(--editor-toolbar-bg) !important; border-color: var(--border-color) !important; }
            .ce-popover-item, .ce-inline-tool, .ce-settings__button { color: var(--text-color) !important; }
            .ce-popover-item:hover, .ce-inline-tool:hover { background-color: var(--editor-hover-bg) !important; }
            .cdx-search-field, .cdx-input { background-color: var(--muted-bg) !important; border: 1px solid var(--border-color) !important; color: var(--text-color) !important; }
            ::selection { background: var(--ai-color); color: #fff; }
        }

        /* App UI */
        #date-header { font-size: clamp(60px, 18vw, 150px); font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: -0.06em; line-height: 0.8; margin: -20px 0 10px -25px; cursor: pointer; user-select: none; }
        #date-header:hover { opacity: 0.7; }
        
        #ai-status-wrapper { margin-bottom: 40px; padding-left: 4px; }
        #ai-status-text { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ai-color); opacity: 0.8; }
        .ai-progress-container { width: 100%; max-width: 200px; height: 4px; background: var(--muted-bg); border-radius: 2px; margin-top: 8px; overflow: hidden; display: none; }
        .ai-progress-bar { width: 0%; height: 100%; background: var(--ai-color); transition: width 0.1s ease-out; }

        .ce-block-time { font-size: 11px; color: var(--muted-text); text-align: right; padding: 6px 2px 2px 0; opacity: 0.7; font-weight: 500; }
        .ai-text-block { color: var(--ai-color); font-style: italic; font-weight: 500; font-size: 16px; border-left: 2px solid var(--ai-color); padding-left: 14px; margin-left: -16px; outline: none; }

        /* Tools General */
        .cal-btn { padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 6px; background: transparent; color: var(--text-color); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; font-weight: 500; }
        .cal-btn:hover { background: var(--editor-hover-bg); }
        .cal-btn.primary { background: var(--text-color); color: var(--bg-color); border-color: var(--text-color); }

        .tool-title-input { width: 100%; border: none; background: transparent; color: var(--text-color); font-size: 16px; font-weight: 600; outline: none; padding: 4px 0; margin-bottom: 8px; }
        .tool-title-input::placeholder { color: var(--muted-text); opacity: 0.6; }

        /* Global Modal */
        .global-calendar-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s ease; backdrop-filter: blur(2px); }
        .global-calendar-modal.show { display: flex; opacity: 1; }
        .cp-container { background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; width: 90%; max-width: 340px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: flex; flex-direction: column; gap: 12px; }
        .cp-header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .cp-header button { background: var(--muted-bg); border: 1px solid var(--border-color); color: var(--text-color); border-radius: 6px; width: 32px; height: 32px; cursor: pointer; }
        .cp-weekdays, .cp-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
        .cp-weekdays { font-size: 12px; color: var(--muted-text); font-weight: 600; }
        .cp-day { padding: 8px 0; font-size: 14px; cursor: pointer; border-radius: 6px; }
        .cp-day:hover:not(.muted) { background: var(--editor-hover-bg); }
        .cp-day.active { background: var(--text-color) !important; color: var(--bg-color) !important; font-weight: bold; }
        .cp-day.muted { color: var(--border-color); pointer-events: none; opacity: 0.3; }
        #dp-time-input { width: 100%; padding: 10px; text-align: center; border-radius: 6px; border: 1px solid var(--border-color); background: var(--muted-bg); color: var(--text-color); outline: none; }

        /* Specific Blocks */
        .compute-tool-container { border: 1px solid var(--border-color); border-radius: 8px; background: var(--muted-bg); margin: 8px 0; display: flex; flex-direction: column; }
        .compute-input { width: 100%; padding: 16px; background: transparent; border: none; outline: none; font-family: monospace; font-size: 14px; color: var(--text-color); resize: none; }
        .compute-output { padding: 12px 16px; border-top: 1px dashed var(--border-color); font-family: monospace; font-size: 16px; font-weight: 700; background: var(--bg-color); word-break: break-word; }
        .compute-error { color: #EF4444; font-size: 13px; font-weight: normal; }

        .scan-wrapper { border: 1px dashed var(--border-color); border-radius: 8px; margin: 8px 0; display: flex; flex-direction: column; }
        .scan-action-area { padding: 30px; display: flex; flex-direction: column; align-items: center; gap: 12px; cursor: pointer; }
        .scan-action-area:hover { background: var(--editor-hover-bg); }
        .scan-output-textarea { width: 100%; min-height: 100px; padding: 16px; border: none; background: var(--muted-bg); color: var(--text-color); font-family: monospace; resize: none; outline: none; }

        .recall-search-wrapper { position: relative; margin: 8px 0; }
        .recall-search-input { width: 100%; padding: 12px 14px 12px 40px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-color); outline: none; }
        .recall-search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 18px; color: var(--muted-text); }
        .recall-dropdown { position: absolute; top: 100%; left: 0; width: 100%; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 8px; z-index: 1000; max-height: 250px; overflow-y: auto; display: none; margin-top: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .recall-dropdown.active { display: block; }
        .recall-result-item { padding: 12px; cursor: pointer; border-bottom: 1px solid var(--border-color); }
        .recall-result-item:hover { background: var(--editor-hover-bg); }
        .recalled-block { margin: 8px 0; padding: 12px; background: var(--recall-bg); border-left: 4px solid var(--recall-border); border-radius: 4px 8px 8px 4px; }

        .calendar-tool-container { margin: 8px 0; display: flex; flex-direction: column; gap: 12px; }
        .cal-display-btn { border: 1px solid var(--border-color); background: var(--muted-bg); border-radius: 6px; padding: 10px; display: flex; justify-content: space-between; cursor: pointer; color: var(--text-color); text-align: left; }

        .voice-tool-container { display: flex; align-items: center; gap: 12px; margin: 8px 0; }
        .v-memo__btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border-color); background: var(--muted-bg); color: var(--text-color); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
        .v-memo__btn.recording { background: #ef4444; color: #fff; border-color: #ef4444; animation: pulse 1.5s infinite; }
        .v-memo__btn.playing { background: #3B82F6; color: #fff; border-color: #3B82F6; }

        .canvas-relative-frame { position: relative; border-radius: 8px; border: 1px solid var(--border-color); overflow: hidden; margin: 8px 0; }
        .block-controls-stack { position: absolute; top: 10px; left: 10px; display: flex; flex-direction: column; gap: 8px; z-index: 401 !important; }
        .canvas-action-btn { width: 32px; height: 32px; border-radius: 6px; background: var(--editor-toolbar-bg); border: 1px solid var(--border-color); color: var(--text-color); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .canvas-action-btn.active { background: var(--text-color); color: var(--bg-color); }
        .leaflet-container { background: var(--bg-color) !important; z-index: 1 !important; width: 100%; height: 400px; }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* --- OPTIMIZED COLLAPSIBLE VISUAL DEBUGGER --- */
        #visual-debugger-panel {
            position: fixed; bottom: 10px; right: 10px; width: calc(100% - 20px); max-width: 350px; 
            background: rgba(17, 17, 17, 0.95); color: #0f0; font-family: monospace; font-size: 11px; 
            z-index: 999999; display: flex; flex-direction: column; border-radius: 8px; border: 1px solid #333;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); overflow: hidden; transition: height 0.3s ease; height: 40px;
        }
        #visual-debugger-panel.expanded { height: 35vh; }
        #visual-debugger-header {
            background: rgba(34, 34, 34, 0.9); padding: 10px 12px; display: flex; justify-content: space-between; 
            align-items: center; color: #aaa; font-weight: bold; cursor: pointer; user-select: none;
        }
        #visual-debugger-log { flex: 1; overflow-y: auto; padding: 10px; white-space: pre-wrap; word-break: break-all; display: none; }
        #visual-debugger-panel.expanded #visual-debugger-log { display: block; }
        .log-line { margin-bottom: 4px; border-bottom: 1px solid #222; padding-bottom: 2px; }
        .log-error { color: #ff5555; font-weight: bold; }
        .log-warn { color: #ffbb00; }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="date-header"></div>
        <div id="ai-status-wrapper">
            <div id="ai-status-text"></div>
            <div id="ai-progress-container" class="ai-progress-container">
                <div id="ai-progress-bar" class="ai-progress-bar"></div>
            </div>
        </div>
        <div id="editorjs"></div>
    </div>

    <!-- Modals -->
    <div id="global-calendar-modal" class="global-calendar-modal">
        <div class="cp-container" onclick="event.stopPropagation()">
            <div class="cp-header">
                <button id="dp-prev"><</button><span id="dp-month-label">Month Year</span><button id="dp-next">></button>
            </div>
            <div class="cp-weekdays"><span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span></div>
            <div id="dp-grid" class="cp-grid"></div>
            <div id="dp-time-section" class="cp-time" style="display: none;"><input type="time" id="dp-time-input" required></div>
            <div style="margin-top: 12px; display: flex; gap: 8px;">
                <button id="dp-today-btn" class="cal-btn" style="flex: 1;">Today</button>
                <button id="dp-confirm-btn" class="cal-btn primary" style="flex: 1;">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Toggleable Debugger -->
    <div id="visual-debugger-panel" class="expanded">
        <div id="visual-debugger-header" onclick="document.getElementById('visual-debugger-panel').classList.toggle('expanded')">
            <span>🐛 Debug Console (Tap)</span>
            <button onclick="event.stopPropagation(); document.getElementById('visual-debugger-log').innerHTML=''" style="background:transparent; color:#fff; border:1px solid #555; border-radius:4px; padding:2px 6px;">Clear</button>
        </div>
        <div id="visual-debugger-log"></div>
    </div>

    <!-- MAIN APP SCRIPT -->
    <script type="module">

        // 1. LOGGER SETUP
        const logContainer = document.getElementById('visual-debugger-log');
        const [origLog, origErr, origWarn] = [console.log, console.error, console.warn];

        function appendLog(msg, type = 'log') {
            const div = document.createElement('div');
            if (typeof msg === 'object') try { msg = JSON.stringify(msg); } catch(e){}
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            div.className = `log-line ${type === 'error' ? 'log-error' : type === 'warn' ? 'log-warn' : ''}`;
            logContainer.appendChild(div); logContainer.scrollTop = logContainer.scrollHeight;
        }

        console.log = (...args) => { origLog(...args); appendLog(args.join(' ')); };
        console.error = (...args) => { origErr(...args); appendLog(args.join(' '), 'error'); };
        console.warn = (...args) => { origWarn(...args); appendLog(args.join(' '), 'warn'); };
        window.addEventListener('error', e => console.error(`Error: ${e.message}`));
        window.addEventListener('unhandledrejection', e => console.error(`Promise Rejection: ${e.reason}`));

        console.log("App Booting...");

        // 2. CONFIG
        const CONFIG = {
            PWA_LOGO_URL: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzAwMDAwMCI+PHBhdGggZD0iTTE0IDJINmEyIDIgMCAwIDAtMiAydjE2YTIgMiAwIDAgMCAyIDJoMTJhMiAyIDAgMCAwIDItMlY4bC02LTZ6Ii8+PC9zdmc+",
            AI_CO_PILOT: { name: "", persona: "", canEditYourWork: true }
        };

        const NAMES = ["Echo", "Void", "Cipher", "Atlas", "Sparks"];
        if (!sessionStorage.getItem('ai_name')) {
            sessionStorage.setItem('ai_name', CONFIG.AI_CO_PILOT.name || NAMES[Math.floor(Math.random() * NAMES.length)]);
            sessionStorage.setItem('ai_persona', "You are brief and analytical.");
        }
        const aiName = sessionStorage.getItem('ai_name');
        const aiPersona = sessionStorage.getItem('ai_persona');

        document.getElementById('pwa-icon').href = CONFIG.PWA_LOGO_URL;

        // Icons map
        const ICONS = {
            mic: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>',
            stop: '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"></rect></svg>',
            play: '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>',
            pause: '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"></rect><rect x="14" y="4" width="4" height="16" rx="1"></rect></svg>',
            image: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>',
            download: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>',
            lock: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>',
            unlock: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>',
            calendar: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>',
            chevronDown: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>',
            bell: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>',
            canvas: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle></svg>',
            map: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon><line x1="9" y1="3" x2="9" y2="21"></line><line x1="15" y1="3" x2="15" y2="21"></line></svg>',
            pen: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>',
            search: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>',
            recall: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><polyline points="3 3 3 8 8 8"></polyline><polyline points="12 7 12 12 15 15"></polyline></svg>',
            scan: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h3"></path><path d="M20 7V4h-3"></path><path d="M4 17v3h3"></path><path d="M20 17v3h-3"></path><line x1="8" y1="12" x2="16" y2="12"></line></svg>',
            compute: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 14 10 14 13 8 18 8"></polyline><circle cx="20" cy="8" r="2"></circle><circle cx="2" cy="14" r="2"></circle></svg>'
        };

        function createEl(tag, cls = '', attrs = {}, children = []) {
            const el = document.createElement(tag); if (cls) el.className = cls;
            for (const [k, v] of Object.entries(attrs)) { if (k === 'innerHTML') el.innerHTML = v; else if (k === 'textContent') el.textContent = v; else if (k === 'style') el.style.cssText = v; else el.setAttribute(k, v); }
            children.forEach(c => c && el.append(c)); return el;
        }

        const NotificationEngine = {
            timers: new Map(),
            schedule: function(id, dt, title) {
                this.cancel(id); if (typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
                const delay = new Date(dt).getTime() - Date.now();
                if (delay > 0) this.timers.set(id, setTimeout(() => { new Notification('Note', { body: title }); this.timers.delete(id); }, delay));
            },
            cancel: function(id) { if (this.timers.has(id)) { clearTimeout(this.timers.get(id)); this.timers.delete(id); } }
        };

        function getLocalYYYYMMDD(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

        // 3. DATABASE
        class DB {
            constructor() { this.cache = {}; this.isMem = false; }
            init() {
                return new Promise(res => {
                    try {
                        const req = indexedDB.open('InfiniteNotes', 1);
                        req.onupgradeneeded = e => e.target.result.createObjectStore('notes');
                        req.onsuccess = e => { this.db = e.target.result; this.loadAll().then(d => { this.cache = d; res(); }); };
                        req.onerror = () => { this.isMem = true; res(); };
                    } catch { this.isMem = true; res(); }
                });
            }
            save(date, data) { this.cache[date] = data; if (!this.isMem) { try { this.db.transaction('notes', 'readwrite').objectStore('notes').put(data, date); } catch(e){} } }
            loadAll() {
                return new Promise(res => {
                    if (this.isMem) return res({});
                    try {
                        const tx = this.db.transaction('notes', 'readonly'), store = tx.objectStore('notes');
                        const vReq = store.getAll(), kReq = store.getAllKeys();
                        tx.oncomplete = () => { const r = {}; kReq.result.forEach((k, i) => r[k] = vReq.result[i]); res(r); };
                    } catch { res({}); }
                });
            }
        }
        let appDB = new DB();

        // 4. PLUGINS
        class AiTextTool {
            constructor({data, readOnly}) {
                this.data = { text: data.text || '', streamId: data.streamId || '' };
                this.wrapper = createEl('div', 'ai-text-block');
                if (!readOnly) this.wrapper.contentEditable = true;
                if (this.data.streamId) this.wrapper.id = this.data.streamId;
                this.wrapper.innerHTML = this.data.text;
            }
            render() { return this.wrapper; }
            save() { return { text: this.wrapper.innerHTML, streamId: null }; } 
        }

        class ScanTool {
            static get toolbox() { return { title: 'Scan Text', icon: ICONS.scan }; }
            constructor({data, config, readOnly}) { this.cfg = config; this.ro = readOnly; this.data = { text: data.text || '' }; this.wrapper = createEl('div', 'scan-wrapper'); }
            render() {
                this.wrapper.innerHTML = '';
                if (this.data.text) {
                    this.input = createEl('textarea', 'scan-output-textarea', { value: this.data.text });
                    if (this.ro) { this.input.readOnly = true; this.input.style.background = 'transparent'; } 
                    else { this.input.oninput = e => { this.data.text = e.target.value; this.adj(); if(this.cfg.onChange) this.cfg.onChange(); }; }
                    this.wrapper.appendChild(this.input); setTimeout(() => this.adj(), 0);
                } else if (!this.ro) {
                    this.act = createEl('div', 'scan-action-area', {}, [createEl('div', 'scan-icon', {innerHTML: ICONS.scan}), createEl('div', 'scan-label', {textContent: 'SCAN DOCUMENT'})]);
                    this.stat = createEl('div', 'scan-status'); this.act.appendChild(this.stat);
                    this.file = createEl('input', '', { type: 'file', accept: 'image/*', capture: 'environment', style: 'display: none;' });
                    this.act.onclick = () => this.file.click(); this.file.onchange = e => this.scan(e.target.files[0]);
                    this.wrapper.append(this.act, this.file);
                }
                return this.wrapper;
            }
            adj() { if (this.input) { this.input.style.height = 'auto'; this.input.style.height = this.input.scrollHeight + 'px'; } }
            async scan(f) {
                if (!f) return; this.act.onclick = null; this.stat.textContent = 'ANALYZING...';
                try {
                    if (typeof Tesseract === 'undefined') await new Promise((res, rej) => { const s = document.createElement('script'); s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'; s.onload = res; s.onerror = rej; document.head.appendChild(s); });
                    const w = await Tesseract.createWorker('eng', 1);
                    const { data: { text } } = await w.recognize(f); await w.terminate();
                    this.data.text = text.trim(); this.render(); if(this.cfg.onChange) this.cfg.onChange();
                } catch { this.stat.textContent = 'FAILED'; this.act.onclick = () => this.file.click(); }
            }
            save() { return this.data; }
        }

        class ComputeTool {
            static get toolbox() { return { title: 'Compute', icon: ICONS.compute }; }
            constructor({data, config, readOnly}) { this.cfg = config; this.ro = readOnly; this.data = { code: data.code || '', output: data.output || '' }; this.wrapper = createEl('div', 'compute-tool-container'); }
            render() {
                this.input = createEl('textarea', 'compute-input', { placeholder: 'Math or logic...', value: this.data.code });
                if (this.ro) this.input.readOnly = true;
                this.output = createEl('div', 'compute-output', { innerHTML: this.data.output });
                const adj = () => { this.input.style.height = 'auto'; this.input.style.height = this.input.scrollHeight + 'px'; };
                setTimeout(adj, 0);
                let to; this.input.oninput = e => { adj(); this.data.code = e.target.value; clearTimeout(to); to = setTimeout(() => this.eval(), 400); };
                this.wrapper.append(this.input, this.output); return this.wrapper;
            }
            async eval() {
                if (!this.data.code.trim()) { this.output.innerHTML = this.data.output = ''; if(this.cfg.onChange) this.cfg.onChange(); return; }
                const allowed = { Math, Date, Number, String }; // Simplified proxy for brevity
                const ctx = new Proxy({}, { has: () => true, get: (t, p) => allowed[p] });
                try {
                    const fn = new (Object.getPrototypeOf(async function(){}).constructor)('ctx', `with (ctx) { return eval(${JSON.stringify(this.data.code)}); }`);
                    const res = await fn(ctx);
                    this.data.output = (res === undefined || Number.isNaN(res)) ? '' : String(res);
                    this.output.innerHTML = this.data.output; this.output.classList.remove('compute-error');
                } catch(e) { this.data.output = `<span class="compute-error">${e.message}</span>`; this.output.innerHTML = this.data.output; }
                if(this.cfg.onChange) this.cfg.onChange();
            }
            save() { return this.data; }
        }

        class RecallTool {
            static get toolbox() { return { title: 'Recall', icon: ICONS.recall }; }
            constructor({data, config, api, readOnly}) { this.api = api; this.cfg = config; this.ro = readOnly; this.data = data && data.recalled ? data : { recalled: false, sourceDate: null, sourceBlock: null }; this.wrapper = createEl('div'); }
            render() {
                this.wrapper.innerHTML = '';
                if (this.data.recalled) {
                    const c = createEl('div', 'recalled-block');
                    c.appendChild(createEl('div', 'recalled-orig-meta', {}, [createEl('div', '', {innerHTML: ICONS.recall}), createEl('span', '', {textContent: `Recalled ${this.data.sourceDate}`})]));
                    const tDef = window.EDITOR_TOOLS_CONFIG[this.data.sourceBlock.type];
                    if (tDef) try { const inst = new tDef.class({ data: this.data.sourceBlock.data, readOnly: true, api: this.api, config: tDef.config || {} }); const rn = inst.render(); rn.style.pointerEvents = 'none'; c.appendChild(rn); } catch(e){}
                    this.wrapper.appendChild(c);
                } else if (!this.ro) {
                    const sw = createEl('div', 'recall-search-wrapper');
                    const inp = createEl('input', 'recall-search-input', { placeholder: 'Search...' });
                    const dd = createEl('div', 'recall-dropdown');
                    inp.oninput = e => {
                        const q = e.target.value.toLowerCase(); dd.innerHTML = ''; if(!q) return dd.classList.remove('active');
                        let res = [];
                        Object.entries(appDB.cache).forEach(([dStr, dData]) => {
                            if(!dData.blocks) return;
                            dData.blocks.forEach(b => {
                                if (b.type !== 'recall' && JSON.stringify(b.data).toLowerCase().includes(q)) res.push({d: dStr, b: b});
                            });
                        });
                        if (res.length) { res.forEach(r => { const item = createEl('div', 'recall-result-item', {textContent: `${r.d}: ${r.b.type}`}); item.onclick = () => { this.data = { recalled: true, sourceDate: r.d, sourceBlock: r.b }; this.render(); this.cfg.onChange(); }; dd.appendChild(item); }); }
                        dd.classList.add('active');
                    };
                    sw.append(createEl('div', 'recall-search-icon', {innerHTML: ICONS.search}), inp, dd); this.wrapper.appendChild(sw);
                }
                return this.wrapper;
            }
            save() { return this.data; }
        }

        class VoiceMemo {
            static get toolbox() { return { title: 'Voice', icon: ICONS.mic }; }
            constructor({data, config, readOnly}) {
                this.cfg = config; this.ro = readOnly; this.data = { url: data.url || null, title: data.title || 'Voice Memo' };
                this.isRec = this.isPlay = false; this.nodes = { w: createEl('div', 'voice-tool-container'), b: createEl('button', 'v-memo__btn'), t: createEl('input', 'tool-title-input', { value: this.data.title }), a: createEl('audio', '', { src: this.data.url || '' }) };
                if (this.ro) this.nodes.t.readOnly = true; else this.nodes.t.oninput = e => { this.data.title = e.target.value; if(this.cfg.onChange) this.cfg.onChange(); };
            }
            render() {
                this.nodes.a.onplay = () => { this.isPlay = true; this.upd(); }; this.nodes.a.onpause = this.nodes.a.onended = () => { this.isPlay = false; this.upd(); };
                this.nodes.b.onclick = () => this.act();
                this.nodes.w.append(this.nodes.b, this.nodes.t, this.nodes.a); this.upd(); return this.nodes.w;
            }
            upd() {
                this.nodes.b.className = 'v-memo__btn';
                if (this.isPlay) { this.nodes.b.innerHTML = ICONS.pause; this.nodes.b.classList.add('playing'); }
                else if (this.data.url) this.nodes.b.innerHTML = ICONS.play;
                else if (this.isRec) { this.nodes.b.innerHTML = ICONS.stop; this.nodes.b.classList.add('recording'); }
                else { this.nodes.b.innerHTML = ICONS.mic; if(this.ro) this.nodes.b.style.display = 'none'; }
            }
            async act() {
                if (this.ro && !this.data.url) return;
                if (this.data.url) this.isPlay ? this.nodes.a.pause() : this.nodes.a.play();
                else if (this.isRec) { this.rec.stop(); this.isRec = false; }
                else {
                    try {
                        const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                        this.rec = new MediaRecorder(s); const c = []; this.rec.ondataavailable = e => c.push(e.data);
                        this.rec.onstop = () => { const r = new FileReader(); r.onloadend = () => { this.data.url = r.result; this.nodes.a.src = this.data.url; this.upd(); if(this.cfg.onChange) this.cfg.onChange(); }; r.readAsDataURL(new Blob(c)); s.getTracks().forEach(t=>t.stop()); };
                        this.rec.start(); this.isRec = true; this.upd();
                    } catch { alert('Mic access denied'); }
                }
            }
            save() { return this.data; }
        }

        // 5. EDITOR & AI CORE
        window.editor = null; 
        let timestamps = {}, updateRaf, saveTimeout, aiTriggerTimeout;
        const processedPrompts = new Set(); 
        let todayStr = getLocalYYYYMMDD(new Date());
        window.currentDateStr = todayStr;
        let isAiLoading = false;

        document.getElementById('date-header').innerHTML = `${new Date().toLocaleDateString(undefined, {month:'short', day:'numeric'})}<br>${new Date().toLocaleDateString(undefined, {weekday:'long'})}`;

        // Tool Config (No defensive boilerplate, relies on CDNs loaded above)
        window.EDITOR_TOOLS_CONFIG = {
            paragraph: { class: Paragraph, inlineToolbar: ['link', 'bold', 'italic'] },
            header: { class: Header, inlineToolbar: ['link', 'bold', 'italic'] },
            list: { class: NestedList, inlineToolbar: ['link', 'bold', 'italic'] },
            checklist: { class: Checklist, inlineToolbar: ['link', 'bold', 'italic'] },
            scan: { class: ScanTool, config: { onChange: scheduleSave } },
            compute: { class: ComputeTool, config: { onChange: scheduleSave } },
            voice: { class: VoiceMemo, config: { onChange: scheduleSave } },
            recall: { class: RecallTool, config: { onChange: scheduleSave } },
            aiText: { class: AiTextTool, config: { onChange: scheduleSave } } 
        };

        const domObserver = new MutationObserver(() => { cancelAnimationFrame(updateRaf); updateRaf = requestAnimationFrame(() => {
            document.querySelectorAll('.ce-block').forEach(b => {
                const id = b.getAttribute('data-id'); if (!id) return;
                let tEl = b.querySelector('.ce-block-time'); if (!tEl) { tEl = createEl('div', 'ce-block-time'); b.appendChild(tEl); }
                if (timestamps[id]) tEl.textContent = new Date(timestamps[id]).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
                else if (window.currentDateStr === todayStr && window.editor && !window.editor.readOnly) { timestamps[id] = Date.now(); scheduleSave(); }
            });
        });});

        async function initLocalAI() {
            if (window.llmEngine || isAiLoading) return;
            isAiLoading = true;
            const statusEl = document.getElementById('ai-status-text');
            const progCont = document.getElementById('ai-progress-container');
            const progBar = document.getElementById('ai-progress-bar');

            console.log("Checking Safari WebGPU support...");
            if (!navigator.gpu) {
                console.error("CRITICAL: WebGPU is disabled. AI aborting.");
                console.warn("-> Go to Settings > Safari > Advanced > Feature Flags > enable WebGPU to fix this.");
                statusEl.textContent = `Collaborator: @${aiName} (WebGPU Disabled)`;
                return;
            }

            try {
                statusEl.textContent = `Collaborator: @${aiName} (Connecting...)`;
                progCont.style.display = 'block';
                console.log("Importing Web-LLM via esm.sh...");
                
                // 🟢 This import matches the Import Map exact path 🟢
                const { CreateMLCEngine } = await import("@mlc-ai/web-llm");

                console.log("Downloading Model...");
                window.llmEngine = await CreateMLCEngine("Llama-3.2-1B-Instruct-q4f16_1-MLC", {
                    initProgressCallback: (p) => {
                        const perc = Math.round(p.progress * 100);
                        progBar.style.width = `${perc}%`;
                        statusEl.textContent = `Collaborator: @${aiName} (Downloading ${perc}%)`;
                    }
                });

                console.log("AI Engine Ready!");
                progCont.style.display = 'none';
                statusEl.textContent = `Collaborator: @${aiName} (Ready)`;
            } catch (e) {
                console.error("AI Init Failed:", e);
                progCont.style.display = 'none';
                statusEl.textContent = `Collaborator: @${aiName} (Error)`;
            }
        }

        async function checkAiTriggers() {
            if (!window.editor || window.editor.readOnly) return;
            const curIdx = window.editor.blocks.getCurrentBlockIndex();
            const data = await window.editor.save();
            
            for (let i = 0; i < data.blocks.length; i++) {
                const b = data.blocks[i];
                if (b.type === 'paragraph' && b.data.text) {
                    const clean = createEl('div', '', {innerHTML: b.data.text}).textContent.trim();
                    if (clean.toLowerCase().startsWith(`@${aiName.toLowerCase()}`) && !processedPrompts.has(b.id)) {
                        if (i !== curIdx) {
                            processedPrompts.add(b.id);
                            if (!window.llmEngine) { window.editor.blocks.insert('aiText', { text: `[System]: Waiting for AI...` }, {}, i + 1, false); return; }
                            const sId = 'ai-stream-' + Date.now();
                            window.editor.blocks.insert('aiText', { text: `...`, streamId: sId }, {}, i + 1, false);
                            executeRAG(clean, sId, b.id);
                        }
                    }
                }
            }
        }

        async function executeRAG(prompt, sId, bId) {
            try {
                let ctx = "";
                Object.values(appDB.cache).forEach(d => { if(d.blocks) d.blocks.forEach(b => { if(b.type !== 'aiText' && b.data.text) ctx += `${b.data.text}\n`; }); });
                const msgs = [ { role: "system", content: `You are ${aiName}. Context:\n${ctx.slice(-2000)}` }, { role: "user", content: prompt } ];
                
                const chunks = await window.llmEngine.chat.completions.create({ messages: msgs, stream: true });
                let reply = ""; const node = document.getElementById(sId);
                
                for await (const chunk of chunks) {
                    reply += chunk.choices[0]?.delta?.content || "";
                    if(node) node.innerHTML = reply.replace(/\n/g, '<br>');
                }
            } catch (e) { console.error("RAG Error:", e); }
            scheduleSave();
        }

        function scheduleSave() {
            if (window.editor && !window.editor.readOnly) {
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(async () => {
                    const out = await window.editor.save(); out.timestamps = timestamps;
                    appDB.save(window.currentDateStr, out);
                }, 500);
                clearTimeout(aiTriggerTimeout); aiTriggerTimeout = setTimeout(checkAiTriggers, 1500); 
            }
        }

        async function initEditor(date) {
            if (window.editor) { domObserver.disconnect(); await window.editor.destroy(); window.editor = null; }
            const isToday = date === todayStr;
            let data = appDB.cache[date] || { blocks: isToday ? [{ type: "paragraph", data: { text: `Type '/' or '@${aiName}'...` } }] : [] };
            timestamps = data.timestamps || {};
            
            window.editor = new EditorJS({
                holder: 'editorjs', readOnly: !isToday, data: data, tools: window.EDITOR_TOOLS_CONFIG,
                onChange: () => { if (isToday) scheduleSave(); },
                onReady: () => { domObserver.observe(document.getElementById('editorjs'), { childList: true, subtree: true }); updateAllTimestamps(); }
            });
        }

        // Boot
        appDB.init().then(() => {
            initEditor(window.currentDateStr);
            initLocalAI();
        });

    </script>
</body>
