<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- PWA & Mobile Web App Meta Tags -->
    <title>Infinite Notes</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Notes">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#121212">
    
    <!-- Dynamic Manifest & Icons -->
    <link id="pwa-manifest" rel="manifest" href="">
    <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzAwMDAwMCI+PHBhdGggZD0iTTE0IDJINmEyIDIgMCAwIDAtMiAydjE2YTIgMiAwIDAgMCAyIDJoMTJhMiAyIDAgMCAwIDItMlY4bC02LTZ6Ii8+PC9zdmc+">

    <!-- Editor.js Core & Essential Core Plugins ONLY -->
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/header@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/nested-list@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/checklist@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/table@latest"></script>

    <style>
        /* --- Standardized Pure Flat Theme Variables --- */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border-color: #e0e0e0;
            --muted-bg: #f5f5f5;
            --muted-text: #666666;
            --accent-color: #000000;
            --editor-toolbar-bg: #ffffff;
            --editor-hover-bg: #ebebeb;
            --overlay-bg: transparent; 
            
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --keyboard-offset: 0px; 
            --safe-area-top: env(safe-area-inset-top, 0px);

            --std-border-radius: 8px;
            --std-padding: 12px 14px;
            --std-margin: 8px 0;
            --std-icon-size: 20px;
            --std-control-height: 36px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-color: #ffffff;
                --border-color: #333333;
                --muted-bg: #1e1e1e;
                --muted-text: #aaaaaa;
                --accent-color: #ffffff;
                --editor-toolbar-bg: #1e1e1e;
                --editor-hover-bg: #2a2a2a;
            }
        }

        body { background-color: var(--bg-color); color: var(--text-color); font-family: var(--font-main); margin: 0; padding: 0; line-height: 1.6; width: 100vw; overflow-x: hidden; }
        #editorjs { max-width: 750px; width: 100%; margin: 0 auto; padding: calc(10vh + var(--safe-area-top)) 20px 65vh 20px; box-sizing: border-box; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        ::-webkit-scrollbar:horizontal { display: none; }
        .ce-block__content, .ce-toolbar__content { max-width: 100% !important; }
        svg { flex-shrink: 0; }

        .ce-toolbar__plus, .ce-toolbar__settings-btn { background-color: var(--bg-color) !important; color: var(--text-color) !important; border: 1px solid transparent; }
        .ce-toolbar__plus:hover, .ce-toolbar__settings-btn:hover { background-color: var(--editor-hover-bg) !important; border-color: var(--border-color); }
        .ce-popover__overlay, .ce-popover-overlay, .cdx-overlay { background: var(--overlay-bg) !important; background-color: var(--overlay-bg) !important; box-shadow: none !important; backdrop-filter: none !important; }

        /* Icon Standardizations */
        .ce-popover-item__icon svg { width: var(--std-icon-size) !important; height: var(--std-icon-size) !important; }
        .ce-popover-item__title { font-size: 14px !important; font-weight: 500 !important; }

        @media (prefers-color-scheme: dark) {
            .ce-popover, .ce-popover__container, .ce-popover__panel, .ce-popover__items, .ce-inline-toolbar, .ce-conversion-toolbar, .ce-settings, .ce-tooltip, .tc-popover { background: var(--editor-toolbar-bg) !important; background-color: var(--editor-toolbar-bg) !important; border-color: var(--border-color) !important; box-shadow: none !important; }
            .ce-popover-item, .ce-inline-tool, .ce-conversion-tool, .ce-settings__button { background-color: transparent !important; color: var(--text-color) !important; }
            .ce-popover-item__title { color: var(--text-color) !important; }
            .ce-popover-item:hover, .ce-inline-tool:hover, .ce-conversion-tool:hover, .ce-settings__button:hover { background-color: var(--editor-hover-bg) !important; }
            .ce-popover-item__icon, .ce-popover-item__icon--active, .ce-popover__item-icon { background-color: var(--muted-bg) !important; color: var(--text-color) !important; box-shadow: none !important; border-color: var(--border-color) !important; }
            .cdx-search-field, .cdx-input { background-color: var(--muted-bg) !important; color: var(--text-color) !important; border: 1px solid var(--border-color) !important; box-shadow: none !important; }
            .cdx-search-field__icon { color: var(--muted-text) !important; }
            .ce-block--selected .ce-block__content { background-color: var(--editor-hover-bg) !important; }
            ::selection { background: #444444 !important; color: #ffffff; }
            
            /* Table Dark Mode Fixes */
            .tc-wrap, .tc-row::after, .tc-cell { border-color: var(--border-color) !important; }
            .tc-cell { background-color: var(--bg-color) !important; color: var(--text-color) !important; }
            .tc-row--heading .tc-cell { background-color: var(--editor-hover-bg) !important; color: var(--text-color) !important; }
            .tc-add-column, .tc-add-row { background-color: var(--muted-bg) !important; border-color: var(--border-color) !important; color: var(--text-color) !important; }
            .tc-add-column:hover, .tc-add-row:hover { background-color: var(--editor-hover-bg) !important; }
        }

        .tc-wrap { overflow-x: auto; width: 100%; max-width: 100%; box-sizing: border-box; }

        @media (max-width: 650px) {
            .ce-popover, .ce-settings, .ce-inline-toolbar {
                bottom: var(--keyboard-offset, 0px) !important;
                max-height: calc(100vh - var(--keyboard-offset, 0px) - 20px) !important;
                transition: bottom 0.2s cubic-bezier(0.1, 0.7, 0.1, 1), max-height 0.2s ease;
            }
        }

        /* --- STANDARDIZED Custom Tools Framework --- */
        .custom-block-wrapper { margin: var(--std-margin); border-radius: var(--std-border-radius); border: 1px solid var(--border-color); background: var(--bg-color); box-sizing: border-box; width: 100%; overflow: hidden; }
        .custom-block-wrapper svg { flex-shrink: 0; }

        /* General Button Styles */
        .cal-btn { padding: 8px 12px; background: transparent; border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-color); cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; white-space: nowrap; }
        .cal-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
        .cal-btn:hover { background: var(--editor-hover-bg); }
        .cal-btn.primary { background: var(--text-color); color: var(--bg-color); border-color: var(--text-color); }
        .cal-btn.primary:hover { opacity: 0.9; }
        .cal-btn.granted { background: #10B981; color: white; border-color: #10B981; }

        /* Calendar Tool */
        .cal-wrapper { padding: var(--std-padding); display: flex; flex-direction: column; gap: 12px; }
        .cal-header { display: flex; align-items: center; gap: 10px; }
        .cal-header svg { color: var(--text-color); }
        .cal-title { flex-grow: 1; border: none; background: transparent; color: var(--text-color); font-size: 16px; font-weight: 500; outline: none; font-family: inherit; }
        .cal-display-btn { border: 1px solid var(--border-color); background: var(--muted-bg); color: var(--text-color); border-radius: 6px; padding: 8px 12px; font-family: inherit; font-size: 14px; outline: none; cursor: pointer; text-align: left; display: flex; align-items: center; justify-content: space-between; }
        .cal-display-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
        .cal-display-btn:hover { background: var(--editor-hover-bg); }
        .cal-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .cal-actions .cal-btn { flex: 1; min-width: 130px; }
        
        .cp-container { border: 1px solid var(--border-color); border-radius: 6px; padding: 12px; background: var(--bg-color); margin-top: 4px; display: none; }
        .cp-container.open { display: block; animation: fadeIn 0.2s ease; }
        .cp-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: bold; }
        .cp-header button { background: var(--muted-bg); border: 1px solid var(--border-color); color: var(--text-color); border-radius: 4px; width: 28px; height: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
        .cp-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 11px; color: var(--muted-text); margin-bottom: 4px; font-weight: 600; }
        .cp-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
        .cp-day { padding: 6px 0; text-align: center; font-size: 13px; cursor: pointer; border-radius: 4px; color: var(--text-color); }
        .cp-day:hover { background: var(--editor-hover-bg); }
        .cp-day.active { background: var(--text-color); color: var(--bg-color); font-weight: bold; }
        .cp-day.muted { color: var(--border-color); pointer-events: none; }
        
        .cp-time { display: flex; justify-content: center; align-items: center; gap: 6px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-color); }
        .cp-time input, .cp-time select { background: var(--muted-bg); border: 1px solid var(--border-color); color: var(--text-color); border-radius: 4px; padding: 4px 8px; font-family: inherit; font-size: 14px; outline: none; }
        .cp-time input[type="number"] { width: 48px; text-align: center; -moz-appearance: textfield; }
        .cp-time input::-webkit-outer-spin-button, .cp-time input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        /* Voice Memo */
        .v-memo { padding: var(--std-padding); display: flex; align-items: center; gap: 12px; }
        .v-memo__btn { width: var(--std-control-height); height: var(--std-control-height); border-radius: 50%; border: 1px solid var(--border-color); background: var(--muted-bg); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-color); flex-shrink: 0; min-width: var(--std-control-height); transition: all 0.2s; }
        .v-memo__btn svg { width: 16px; height: 16px; } 
        .v-memo__btn:hover { background: var(--editor-hover-bg); }
        .v-memo__btn.recording { color: #ffffff; border-color: #ef4444; background: #ef4444; animation: pulse 1.5s infinite; }
        .v-memo__btn.playing { color: #ffffff; border-color: #3B82F6; background: #3B82F6; }
        .v-memo__status { font-size: 14px; color: var(--muted-text); flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
        
        /* Canvas Tool */
        .canvas-wrapper { width: 100%; display: flex; justify-content: center; background: var(--bg-color); position: relative; }
        .canvas-wrapper canvas { cursor: crosshair; display: block; max-width: 100%; object-fit: fill; }
        .canvas-wrapper.locked canvas { cursor: default; }
        
        .canvas-lock-btn { position: absolute; top: 10px; right: 10px; width: 32px; height: 32px; border-radius: 6px; background: var(--editor-toolbar-bg); border: 1px solid var(--border-color); color: var(--text-color); cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0.6; transition: all 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .canvas-lock-btn:hover { opacity: 1; background: var(--editor-hover-bg); }
        .canvas-lock-btn svg { width: 16px; height: 16px; }

        /* Canvas Settings */
        .canvas-settings-wrapper { padding: 4px; display: flex; flex-direction: column; gap: 4px; min-width: 200px; }
        .canvas-setting-btn { display: flex; align-items: center; gap: 10px; padding: 10px 12px; cursor: pointer; border-radius: 6px; color: var(--text-color); font-size: 14px; background: transparent; border: none; font-family: inherit; width: 100%; text-align: left; }
        .canvas-setting-btn:hover { background: var(--editor-hover-bg); }
        .canvas-setting-btn svg { width: 18px; height: 18px; opacity: 0.8; flex-shrink: 0; }
        .canvas-color-grid { display: flex; gap: 12px; width: 100%; justify-content: space-between; padding: 6px 12px; box-sizing: border-box; margin-bottom: 8px; }
        .canvas-color-setting { width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--border-color); cursor: pointer; padding: 0; transition: transform 0.1s; background-clip: padding-box; }
        .canvas-color-setting.active { transform: scale(1.15); box-shadow: 0 0 0 2px var(--editor-toolbar-bg), 0 0 0 4px var(--text-color); border-color: transparent; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="editorjs"></div>

    <script>
        // Prevent benign ResizeObserver errors from bubbling up to global error handlers
        window.addEventListener('error', function(e) {
            if (e.message === 'ResizeObserver loop limit exceeded' || e.message === 'ResizeObserver loop completed with undelivered notifications.') {
                e.stopImmediatePropagation();
            }
        });

        const STORAGE_KEY = 'ultimate_notes_pure_flat_v6';

        // --- PWA Setup ---
        const pwaManifest = {
            "name": "Infinite Notes",
            "short_name": "Notes",
            "start_url": ".",
            "display": "standalone",
            "background_color": window.matchMedia('(prefers-color-scheme: dark)').matches ? "#121212" : "#ffffff",
            "theme_color": window.matchMedia('(prefers-color-scheme: dark)').matches ? "#121212" : "#ffffff",
            "icons": [{
                "src": "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzAwMDAwMCI+PHBhdGggZD0iTTE0IDJINmEyIDIgMCAwIDAtMiAydjE2YTIgMiAwIDAgMCAyIDJoMTJhMiAyIDAgMCAwIDItMlY4bC02LTZ6Ii8+PC9zdmc+",
                "sizes": "192x192",
                "type": "image/svg+xml"
            }]
        };
        const manifestString = JSON.stringify(pwaManifest);
        document.getElementById('pwa-manifest').setAttribute('href', 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(manifestString));

        // --- Service Worker Implementation (Offline First) ---
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'infinite-notes-cache-v4';
                const ASSETS = [
                    location.href.split('#')[0].split('?')[0],
                    'https://cdn.jsdelivr.net/npm/@editorjs/editorjs@latest',
                    'https://cdn.jsdelivr.net/npm/@editorjs/header@latest',
                    'https://cdn.jsdelivr.net/npm/@editorjs/nested-list@latest',
                    'https://cdn.jsdelivr.net/npm/@editorjs/checklist@latest',
                    'https://cdn.jsdelivr.net/npm/@editorjs/table@latest'
                ];

                self.addEventListener('install', (e) => {
                    self.skipWaiting();
                    e.waitUntil(
                        caches.open(CACHE_NAME).then((cache) => {
                            return Promise.allSettled(ASSETS.map(url => cache.add(url).catch(err => console.warn('SW Cache failed:', url))));
                        })
                    );
                });

                self.addEventListener('activate', (e) => { e.waitUntil(self.clients.claim()); });

                self.addEventListener('fetch', (e) => {
                    if (e.request.method !== 'GET') return;
                    e.respondWith(
                        caches.match(e.request).then((cached) => {
                            if (cached) return cached;
                            return fetch(e.request).then((response) => {
                                if (!response || response.status !== 200 || (response.type !== 'basic' && response.type !== 'cors')) return response;
                                const responseToCache = response.clone();
                                caches.open(CACHE_NAME).then((cache) => cache.put(e.request, responseToCache));
                                return response;
                            }).catch(() => console.warn('Fetch failed:', e.request.url));
                        })
                    );
                });
            `;
            try {
                const blob = new Blob([swCode], { type: 'application/javascript' });
                navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(e => console.log('SW Registration failed', e));
            } catch (e) { console.error('SW Setup Error:', e); }
        }

        // --- Mobile Keyboard Fix Engine ---
        if (window.visualViewport) {
            const updateKeyboardOffset = () => {
                const safeOffset = Math.max(0, window.innerHeight - window.visualViewport.height);
                document.documentElement.style.setProperty('--keyboard-offset', `${safeOffset}px`);
                if (safeOffset > 100) {
                    setTimeout(() => {
                        const activeBlock = document.querySelector('.ce-block--focused');
                        if (activeBlock) activeBlock.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 150);
                }
            };
            window.visualViewport.addEventListener('resize', updateKeyboardOffset);
            window.visualViewport.addEventListener('scroll', updateKeyboardOffset);
            updateKeyboardOffset();
        }

        // --- Global Notification Engine ---
        const NotificationEngine = {
            timers: new Map(),
            schedule: function(blockId, datetime, title, callback) {
                this.cancel(blockId);
                if (typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
                const delay = new Date(datetime).getTime() - Date.now();
                if (delay > 0) {
                    const tid = setTimeout(() => {
                        new Notification('Note Reminder', { body: title || 'Scheduled Event Reached' });
                        if (callback) callback();
                        this.timers.delete(blockId);
                    }, delay);
                    this.timers.set(blockId, tid);
                }
            },
            cancel: function(blockId) {
                if (this.timers.has(blockId)) { clearTimeout(this.timers.get(blockId)); this.timers.delete(blockId); }
            }
        };

        // --- Standardized Global Icons ---
        const ICONS = {
            mic: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>',
            stop: '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"></rect></svg>',
            play: '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>',
            pause: '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"></rect><rect x="14" y="4" width="4" height="16" rx="1"></rect></svg>',
            image: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>',
            trash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2-2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>',
            download: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>',
            lock: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>',
            unlock: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>',
            calendar: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>',
            chevronDown: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>',
            bell: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>',
            canvas: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle></svg>'
        };

        // --- Central DOM Creation Engine ---
        function createEl(tag, classNames = '', attributes = {}, children = []) {
            const el = document.createElement(tag);
            if (classNames) el.className = classNames;
            for (const [key, val] of Object.entries(attributes)) {
                if (key === 'innerHTML') el.innerHTML = val;
                else if (key === 'textContent') el.textContent = val;
                else if (key === 'style') el.style.cssText = val;
                else el.setAttribute(key, val);
            }
            children.forEach(c => c && el.append(c));
            return el;
        }

        // --- 1. Custom Block Tool: Calendar & Custom Date Picker ---
        class CalendarTool {
            static get toolbox() { return { title: 'Calendar Event', icon: ICONS.calendar }; }
            
            constructor({data}) {
                this.id = crypto.randomUUID(); 
                this.data = { title: data.title || '', datetime: data.datetime || new Date().toISOString(), notified: data.notified || false };
                this.viewDate = new Date(this.data.datetime); 
                if (!this.data.notified) this.scheduleNotification();
            }

            scheduleNotification() {
                NotificationEngine.schedule(this.id, this.data.datetime, this.data.title, () => { this.data.notified = true; });
            }

            formatDisplayDate() {
                const d = new Date(this.data.datetime);
                return `${d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' })} at ${d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' })}`;
            }

            render() {
                // Fully refactored to use createEl paradigm
                this.titleInput = createEl('input', 'cal-title', { type: 'text', placeholder: 'Event Name / Reminder...', value: this.data.title });
                this.titleInput.oninput = (e) => { this.data.title = e.target.value; this.scheduleNotification(); };

                const header = createEl('div', 'cal-header', {}, [createEl('div', '', { innerHTML: ICONS.calendar }), this.titleInput]);

                this.displayTxt = createEl('span', 'cal-display-text', { textContent: this.formatDisplayDate() });
                const displayBtn = createEl('button', 'cal-display-btn', {}, [this.displayTxt, createEl('div', '', { innerHTML: ICONS.chevronDown })]);

                this.monthLabel = createEl('span', 'cp-month-label', { textContent: 'Month Year' });
                const prevBtn = createEl('button', 'cp-prev', { textContent: '<' });
                const nextBtn = createEl('button', 'cp-next', { textContent: '>' });
                prevBtn.onclick = () => { this.viewDate.setMonth(this.viewDate.getMonth() - 1); this.renderGrid(); };
                nextBtn.onclick = () => { this.viewDate.setMonth(this.viewDate.getMonth() + 1); this.renderGrid(); };
                
                this.grid = createEl('div', 'cp-grid');
                this.hourInput = createEl('input', 'cp-hour', { type: 'number', min: '1', max: '12' });
                this.minInput = createEl('input', 'cp-minute', { type: 'number', min: '0', max: '59' });
                this.ampmInput = createEl('select', 'cp-ampm', {}, [ createEl('option', '', { value: 'AM', textContent: 'AM' }), createEl('option', '', { value: 'PM', textContent: 'PM' }) ]);

                const handleTimeChange = () => {
                    const newDate = new Date(this.data.datetime);
                    let h = parseInt(this.hourInput.value) || 12;
                    const ampm = this.ampmInput.value;
                    if (h === 12 && ampm === 'AM') h = 0;
                    if (h < 12 && ampm === 'PM') h += 12;
                    newDate.setHours(h, parseInt(this.minInput.value) || 0);
                    this.updateDateTime(newDate);
                };

                [this.hourInput, this.minInput, this.ampmInput].forEach(el => el.onchange = handleTimeChange);

                this.picker = createEl('div', 'cp-container', {}, [
                    createEl('div', 'cp-header', {}, [prevBtn, this.monthLabel, nextBtn]),
                    createEl('div', 'cp-weekdays', { innerHTML: '<span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span>' }),
                    this.grid,
                    createEl('div', 'cp-time', {}, [this.hourInput, createEl('span', '', {textContent: ':'}), this.minInput, this.ampmInput])
                ]);

                displayBtn.onclick = () => { this.picker.classList.toggle('open'); this.renderGrid(); };

                const isGranted = typeof Notification !== 'undefined' && Notification.permission === 'granted';
                const exportBtn = createEl('button', 'cal-btn cal-export-btn primary', {}, [createEl('div', '', { innerHTML: ICONS.download }), document.createTextNode(' Add to Calendar')]);
                this.notifyBtn = createEl('button', `cal-btn cal-notify-btn ${isGranted ? 'granted' : ''}`, {}, [createEl('div', '', { innerHTML: ICONS.bell }), document.createTextNode(isGranted ? ' On' : ' Notify')]);

                exportBtn.onclick = () => {
                    const start = new Date(this.data.datetime);
                    const formatICS = (date) => date.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
                    const icsContent = ['BEGIN:VCALENDAR', 'VERSION:2.0', 'BEGIN:VEVENT', `DTSTART:${formatICS(start)}`, `DTEND:${formatICS(new Date(start.getTime() + 3600000))}`, `SUMMARY:${this.data.title || 'Note Event'}`, 'END:VEVENT', 'END:VCALENDAR'].join('\n');
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(new Blob([icsContent], { type: 'text/calendar;charset=utf-8' }));
                    a.download = `${this.data.title ? this.data.title.replace(/\s+/g, '_') : 'event'}.ics`;
                    a.click();
                };

                this.notifyBtn.onclick = async () => {
                    if (!('Notification' in window)) return alert('Your browser does not support notifications.');
                    if (Notification.permission === 'granted') return alert('Notifications active!');
                    if (await Notification.requestPermission() === 'granted') {
                        this.notifyBtn.innerHTML = ICONS.bell + ' On';
                        this.notifyBtn.classList.add('granted');
                        this.scheduleNotification();
                    }
                };

                this.wrapper = createEl('div', 'custom-block-wrapper cal-wrapper', {}, [
                    header, displayBtn, this.picker, createEl('div', 'cal-actions', {}, [exportBtn, this.notifyBtn])
                ]);
                return this.wrapper;
            }

            renderGrid() {
                const activeDate = new Date(this.data.datetime);
                const year = this.viewDate.getFullYear(), month = this.viewDate.getMonth();
                
                this.monthLabel.textContent = this.viewDate.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
                this.hourInput.value = activeDate.getHours() % 12 || 12;
                this.minInput.value = activeDate.getMinutes().toString().padStart(2, '0');
                this.ampmInput.value = activeDate.getHours() >= 12 ? 'PM' : 'AM';

                this.grid.innerHTML = '';
                for (let i = 0; i < new Date(year, month, 1).getDay(); i++) this.grid.appendChild(createEl('div', 'cp-day muted'));
                
                for (let i = 1; i <= new Date(year, month + 1, 0).getDate(); i++) {
                    const dayEl = createEl('div', 'cp-day', { textContent: i });
                    if (activeDate.getFullYear() === year && activeDate.getMonth() === month && activeDate.getDate() === i) dayEl.classList.add('active');
                    dayEl.onclick = () => {
                        const newDate = new Date(this.data.datetime);
                        newDate.setFullYear(year, month, i);
                        this.updateDateTime(newDate);
                        this.renderGrid(); 
                    };
                    this.grid.appendChild(dayEl);
                }
            }

            updateDateTime(newDateObj) {
                this.data.datetime = newDateObj.toISOString();
                this.data.notified = false;
                this.displayTxt.textContent = this.formatDisplayDate();
                this.scheduleNotification();
            }

            destroy() { NotificationEngine.cancel(this.id); }
            save() { return this.data; }
        }

        // --- 2. Minimal Custom Block Tool: Drawing & Photo Annotator ---
        class CanvasTool {
            static get toolbox() { return { title: 'Drawing/Photo', icon: ICONS.canvas }; }

            constructor({data, api}) {
                this.api = api; 
                this.baseImage = data.baseImage || 'blank'; 
                this.data = data.image || null; 
                
                // UX Feature: Default to locked if loaded with an existing drawing
                this.isLocked = data.isLocked !== undefined ? data.isLocked : (this.data !== null); 
                
                this.currentColor = 'theme-ink'; 
                this.canvas = null;
                this.ctx = null;
                this.initialized = false;
                
                this.wrapper = createEl('div', 'custom-block-wrapper');
                if (this.isLocked) this.wrapper.classList.add('locked');

                this.startDraw = this.startDraw.bind(this);
                this.draw = this.draw.bind(this);
                this.stopDraw = this.stopDraw.bind(this);
                this.loadAndDraw = this.loadAndDraw.bind(this);
                this.isDrawing = false;
            }

            loadAndDraw() {
                const dynamicMaxWidth = this.wrapper.clientWidth > 0 ? this.wrapper.clientWidth : (window.innerWidth - 40);
                const dpr = window.devicePixelRatio || 1;
                
                const initCtx = () => { this.ctx.scale(dpr, dpr); this.ctx.lineCap = 'round'; this.ctx.lineJoin = 'round'; };

                if (this.baseImage && this.baseImage !== 'blank') {
                    const img = new Image();
                    img.onload = () => {
                        const aspect = img.height / img.width;
                        const displayWidth = dynamicMaxWidth, displayHeight = displayWidth * aspect;
                        this.canvas.style.width = `${displayWidth}px`; this.canvas.style.height = `${displayHeight}px`;
                        this.canvas.width = displayWidth * dpr; this.canvas.height = displayHeight * dpr;
                        initCtx();
                        this.ctx.drawImage(img, 0, 0, displayWidth, displayHeight);
                        if(this.data && this.data !== this.baseImage) {
                             const drawImg = new Image();
                             drawImg.onload = () => this.ctx.drawImage(drawImg, 0, 0, displayWidth, displayHeight);
                             drawImg.src = this.data;
                        }
                    };
                    img.src = this.baseImage;
                } else {
                    const displayWidth = dynamicMaxWidth, displayHeight = Math.min(400, dynamicMaxWidth * 0.75); 
                    this.canvas.style.width = `${displayWidth}px`; this.canvas.style.height = `${displayHeight}px`;
                    this.canvas.width = displayWidth * dpr; this.canvas.height = displayHeight * dpr;
                    initCtx();
                    if (this.data && this.data !== 'blank') {
                        const img = new Image();
                        img.onload = () => this.ctx.drawImage(img, 0, 0, displayWidth, displayHeight);
                        img.src = this.data;
                    }
                }
            }

            render() {
                this.canvas = document.createElement('canvas');
                this.ctx = this.canvas.getContext('2d');
                
                this.resizeObserver = new ResizeObserver((entries) => {
                    window.requestAnimationFrame(() => {
                        if (!entries.length) return;
                        if (entries[0].contentRect.width > 0 && !this.initialized) {
                            this.initialized = true;
                            this.loadAndDraw();
                        }
                    });
                });
                this.resizeObserver.observe(this.wrapper);

                this.canvas.addEventListener('mousedown', this.startDraw); 
                this.canvas.addEventListener('mousemove', this.draw);
                this.canvas.addEventListener('mouseup', this.stopDraw); 
                this.canvas.addEventListener('mouseleave', this.stopDraw);
                
                // Note: passive is set to false because we need to call preventDefault when NOT locked
                this.canvas.addEventListener('touchstart', this.startDraw, {passive: false}); 
                this.canvas.addEventListener('touchmove', this.draw, {passive: false}); 
                this.canvas.addEventListener('touchend', this.stopDraw);

                const lockBtn = createEl('button', 'canvas-lock-btn', { innerHTML: this.isLocked ? ICONS.lock : ICONS.unlock });
                lockBtn.onclick = () => {
                    this.isLocked = !this.isLocked;
                    lockBtn.innerHTML = this.isLocked ? ICONS.lock : ICONS.unlock;
                    this.wrapper.classList.toggle('locked', this.isLocked);
                    this.saveToData();
                };

                this.wrapper.appendChild(createEl('div', 'canvas-wrapper', {}, [this.canvas, lockBtn]));
                return this.wrapper;
            }

            getCoords(e) {
                const rect = this.canvas.getBoundingClientRect();
                const clientX = (e.touches && e.touches.length > 0) ? e.touches[0].clientX : e.clientX;
                const clientY = (e.touches && e.touches.length > 0) ? e.touches[0].clientY : e.clientY;
                return { x: clientX - rect.left, y: clientY - rect.top };
            }

            startDraw(e) { 
                if (this.isLocked) return; // Exit early if locked. This allows touch scrolling to pass through!
                if (e.type === 'touchstart') e.preventDefault();
                this.isDrawing = true; 
                const {x, y} = this.getCoords(e); 
                this.ctx.beginPath(); 
                this.ctx.moveTo(x, y); 
            }
            
            draw(e) { 
                if (!this.isDrawing || this.isLocked) return; 
                e.preventDefault(); 
                const {x, y} = this.getCoords(e); 
                this.ctx.lineTo(x, y); 
                
                let strokeColor = this.currentColor;
                const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (strokeColor === 'theme-ink') strokeColor = isDark ? '#ffffff' : '#000000';
                if (strokeColor === 'theme-paper') strokeColor = isDark ? '#121212' : '#ffffff';

                this.ctx.strokeStyle = strokeColor; 
                this.ctx.lineWidth = 4; 
                this.ctx.stroke(); 
            }
            
            stopDraw() { if(this.isDrawing) { this.isDrawing = false; this.saveToData(); } }

            renderSettings() {
                const grid = createEl('div', 'canvas-color-grid');
                ['theme-ink', '#EF4444', '#3B82F6', '#10B981', 'theme-paper'].forEach(color => {
                    const btn = createEl('button', 'canvas-color-setting');
                    if (color === 'theme-ink') btn.style.backgroundColor = 'var(--text-color)';
                    else if (color === 'theme-paper') btn.style.backgroundColor = 'var(--bg-color)';
                    else btn.style.backgroundColor = color;
                    
                    if (this.currentColor === color) btn.classList.add('active');
                    btn.onclick = () => {
                        this.currentColor = color;
                        grid.querySelectorAll('.canvas-color-setting').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                    };
                    grid.appendChild(btn);
                });

                const uploadBtn = createEl('button', 'canvas-setting-btn', {}, [createEl('div', '', { innerHTML: ICONS.image }), createEl('span', '', {textContent: 'Set Background Image'})]);
                const clearBtn = createEl('button', 'canvas-setting-btn', { style: 'color: #EF4444;' }, [createEl('div', '', { innerHTML: ICONS.trash }), createEl('span', '', {textContent: 'Clear Drawing'})]);
                const fileInput = createEl('input', '', { type: 'file', accept: 'image/*', style: 'display: none;' });

                uploadBtn.onclick = () => fileInput.click();
                fileInput.onchange = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (re) => { this.baseImage = re.target.result; this.data = this.baseImage; this.loadAndDraw(); this.saveToData(); this.api.toolbar.close(); };
                        reader.readAsDataURL(file);
                    }
                };

                clearBtn.onclick = () => { this.data = this.baseImage === 'blank' ? null : this.baseImage; this.loadAndDraw(); this.saveToData(); this.api.toolbar.close(); };

                return createEl('div', 'canvas-settings-wrapper', {}, [grid, uploadBtn, clearBtn, fileInput]);
            }

            destroy() { if (this.resizeObserver) this.resizeObserver.disconnect(); }
            saveToData() { this.data = this.canvas.toDataURL('image/png'); }
            save() { return { image: this.data, baseImage: this.baseImage, isLocked: this.isLocked }; }
        }

        // --- 3. Custom Block Tool: Voice Memo ---
        class VoiceMemo {
            static get toolbox() { return { title: 'Voice Memo', icon: ICONS.mic }; }
            constructor({data}) {
                this.data = data.url || null; 
                this.recorder = null; this.chunks = [];
                this.isPlaying = false; this.isRecording = false;
                
                // Fully refactored to use createEl paradigm
                this.nodes = { 
                    wrapper: createEl('div', 'custom-block-wrapper v-memo'), 
                    button: createEl('button', 'v-memo__btn'), 
                    audio: createEl('audio', '', { style: 'display: none;', src: this.data || '' }), 
                    status: createEl('div', 'v-memo__status') 
                };
            }

            render() {
                this.nodes.audio.onplay = () => { this.isPlaying = true; this.updateUI(); };
                this.nodes.audio.onpause = () => { this.isPlaying = false; this.updateUI(); };
                this.nodes.audio.onended = () => { this.isPlaying = false; this.updateUI(); };
                this.nodes.button.onclick = () => this.handleAction();
                
                this.nodes.wrapper.append(this.nodes.button, this.nodes.status, this.nodes.audio);
                this.updateUI();
                return this.nodes.wrapper;
            }

            updateUI() {
                this.nodes.button.className = 'v-memo__btn'; 
                if (this.isPlaying) {
                    this.nodes.button.innerHTML = ICONS.pause; this.nodes.status.innerText = 'Playing...'; this.nodes.button.classList.add('playing');
                } else if (this.data) {
                    this.nodes.button.innerHTML = ICONS.play; this.nodes.status.innerText = 'Voice Memo (Ready)';
                } else if (this.isRecording) {
                    this.nodes.button.innerHTML = ICONS.stop; this.nodes.status.innerText = 'Recording...'; this.nodes.button.classList.add('recording');
                } else {
                    this.nodes.button.innerHTML = ICONS.mic; this.nodes.status.innerText = 'Click to record';
                }
            }

            async handleAction() {
                if (this.data) {
                    this.isPlaying ? this.nodes.audio.pause() : this.nodes.audio.play();
                } else {
                    if (this.isRecording) {
                        this.recorder.stop(); this.isRecording = false; this.nodes.status.innerText = 'Processing...';
                    } else {
                        try {
                            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                            this.recorder = new MediaRecorder(stream); this.chunks = [];
                            this.recorder.ondataavailable = (e) => this.chunks.push(e.data);
                            this.recorder.onstop = () => {
                                const reader = new FileReader();
                                reader.onloadend = () => { this.data = reader.result; this.nodes.audio.src = this.data; this.updateUI(); };
                                reader.readAsDataURL(new Blob(this.chunks, { type: 'audio/ogg; codecs=opus' }));
                                stream.getTracks().forEach(track => track.stop());
                            };
                            this.recorder.start(); this.isRecording = true; this.updateUI();
                        } catch (err) { this.nodes.status.innerText = 'Mic access denied'; }
                    }
                }
            }

            destroy() {
                if (this.recorder && this.recorder.state !== 'inactive') this.recorder.stop();
                if (this.recorder && this.recorder.stream) this.recorder.stream.getTracks().forEach(track => track.stop());
                this.nodes.audio.pause();
            }
            save() { return { url: this.data }; }
        }

        // --- Editor Initialization ---
        const defaultData = {
            blocks: [
                { type: "header", data: { text: "Infinite Notes", level: 1 } },
                { type: "paragraph", data: { text: "A blazing fast, 100% serverless note-taking environment. Type '/' to view the command menu." } }
            ]
        };

        const inlineToolbarConfig = ['link', 'bold', 'italic'];

        function buildTools() {
            return {
                header: { class: Header, inlineToolbar: inlineToolbarConfig, config: { levels: [1, 2, 3], defaultLevel: 2 } },
                list: { class: NestedList, inlineToolbar: inlineToolbarConfig },
                checklist: { class: Checklist, inlineToolbar: inlineToolbarConfig },
                table: Table,
                calendar: CalendarTool,
                canvas: CanvasTool,
                voice: VoiceMemo
            };
        }

        let saveTimeout; 

        const editor = new EditorJS({
            holder: 'editorjs',
            placeholder: 'Type "/" for commands...',
            data: localStorage.getItem(STORAGE_KEY) ? JSON.parse(localStorage.getItem(STORAGE_KEY)) : defaultData,
            tools: buildTools(),
            onChange: () => {
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(async () => {
                    const outputData = await editor.save();
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(outputData));
                }, 500); 
            }
        });
    </script>
</body>
</html>
