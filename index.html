<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>Infinite Notes</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Notes">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0a0a">

    <link id="pwa-manifest" rel="manifest" href="">
    <link id="pwa-icon" rel="apple-touch-icon" href="">

    <!-- Core Markdown Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/turndown/dist/turndown.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

    <style>
        /* --- CORE THEME & EXPRESSIVE TYPOGRAPHY --- */
        :root {
            --bg-color: #ffffff;
            --bg-color-transparent: rgba(255, 255, 255, 0.85);
            --text-color: #000000;
            --muted-text: #888888;
            --font-main: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Inter", sans-serif;
            --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0a0a0a;
                --bg-color-transparent: rgba(10, 10, 10, 0.85);
                --text-color: #f0f0f0;
                --muted-text: #666666;
            }
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            margin: 0;
            padding: 0;
            width: 100vw;
            overflow-x: hidden;
            overscroll-behavior-y: none;
        }

        .app-container {
            max-width: 680px;
            width: 100%;
            margin: 0 auto;
            padding: 0 24px 60vh 24px;
            position: relative;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- THE HEADER --- */
        #header-container {
            position: relative;
            width: 100%;
            min-height: 24vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 6vh 24px 24px 24px;
            z-index: 100;
        }

        .header-max-width {
            max-width: 632px;
            margin: 0 auto;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        /* --- BRUTALIST HEADER TEXT --- */
        #date-header {
            text-align: left;
            font-size: clamp(40px, 14vw, 110px);
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            line-height: 0.9;
            color: var(--text-color);
            margin: 0 0 10px -2px;
            cursor: pointer;
            user-select: none;
            display: inline-block;
            transition: color 0.1s;
        }

        #date-header:hover {
            color: var(--muted-text);
        }

        #date-header.is-root {
            cursor: default;
        }

        #date-header.is-root:hover {
            color: var(--text-color);
        }

        .status-row {
            display: flex;
            align-items: center;
            gap: 16px;
            user-select: none;
            flex-wrap: wrap;
        }

        .db-status {
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: lowercase;
            color: var(--muted-text);
        }

        .mode-link {
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: 700;
            color: var(--text-color);
            text-transform: lowercase;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.1s;
            opacity: 0.6;
            white-space: nowrap;
        }

        .mode-link:hover {
            opacity: 1;
            text-decoration: underline;
            text-decoration-thickness: 2px;
            text-underline-offset: 3px;
        }

        .mode-link.disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        .hidden {
            display: none !important;
        }

        /* --- VANILLA PROSE EDITOR --- */
        .workspace-pane {
            flex: 1;
            width: 100%;
            background: transparent;
            border: none;
            color: inherit;
            font-family: inherit;
            font-size: clamp(18px, 4.5vw, 22px);
            outline: none;
            font-weight: 500;
            resize: none;
            -webkit-overflow-scrolling: touch;
            padding-top: 16px;
            line-height: 1.5;
            letter-spacing: -0.02em;
        }

        #live-editor:empty:before {
            content: attr(placeholder);
            color: var(--muted-text);
            pointer-events: none;
            display: block;
            font-style: italic;
        }

        .prose p:empty:before,
        .prose h1:empty:before,
        .prose h2:empty:before,
        .prose h3:empty:before {
            content: "\200B";
        }

        .prose h1,
        .prose h2,
        .prose h3,
        .prose h4,
        .prose h5,
        .prose h6 {
            font-family: inherit;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: -0.05em;
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            line-height: 1.1;
        }

        .prose>*:first-child {
            margin-top: 0;
        }

        .prose h1 {
            font-size: clamp(36px, 8vw, 48px);
        }

        .prose h2 {
            font-size: clamp(28px, 6vw, 36px);
        }

        .prose h3 {
            font-size: clamp(22px, 5vw, 28px);
        }

        .prose p,
        .prose ul,
        .prose ol {
            margin-bottom: 1em;
        }

        .prose ul,
        .prose ol {
            padding-left: 1.5em;
        }

        .prose a {
            color: var(--text-color);
            font-weight: 900;
            text-decoration: underline;
            text-decoration-thickness: 2px;
            text-underline-offset: 3px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .prose a:hover {
            background-color: var(--text-color);
            color: var(--bg-color);
        }

        .prose blockquote {
            border-left: 4px solid var(--text-color);
            padding: 0.5em 1em;
            background: rgba(128, 128, 128, 0.1);
            margin: 0 0 1em 0;
            font-weight: 600;
            font-style: italic;
            opacity: 0.8;
        }

        .prose hr {
            border: none;
            border-top: 4px solid var(--text-color);
            margin: 2em 0;
        }

        .prose code {
            border: 1px solid var(--text-color);
            padding: 0.1em 0.3em;
            font-size: 0.9em;
            word-break: break-all;
        }

        .prose pre {
            border: 2px solid var(--text-color);
            padding: 1em;
            overflow-x: auto;
            margin-bottom: 1em;
        }

        .prose pre code {
            border: none;
            padding: 0;
        }

        .prose table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5em;
            border: 2px solid var(--text-color);
            display: block;
            overflow-x: auto;
        }

        .prose th,
        .prose td {
            border: 1px solid var(--text-color);
            padding: 0.5em;
            text-align: left;
        }

        .prose th {
            background-color: var(--text-color);
            color: var(--bg-color);
            text-transform: uppercase;
            font-weight: 900;
        }

        /* --- TASK LIST CHECKBOXES --- */
        .prose li:has(> input[type="checkbox"]) {
            list-style: none;
            margin-left: -1.5em;
            display: flex;
            align-items: baseline;
            gap: 0.5em;
        }

        .prose input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border: 2px solid var(--text-color);
            background: transparent;
            cursor: default;
            flex-shrink: 0;
            position: relative;
            top: 1px;
        }

        .prose input[type="checkbox"]:checked {
            background: var(--text-color);
        }

        .prose input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            left: 2px;
            top: -1px;
            width: 6px;
            height: 9px;
            border: 2px solid var(--bg-color);
            border-top: none;
            border-left: none;
            transform: rotate(45deg);
        }

        .ai-loading-box {
            border: 2px solid var(--text-color);
            padding: 1em;
            margin: 1em 0;
            font-family: var(--font-mono);
            font-size: 0.85em;
            background: rgba(128, 128, 128, 0.05);
        }

        .ai-progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(128, 128, 128, 0.2);
            margin-top: 8px;
        }

        .ai-progress-fill {
            height: 100%;
            width: 0%;
            background: var(--text-color);
            transition: width 0.1s;
        }

        /* Ghost Autocomplete Text Styling */
        .ghost-text {
            color: var(--muted-text);
            /* pointer-events: none; REMOVED so it can be tapped on mobile */
            user-select: none;
            opacity: 0.6;
            cursor: pointer;
            /* Added a dashed border to make it look tappable */
            border-bottom: 1px dashed var(--muted-text);
        }
    </style>
</head>

<body>
    <div class="app-container">
        <div id="header-container" class="header-max-width">
            <div id="date-header">today</div>
            <div class="status-row">
                <span id="db-status" class="db-status">db.init</span>
                <a href="#" id="mode-toggle" class="mode-link">[ mode: live ]</a>
                <a href="#" id="ai-toggle" class="mode-link">[ ai: off ]</a>
                <a href="#" id="reset-db" class="mode-link" style="color: #cc0000;">[ reset db ]</a>
            </div>
        </div>

        <div id="live-editor" contenteditable="false" class="workspace-pane prose header-max-width"
            placeholder="initializing..."></div>
        <textarea id="raw-editor" class="workspace-pane hidden header-max-width"
            placeholder="start typing raw markdown here..." spellcheck="false" autocorrect="off"
            autocapitalize="none"></textarea>
        <div id="read-preview" class="workspace-pane prose hidden header-max-width"></div>
    </div>

    <script type="module">
        import { PGlite } from "https://cdn.jsdelivr.net/npm/@electric-sql/pglite/dist/index.js";
        import { vector } from "https://cdn.jsdelivr.net/npm/@electric-sql/pglite/dist/vector/index.js";
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        // ============================================================================
        // STATE & VIRTUAL PAGES
        // ============================================================================
        const modes = ['Live', 'Raw', 'Read'];
        let currentModeIndex = 0;
        let notes = {};
        let currentKey = '';
        let saveTimeout;
        const VIRTUAL_PAGES = ['index', 'days', 'personas', 'models'];
        let db = null;

        // Autocomplete State
        let currentGhostSuggestion = null;
        let ghostNode = null;

        function removeGhost() {
            if (ghostNode && ghostNode.parentNode) {
                ghostNode.parentNode.removeChild(ghostNode);
            }
            ghostNode = null;
            currentGhostSuggestion = null;
        }

        // Extracted auto-complete acceptance logic so it can be called by Tab AND Tap
        function acceptGhostSuggestion() {
            if (!currentGhostSuggestion) return;
            const suggestion = currentGhostSuggestion;
            
            const sel = window.getSelection();
            if (sel.rangeCount > 0) {
                const node = sel.focusNode;
                const offset = sel.focusOffset;
                
                if (node && node.nodeType === Node.TEXT_NODE) {
                    const textBefore = node.textContent.substring(0, offset);
                    const match = textBefore.match(/(?:^|\s)(#[a-zA-Z0-9_.]+)$/);
                    
                    removeGhost(); // Removes the span safely
                    
                    if (match) {
                        const partial = match[1];
                        const range = document.createRange();
                        range.setStart(node, offset - partial.length);
                        range.setEnd(node, offset);
                        sel.removeAllRanges();
                        sel.addRange(range);
                        
                        const baseTag = suggestion.substring(1).split('.')[0].toLowerCase();
                        // Inject HTML link and a non-breaking space so user can keep typing
                        document.execCommand('insertHTML', false, `<a href="#tag-${baseTag}">${suggestion}</a>&nbsp;`);
                        
                        clearTimeout(saveTimeout);
                        saveTimeout = setTimeout(flushLiveSave, 50);
                    }
                } else {
                    removeGhost();
                }
            } else {
                removeGhost();
            }
        }

        // ML Engine State
        let aiEngine = null;
        let aiState = 'off'; // off, loading, ready

        const AI_MODELS = [
            { id: "Qwen2.5-0.5B-Instruct-q4f16_1-MLC", name: "Qwen2.5 (0.5B)", size: "~350MB", desc: "Super tiny, fast loading. Excellent reasoning for its micro size." },
            { id: "TinyLlama-1.1B-Chat-v1.0-q4f16_1-MLC", name: "TinyLlama (1.1B)", size: "~600MB", desc: "Great balance of speed and size. Standard small chat model." },
            { id: "Llama-3.2-1B-Instruct-q4f16_1-MLC", name: "Llama 3.2 (1B)", size: "~700MB", desc: "Meta's highly capable edge model." },
            { id: "gemma-2b-it-q4f16_1-MLC", name: "Gemma (2B)", size: "~1.4GB", desc: "Google's open-weights model." },
            { id: "Phi-3-mini-4k-instruct-q4f16_1-MLC", name: "Phi-3 Mini", size: "~2.2GB", desc: "Top-tier logic. Highly recommended if your device can handle it." }
        ];

        let selectedModel = localStorage.getItem('selectedModel') || AI_MODELS[0].id;

        // ============================================================================
        // UTILS
        // ============================================================================
        function getLocalYYYYMMDD(dateObj) {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function formatDateDisplay(key) {
            const [y, m, d] = key.split('-');
            const dateObj = new Date(y, m - 1, d);
            return dateObj.toLocaleDateString(undefined, {
                weekday: 'long',
                month: 'long',
                day: 'numeric'
            }).toLowerCase();
        }

        const todayStr = getLocalYYYYMMDD(new Date());

        function getAllKnownTags() {
            let tagSet = new Set();
            for (let k in notes) {
                if (VIRTUAL_PAGES.includes(k)) continue;
                const text = notes[k];
                if (!text) continue;
                const matches = text.match(/(?:^|\s)(#[a-zA-Z0-9_]+(?:\.[a-zA-Z0-9_]+)?)\b/g);
                if (matches) {
                    matches.forEach(m => tagSet.add(m.trim()));
                }
            }
            return Array.from(tagSet).sort();
        }

        // ============================================================================
        // DATABASE IMPLEMENTATION (PGLITE)
        // ============================================================================
        const statusEl = document.getElementById('db-status');

        async function saveNoteToDB(id, content) {
            if (VIRTUAL_PAGES.includes(id)) return;
            if (!db) return;
            try {
                await db.query(`
                    INSERT INTO notes (id, content)
                    VALUES ($1, $2)
                    ON CONFLICT (id) DO UPDATE 
                    SET content = EXCLUDED.content, updated_at = CURRENT_TIMESTAMP;
                `, [id, content]);
            } catch (err) {
                console.error("Failed to save note to DB:", err);
            }
        }

        // ============================================================================
        // PARSING & TAG LOGIC
        // ============================================================================
        marked.use({
            extensions: [{
                name: 'hashtag',
                level: 'inline',
                start(src) { const match = src.match(/(^|\s)#([a-zA-Z0-9_]+(?:\.[a-zA-Z0-9_]+)?)/); return match ? match.index : undefined; },
                tokenizer(src) {
                    const match = /^(\s?)#([a-zA-Z0-9_]+)(?:\.([a-zA-Z0-9_]+))?/.exec(src);
                    if (match) return { type: 'hashtag', raw: match[0], space: match[1], baseTag: match[2], fullTag: match[3] ? `${match[2]}.${match[3]}` : match[2] };
                },
                renderer(token) { return `${token.space}<a href="#tag-${token.baseTag.toLowerCase()}">#${token.fullTag}</a>`; }
            }]
        });

        const turndownService = new TurndownService({ headingStyle: 'atx', bulletListMarker: '-', codeBlockStyle: 'fenced' });
        turndownService.addRule('hashtag', { filter: (n) => n.nodeName === 'A' && n.getAttribute('href')?.startsWith('#tag-'), replacement: (c) => c });
        
        // Ensure ghost autocomplete spans are strictly ignored on save
        turndownService.addRule('ghostText', {
            filter: function (node, options) {
                return node.nodeName === 'SPAN' && node.classList.contains('ghost-text');
            },
            replacement: function (content, node) {
                return ''; 
            }
        });

        function parseMD(text) {
            return DOMPurify.sanitize(marked.parse(text), {
                ADD_TAGS: ['table', 'th', 'tr', 'td', 'thead', 'tbody', 'input'],
                ADD_ATTR: ['type', 'checked', 'disabled']
            });
        }

        function getDynamicHashtagContent(baseTagName) {
            let groups = { _base: [] };
            const dayKeys = Object.keys(notes).filter(k => /^\d{4}-\d{2}-\d{2}$/.test(k)).sort().reverse();

            dayKeys.forEach(day => {
                const content = notes[day] || '';
                const blocks = content.split('\n\n');
                blocks.forEach(block => {
                    const regex = new RegExp(`(?:^|\\s)#${baseTagName}(?:\\.([a-zA-Z0-9_]+))?\\b`, 'gi');
                    let match; let matchedSubtags = new Set(); let matchedBase = false;
                    while ((match = regex.exec(block)) !== null) {
                        if (match[1]) matchedSubtags.add(match[1].toLowerCase());
                        else matchedBase = true;
                    }
                    if (matchedBase) groups._base.push({ day, text: block });
                    matchedSubtags.forEach(sub => {
                        if (!groups[sub]) groups[sub] = [];
                        groups[sub].push({ day, text: block });
                    });
                });
            });

            let tagMarkdown = `\n\n---\n\n`;
            let hasMentions = false;

            if (groups._base.length > 0) {
                hasMentions = true;
                tagMarkdown += `## GENERAL MENTIONS\n\n`;
                groups._base.forEach(item => {
                    tagMarkdown += `### [${formatDateDisplay(item.day)}](#${item.day})\n\n> ${item.text.replace(/\n/g, '\n> ')}\n\n`;
                });
            }

            const subKeys = Object.keys(groups).filter(k => k !== '_base').sort();
            subKeys.forEach(sub => {
                hasMentions = true;
                tagMarkdown += `## ${sub.toUpperCase()}\n\n`;
                groups[sub].forEach(item => {
                    tagMarkdown += `### [${formatDateDisplay(item.day)}](#${item.day})\n\n> ${item.text.replace(/\n/g, '\n> ')}\n\n`;
                });
            });

            if (!hasMentions) tagMarkdown += "## AGGREGATED MENTIONS\n*No mentions found yet.*";
            return tagMarkdown;
        }

        // ============================================================================
        // EDITOR & ROUTING
        // ============================================================================
        const liveEditor = document.getElementById('live-editor');
        const rawEditor = document.getElementById('raw-editor');
        const readPreview = document.getElementById('read-preview');
        const modeToggle = document.getElementById('mode-toggle');
        const aiToggle = document.getElementById('ai-toggle');
        const dateTitle = document.getElementById('date-header');

        function resetStatus() {
            setTimeout(() => { if (statusEl.textContent === 'db.saved') statusEl.textContent = 'db.ready'; }, 1500);
        }

        async function flushLiveSave() {
            if (modes[currentModeIndex] !== 'Live' || VIRTUAL_PAGES.includes(currentKey)) return;
            const keyToSave = currentKey;
            let markdown = turndownService.turndown(liveEditor.innerHTML).replace(/\u00A0/g, ' ');
            if (!markdown.trim() || markdown === '\\') markdown = '';
            if (notes[keyToSave] === markdown) return; // no-op if unchanged
            statusEl.textContent = 'db.saving';
            notes[keyToSave] = markdown;
            await saveNoteToDB(keyToSave, markdown);
            statusEl.textContent = 'db.saved';
            resetStatus();
        }

        function updateModeUI() {
            const mode = modes[currentModeIndex];
            modeToggle.innerText = `[ mode: ${mode.toLowerCase()} ]`;

            if (currentKey.startsWith('tag-')) {
                liveEditor.setAttribute('placeholder', 'Write persona instructions for this tag here...');
            } else {
                liveEditor.setAttribute('placeholder', 'Start typing...');
            }

            liveEditor.classList.add('hidden');
            rawEditor.classList.add('hidden');
            readPreview.classList.add('hidden');

            let rawMarkdown = notes[currentKey] || '';

            if (mode === 'Live') {
                liveEditor.innerHTML = parseMD(rawMarkdown);
                liveEditor.classList.remove('hidden');
                if (!VIRTUAL_PAGES.includes(currentKey)) liveEditor.focus();
            } else if (mode === 'Raw') {
                rawEditor.value = rawMarkdown;
                rawEditor.classList.remove('hidden');
                if (!VIRTUAL_PAGES.includes(currentKey)) rawEditor.focus();
            } else if (mode === 'Read') {
                if (currentKey.startsWith('tag-')) rawMarkdown += getDynamicHashtagContent(currentKey.substring(4));
                readPreview.innerHTML = parseMD(rawMarkdown);
                readPreview.classList.remove('hidden');
            }
        }

        function loadIndex() { flushLiveSave(); currentKey = 'index'; notes['index'] = `*Root Directory*\n\n- [Days](#days)\n- [Personas](#personas)\n- [Models](#models)`; dateTitle.innerText = 'INDEX'; dateTitle.classList.add('is-root'); currentModeIndex = 2; updateModeUI(); }

        function loadDays() {
            flushLiveSave();
            currentKey = 'days';
            const links = Object.keys(notes).filter(k => /^\d{4}-\d{2}-\d{2}$/.test(k)).sort().reverse().map(k => `- [${formatDateDisplay(k)}](#${k})`).join('\n');
            notes['days'] = `*All daily notes.*\n\n${links || '*No notes yet.*'}`;
            dateTitle.innerText = 'DAYS';
            dateTitle.classList.remove('is-root');
            currentModeIndex = 2;
            updateModeUI();
        }

        function loadPersonas() {
            flushLiveSave();
            currentKey = 'personas';
            const tags = new Set();
            Object.keys(notes).filter(k => /^\d{4}-\d{2}-\d{2}$/.test(k)).forEach(k => {
                const matches = notes[k].match(/(?:^|\s)#([a-zA-Z0-9_]+)(?:\.[a-zA-Z0-9_]+)?\b/g);
                if (matches) matches.forEach(m => tags.add(m.trim().substring(1).toLowerCase().split('.')[0]));
            });
            const tagLinks = Array.from(tags).sort().map(t => `- [#${t}](#tag-${t})`).join('\n') || "*No personas used yet.*";
            notes['personas'] = `*All personas used across notes.*\n\n${tagLinks}`;
            dateTitle.innerText = 'PERSONAS';
            dateTitle.classList.remove('is-root');
            currentModeIndex = 2;
            updateModeUI();
        }

        function loadModels() {
            flushLiveSave(); currentKey = 'models';
            let md = `*Select a local AI model to download and run securely inside your browser.*\n\n*Note: Larger models take longer to download and require more device RAM.*\n\n`;

            AI_MODELS.forEach(m => {
                const isSelected = m.id === selectedModel ? " **(Active)**" : "";
                md += `### [${m.name}](#model-${m.id})${isSelected}\n- **Size**: ${m.size}\n- **Info**: ${m.desc}\n\n`;
            });

            notes['models'] = md;
            dateTitle.innerText = 'MODELS'; dateTitle.classList.remove('is-root');
            currentModeIndex = 2; updateModeUI();
        }

        function loadNote(key) {
            flushLiveSave();
            currentKey = key;
            if (notes[key] === undefined) {
                notes[key] = (key.startsWith('tag-') || key.startsWith('sys-')) ? `*Write instructions here.*` : '';
                saveNoteToDB(key, notes[key]);
            }
            dateTitle.classList.remove('is-root');
            if (key.startsWith('tag-')) {
                dateTitle.innerText = '#' + key.substring(4).toUpperCase();
                if (currentModeIndex !== 2) currentModeIndex = 2;
            } else if (key.startsWith('sys-')) {
                dateTitle.innerText = key.toUpperCase();
                if (currentModeIndex !== 2) currentModeIndex = 2;
            } else {
                dateTitle.innerText = formatDateDisplay(key);
                if (currentModeIndex === 2) currentModeIndex = 0;
            }
            updateModeUI();
        }

        // =========================================================================
        // 🤖 IN-BROWSER AI EXECUTION LOGIC (WebLLM)
        // =========================================================================

        function updateAIBadge(text, state) {
            aiToggle.innerText = `[ ai: ${text} ]`;
            aiState = state;
            if (state === 'loading') aiToggle.classList.add('disabled');
            else aiToggle.classList.remove('disabled');
        }

        async function turnOnAI() {
            if (!navigator.gpu) {
                alert("WebGPU is not enabled. On iOS, go to Settings > Safari > Advanced > Feature Flags > WebGPU.");
                return;
            }
            updateAIBadge('loading', 'loading');
            try {
                if (!aiEngine) aiEngine = new webllm.MLCEngine();
                aiEngine.setInitProgressCallback((info) => {
                    updateAIBadge(`loading ${Math.round(info.progress * 100)}%`, 'loading');
                });
                await aiEngine.reload(selectedModel);
                updateAIBadge('ready', 'ready');
            } catch (err) {
                console.error(err);
                updateAIBadge('error', 'off');
                alert("Failed to load AI model. Check console.");
            }
        }

        function turnOffAI() {
            if (aiEngine) {
                aiEngine.unload().catch(() => { });
                aiEngine = null;
            }
            updateAIBadge('off', 'off');
        }

        // --- Prompt Building Helpers ---

        // Build the system prompt for a persona — just the raw persona note, nothing more.
        function buildPersonaContext(tag) {
            const raw = notes[`tag-${tag}`] || '';
            // Strip anything after the '---' separator (mention aggregation view)
            return raw.split(/\n---\n/)[0].trim();
        }

        // --- AI Execution ---

        async function executePersona(commandText, tagTrigger, placeholderId) {
            const tag = tagTrigger.substring(1).split('.')[0].toLowerCase();
            const systemPrompt = buildPersonaContext(tag);
            const placeholderNode = document.getElementById(placeholderId);
            const textNode = placeholderNode?.querySelector('.ai-status-text');

            try {
                if (aiState !== 'ready') {
                    if (textNode) textNode.innerText = `Initializing local AI engine...`;
                    await turnOnAI();
                }
                updateAIBadge('gen', 'generating');
                if (textNode) textNode.innerText = `Generating response...`;

                const messages = [
                    { role: "system", content: systemPrompt },
                    { role: "user", content: commandText }
                ];

                const chunks = await aiEngine.chat.completions.create({ messages, stream: true });
                let fullResponse = "";
                placeholderNode.outerHTML = `<div id="${placeholderId}-stream"></div>`;
                const streamNode = document.getElementById(`${placeholderId}-stream`);

                let lastRender = 0;
                for await (const chunk of chunks) {
                    const delta = chunk.choices[0]?.delta?.content || "";
                    fullResponse += delta;
                    const now = Date.now();
                    if (streamNode && now - lastRender > 100) {
                        streamNode.innerHTML = parseMD(fullResponse);
                        lastRender = now;
                    }
                }
                if (streamNode) streamNode.innerHTML = parseMD(fullResponse); // final render

                if (streamNode) { streamNode.outerHTML = parseMD(fullResponse); flushLiveSave(); }
                updateAIBadge('ready', 'ready');

            } catch (error) {
                console.error("AI Gen Error:", error);
                if (placeholderNode) {
                    placeholderNode.innerHTML = `<span style="color:#cc0000; font-weight:bold;">[AI Request Failed] ${error.message}</span>`;
                }
                updateAIBadge('error', 'ready');
            }
        }

        // --- Event Listeners ---
        modeToggle.addEventListener('click', (e) => {
            e.preventDefault(); flushLiveSave(); currentModeIndex = (currentModeIndex + 1) % modes.length; updateModeUI();
        });

        aiToggle.addEventListener('click', (e) => {
            e.preventDefault();
            if (aiState === 'off' || aiState === 'error') turnOnAI();
            else if (aiState === 'ready') turnOffAI();
        });

        document.getElementById('reset-db').addEventListener('click', async (e) => {
            e.preventDefault();
            if (confirm("Are you sure you want to completely wipe the database and start fresh?")) {
                localStorage.clear();
                if (db) {
                    try { await db.close(); } catch (e) { }
                }
                if (window.indexedDB && window.indexedDB.databases) {
                    const dbs = await window.indexedDB.databases();
                    dbs.forEach(d => window.indexedDB.deleteDatabase(d.name));
                } else {
                    window.indexedDB.deleteDatabase('idb://notes-app-v2-db');
                    window.indexedDB.deleteDatabase('/pglite/idb://notes-app-v2-db');
                }
                window.location.reload();
            }
        });

        // TAPPING LOGIC FOR MOBILE:
        // Intercept touches/clicks on the editor to handle ghost taps gracefully
        function handleEditorTap(e) {
            if (e.target && e.target.classList.contains('ghost-text')) {
                e.preventDefault(); // Stop cursor from moving elsewhere
                e.stopPropagation();
                acceptGhostSuggestion();
            } else {
                removeGhost();
            }
        }

        liveEditor.addEventListener('mousedown', handleEditorTap);
        liveEditor.addEventListener('touchstart', handleEditorTap, { passive: false });
        liveEditor.addEventListener('blur', removeGhost);

        liveEditor.addEventListener('keydown', (e) => {
            // --- 1. Ghost Tab Completion (Desktop) ---
            if ((e.key === 'Tab' || e.key === 'ArrowRight') && currentGhostSuggestion) {
                e.preventDefault();
                acceptGhostSuggestion();
                return;
            }

            // Clean up ghost on any non-typing keystroke
            if (e.key === 'Escape' || e.key.startsWith('Arrow')) {
                removeGhost();
            }

            // AI TRIGGER INTERCEPTOR ('/')
            if (e.key === '/') {
                removeGhost();
                const sel = window.getSelection();
                if (sel.rangeCount > 0 && sel.focusNode.nodeType === Node.TEXT_NODE) {
                    const text = sel.focusNode.textContent.substring(0, sel.focusOffset);
                    const match = text.match(/(.*?)(#[a-zA-Z0-9_.]+)$/);

                    if (match) {
                        e.preventDefault();

                        if (aiState === 'off') {
                            alert("Please turn on the AI engine first by clicking [ ai: off ]");
                            return;
                        }

                        const fullMatchLength = match[0].length;
                        const commandText = match[1].trim();
                        const tagTrigger = match[2];

                        const range = document.createRange();
                        range.setStart(sel.focusNode, sel.focusOffset - fullMatchLength);
                        range.setEnd(sel.focusNode, sel.focusOffset);
                        sel.removeAllRanges(); sel.addRange(range);
                        document.execCommand('delete', false, null);

                        const placeholderId = 'ai-loading-' + Date.now();
                        const promptHTML = `<div id="${placeholderId}" contenteditable="false" class="ai-loading-box"><div class="ai-status-text">...</div></div><p>&#8203;</p>`;

                        document.execCommand('insertHTML', false, promptHTML);
                        clearTimeout(saveTimeout); saveTimeout = setTimeout(flushLiveSave, 50);

                        executePersona(commandText, tagTrigger, placeholderId);
                        return;
                    }
                }
            }

            if (e.key === ' ') {
                removeGhost();
                const sel = window.getSelection();
                if (sel.rangeCount > 0 && sel.focusNode.nodeType === Node.TEXT_NODE) {
                    const text = sel.focusNode.textContent.substring(0, sel.focusOffset);

                    const tagMatch = text.match(/(?:^|\s)(#[a-zA-Z0-9_.]+)$/);
                    if (tagMatch) {
                        e.preventDefault();
                        const range = document.createRange();
                        range.setStart(sel.focusNode, sel.focusOffset - tagMatch[1].length);
                        range.setEnd(sel.focusNode, sel.focusOffset);
                        sel.removeAllRanges(); sel.addRange(range);
                        document.execCommand('insertHTML', false, `<a href="#tag-${tagMatch[1].substring(1).split('.')[0].toLowerCase()}">${tagMatch[1]}</a>&nbsp;`);
                        clearTimeout(saveTimeout); saveTimeout = setTimeout(flushLiveSave, 50);
                        return;
                    }

                    const hMatch = text.match(/^(#{1,6})$/);
                    if (hMatch || text === '>' || text === '-' || text === '1.') {
                        e.preventDefault();
                        const range = document.createRange();
                        range.setStart(sel.focusNode, 0); range.setEnd(sel.focusNode, sel.focusOffset);
                        sel.removeAllRanges(); sel.addRange(range);
                        document.execCommand('delete', false, null);

                        if (hMatch) document.execCommand('formatBlock', false, `<H${hMatch[1].length}>`);
                        else if (text === '>') document.execCommand('formatBlock', false, `<BLOCKQUOTE>`);
                        else if (text === '-') document.execCommand('insertUnorderedList', false, null);
                        else document.execCommand('insertOrderedList', false, null);

                        clearTimeout(saveTimeout); saveTimeout = setTimeout(flushLiveSave, 50);
                    }
                }
            }
        });

        liveEditor.addEventListener('input', () => {
            removeGhost(); // Clear old ghost text

            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(flushLiveSave, 500);

            const sel = window.getSelection();
            if (!sel || sel.rangeCount === 0) return;
            const node = sel.focusNode;
            if (!node || node.nodeType !== Node.TEXT_NODE) return;

            const textBefore = node.textContent.substring(0, sel.focusOffset);
            const match = textBefore.match(/(?:^|\s)(#[a-zA-Z0-9_.]+)$/);
            
            if (match) {
                const typingTag = match[1];
                
                // Only autocomplete if they've typed '#' + at least one letter
                if (typingTag.length < 2) return;

                const allTags = getAllKnownTags();
                const suggestion = allTags.find(t => t.toLowerCase().startsWith(typingTag.toLowerCase()) && t.length > typingTag.length);
                
                if (suggestion) {
                    const remainder = suggestion.substring(typingTag.length);
                    currentGhostSuggestion = typingTag + remainder; 
                    
                    // Inject invisible span
                    ghostNode = document.createElement('span');
                    ghostNode.className = 'ghost-text';
                    ghostNode.textContent = remainder;
                    ghostNode.contentEditable = 'false';
                    
                    const range = sel.getRangeAt(0);
                    range.insertNode(ghostNode);
                    range.setStartBefore(ghostNode);
                    range.collapse(true);
                    
                    sel.removeAllRanges();
                    sel.addRange(range);
                }
            }
        });

        rawEditor.addEventListener('input', () => {
            if (modes[currentModeIndex] !== 'Raw' || VIRTUAL_PAGES.includes(currentKey)) return;
            notes[currentKey] = rawEditor.value;
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(async () => {
                statusEl.textContent = 'db.saving';
                await saveNoteToDB(currentKey, notes[currentKey]);
                statusEl.textContent = 'db.saved';
                resetStatus();
            }, 500);
        });

        function handleLinkClick(e) {
            let target = e.target;
            while (target && target.tagName !== 'A' && target !== this) target = target.parentElement;
            if (target && target.tagName === 'A') {
                const href = target.getAttribute('href');
                if (href) {
                    e.preventDefault();
                    if (href.startsWith('#model-')) {
                        selectedModel = href.substring(7);
                        localStorage.setItem('selectedModel', selectedModel);
                        if (aiState !== 'off') {
                            turnOnAI(); // reload with new model
                        }
                        loadModels(); // refresh UI
                    }
                    else if (href === '#models') loadModels();
                    else if (href === '#days') loadDays();
                    else if (href === '#personas') loadPersonas();
                    else if (href === '#system') loadSystem();
                    else loadNote(href.substring(1));
                }
            }
        }

        liveEditor.addEventListener('click', handleLinkClick);
        readPreview.addEventListener('click', handleLinkClick);

        dateTitle.addEventListener('click', () => {
            if (currentKey === 'index') return;
            else if (['days', 'personas', 'models', 'system'].includes(currentKey)) loadIndex();
            else if (currentKey.startsWith('tag-') || currentKey.startsWith('sys-')) loadPersonas();
            else if (/^\d{4}-\d{2}-\d{2}$/.test(currentKey)) loadDays();
        });

        // ============================================================================
        // APP LIFECYCLE
        // ============================================================================
        async function boot() {
            try {
                db = new PGlite('idb://notes-app-v2-db', { extensions: { vector } });

                await db.exec(`
                    CREATE EXTENSION IF NOT EXISTS vector;
                    CREATE TABLE IF NOT EXISTS notes (
                        id TEXT PRIMARY KEY,
                        content TEXT,
                        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                        embedding vector(384)
                    );
                `);

                statusEl.textContent = 'db.ready';

                const allNotes = await db.query(`SELECT id, content FROM notes;`);
                allNotes.rows.forEach(row => {
                    notes[row.id] = row.content;
                });

                // No default personas seeded — each persona is defined by the user in its tag note.

                liveEditor.setAttribute('contenteditable', 'true');
                loadNote(todayStr);

            } catch (error) {
                console.error("Database initialization failed:", error);
                dateTitle.innerText = "DB Error";
                liveEditor.innerHTML = `<h2 style="color: #cc0000;">Database Initialization Failed</h2><div class="error-log">${error.message}</div>`;
            }
        }

        boot();
    </script>
</body>
