<body>

    <header>
        <h1 id="date-title" class="header-title">Loading DB...</h1>
    </header>
    <div class="sub-header">
        <a href="#" id="mode-toggle" class="mode-link">Mode: Live</a>
    </div>

    <main>
        <div id="live-editor" contenteditable="false" class="workspace-pane prose workspace-content" placeholder="Initializing database..." spellcheck="false" autocorrect="off" autocapitalize="none"></div>
        <textarea id="raw-editor" class="workspace-pane workspace-content hidden" placeholder="Start typing raw markdown here..." spellcheck="false" autocorrect="off" autocapitalize="none"></textarea>
        <div id="read-preview" class="workspace-pane prose workspace-content hidden"></div>
    </main>
    
    <script type="module">
        import { PGlite } from "https://cdn.jsdelivr.net/npm/@electric-sql/pglite/dist/index.js";
        import { vector } from "https://cdn.jsdelivr.net/npm/@electric-sql/pglite/dist/vector/index.js";
        // Import WebLLM natively for on-device inference
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        const liveEditor = document.getElementById('live-editor');
        const rawEditor = document.getElementById('raw-editor');
        const readPreview = document.getElementById('read-preview');
        const modeToggle = document.getElementById('mode-toggle');
        const dateTitle = document.getElementById('date-title');
        
        const modes = ['Live', 'Raw', 'Read'];
        let currentModeIndex = 0; 
        let notes = {};
        let currentKey = '';
        let saveTimeout;
        const VIRTUAL_PAGES = ['index', 'diary', 'tags'];

        let currentGhostSuggestion = null;
        let ghostNode = null;
        let db = null;
        
        // ML Engine State
        let aiEngine = null;
        
        // -------------------------------------------------------------
        // ULTRA-LIGHT MODEL CONFIGURATION
        // Qwen2.5-0.5B is heavily quantized. ~350MB total cache size.
        // Runs incredibly fast and is very unlikely to crash iOS Safari.
        // -------------------------------------------------------------
        const AI_MODEL = "Qwen2.5-0.5B-Instruct-q4f16_1-MLC"; 

        // =========================================================================
        // 🗄️ DATABASE & STATE LOGIC
        // =========================================================================

        async function saveNoteToDB(id, content) {
            if (VIRTUAL_PAGES.includes(id)) return;
            if (!db) return;
            try {
                await db.query(`
                    INSERT INTO notes (id, content)
                    VALUES ($1, $2)
                    ON CONFLICT (id) DO UPDATE 
                    SET content = EXCLUDED.content, updated_at = CURRENT_TIMESTAMP;
                `, [id, content]);
            } catch (err) {
                console.error("Failed to save note to DB:", err);
            }
        }

        async function flushLiveSave() {
            if (modes[currentModeIndex] === 'Live' && !VIRTUAL_PAGES.includes(currentKey)) {
                const keyToSave = currentKey; 
                let markdown = turndownService.turndown(liveEditor.innerHTML).replace(/\u00A0/g, ' ');
                if (!markdown.trim() || markdown === '\\') markdown = ''; 
                notes[keyToSave] = markdown;
                await saveNoteToDB(keyToSave, markdown);
            }
        }

        function parseMD(text) {
            return DOMPurify.sanitize(marked.parse(text), { ADD_TAGS: ['table', 'th', 'tr', 'td', 'thead', 'tbody'] });
        }

        function removeGhost() {
            if (ghostNode && ghostNode.parentNode) ghostNode.parentNode.removeChild(ghostNode);
            ghostNode = null; currentGhostSuggestion = null;
        }

        marked.use({
            extensions: [{
                name: 'hashtag',
                level: 'inline',
                start(src) { const match = src.match(/(^|\s)#([a-zA-Z0-9_]+(?:\.[a-zA-Z0-9_]+)?)/); return match ? match.index : undefined; },
                tokenizer(src) {
                    const match = /^(\s?)#([a-zA-Z0-9_]+)(?:\.([a-zA-Z0-9_]+))?/.exec(src);
                    if (match) return { type: 'hashtag', raw: match[0], space: match[1], baseTag: match[2], fullTag: match[3] ? `${match[2]}.${match[3]}` : match[2] };
                },
                renderer(token) { return `${token.space}<a href="#tag-${token.baseTag.toLowerCase()}">#${token.fullTag}</a>`; }
            }]
        });

        const turndownService = new TurndownService({ headingStyle: 'atx', bulletListMarker: '-', codeBlockStyle: 'fenced' });
        turndownService.addRule('hashtag', { filter: (n) => n.nodeName === 'A' && n.getAttribute('href')?.startsWith('#tag-'), replacement: (c) => c });
        turndownService.addRule('ghostText', { filter: (n) => n.nodeName === 'DIV' && n.classList.contains('ai-loading-box'), replacement: () => '' });

        function getTodayKey() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        function formatDateDisplay(key) {
            const [y, m, d] = key.split('-');
            return new Date(y, m - 1, d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function getAllKnownTags() {
            let tagSet = new Set();
            for (let k in notes) {
                if (VIRTUAL_PAGES.includes(k)) continue;
                const matches = notes[k].match(/(?:^|\s)(#[a-zA-Z0-9_]+(?:\.[a-zA-Z0-9_]+)?)\b/g);
                if (matches) matches.forEach(m => tagSet.add(m.trim()));
            }
            return Array.from(tagSet).sort();
        }

        function getDynamicHashtagContent(baseTagName) {
            let groups = { _base: [] };
            const dayKeys = Object.keys(notes).filter(k => /^\d{4}-\d{2}-\d{2}$/.test(k)).sort().reverse();
            
            dayKeys.forEach(day => {
                const content = notes[day] || '';
                const blocks = content.split('\n\n');
                blocks.forEach(block => {
                    const regex = new RegExp(`(?:^|\\s)#${baseTagName}(?:\\.([a-zA-Z0-9_]+))?\\b`, 'gi');
                    let match; let matchedSubtags = new Set(); let matchedBase = false;
                    while ((match = regex.exec(block)) !== null) {
                        if (match[1]) matchedSubtags.add(match[1].toLowerCase());
                        else matchedBase = true;
                    }
                    if (matchedBase) groups._base.push({ day, text: block });
                    matchedSubtags.forEach(sub => {
                        if (!groups[sub]) groups[sub] = [];
                        groups[sub].push({ day, text: block });
                    });
                });
            });
            
            let tagMarkdown = `\n\n---\n\n`;
            let hasMentions = false;
            
            if (groups._base.length > 0) {
                hasMentions = true;
                tagMarkdown += `## GENERAL MENTIONS\n\n`;
                groups._base.forEach(item => {
                    tagMarkdown += `### [${formatDateDisplay(item.day)}](#${item.day})\n\n> ${item.text.replace(/\n/g, '\n> ')}\n\n`;
                });
            }
            
            const subKeys = Object.keys(groups).filter(k => k !== '_base').sort();
            subKeys.forEach(sub => {
                hasMentions = true;
                tagMarkdown += `## ${sub.toUpperCase()}\n\n`;
                groups[sub].forEach(item => {
                    tagMarkdown += `### [${formatDateDisplay(item.day)}](#${item.day})\n\n> ${item.text.replace(/\n/g, '\n> ')}\n\n`;
                });
            });
            
            if (!hasMentions) tagMarkdown += "## AGGREGATED MENTIONS\n*No mentions found yet.*";
            return tagMarkdown;
        }

        function updateModeUI() {
            const mode = modes[currentModeIndex];
            modeToggle.innerText = `[ Mode: ${mode} ]`;
            
            if (currentKey.startsWith('tag-')) {
                liveEditor.setAttribute('placeholder', 'Write persona instructions for this tag here...');
            } else {
                liveEditor.setAttribute('placeholder', 'Start typing...');
            }
            
            liveEditor.classList.add('hidden'); 
            rawEditor.classList.add('hidden'); 
            readPreview.classList.add('hidden');
            
            let rawMarkdown = notes[currentKey] || '';

            if (mode === 'Live') {
                liveEditor.innerHTML = parseMD(rawMarkdown);
                liveEditor.classList.remove('hidden');
                if (!VIRTUAL_PAGES.includes(currentKey)) liveEditor.focus();
            } else if (mode === 'Raw') {
                rawEditor.value = rawMarkdown;
                rawEditor.classList.remove('hidden');
                if (!VIRTUAL_PAGES.includes(currentKey)) rawEditor.focus();
            } else if (mode === 'Read') {
                if (currentKey.startsWith('tag-')) rawMarkdown += getDynamicHashtagContent(currentKey.substring(4));
                readPreview.innerHTML = parseMD(rawMarkdown);
                readPreview.classList.remove('hidden');
            }
        }

        // --- Virtual Pages & Navigation ---
        function loadIndex() { flushLiveSave(); currentKey = 'index'; notes['index'] = `*Root Directory*\n\n- [Diary](#diary)\n- [Tags](#tags)`; dateTitle.innerText = 'Index'; dateTitle.classList.add('is-root'); currentModeIndex = 2; updateModeUI(); }
        function loadDiary() { flushLiveSave(); currentKey = 'diary'; const links = Object.keys(notes).filter(k => /^\d{4}-\d{2}-\d{2}$/.test(k)).sort().reverse().map(k => `- [${formatDateDisplay(k)}](#${k})`).join('\n'); notes['diary'] = `*All daily notes.*\n\n${links || '*No notes yet.*'}`; dateTitle.innerText = 'Diary'; dateTitle.classList.remove('is-root'); currentModeIndex = 2; updateModeUI(); }
        function loadTags() { flushLiveSave(); currentKey = 'tags'; const tags = new Set(); Object.keys(notes).filter(k => /^\d{4}-\d{2}-\d{2}$/.test(k)).forEach(k => { const matches = notes[k].match(/(?:^|\s)#([a-zA-Z0-9_]+)(?:\.[a-zA-Z0-9_]+)?\b/g); if (matches) matches.forEach(m => tags.add(m.trim().substring(1).toLowerCase().split('.')[0])); }); const tagLinks = Array.from(tags).sort().map(t => `- [#${t}](#tag-${t})`).join('\n') || "*No hashtags used yet.*"; notes['tags'] = `*All tags used across notes.*\n\n${tagLinks}`; dateTitle.innerText = 'Tags'; dateTitle.classList.remove('is-root'); currentModeIndex = 2; updateModeUI(); }
        function loadNote(key) {
            flushLiveSave(); currentKey = key;
            if (notes[key] === undefined) { notes[key] = key.startsWith('tag-') ? `*Write notes for this tag here.*` : ''; saveNoteToDB(key, notes[key]); }
            dateTitle.classList.remove('is-root');
            if (key.startsWith('tag-')) { dateTitle.innerText = '#' + key.substring(4).toUpperCase(); if (currentModeIndex !== 2) currentModeIndex = 2; } 
            else { dateTitle.innerText = formatDateDisplay(key); if (currentModeIndex === 2) currentModeIndex = 0; }
            updateModeUI();
        }

        // =========================================================================
        // 🤖 IN-BROWSER AI EXECUTION LOGIC (WebLLM for iOS)
        // =========================================================================

        async function initWebLLM(progressCallback) {
            if (aiEngine) return aiEngine;
            
            if (!navigator.gpu) {
                throw new Error("WebGPU is not enabled. On iOS 17, go to Settings > Safari > Advanced > Feature Flags > WebGPU.");
            }

            aiEngine = new webllm.MLCEngine();
            aiEngine.setInitProgressCallback(progressCallback);
            
            // Loads Qwen2.5 0.5B (approx ~350MB download)
            await aiEngine.reload(AI_MODEL);
            return aiEngine;
        }

        async function executePersona(commandText, tagTrigger, placeholderId) {
            const baseTag = tagTrigger.substring(1).split('.')[0].toLowerCase();
            let systemPrompt = notes[`tag-${baseTag}`] || "";
            systemPrompt = systemPrompt.split('## GENERAL MENTIONS')[0].trim();
            
            if (!systemPrompt || systemPrompt.includes('*Write notes for this tag here.*')) {
                systemPrompt = `You are a concise AI assistant representing the persona of ${tagTrigger}. Respond using Markdown. Do not hallucinate. Format beautifully.`;
            }

            const placeholderNode = document.getElementById(placeholderId);
            const textNode = placeholderNode?.querySelector('.ai-status-text');
            const progressFill = placeholderNode?.querySelector('.ai-progress-fill');

            try {
                // Initialize engine with progress callback for mobile UX
                const engine = await initWebLLM((info) => {
                    if (textNode) {
                        const pct = Math.round(info.progress * 100);
                        textNode.innerText = `Loading ML Engine (${pct}%) - ${info.text.split(']')[1] || info.text}`;
                        if (progressFill) progressFill.style.width = `${pct}%`;
                    }
                });

                if (textNode) textNode.innerText = `Generating response...`;
                if (progressFill) progressFill.style.background = "#4CAF50";

                // Generate response (Streaming for immediate feedback on slow devices)
                const messages = [
                    { role: "system", content: systemPrompt },
                    { role: "user", content: commandText || "Execute primary function." }
                ];

                const chunks = await engine.chat.completions.create({ messages, stream: true });
                
                let fullResponse = "";
                // Replace the loading box with a blockquote for the incoming stream
                placeholderNode.outerHTML = `<blockquote id="${placeholderId}-stream" style="border-left-color: #4CAF50;"></blockquote>`;
                const streamNode = document.getElementById(`${placeholderId}-stream`);

                for await (const chunk of chunks) {
                    const delta = chunk.choices[0]?.delta?.content || "";
                    fullResponse += delta;
                    if (streamNode) streamNode.innerHTML = parseMD(fullResponse);
                }

                // Finalize DOM
                if (streamNode) {
                    streamNode.outerHTML = parseMD(fullResponse);
                    flushLiveSave();
                }
                
            } catch (error) {
                console.error("AI Gen Error:", error);
                if (placeholderNode) {
                    placeholderNode.innerHTML = `<span style="color:#cc0000; font-weight:bold;">[AI Request Failed] ${error.message}</span>`;
                }
            }
        }

        // --- Event Listeners ---

        modeToggle.addEventListener('click', (e) => {
            e.preventDefault(); flushLiveSave(); currentModeIndex = (currentModeIndex + 1) % modes.length; updateModeUI();
        });

        // Use touch events for mobile ghost removal
        liveEditor.addEventListener('touchstart', removeGhost, {passive: true});
        liveEditor.addEventListener('mousedown', removeGhost);
        liveEditor.addEventListener('blur', removeGhost);

        liveEditor.addEventListener('keydown', (e) => {
            // AI TRIGGER INTERCEPTOR ('/')
            if (e.key === '/') {
                const sel = window.getSelection();
                if (sel.rangeCount > 0 && sel.focusNode.nodeType === Node.TEXT_NODE) {
                    const text = sel.focusNode.textContent.substring(0, sel.focusOffset);
                    const match = text.match(/(.*?)(#[a-zA-Z0-9_.]+)$/);
                    
                    if (match) {
                        e.preventDefault(); removeGhost();
                        
                        const fullMatchLength = match[0].length;
                        const commandText = match[1].trim();
                        const tagTrigger = match[2];
                        const baseTag = tagTrigger.substring(1).split('.')[0].toLowerCase();
                        
                        const range = document.createRange();
                        range.setStart(sel.focusNode, sel.focusOffset - fullMatchLength);
                        range.setEnd(sel.focusNode, sel.focusOffset);
                        sel.removeAllRanges(); sel.addRange(range);
                        document.execCommand('delete', false, null);
                        
                        const placeholderId = 'ai-loading-' + Date.now();
                        const promptHTML = `<blockquote><strong>${commandText}</strong> <a href="#tag-${baseTag}">${tagTrigger}</a></blockquote>
                            <div id="${placeholderId}" contenteditable="false" class="ai-loading-box">
                                <div class="ai-status-text">Initializing local AI engine (~350MB load)...</div>
                                <div class="ai-progress-bar"><div class="ai-progress-fill"></div></div>
                            </div><p>&#8203;</p>`;
                        
                        document.execCommand('insertHTML', false, promptHTML);
                        clearTimeout(saveTimeout); saveTimeout = setTimeout(flushLiveSave, 50);
                        
                        executePersona(commandText, tagTrigger, placeholderId);
                        return;
                    }
                }
            }

            // AUTO-FORMATTER (Spacebar)
            if (e.key === ' ') {
                removeGhost();
                const sel = window.getSelection();
                if (sel.rangeCount > 0 && sel.focusNode.nodeType === Node.TEXT_NODE) {
                    const text = sel.focusNode.textContent.substring(0, sel.focusOffset);
                    
                    const tagMatch = text.match(/(?:^|\s)(#[a-zA-Z0-9_.]+)$/);
                    if (tagMatch) {
                        e.preventDefault();
                        const range = document.createRange();
                        range.setStart(sel.focusNode, sel.focusOffset - tagMatch[1].length);
                        range.setEnd(sel.focusNode, sel.focusOffset);
                        sel.removeAllRanges(); sel.addRange(range);
                        document.execCommand('insertHTML', false, `<a href="#tag-${tagMatch[1].substring(1).split('.')[0].toLowerCase()}">${tagMatch[1]}</a>&nbsp;`);
                        clearTimeout(saveTimeout); saveTimeout = setTimeout(flushLiveSave, 50);
                        return; 
                    }

                    const hMatch = text.match(/^(#{1,6})$/);
                    if (hMatch || text === '>' || text === '-' || text === '1.') {
                        e.preventDefault(); 
                        const range = document.createRange();
                        range.setStart(sel.focusNode, 0); range.setEnd(sel.focusNode, sel.focusOffset);
                        sel.removeAllRanges(); sel.addRange(range);
                        document.execCommand('delete', false, null);
                        
                        if (hMatch) document.execCommand('formatBlock', false, `<H${hMatch[1].length}>`);
                        else if (text === '>') document.execCommand('formatBlock', false, `<BLOCKQUOTE>`);
                        else if (text === '-') document.execCommand('insertUnorderedList', false, null);
                        else document.execCommand('insertOrderedList', false, null);
                        
                        clearTimeout(saveTimeout); saveTimeout = setTimeout(flushLiveSave, 50);
                    }
                }
            }
        });

        liveEditor.addEventListener('input', () => {
            clearTimeout(saveTimeout); saveTimeout = setTimeout(flushLiveSave, 500);
        });

        function handleLinkClick(e) {
            let target = e.target;
            while (target && target.tagName !== 'A' && target !== this) target = target.parentElement;
            if (target && target.tagName === 'A') {
                const href = target.getAttribute('href');
                if (href) {
                    e.preventDefault();
                    if (href === '#diary') loadDiary();
                    else if (href === '#tags') loadTags();
                    else loadNote(href.substring(1));
                }
            }
        }
        
        liveEditor.addEventListener('click', handleLinkClick);
        readPreview.addEventListener('click', handleLinkClick);

        dateTitle.addEventListener('click', () => {
            if (currentKey === 'index') return; 
            else if (currentKey === 'diary' || currentKey === 'tags') loadIndex(); 
            else if (currentKey.startsWith('tag-')) loadTags(); 
            else if (/^\d{4}-\d{2}-\d{2}$/.test(currentKey)) loadDiary(); 
        });

        // =========================================================================
        // 🚀 BOOTSTRAPPER 
        // =========================================================================

        async function initApp() {
            try {
                db = new PGlite('idb://brutal-notes-db', { extensions: { vector } });

                await db.exec(`
                    CREATE EXTENSION IF NOT EXISTS vector;
                    CREATE TABLE IF NOT EXISTS notes (
                        id TEXT PRIMARY KEY,
                        content TEXT,
                        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                        embedding vector(384)
                    );
                `);

                const res = await db.query(`SELECT COUNT(*) as count FROM notes;`);
                if (parseInt(res.rows[0].count, 10) === 0) {
                    const todayKey = getTodayKey();
                    notes[todayKey] = `Welcome to your brutalist, mobile-first agent notebook.\n\n### On-Device WebGPU AI 📱\nYour device runs the AI entirely in Safari using WebLLM. No servers needed. \n\n**Test the AI (Type exactly this, then press space after the slash):**\nSimulate a pricing war #strategy/\n\n*(Note: The very first time you do this, it will download an ultra-light ~350MB model into your browser cache. Make sure you are on Wi-Fi!)*`;
                    await saveNoteToDB(todayKey, notes[todayKey]);
                } else {
                    const allNotes = await db.query(`SELECT id, content FROM notes;`);
                    allNotes.rows.forEach(row => notes[row.id] = row.content);
                }

                liveEditor.setAttribute('contenteditable', 'true');
                loadNote(getTodayKey());

            } catch (error) {
                liveEditor.innerHTML = `<h2 style="color: #cc0000;">DB Error</h2><div class="error-log">${error.message}</div>`;
            }
        }

        initApp();
    </script>
</body>
</html>
