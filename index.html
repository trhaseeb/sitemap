<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Infinite Notes</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Notes">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0a0a">

    <style>
        /* --- CORE THEME & EXPRESSIVE TYPOGRAPHY --- */
        :root {
            --bg-color: #ffffff;
            --bg-color-transparent: rgba(255, 255, 255, 0.85);
            --text-color: #000000;
            --muted-text: #888888;
            --neon-purple: #a855f7;
            --neon-green: #10b981;
            --baritone-bg: #f2f2f2;
            --baritone-text: #333333;
            --font-main: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Inter", sans-serif;
            --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0a0a0a;
                --bg-color-transparent: rgba(10, 10, 10, 0.85);
                --text-color: #f0f0f0;
                --muted-text: #666666;
                --baritone-bg: #151515;
                --baritone-text: #cccccc;
            }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: var(--font-main); margin: 0; padding: 0; width: 100vw;
            overflow-x: hidden; overscroll-behavior-y: none;
        }

        .app-container {
            max-width: 680px; width: 100%; margin: 0 auto;
            padding: 0 24px 60vh 24px; position: relative;
        }

        /* --- THE HEADER --- */
        #header-container {
            position: relative; width: 100%; min-height: 24vh;
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 6vh 24px 24px 24px; z-index: 100;
        }

        .header-max-width { max-width: 632px; margin: 0 auto; width: 100%; position: relative; z-index: 2; }

        #date-header {
            text-align: left; font-size: clamp(40px, 14vw, 110px); font-weight: 900;
            font-style: italic; text-transform: uppercase; letter-spacing: -0.05em;
            line-height: 0.9; color: var(--text-color); margin: 0 0 10px -2px;
            cursor: pointer; transition: opacity 0.2s; user-select: none; display: inline-block;
            display: flex; align-items: baseline; flex-wrap: wrap; gap: 8px;
        }
        #date-header:active { opacity: 0.5; }

        .status-row { display: flex; align-items: center; gap: 16px; user-select: none; flex-wrap: wrap; }
        .neon-status { font-family: var(--font-mono); font-size: 12px; font-weight: 700; letter-spacing: 0.05em; text-transform: lowercase; cursor: pointer; transition: opacity 0.2s; }
        .neon-status:hover { opacity: 0.7; }
        
        .ai-status { color: var(--neon-purple); opacity: 0.8; }
        .ai-status.loading { animation: neon-pulse 1.5s infinite ease-in-out; }
        .ai-status.error { color: #ef4444; opacity: 1; }
        .ai-status.standby { color: var(--muted-text); border-bottom: 1px dashed var(--muted-text); }

        .db-status { color: var(--neon-green); opacity: 0.8; transition: all 0.3s ease; }
        .db-status.saving { opacity: 1; text-shadow: 0 0 8px rgba(16, 185, 129, 0.4); }
        .db-status.error { color: #ef4444; opacity: 1; text-shadow: none; }

        @keyframes neon-pulse {
            0%, 100% { opacity: 0.8; text-shadow: 0 0 8px rgba(168, 85, 247, 0.4); }
            50% { opacity: 0.3; text-shadow: none; }
        }

        /* --- EXPRESSIVE TEXT BLOCKS --- */
        #lean-editor { position: relative; display: flex; flex-direction: column; gap: 2px; width: 100%; margin-top: 16px; counter-reset: lean-ol; }
        .stream-block { position: relative; width: 100%; transition: opacity 0.2s; }
        .stream-block:not(:has(.ol)) { counter-reset: lean-ol; }

        .text-content {
            font-size: clamp(18px, 4.5vw, 22px); font-weight: 500; letter-spacing: -0.02em;
            line-height: 1.5; color: var(--text-color); outline: none; min-height: 1.5em;
            word-wrap: break-word; padding: 4px 0; width: 100%; position: relative;
        }

        .text-content[data-placeholder]:empty:before {
            content: attr(data-placeholder); color: var(--muted-text);
            font-style: italic; font-weight: 400; opacity: 0.5; pointer-events: none;
        }

        /* Block Type Styles */
        .text-content.h1 { font-size: clamp(36px, 8vw, 48px); font-weight: 900; letter-spacing: -0.04em; line-height: 1.1; margin: 36px 0 8px 0; text-transform: uppercase; padding: 0; }
        .text-content.h2 { font-size: clamp(28px, 6vw, 36px); font-weight: 800; letter-spacing: -0.03em; line-height: 1.2; margin: 28px 0 6px 0; padding: 0; }
        .text-content.h3 { font-size: clamp(22px, 5vw, 28px); font-weight: 700; letter-spacing: -0.02em; line-height: 1.3; margin: 20px 0 4px 0; padding: 0; }
        .text-content.quote { font-size: clamp(20px, 5vw, 26px); font-weight: 600; letter-spacing: -0.01em; color: var(--baritone-text); background: var(--baritone-bg); border-left: 4px solid var(--text-color); padding: 16px 20px; margin: 8px 0; font-style: italic; }
        .text-content.ul, .text-content.ol, .text-content.todo, .text-content.todo-checked { padding-left: 32px; margin: 4px 0; }
        
        .stream-block:has(.ul)::after { content: '—'; position: absolute; left: 0; top: 4px; color: var(--text-color); font-weight: 900; pointer-events: none; }
        .stream-block:has(.ol) { counter-increment: lean-ol; }
        .stream-block:has(.ol)::after { content: counter(lean-ol) "."; position: absolute; left: 0; top: 4px; font-family: var(--font-mono); font-weight: 700; color: var(--text-color); font-size: 0.9em; pointer-events: none; }

        /* CHECKBOXES */
        .stream-block:has(.todo)::after, .stream-block:has(.todo-checked)::after { position: absolute; left: 4px; top: 8px; width: 16px; height: 16px; border-radius: 3px; cursor: pointer; pointer-events: none; }
        .stream-block:has(.todo)::after { content: ''; border: 2px solid var(--muted-text); }
        .stream-block:has(.todo-checked)::after { content: '✔'; background: var(--text-color); color: var(--bg-color); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; }
        .stream-block:has(.todo-checked) .text-content { text-decoration: line-through; color: var(--muted-text); opacity: 0.8; }

        /* DIVIDER */
        .text-content.hr { border-bottom: 2px solid var(--baritone-bg); margin: 24px 0; padding: 0; min-height: 0; height: 0; font-size: 0; }
        .text-content.hr:empty:before { display: none; }

        /* AI RESPONSE BLOCKS */
        .stream-block[class*="-ai"] .text-content { font-weight: 400; color: var(--neon-purple); }
        .stream-block[class*="-ai"]::before { content: ''; position: absolute; left: -16px; top: 10px; bottom: 10px; width: 3px; background: var(--neon-purple); opacity: 0.5; }
        .ai-cursor { display: inline-block; width: 8px; height: 18px; background-color: var(--neon-purple); vertical-align: middle; animation: blink 1s step-end infinite; margin-left: 4px; }
        @keyframes blink { 50% { opacity: 0; } }

        /* --- MENUS & UNIFIED INLINE TOOLBAR --- */
        .floating-menu { position: absolute; background: var(--bg-color); border: 2px solid var(--text-color); box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.15); z-index: 1000; display: none; flex-direction: column; width: 260px; border-radius: 4px; overflow: hidden; padding: 8px 0; transition: opacity 0.1s; }
        .floating-menu.active { display: flex; }
        .menu-item { padding: 10px 16px; font-family: var(--font-mono); font-size: 13px; font-weight: 700; text-transform: uppercase; cursor: pointer; color: var(--text-color); background: transparent; border: none; text-align: left; display: flex; justify-content: space-between; align-items: center; }
        .menu-item .sub { color: var(--muted-text); font-size: 10px; font-weight: 500; }
        .menu-item.selected, .menu-item:hover { background: var(--text-color); color: var(--bg-color); }
        .menu-item.selected .sub, .menu-item:hover .sub { color: var(--bg-color); opacity: 0.7; }
        .menu-item.create-new { color: #3b82f6; border-top: 1px solid var(--baritone-bg); }
        .menu-item.create-new.selected, .menu-item.create-new:hover { background: #3b82f6; color: #fff; }

        /* Unified Inline Context/Format Toolbar */
        .inline-toolbar {
            position: absolute; background: var(--bg-color); color: var(--text-color); border: 2px solid var(--text-color); border-radius: 2px;
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.15); display: flex; flex-direction: row; align-items: center; gap: 2px; padding: 4px;
            z-index: 10000; transition: opacity 0.15s ease, transform 0.15s ease; opacity: 0; transform: translateY(4px); pointer-events: none; white-space: nowrap;
        }
        .inline-toolbar.active { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .toolbar-btn { background: transparent; color: var(--text-color); border: none; font-family: var(--font-mono); font-size: 11px; font-weight: 800; text-transform: uppercase; cursor: pointer; padding: 6px 10px; border-radius: 2px; transition: background 0.15s, color 0.15s; }
        .toolbar-btn:hover { background: var(--text-color); color: var(--bg-color); }
        .toolbar-btn.danger { color: #ef4444; }
        .toolbar-btn.danger:hover { background: #ef4444; color: #fff; }
        .toolbar-divider { width: 2px; height: 16px; background: var(--baritone-bg); margin: 0 4px; }

        /* --- BARITONE PANELS & CONTROLS --- */
        .baritone-panel { background: var(--baritone-bg); border-radius: 2px; padding: 16px 20px; margin: 16px 0; display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .baritone-panel.virtual-block { border: 2px dashed var(--muted-text); background: transparent; opacity: 0.95; }
        .virtual-block .panel-header { color: var(--neon-purple); }
        .panel-header { font-family: var(--font-mono); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted-text); display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; user-select: none; }
        .panel-controls { display: flex; gap: 12px; align-items: center; }
        .panel-ctrl-btn { background: none; border: none; padding: 0; color: var(--muted-text); font-size: 14px; cursor: pointer; transition: color 0.2s; display: flex; align-items: center; justify-content: center; }
        .panel-ctrl-btn:hover { color: var(--text-color); }
        .panel-ctrl-btn.delete:hover { color: #ef4444; }

        .panel-title-input { background: transparent; border: none; outline: none; color: var(--text-color); font-family: var(--font-main); font-size: 24px; font-weight: 800; letter-spacing: -0.02em; width: 100%; margin-bottom: 8px; border-bottom: 2px solid transparent; transition: border-color 0.2s; }
        .panel-title-input::placeholder { color: var(--muted-text); font-weight: 600; opacity: 0.4; }
        .panel-title-input:focus { border-bottom-color: var(--text-color); }

        .raw-input { background: transparent; border: none; outline: none; color: var(--text-color); font-family: var(--font-main); font-size: 18px; font-weight: 500; width: 100%; }
        .raw-input::placeholder { color: var(--muted-text); }
        
        .raw-btn { background: var(--bg-color); border: 2px solid var(--text-color); color: var(--text-color); font-family: var(--font-mono); font-size: 11px; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: all 0.2s; padding: 8px 12px; border-radius: 2px; box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.15); display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .raw-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.15); }
        .raw-btn.active { background: var(--text-color); color: var(--bg-color); }
        .raw-btn.danger { color: #ef4444; border-color: #ef4444; }
        .raw-btn.danger.active { background: #ef4444; border-color: #ef4444; color: #fff; }

        .calendar-date-display { font-family: var(--font-mono); font-size: 15px; color: var(--neon-purple); font-weight: 700; display: inline-block; transition: opacity 0.2s; margin-bottom: 4px; cursor: pointer; }
        .calendar-date-display:hover { opacity: 0.8; }

        /* --- NATIVE INLINE TABLE --- */
        .infinotes-table { width: 100%; border-collapse: collapse; font-size: clamp(16px, 4.5vw, 20px); table-layout: fixed; margin: 12px 0; }
        .infinotes-table th, .infinotes-table td { border: 1px solid var(--baritone-bg); padding: 0; position: relative; }
        .infinotes-table th { border-bottom: 2px solid var(--text-color); font-weight: 800; text-align: left; }
        .table-cell-input { padding: 8px 12px; min-height: 38px; outline: none; word-break: break-word; color: var(--text-color); transition: background 0.1s; }
        .table-cell-input:focus { background: rgba(128, 128, 128, 0.05); }

        /* --- PERSONA MENTIONS --- */
        .persona-mention { color: #3b82f6; font-weight: 700; cursor: pointer; text-decoration: none; border-bottom: 2px solid transparent; transition: border-color 0.2s, opacity 0.2s; padding: 0 1px; }
        .persona-mention:hover { border-bottom-color: currentColor; opacity: 0.8; }

        /* --- BACKLINKS SECTION --- */
        .backlinks-section { margin-bottom: 24px; padding: 16px 20px; background: var(--baritone-bg); border-radius: 2px; }
        .backlinks-header { font-family: var(--font-mono); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted-text); margin-bottom: 12px; user-select: none; }
        .backlink-item { font-family: var(--font-mono); font-size: 13px; font-weight: 600; color: #3b82f6; cursor: pointer; padding: 6px 0; border: none; background: none; text-align: left; display: flex; gap: 8px; align-items: baseline; transition: opacity 0.2s; width: 100%; }
        .backlink-item:hover { opacity: 0.7; }
        .backlink-item .backlink-preview { color: var(--muted-text); font-weight: 400; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }

        /* --- MODALS (CALENDAR & AI CONFIG) --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-color-transparent); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 10000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal-panel { background: var(--bg-color); width: 100%; max-width: 400px; padding: 24px; display: flex; flex-direction: column; border: 2px solid var(--text-color); box-shadow: 8px 8px 0 rgba(0, 0, 0, 0.15); max-height: 90vh; overflow-y: auto; }
        
        /* Calendar specifics */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 14px; font-weight: 700; cursor: pointer; background: var(--baritone-bg); color: var(--text-color); transition: background 0.2s, color 0.2s; }
        .cal-day:active, .cal-day.selected { background: var(--text-color); color: var(--bg-color); }
        .cal-day.muted { opacity: 0.15; pointer-events: none; }
        .time-row { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 8px; padding-bottom: 8px; scrollbar-width: none; -ms-overflow-style: none; }
        .time-row::-webkit-scrollbar { display: none; }
        .time-row .raw-btn { flex: 0 0 auto; scroll-snap-align: center; border-radius: 20px; box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.15); }
        
        /* AI Config Specifics */
        .ai-model-card { border: 2px solid var(--baritone-bg); padding: 12px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s; border-radius: 2px; }
        .ai-model-card:hover { border-color: var(--neon-purple); background: rgba(168, 85, 247, 0.05); }
        .ai-model-card.active { border-color: var(--neon-purple); background: rgba(168, 85, 247, 0.1); }
        .ai-model-title { font-weight: 800; display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .ai-model-size { font-family: var(--font-mono); font-size: 10px; font-weight: 700; color: var(--muted-text); }
        .ai-model-desc { font-size: 13px; color: var(--muted-text); line-height: 1.4; margin-top: 6px; }
        
        .risk-badge { padding: 2px 6px; border-radius: 4px; font-size: 9px; font-family: var(--font-mono); text-transform: uppercase; font-weight: 800; margin-left: 8px; }
        .risk-safe { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid #10b981; }
        .risk-mod { background: rgba(234, 179, 8, 0.1); color: #eab308; border: 1px solid #eab308; }
        .risk-high { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444; }
    </style>
</head>

<body>
    <div id="header-container">
        <div class="header-max-width">
            <div id="date-header">today</div>
            <div class="status-row">
                <span id="ai-inline-status" class="neon-status ai-status standby" onclick="SystemConfig.openModal()">sys.ai.standby [tap to config]</span>
                <span id="db-status" class="neon-status db-status">db.init</span>
            </div>
        </div>
    </div>

    <div class="app-container">
        <div id="lean-editor"></div>
    </div>

    <!-- System & AI Config Modal -->
    <div id="ai-config-modal" class="modal-overlay">
        <div class="modal-panel">
            <div style="font-size: 20px; font-weight: 900; font-style: italic; text-transform: uppercase; margin-bottom: 20px;">System & AI</div>
            <div style="font-size: 13px; color: var(--muted-text); margin-bottom: 16px; line-height: 1.5;">
                Local intelligence models run in your browser's memory. Larger models are smarter but require more device RAM.
            </div>
            
            <div id="ai-model-list"></div>
            
            <div style="display: flex; gap: 12px; margin-top: 12px;">
                <button id="ai-unload-btn" class="raw-btn danger" style="flex: 1;" onclick="SystemConfig.unload()">SHUTDOWN AI</button>
            </div>
            
            <div style="margin-top: 24px; padding-top: 16px; border-top: 2px solid var(--baritone-bg);">
                <div style="font-family: var(--font-mono); font-size: 10px; color: var(--muted-text); text-transform: uppercase; margin-bottom: 12px; font-weight: 700;">Data Management</div>
                <button class="raw-btn" style="width: 100%; justify-content: flex-start;" onclick="SystemConfig.exportVault()">EXPORT VAULT (BACKUP)</button>
            </div>
            
            <div style="display: flex; gap: 12px; margin-top: 24px;">
                <button class="raw-btn active" style="flex: 1;" onclick="document.getElementById('ai-config-modal').classList.remove('active')">CLOSE</button>
            </div>
        </div>
    </div>

    <!-- Editorial Calendar Overlay -->
    <div id="editorial-cal" class="modal-overlay">
        <div class="modal-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <button id="ecal-prev" class="raw-btn">&larr;</button>
                <div id="ecal-title" style="font-size: 20px; font-weight: 900; font-style: italic; text-transform: uppercase; font-family: var(--font-main);">month</div>
                <button id="ecal-next" class="raw-btn">&rarr;</button>
            </div>
            <div id="ecal-grid" class="cal-grid"></div>
            <div id="ecal-time-container" style="display: none; flex-direction: column; gap: 16px; margin-top: 24px; border-top: 2px solid var(--text-color); padding-top: 20px;">
                <div style="font-family: var(--font-mono); font-size: 10px; color: var(--muted-text); text-transform: uppercase; margin-bottom: -8px;">Time</div>
                <div class="time-row" id="ecal-hour-row"></div>
                <div class="time-row" id="ecal-minute-row"></div>
                <div style="font-family: var(--font-mono); font-size: 10px; color: var(--muted-text); text-transform: uppercase; margin-bottom: -8px; margin-top: 8px;">Recurrence</div>
                <div class="time-row" id="ecal-recurrence-row"></div>
            </div>
            <button id="ecal-close" class="raw-btn active" style="margin-top: 24px; width: 100%; padding: 12px; font-size: 14px;">CONFIRM</button>
        </div>
    </div>

    <script type="module">
        // ============================================================================
        // ⚙️ SYSTEM UTILS & HELPERS
        // ============================================================================
        const CONFIG = { EMBEDDING_MODEL_ID: "Xenova/all-MiniLM-L3-v2", DEV_ALLOW_PAST_EDITING: true };
        window.isAIGenerating = false; 
        
        const SLASH_COMMANDS = [
            { id: 'calendar', label: 'Event', sub: 'Schedule & Recurring' },
            { id: 'recall', label: 'Recall', sub: 'Search Past Notes' }
        ];

        const MARKDOWN_MAP = {
            '# ': 'h1', '## ': 'h2', '### ': 'h3',
            '- ': 'ul', '* ': 'ul', '1. ': 'ol',
            '> ': 'quote', '[] ': 'todo', '[ ] ': 'todo',
            '[x] ': 'todo-checked', '[X] ': 'todo-checked',
            '---': 'hr'
        };

        function el(tag, attrs = {}, ...children) {
            const element = document.createElement(tag);
            for (const [key, value] of Object.entries(attrs || {})) {
                if (key === 'style') Object.assign(element.style, value);
                else if (key.startsWith('on')) element[key] = value;
                else if (key === 'className') element.className = value;
                else if (['innerHTML', 'textContent', 'value'].includes(key)) element[key] = value;
                else if (value !== false && value != null) element.setAttribute(key, value);
            }
            children.flat().filter(Boolean).forEach(child => {
                element.appendChild(typeof child === 'string' || typeof child === 'number' ? document.createTextNode(child) : child);
            });
            return element;
        }

        function setCaret(element, offset = -1) {
            element.focus();
            try {
                const range = document.createRange();
                const sel = window.getSelection();
                if (offset === -1) {
                    range.selectNodeContents(element);
                    range.collapse(false);
                } else {
                    range.setStart(element, offset);
                    range.collapse(true);
                }
                sel.removeAllRanges();
                sel.addRange(range);
            } catch (err) { }
        }

        function debounce(fn, wait) {
            let timeout;
            return function (...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => fn.apply(this, args), wait);
            };
        }

        const UI = {
            button: (text, onClick, className = '') => el('button', { className: `raw-btn ${className}`.trim(), textContent: text, onclick: onClick }),
            row: (...children) => el('div', { style: { display: 'flex', gap: '12px', flexWrap: 'wrap', alignItems: 'center' } }, ...children),
            textarea: (props) => el('textarea', { className: 'raw-input', ...props })
        };

        const getLocalYYYYMMDD = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        const parseLocal = (s) => new Date(s + 'T00:00:00');
        const normalizePlainText = (t = '') => String(t).replace(/<br\s*\/?>/gi, '\n').replace(/<[^>]*>?/gm, '').replace(/\s+/g, ' ').trim();
        const escapeHTML = (t = '') => String(t).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        const decodeHTML = (html) => { const textarea = document.createElement('textarea'); textarea.innerHTML = html; return textarea.value; };

        const NotificationEngine = {
            timers: new Map(),
            schedule: function (id, dt, title) {
                this.cancel(id);
                if (typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
                const delay = new Date(dt).getTime() - Date.now();
                if (delay > 0) {
                    this.timers.set(id, setTimeout(() => {
                        new Notification('Note Reminder', { body: title || 'Event Reached' });
                        this.timers.delete(id);
                    }, delay));
                }
            },
            cancel: function (id) {
                if (this.timers.has(id)) {
                    clearTimeout(this.timers.get(id));
                    this.timers.delete(id);
                }
            }
        };

        // ============================================================================
        // 🧠 VECTOR EMBEDDING ENGINE (Transformers.js)
        // ============================================================================
        const VectorEmbedder = new (class {
            constructor() { this.embedder = null; this.promise = null; }
            async getEmbedder() {
                if (this.embedder) return this.embedder;
                if (!this.promise) {
                    this.promise = import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0-alpha.19/+esm').then(async ({ pipeline, env }) => {
                        env.allowRemoteModels = true; env.useBrowserCache = true;
                        if (env.backends?.onnx) env.backends.onnx.logLevel = 'fatal';
                        try { this.embedder = await pipeline('feature-extraction', CONFIG.EMBEDDING_MODEL_ID, { device: 'wasm', dtype: 'q8' }); }
                        catch (e) { console.error("Embedding engine failed:", e); }
                        return this.embedder;
                    });
                }
                return this.promise;
            }
            async embedText(text, bypassLock = false) {
                if (window.isAIGenerating && !bypassLock) return null; // Allow queries if bypassLock is true
                const normalizedText = normalizePlainText(text).slice(0, 1200);
                if (!normalizedText) return null;
                try {
                    const pipe = await this.getEmbedder();
                    if (!pipe) return null;
                    const out = await pipe(normalizedText, { pooling: 'mean', normalize: true });
                    const list = typeof out.tolist === 'function' ? out.tolist() : Array.from(out.data);
                    return Array.isArray(list[0]) ? list[0] : list;
                } catch { return null; }
            }
        })();

            async saveNote(dateStr, data) {
                this.cache[dateStr] = data;
                localStorage.setItem(`infinotes_backup_${dateStr}`, JSON.stringify(data));
                if (!this.isReady) throw new Error("Offline");
                await this.pg.query(`INSERT INTO daily_notes (date_str, data) VALUES ($1, $2) ON CONFLICT (date_str) DO UPDATE SET data = EXCLUDED.data`, [dateStr, JSON.stringify(data)]);
                this.pendingDays.add(dateStr);
            }

            async getPersonas() {
                if (!this.isReady) return [];
                return (await this.pg.query(`SELECT slug, display_name, created_at, parent_slug FROM personas_list ORDER BY created_at DESC`)).rows;
            }

            async createPersona(slug, displayName, parentSlug = null) {
                if (this.isReady) {
                    await this.pg.query(
                        `INSERT INTO personas_list (slug, display_name, created_at, parent_slug) VALUES ($1, $2, $3, $4) ON CONFLICT (slug) DO NOTHING`, 
                        [slug, displayName, Date.now(), parentSlug]
                    );
                }
            }

            findBacklinks(slug) {
                const results = [];
                const searchString = `data-slug="${slug}"`;
                for (const [key, data] of Object.entries(this.cache)) {
                    if (key.startsWith('persona::') || !data?.blocks) continue;
                    for (const block of data.blocks) {
                        if (block.data?.text?.includes(searchString)) {
                            results.push({
                                dateStr: key,
                                blockId: block.id,
                                preview: decodeHTML(normalizePlainText(block.data.text)).substring(0, 80)
                            });
                            break;
                        }
                    }
                }
                return results.sort((a, b) => b.dateStr.localeCompare(a.dateStr));
            }

            startBackgroundIndexer() {
                setInterval(async () => {
                    if (!this.isReady || !this.pendingDays.size || window.isAIGenerating) return;
                    
                    const dateStr = [...this.pendingDays][0];
                    this.pendingDays.delete(dateStr);
                    const dayData = this.cache[dateStr];
                    
                    if (!dayData?.blocks) return;
                    
                    try {
                        await this.pg.query(`DELETE FROM semantic_index WHERE date_str = $1`, [dateStr]);
                        for (const block of dayData.blocks) {
                            const textToEmbed = ['text', 'h1', 'h2', 'h3'].includes(block.type) 
                                ? normalizePlainText(block.data?.text) 
                                : normalizePlainText(JSON.stringify(block.data));
                                
                            if (!textToEmbed) continue;
                            const vec = await VectorEmbedder.embedText(textToEmbed, false);
                            if (!vec) continue;
                            
                            await this.pg.query(
                                `INSERT INTO semantic_index (key, date_str, block_id, block_type, search_text, embedding, timestamp) VALUES ($1, $2, $3, $4, $5, $6::vector, $7)`,
                                [`${dateStr}::${block.id}`, dateStr, block.id, block.type, textToEmbed, `[${vec.join(',')}]`, block.timestamp || Date.now()]
                            );
                        }
                    } catch (e) { console.warn("Indexer error:", e); }
                }, 5000);
            }

            async searchSemantic(queryText, excludeDate, limit = 5, bypassLock = false) {
                if (!this.isReady || (window.isAIGenerating && !bypassLock)) return []; 
                const vec = await VectorEmbedder.embedText(queryText, bypassLock);
                if (!vec) return [];
                
                const result = await this.pg.query(
                    `SELECT date_str as date, block_id as "blockId", block_type as type, search_text as "searchText", timestamp, 1 - (embedding <=> $1::vector) AS score 
                     FROM semantic_index 
                     WHERE date_str != $2 
                     ORDER BY embedding <=> $1::vector ASC 
                     LIMIT $3`,
                    [`[${vec.join(',')}]`, excludeDate || '', limit]
                );
                return result.rows;
            }
        }

        const EditorialCalendar = (() => {
            const modal = document.getElementById('editorial-cal');
            const title = document.getElementById('ecal-title');
            const grid = document.getElementById('ecal-grid');
            const timeContainer = document.getElementById('ecal-time-container');
            const hourRow = document.getElementById('ecal-hour-row');
            const minuteRow = document.getElementById('ecal-minute-row');
            const recurrenceRow = document.getElementById('ecal-recurrence-row');
            
            let viewDate, activeDate, requireTime, onConfirm;
            let selectedHour = 0, selectedMinute = 0, selectedRecurrence = 'none';
            
            const RECURRENCE_OPTS = [
                { id: 'none', label: 'Once' },
                { id: 'daily', label: 'Daily' },
                { id: 'weekly', label: 'Weekly' },
                { id: 'monthly', label: 'Monthly' },
                { id: 'yearly', label: 'Yearly' }
            ];
            
            const formatHour = (h) => `${h % 12 || 12} ${h >= 12 ? 'PM' : 'AM'}`;

            function renderCarousel(row, items, selectedVal, onSelect) {
                row.innerHTML = '';
                items.forEach(item => {
                    const btn = el('button', {
                        className: `raw-btn ${item.val === selectedVal ? 'active' : ''}`,
                        textContent: item.label,
                        onclick: () => {
                            onSelect(item.val);
                            renderCarousel(row, items, item.val, onSelect);
                        }
                    });
                    row.appendChild(btn);
                    if (item.val === selectedVal) {
                        setTimeout(() => btn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' }), 10);
                    }
                });
            }

            function render() {
                const year = viewDate.getFullYear();
                const month = viewDate.getMonth();
                
                title.textContent = viewDate.toLocaleDateString(undefined, { month: 'short', year: 'numeric' });
                grid.innerHTML = '';
                
                const startDay = new Date(year, month, 1).getDay();
                for (let i = 0; i < startDay; i++) {
                    grid.appendChild(el('div', { className: 'cal-day muted' }));
                }
                
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                for (let i = 1; i <= daysInMonth; i++) {
                    const isSelected = (year === activeDate.getFullYear() && month === activeDate.getMonth() && i === activeDate.getDate());
                    const currentDayStr = getLocalYYYYMMDD(new Date(year, month, i));
                    const isMuted = !requireTime && currentDayStr > todayStr;
                    
                    grid.appendChild(el('div', {
                        className: `cal-day ${isSelected ? 'selected' : ''} ${isMuted ? 'muted' : ''}`,
                        textContent: i,
                        onclick: () => {
                            if (!isMuted) {
                                activeDate = new Date(year, month, i);
                                render();
                            }
                        }
                    }));
                }
            }

            document.getElementById('ecal-prev').onclick = () => { viewDate.setMonth(viewDate.getMonth() - 1); render(); };
            document.getElementById('ecal-next').onclick = () => { viewDate.setMonth(viewDate.getMonth() + 1); render(); };
            document.getElementById('ecal-close').onclick = () => {
                modal.classList.remove('active');
                if (requireTime) {
                    activeDate.setHours(selectedHour, selectedMinute, 0);
                }
                if (onConfirm) onConfirm(activeDate, requireTime ? selectedRecurrence : null);
            };

            return {
                open: (initialDate, needsTime, initialRecurrence, callback) => {
                    activeDate = initialDate || new Date();
                    viewDate = new Date(activeDate);
                    requireTime = needsTime;
                    onConfirm = callback;
                    timeContainer.style.display = needsTime ? 'flex' : 'none';
                    
                    if (needsTime) {
                        selectedHour = activeDate.getHours();
                        selectedMinute = Math.round(activeDate.getMinutes() / 5) * 5;
                        if (selectedMinute === 60) {
                            selectedMinute = 0;
                            selectedHour = (selectedHour + 1) % 24;
                        }
                        selectedRecurrence = initialRecurrence || 'none';
                        
                        renderCarousel(hourRow, Array.from({ length: 24 }, (_, i) => ({ val: i, label: formatHour(i) })), selectedHour, v => selectedHour = v);
                        renderCarousel(minuteRow, Array.from({ length: 12 }, (_, i) => ({ val: i * 5, label: String(i * 5).padStart(2, '0') })), selectedMinute, v => selectedMinute = v);
                        renderCarousel(recurrenceRow, RECURRENCE_OPTS.map(o => ({ val: o.id, label: o.label })), selectedRecurrence, v => selectedRecurrence = v);
                    }
                    
                    render();
                    modal.classList.add('active');
                }
            };
        })();
