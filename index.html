<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRUTAL NOTES</title>
    
    <!-- Marked.js for Markdown -> HTML -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- Turndown.js for HTML -> Markdown (powers the Live Mode sync) -->
    <script src="https://unpkg.com/turndown/dist/turndown.js"></script>
    
    <!-- DOMPurify for security -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    
    <style>
        /* 1. CSS Variables for Dark/Light Mode Theming */
        :root {
            --bg: #f4f4f0; /* Off-white newspaper feel */
            --fg: #111111; /* Brutal black */
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #111111;
                --fg: #f4f4f0;
            }
        }

        /* 2. Base Brutalist Reset & Layout */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            background-color: var(--bg);
            color: var(--fg);
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            line-height: 1.6;
        }

        /* Inverse text selection */
        ::selection {
            background-color: var(--fg);
            color: var(--bg);
        }

        /* Custom thick scrollbar */
        ::-webkit-scrollbar {
            width: 14px;
            height: 14px;
            border-left: 4px solid var(--fg);
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--fg);
        }

        /* 3. Layout Structure */
        header {
            padding: 1.5rem 1.5rem 0 1.5rem;
            border-bottom: 6px solid var(--fg);
            flex-shrink: 0;
            user-select: none;
        }

        .header-title {
            font-size: clamp(3rem, 9vw, 7rem); /* Oversized font scaling */
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.06em; /* Tight editorial tracking */
            line-height: 0.8; /* Squeezed line height */
            padding-bottom: 0.5rem; /* Spacing before the thick border */
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%; 
            transition: color 0.1s;
        }

        .header-title:hover {
            color: #888888; /* Subtle hover state */
        }

        /* Stop hover effect when at the root directory */
        .header-title.is-root {
            cursor: default;
        }
        .header-title.is-root:hover {
            color: var(--fg);
        }

        .sub-header {
            padding: 0.5rem 1.5rem 1.5rem 1.5rem;
            flex-shrink: 0;
            user-select: none;
        }

        .mode-link {
            font-family: inherit;
            font-size: clamp(0.75rem, 1.5vw, 1rem);
            font-weight: 900;
            color: var(--fg);
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.1s;
            opacity: 0.6;
        }

        .mode-link:hover {
            opacity: 1;
            text-decoration: underline;
            text-decoration-thickness: 3px;
            text-underline-offset: 4px;
        }

        main {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Shared Editor/Preview Pane Styles */
        .workspace-pane {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            padding: clamp(1.5rem, 5vw, 3rem);
            overflow-y: auto;
            background: transparent;
            border: none;
            color: inherit;
            font-family: inherit;
            font-size: clamp(1rem, 2vw, 1.25rem);
            outline: none;
            font-weight: 500;
            resize: none;
        }

        /* Center the text column for readability */
        .workspace-content {
            max-width: 56rem;
            margin: 0 auto;
            width: 100%;
            min-height: 100%; 
        }

        .hidden {
            display: none !important;
        }

        /* Ghost Autocomplete Text Styling */
        .ghost-text {
            color: #aaaaaa;
            pointer-events: none;
            user-select: none;
        }

        /* 4. Vanilla CSS "Prose" Engine */
        .prose h1, .prose h2, .prose h3, .prose h4, .prose h5, .prose h6 {
            font-family: inherit;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: -0.05em;
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            line-height: 1.1;
        }
        
        .prose > *:first-child { margin-top: 0; }

        .prose h1 { font-size: 2.25em; }
        .prose h2 { font-size: 1.8em; }
        .prose h3 { font-size: 1.5em; }
        .prose h4 { font-size: 1.25em; }
        
        .prose p, .prose ul, .prose ol { margin-bottom: 1em; }
        .prose ul { list-style-type: disc; padding-left: 1.5em; }
        .prose ol { list-style-type: decimal; padding-left: 1.5em; }
        .prose li { margin-bottom: 0.5em; }

        .prose a {
            color: var(--fg);
            font-weight: 900;
            text-decoration: underline;
            text-decoration-thickness: 3px;
            text-underline-offset: 4px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .prose a:hover {
            background-color: var(--fg);
            color: var(--bg);
        }

        .prose blockquote {
            border-left: 8px solid var(--fg);
            padding: 0.5em 1.5em;
            background: rgba(128, 128, 128, 0.1);
            margin-left: 0;
            margin-right: 0;
            font-weight: bold;
        }

        .prose hr {
            border: none;
            border-top: 4px solid var(--fg);
            margin: 2em 0;
        }

        .prose code {
            border: 2px solid var(--fg);
            padding: 0.1em 0.3em;
            background: transparent;
            font-size: 0.9em;
        }
        
        .prose pre {
            border: 4px solid var(--fg);
            padding: 1em;
            background: transparent;
            overflow-x: auto;
            margin-bottom: 1em;
        }
        
        .prose pre code {
            border: none;
            padding: 0;
        }

        #live-editor:empty:before {
            content: attr(placeholder);
            color: #888;
            pointer-events: none;
            display: block;
        }

        .prose p:empty:before, .prose h1:empty:before, .prose h2:empty:before, 
        .prose h3:empty:before, .prose h4:empty:before, .prose h5:empty:before, 
        .prose h6:empty:before {
            content: "\200B"; 
        }

    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <h1 id="date-title" class="header-title">Loading...</h1>
    </header>
    <div class="sub-header">
        <a href="#" id="mode-toggle" class="mode-link">Mode: Live</a>
    </div>

    <!-- Main Single Workspace -->
    <main>
        <!-- Mode 1: Live (Rich Text with Auto-Markdown) -->
        <div id="live-editor" 
             contenteditable="true"
             class="workspace-pane prose workspace-content"
             placeholder="Start typing naturally..."
             spellcheck="false"></div>

        <!-- Mode 2: Raw (Standard Code Editor) -->
        <textarea id="raw-editor" 
                  class="workspace-pane workspace-content hidden"
                  placeholder="Start typing raw markdown here..."
                  spellcheck="false"></textarea>

        <!-- Mode 3: Read (Locked view / Aggregation view) -->
        <div id="read-preview" 
             class="workspace-pane prose workspace-content hidden"></div>
    </main>
    
    <script>
        // --- DOM Elements ---
        const liveEditor = document.getElementById('live-editor');
        const rawEditor = document.getElementById('raw-editor');
        const readPreview = document.getElementById('read-preview');
        const modeToggle = document.getElementById('mode-toggle');
        const dateTitle = document.getElementById('date-title');
        
        // --- State ---
        const modes = ['Live', 'Raw', 'Read'];
        let currentModeIndex = 0; 
        let notes = {};
        let currentKey = '';
        let saveTimeout;
        const VIRTUAL_PAGES = ['index', 'diary', 'tags'];

        // Autocomplete State
        let currentGhostSuggestion = null;
        let ghostNode = null;

        function removeGhost() {
            if (ghostNode && ghostNode.parentNode) {
                ghostNode.parentNode.removeChild(ghostNode);
            }
            ghostNode = null;
            currentGhostSuggestion = null;
        }

        // --- Custom Markdown Extension for Hashtags & Subtags ---
        marked.use({
            extensions: [{
                name: 'hashtag',
                level: 'inline',
                start(src) { 
                    const match = src.match(/(^|\s)#([a-zA-Z0-9_]+(?:\.[a-zA-Z0-9_]+)?)/);
                    return match ? match.index : undefined; 
                },
                tokenizer(src, tokens) {
                    const rule = /^(\s?)#([a-zA-Z0-9_]+)(?:\.([a-zA-Z0-9_]+))?/;
                    const match = rule.exec(src);
                    if (match) {
                        const baseTag = match[2];
                        const subTag = match[3];
                        const fullTag = subTag ? `${baseTag}.${subTag}` : baseTag;
                        return {
                            type: 'hashtag',
                            raw: match[0],
                            space: match[1],
                            baseTag: baseTag,
                            fullTag: fullTag
                        };
                    }
                },
                renderer(token) {
                    return `${token.space}<a href="#tag-${token.baseTag.toLowerCase()}">#${token.fullTag}</a>`;
                }
            }]
        });

        const turndownService = new TurndownService({
            headingStyle: 'atx',
            bulletListMarker: '-',
            codeBlockStyle: 'fenced'
        });
        
        // Ensure hashtags convert back to clean markdown
        turndownService.addRule('hashtag', {
            filter: function (node, options) {
                return node.nodeName === 'A' && node.getAttribute('href') && node.getAttribute('href').startsWith('#tag-');
            },
            replacement: function (content, node) {
                return content; 
            }
        });

        // Ensure ghost autocomplete spans are strictly ignored on save
        turndownService.addRule('ghostText', {
            filter: function (node, options) {
                return node.nodeName === 'SPAN' && node.classList.contains('ghost-text');
            },
            replacement: function (content, node) {
                return ''; 
            }
        });

        // --- Date & Utility Functions ---
        function getTodayKey() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        function formatDateDisplay(key) {
            const [y, m, d] = key.split('-');
            const date = new Date(y, m - 1, d);
            return date.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
        }

        function getAllKnownTags() {
            let tagSet = new Set();
            for (let k in notes) {
                if (VIRTUAL_PAGES.includes(k)) continue;
                const text = notes[k];
                const matches = text.match(/(?:^|\s)(#[a-zA-Z0-9_]+(?:\.[a-zA-Z0-9_]+)?)\b/g);
                if (matches) {
                    matches.forEach(m => tagSet.add(m.trim()));
                }
            }
            return Array.from(tagSet).sort();
        }

        // --- Core Save/Load Functions ---
        function loadNotesData() {
            const saved = localStorage.getItem('brutalNotes');
            if (saved) {
                notes = JSON.parse(saved);
            }
        }

        function saveNotesData() {
            const toSave = {};
            for(let k in notes) {
                if(!VIRTUAL_PAGES.includes(k)) {
                    toSave[k] = notes[k];
                }
            }
            localStorage.setItem('brutalNotes', JSON.stringify(toSave));
        }

        function flushLiveSave() {
            if (modes[currentModeIndex] === 'Live' && !VIRTUAL_PAGES.includes(currentKey)) {
                // Remove non-breaking spaces generated by 'insertHTML' formatting commands
                let markdown = turndownService.turndown(liveEditor.innerHTML).replace(/\u00A0/g, ' ');
                if (!markdown.trim() || markdown === '\\') markdown = ''; 
                notes[currentKey] = markdown;
                saveNotesData();
            }
        }

        function getDynamicHashtagContent(baseTagName) {
            let groups = { _base: [] };
            const dayKeys = Object.keys(notes).filter(k => /^\d{4}-\d{2}-\d{2}$/.test(k)).sort().reverse();
            
            dayKeys.forEach(day => {
                const content = notes[day] || '';
                const blocks = content.split('\n\n');
                
                blocks.forEach(block => {
                    const regex = new RegExp(`(?:^|\\s)#${baseTagName}(?:\\.([a-zA-Z0-9_]+))?\\b`, 'gi');
                    let match;
                    let matchedSubtags = new Set();
                    let matchedBase = false;
                    
                    while ((match = regex.exec(block)) !== null) {
                        if (match[1]) {
                            matchedSubtags.add(match[1].toLowerCase());
                        } else {
                            matchedBase = true;
                        }
                    }
                    
                    if (matchedBase) {
                        groups._base.push({ day, text: block });
                    }
                    
                    matchedSubtags.forEach(sub => {
                        if (!groups[sub]) groups[sub] = [];
                        groups[sub].push({ day, text: block });
                    });
                });
            });
            
            let tagMarkdown = `\n\n---\n\n`;
            let hasMentions = false;
            
            if (groups._base.length > 0) {
                hasMentions = true;
                tagMarkdown += `## GENERAL MENTIONS\n\n`;
                groups._base.forEach(item => {
                    tagMarkdown += `### [${formatDateDisplay(item.day)}](#${item.day})\n\n> ${item.text.replace(/\n/g, '\n> ')}\n\n`;
                });
            }
            
            const subKeys = Object.keys(groups).filter(k => k !== '_base').sort();
            subKeys.forEach(sub => {
                hasMentions = true;
                tagMarkdown += `## ${sub.toUpperCase()}\n\n`;
                groups[sub].forEach(item => {
                    tagMarkdown += `### [${formatDateDisplay(item.day)}](#${item.day})\n\n> ${item.text.replace(/\n/g, '\n> ')}\n\n`;
                });
            });
            
            if (!hasMentions) tagMarkdown += "## AGGREGATED MENTIONS\n*No mentions found yet.*";
            
            return tagMarkdown;
        }

        function updateModeUI() {
            const mode = modes[currentModeIndex];
            modeToggle.innerText = `[ Mode: ${mode} ]`;
            
            if (currentKey.startsWith('tag-')) {
                liveEditor.setAttribute('placeholder', 'Write a definition or notes for this tag here...');
            } else {
                liveEditor.setAttribute('placeholder', 'Start typing naturally...');
            }
            
            liveEditor.classList.add('hidden');
            rawEditor.classList.add('hidden');
            readPreview.classList.add('hidden');
            
            let rawMarkdown = notes[currentKey] || '';

            if (mode === 'Live') {
                liveEditor.innerHTML = DOMPurify.sanitize(marked.parse(rawMarkdown));
                liveEditor.classList.remove('hidden');
                if (!VIRTUAL_PAGES.includes(currentKey)) {
                    liveEditor.focus();
                }
            } else if (mode === 'Raw') {
                rawEditor.value = rawMarkdown;
                rawEditor.classList.remove('hidden');
                if (!VIRTUAL_PAGES.includes(currentKey)) rawEditor.focus();
            } else if (mode === 'Read') {
                if (currentKey.startsWith('tag-')) {
                    const tagName = currentKey.substring(4);
                    rawMarkdown += getDynamicHashtagContent(tagName);
                }
                
                readPreview.innerHTML = DOMPurify.sanitize(marked.parse(rawMarkdown));
                readPreview.classList.remove('hidden');
            }
        }

        // --- Navigation Levels ---

        function loadIndex() {
            flushLiveSave();
            currentKey = 'index';
            notes['index'] = `*Root Directory*\n\n- [Diary](#diary)\n- [Tags](#tags)`;
            dateTitle.innerText = 'Index';
            dateTitle.title = "You are at the root directory";
            dateTitle.classList.add('is-root');
            currentModeIndex = 2; 
            updateModeUI();
        }

        function loadDiary() {
            flushLiveSave();
            currentKey = 'diary';
            const dayKeys = Object.keys(notes).filter(k => /^\d{4}-\d{2}-\d{2}$/.test(k)).sort().reverse(); 
            const links = dayKeys.map(k => `- [${formatDateDisplay(k)}](#${k})`).join('\n');
            notes['diary'] = `*All daily notes.*\n\n${links || '*No notes yet.*'}`;
            dateTitle.innerText = 'Diary';
            dateTitle.title = "Click to go up to Index";
            dateTitle.classList.remove('is-root');
            currentModeIndex = 2; 
            updateModeUI();
        }

        function loadTags() {
            flushLiveSave();
            currentKey = 'tags';
            const dayKeys = Object.keys(notes).filter(k => /^\d{4}-\d{2}-\d{2}$/.test(k)); 
            const tags = new Set();
            
            dayKeys.forEach(k => {
                const text = notes[k];
                const matches = text.match(/(?:^|\s)#([a-zA-Z0-9_]+)(?:\.[a-zA-Z0-9_]+)?\b/g);
                if (matches) {
                    matches.forEach(m => {
                        const fullTag = m.trim().substring(1).toLowerCase();
                        const baseTag = fullTag.split('.')[0];
                        tags.add(baseTag);
                    });
                }
            });
            
            let tagLinks = Array.from(tags).sort().map(t => `- [#${t}](#tag-${t})`).join('\n');
            if(!tagLinks) tagLinks = "*No hashtags used yet.*";
            
            notes['tags'] = `*All tags used across notes.*\n\n${tagLinks}`;
            dateTitle.innerText = 'Tags';
            dateTitle.title = "Click to go up to Index";
            dateTitle.classList.remove('is-root');
            currentModeIndex = 2; 
            updateModeUI();
        }

        function loadNote(key) {
            flushLiveSave();
            currentKey = key;
            
            if (notes[key] === undefined) {
                if (key.startsWith('tag-')) {
                    notes[key] = `*Write notes or a definition for this tag here.*`;
                } else {
                    notes[key] = ''; 
                }
                saveNotesData();
            }

            dateTitle.classList.remove('is-root');
            if (key.startsWith('tag-')) {
                dateTitle.innerText = '#' + key.substring(4).toUpperCase();
                dateTitle.title = "Click to go up to Tags Directory";
                if (currentModeIndex !== 2) currentModeIndex = 2;
            } else {
                dateTitle.innerText = formatDateDisplay(key);
                dateTitle.title = "Click to go up to Diary Directory";
                if (currentModeIndex === 2) currentModeIndex = 0; 
            }

            updateModeUI();
        }

        // --- Event Listeners & Editor Magic ---

        modeToggle.addEventListener('click', (e) => {
            e.preventDefault(); 
            flushLiveSave();
            currentModeIndex = (currentModeIndex + 1) % modes.length;
            updateModeUI();
        });

        // Clear ghosts on focus loss
        liveEditor.addEventListener('mousedown', removeGhost);
        liveEditor.addEventListener('blur', removeGhost);

        liveEditor.addEventListener('keydown', (e) => {
            // 1. Ghost Tab Completion
            if ((e.key === 'Tab' || e.key === 'ArrowRight') && currentGhostSuggestion) {
                e.preventDefault();
                const suggestion = currentGhostSuggestion;
                
                const sel = window.getSelection();
                if (sel.rangeCount > 0) {
                    const node = sel.focusNode;
                    const offset = sel.focusOffset;
                    
                    if (node && node.nodeType === Node.TEXT_NODE) {
                        const textBefore = node.textContent.substring(0, offset);
                        const match = textBefore.match(/(?:^|\s)(#[a-zA-Z0-9_.]+)$/);
                        
                        removeGhost(); // Strip out the ghost span safely
                        
                        if (match) {
                            const partial = match[1];
                            const range = document.createRange();
                            range.setStart(node, offset - partial.length);
                            range.setEnd(node, offset);
                            sel.removeAllRanges();
                            sel.addRange(range);
                            
                            const baseTag = suggestion.substring(1).split('.')[0].toLowerCase();
                            // Inject HTML link and a non-breaking space so user can keep typing
                            document.execCommand('insertHTML', false, `<a href="#tag-${baseTag}">${suggestion}</a>&nbsp;`);
                            
                            clearTimeout(saveTimeout);
                            saveTimeout = setTimeout(flushLiveSave, 50);
                        }
                    } else {
                        removeGhost();
                    }
                } else {
                    removeGhost();
                }
                return;
            }

            // Clean up ghost on any non-typing keystroke
            if (e.key === 'Escape' || e.key.startsWith('Arrow')) {
                removeGhost();
            }

            // 2. Instant Spacebar formatting (for full tags and headers)
            if (e.key === ' ') {
                removeGhost();
                const sel = window.getSelection();
                if (sel.rangeCount > 0) {
                    const node = sel.focusNode;
                    if (node && node.nodeType === Node.TEXT_NODE) {
                        const textBeforeCursor = node.textContent.substring(0, sel.focusOffset);
                        
                        // Instant Tag Check (Did they finish typing a tag naturally?)
                        const tagMatch = textBeforeCursor.match(/(?:^|\s)(#[a-zA-Z0-9_.]+)$/);
                        if (tagMatch) {
                            e.preventDefault();
                            const fullTag = tagMatch[1];
                            const range = document.createRange();
                            range.setStart(node, sel.focusOffset - fullTag.length);
                            range.setEnd(node, sel.focusOffset);
                            sel.removeAllRanges();
                            sel.addRange(range);

                            const baseTag = fullTag.substring(1).split('.')[0].toLowerCase();
                            document.execCommand('insertHTML', false, `<a href="#tag-${baseTag}">${fullTag}</a>&nbsp;`);
                            
                            clearTimeout(saveTimeout);
                            saveTimeout = setTimeout(flushLiveSave, 50);
                            return; 
                        }

                        // Existing Instant Header formatting
                        let formatTag = null;
                        let execCmd = null;

                        const hMatch = textBeforeCursor.match(/^(#{1,6})$/);
                        if (hMatch) {
                            formatTag = `H${hMatch[1].length}`;
                        } else if (textBeforeCursor === '>') {
                            formatTag = 'BLOCKQUOTE';
                        } else if (textBeforeCursor === '-' || textBeforeCursor === '*') {
                            execCmd = 'insertUnorderedList';
                        } else if (textBeforeCursor === '1.') {
                            execCmd = 'insertOrderedList';
                        }

                        if (formatTag || execCmd) {
                            e.preventDefault(); 
                            const range = document.createRange();
                            range.setStart(node, 0);
                            range.setEnd(node, sel.focusOffset);
                            sel.removeAllRanges();
                            sel.addRange(range);

                            document.execCommand('delete', false, null);

                            if (formatTag) {
                                document.execCommand('formatBlock', false, `<${formatTag}>`);
                            } else {
                                document.execCommand(execCmd, false, null);
                            }
                            
                            clearTimeout(saveTimeout);
                            saveTimeout = setTimeout(flushLiveSave, 50);
                        }
                    }
                }
            }
        });

        liveEditor.addEventListener('input', (e) => {
            removeGhost(); // Clear old ghost text
            
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(flushLiveSave, 500);

            const sel = window.getSelection();
            if (!sel || sel.rangeCount === 0) return;
            const node = sel.focusNode;
            if (!node || node.nodeType !== Node.TEXT_NODE) return;

            const textBefore = node.textContent.substring(0, sel.focusOffset);
            const match = textBefore.match(/(?:^|\s)(#[a-zA-Z0-9_.]+)$/);
            
            if (match) {
                const typingTag = match[1];
                
                // Only autocomplete if they've typed '#' + at least one letter
                if (typingTag.length < 2) return;

                const allTags = getAllKnownTags();
                const suggestion = allTags.find(t => t.toLowerCase().startsWith(typingTag.toLowerCase()) && t.length > typingTag.length);
                
                if (suggestion) {
                    const remainder = suggestion.substring(typingTag.length);
                    currentGhostSuggestion = typingTag + remainder; 
                    
                    // Inject invisible span
                    ghostNode = document.createElement('span');
                    ghostNode.className = 'ghost-text';
                    ghostNode.textContent = remainder;
                    ghostNode.contentEditable = 'false';
                    
                    const range = sel.getRangeAt(0);
                    range.insertNode(ghostNode);
                    range.setStartBefore(ghostNode);
                    range.collapse(true);
                    
                    sel.removeAllRanges();
                    sel.addRange(range);
                }
            }
        });

        rawEditor.addEventListener('input', () => {
            if (!VIRTUAL_PAGES.includes(currentKey)) {
                notes[currentKey] = rawEditor.value;
                saveNotesData();
            }
        });

        // Router handler for inline links
        function handleLinkClick(e) {
            let target = e.target;
            while (target && target.tagName !== 'A' && target !== this) {
                target = target.parentElement;
            }
            if (target && target.tagName === 'A') {
                const href = target.getAttribute('href');
                if (href) {
                    if (href === '#diary') { e.preventDefault(); loadDiary(); }
                    else if (href === '#tags') { e.preventDefault(); loadTags(); }
                    else if (href.match(/^#\d{4}-\d{2}-\d{2}$/) || href.startsWith('#tag-')) {
                        e.preventDefault();
                        const targetKey = href.substring(1);
                        loadNote(targetKey);
                    }
                }
            }
        }
        
        liveEditor.addEventListener('click', handleLinkClick);
        readPreview.addEventListener('click', handleLinkClick);

        // Header click router ("Up-leveling" logic)
        dateTitle.addEventListener('click', () => {
            if (currentKey === 'index') {
                return; // Already at root
            } else if (currentKey === 'diary' || currentKey === 'tags') {
                loadIndex(); // Level 1 -> Go to Level 0 (Index)
            } else if (currentKey.startsWith('tag-')) {
                loadTags(); // Level 2 -> Go to Level 1 (Tags)
            } else if (/^\d{4}-\d{2}-\d{2}$/.test(currentKey)) {
                loadDiary(); // Level 2 -> Go to Level 1 (Diary)
            }
        });

        // Make clicking the blank space around the editor focus the editor
        document.querySelector('.workspace-pane').addEventListener('click', (e) => {
            if(e.target === liveEditor && currentModeIndex === 0) {
                liveEditor.focus();
            }
        });

        // --- Boot Up ---
        window.addEventListener('DOMContentLoaded', () => {
            let isFirstVisit = false;
            if (!localStorage.getItem('brutalNotes')) {
                isFirstVisit = true;
            }
            
            loadNotesData();
            const todayKey = getTodayKey();
            
            if (isFirstVisit) {
                notes[todayKey] = `Welcome to your brutalist notebook.\n\nType naturally here. If you type \`## \` it instantly turns into a header.\n\nTry creating a tag like #idea.cake below. If you click away and then type \`#i\`, a grey ghost autocomplete will appear. Hit **Tab** to complete it!`;
                saveNotesData();
            }
            
            loadNote(todayKey);
        });
    </script>
</body>
</html>
