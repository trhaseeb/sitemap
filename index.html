<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>Infinite Notes</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Notes">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0a0a">

    <link id="pwa-manifest" rel="manifest" href="">
    <link id="pwa-icon" rel="apple-touch-icon" href="">

    <!-- Explicitly Loaded for Offline PWA Caching -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* --- CORE THEME & EXPRESSIVE TYPOGRAPHY --- */
        :root {
            --bg-color: #ffffff;
            --bg-color-transparent: rgba(255, 255, 255, 0.85);
            --text-color: #000000;
            --muted-text: #888888;
            --neon-purple: #a855f7;
            --neon-green: #10b981;
            --baritone-bg: #f2f2f2;
            --baritone-text: #333333;
            --font-main: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Inter", sans-serif;
            --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0a0a0a;
                --bg-color-transparent: rgba(10, 10, 10, 0.85);
                --text-color: #f0f0f0;
                --muted-text: #666666;
                --baritone-bg: #151515;
                --baritone-text: #cccccc;
            }
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            margin: 0;
            padding: 0;
            width: 100vw;
            overflow-x: hidden;
            overscroll-behavior-y: none;
        }

        .app-container {
            max-width: 680px;
            width: 100%;
            margin: 0 auto;
            padding: 0 24px 60vh 24px;
            position: relative;
        }

        /* --- THE HEADER --- */
        #header-container {
            position: relative;
            width: 100%;
            min-height: 24vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 6vh 24px 24px 24px;
            z-index: 100;
        }

        .header-max-width {
            max-width: 632px;
            /* 680 - 48 padding */
            margin: 0 auto;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        /* --- BRUTALIST HEADER TEXT --- */
        #date-header {
            text-align: left;
            font-size: clamp(40px, 14vw, 110px);
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            line-height: 0.9;
            color: var(--text-color);
            margin: 0 0 10px -2px;
            cursor: pointer;
            transition: opacity 0.2s;
            user-select: none;
            display: inline-block;
        }

        #date-header:active {
            opacity: 0.5;
        }

        .status-row {
            display: flex;
            align-items: center;
            gap: 16px;
            user-select: none;
            flex-wrap: wrap;
        }

        .neon-status {
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: lowercase;
        }

        .ai-status {
            color: var(--neon-purple);
            opacity: 0.8;
            transition: opacity 0.3s ease;
        }

        .ai-status.loading {
            animation: neon-pulse 1.5s infinite ease-in-out;
        }

        .ai-status.error {
            color: #ef4444;
            opacity: 1;
        }

        .save-status {
            color: var(--muted-text);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .save-status.visible {
            opacity: 1;
            color: var(--neon-green);
        }

        .storage-warning {
            color: #ef4444;
            display: none;
        }

        @keyframes neon-pulse {

            0%,
            100% {
                opacity: 0.8;
                text-shadow: 0 0 8px rgba(168, 85, 247, 0.4);
            }

            50% {
                opacity: 0.3;
                text-shadow: none;
            }
        }

        /* --- EXPRESSIVE TEXT BLOCKS --- */
        #lean-editor {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 2px;
            width: 100%;
            margin-top: 16px;
        }

        .stream-block {
            position: relative;
            width: 100%;
            transition: opacity 0.2s;
        }

        .text-content {
            font-size: clamp(18px, 4.5vw, 22px);
            font-weight: 500;
            letter-spacing: -0.02em;
            line-height: 1.5;
            color: var(--text-color);
            outline: none;
            min-height: 1.5em;
            word-wrap: break-word;
            padding: 4px 0;
            width: 100%;
            position: relative;
        }

        .text-content[data-placeholder]:empty:before {
            content: attr(data-placeholder);
            color: var(--muted-text);
            font-style: italic;
            font-weight: 400;
            opacity: 0.5;
            pointer-events: none;
        }

        .text-content[data-ghost]::after {
            content: attr(data-ghost);
            color: var(--neon-purple);
            opacity: 0.6;
            pointer-events: none;
            user-select: none;
            display: inline;
        }

        .text-content.h1 {
            font-size: clamp(36px, 8vw, 48px);
            font-weight: 900;
            letter-spacing: -0.04em;
            line-height: 1.1;
            margin-top: 36px;
            margin-bottom: 8px;
            text-transform: uppercase;
            padding: 0;
        }

        .text-content.h2 {
            font-size: clamp(28px, 6vw, 36px);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.2;
            margin-top: 28px;
            margin-bottom: 6px;
            padding: 0;
        }

        .text-content.h3 {
            font-size: clamp(22px, 5vw, 28px);
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.3;
            margin-top: 20px;
            margin-bottom: 4px;
            padding: 0;
        }

        .stream-block.author-ai .text-content {
            font-weight: 400;
            color: var(--neon-purple);
        }

        .stream-block.author-ai::before {
            content: '';
            position: absolute;
            left: -16px;
            top: 10px;
            bottom: 10px;
            width: 3px;
            background: var(--neon-purple);
            opacity: 0.5;
        }

        /* --- SLASH COMMAND MENU --- */
        #slash-menu {
            position: absolute;
            background: var(--bg-color);
            border: 2px solid var(--text-color);
            box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.15);
            z-index: 1000;
            display: none;
            flex-direction: column;
            width: 240px;
            border-radius: 4px;
            overflow: hidden;
            padding: 8px 0;
            transition: opacity 0.1s;
        }

        #slash-menu.active {
            display: flex;
        }

        .slash-item {
            padding: 10px 16px;
            font-family: var(--font-mono);
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            color: var(--text-color);
            background: transparent;
            border: none;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .slash-item .sub {
            color: var(--muted-text);
            font-size: 10px;
            font-weight: 500;
        }

        .slash-item.selected,
        .slash-item:hover {
            background: var(--text-color);
            color: var(--bg-color);
        }

        .slash-item.selected .sub,
        .slash-item:hover .sub {
            color: var(--bg-color);
            opacity: 0.7;
        }

        /* --- BARITONE PANELS --- */
        .baritone-panel {
            background: var(--baritone-bg);
            border-radius: 2px;
            padding: 16px 20px;
            margin: 16px 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .panel-header {
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted-text);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
            user-select: none;
        }

        .panel-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .panel-ctrl-btn {
            background: none;
            border: none;
            padding: 0;
            color: var(--muted-text);
            font-size: 14px;
            cursor: pointer;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .panel-ctrl-btn:hover {
            color: var(--text-color);
        }

        .panel-ctrl-btn.delete:hover {
            color: #ef4444;
        }

        .panel-title-input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-color);
            font-family: var(--font-main);
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.02em;
            width: 100%;
            margin-bottom: 8px;
            border-bottom: 2px solid transparent;
            transition: border-color 0.2s;
        }

        .panel-title-input::placeholder {
            color: var(--muted-text);
            font-weight: 600;
            opacity: 0.4;
        }

        .panel-title-input:focus {
            border-bottom-color: var(--text-color);
        }

        .raw-input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-color);
            font-family: var(--font-main);
            font-size: 18px;
            font-weight: 500;
            width: 100%;
        }

        .raw-input::placeholder {
            color: var(--muted-text);
        }

        .raw-btn {
            background: var(--bg-color);
            border: 2px solid var(--text-color);
            color: var(--text-color);
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            padding: 8px 12px;
            border-radius: 2px;
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.15);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .raw-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.15);
        }

        .raw-btn.active {
            background: var(--text-color);
            color: var(--bg-color);
        }

        .raw-btn.danger {
            color: #ef4444;
            border-color: #ef4444;
        }

        .raw-btn.danger.active {
            background: #ef4444;
            border-color: #ef4444;
            color: #fff;
        }

        .compute-code {
            font-family: var(--font-mono);
            font-size: 16px;
            font-weight: 500;
            resize: none;
            min-height: 22px;
            line-height: 1.4;
            border-bottom: 1px dashed var(--muted-text);
            padding-bottom: 8px;
            margin-bottom: 8px;
        }

        .compute-output {
            font-family: var(--font-mono);
            font-size: 22px;
            font-weight: 700;
            color: var(--neon-purple);
            word-break: break-word;
        }

        .compute-error {
            color: #ef4444;
            font-size: 14px;
        }

        .voice-status-text {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--muted-text);
        }

        .scan-output {
            font-family: var(--font-mono);
            font-size: 14px;
            min-height: 80px;
            resize: none;
            line-height: 1.5;
            color: var(--baritone-text);
        }

        .calendar-date-display {
            font-family: var(--font-mono);
            font-size: 15px;
            color: var(--neon-purple);
            font-weight: 700;
            display: inline-block;
            transition: opacity 0.2s;
            margin-bottom: 4px;
            cursor: pointer;
        }

        .calendar-date-display:hover {
            opacity: 0.8;
        }

        /* --- SMART CANVAS --- */
        .smart-canvas-selector {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 8px;
            justify-content: center;
        }

        .smart-canvas-option {
            flex: 1;
            min-width: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 24px 16px;
            background: transparent;
            border: 2px dashed var(--muted-text);
            border-radius: 2px;
            color: var(--text-color);
            font-family: var(--font-mono);
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }

        .smart-canvas-option:hover {
            border-color: var(--text-color);
            border-style: solid;
            background: var(--text-color);
            color: var(--bg-color);
        }

        .canvas-relative-frame.full-bleed {
            position: relative;
            margin-left: -20px;
            width: calc(100% + 40px);
            max-width: none;
            border-radius: 0;
            overflow: hidden;
            margin-top: 8px;
            height: 60vh;
            min-height: 400px;
        }

        .leaflet-container {
            background: var(--bg-color) !important;
            width: 100%;
            height: 100% !important;
            z-index: 1;
            position: absolute;
            top: 0;
            left: 0;
        }

        .leaflet-container.drawing-mode,
        .leaflet-container.drawing-mode .leaflet-interactive {
            cursor: crosshair !important;
            touch-action: none !important;
        }

        .leaflet-container.locked-mode {
            cursor: default !important;
        }



        /* --- EDITORIAL CALENDAR OVERLAY --- */
        .editorial-cal-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg-color);
            z-index: 10000;
            display: none;
            flex-direction: column;
            padding: 10vh 32px 32px 32px;
            overflow-y: auto;
        }

        .editorial-cal-modal.active {
            display: flex;
        }

        .cal-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .cal-nav-btn {
            background: none;
            border: none;
            font-size: 40px;
            font-weight: 300;
            color: var(--text-color);
            cursor: pointer;
        }

        .cal-month-title {
            font-size: clamp(30px, 8vw, 60px);
            font-weight: 900;
            font-style: italic;
            letter-spacing: -0.04em;
            text-transform: uppercase;
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .cal-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            background: var(--baritone-bg);
            transition: background 0.2s, color 0.2s;
        }

        .cal-day:active,
        .cal-day.selected {
            background: var(--text-color);
            color: var(--bg-color);
        }

        .cal-day.muted {
            opacity: 0.15;
            pointer-events: none;
        }

        .cal-time-input {
            margin-top: 40px;
            width: 100%;
            padding: 20px;
            background: transparent;
            border: 2px solid var(--baritone-bg);
            color: var(--text-color);
            font-family: var(--font-mono);
            font-size: 24px;
            text-align: center;
            border-radius: 4px;
            outline: none;
        }

        .cal-close-btn {
            margin-top: auto;
            padding: 20px;
            width: 100%;
            background: var(--text-color);
            color: var(--bg-color);
            font-family: var(--font-mono);
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            letter-spacing: 0.1em;
        }
    </style>
</head>

<body>

    <!-- THE HEADER -->
    <div id="header-container">
        <div class="header-max-width">
            <div id="date-header">today</div>
            <div class="status-row">
                <span id="ai-inline-status" class="neon-status ai-status loading">sys.ai.booting</span>
                <span id="db-status" class="neon-status"
                    style="color: var(--neon-purple); opacity: 0.8;">pg_vector.init</span>
                <span id="save-indicator" class="neon-status save-status">saved</span>
                <span id="storage-warning" class="neon-status storage-warning">db.offline [memory mode]</span>
            </div>
        </div>
    </div>

    <!-- THE LEAN EDITOR -->
    <div class="app-container">
        <div id="lean-editor">
            <div id="slash-menu"></div>
        </div>
    </div>

    <!-- Editorial Calendar Overlay -->
    <div id="editorial-cal" class="editorial-cal-modal">
        <div class="cal-header-row">
            <button id="ecal-prev" class="cal-nav-btn">←</button>
            <div id="ecal-title" class="cal-month-title">month</div>
            <button id="ecal-next" class="cal-nav-btn">→</button>
        </div>
        <div id="ecal-grid" class="cal-grid"></div>
        <input type="time" id="ecal-time" class="cal-time-input" style="display: none;">
        <button id="ecal-close" class="cal-close-btn">CONFIRM</button>
    </div>

    <script type="module">
        // ============================================================================
        // ⚙️ SYSTEM UTILS & HELPERS
        // ============================================================================
        const CONFIG = {
            PWA_LOGO_URL: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzAwMDAwMCI+PHBhdGggZD0iTTE0IDJINmEyIDIgMCAwIDAtMiAydjE2YTIgMiAwIDAgMCAyIDJoMTJhMiAyIDAgMCAwIDItMlY4bC02LTZ6Ii8+PC9zdmc+",
            EMBEDDING_MODEL_ID: "Xenova/all-MiniLM-L6-v2",
        };

        const SLASH_COMMANDS = [
            { id: 'profile', label: 'Persona', sub: 'My Persona' },
            { id: 'h1', label: 'Heading 1', sub: 'Big Title' },
            { id: 'h2', label: 'Heading 2', sub: 'Medium Title' },
            { id: 'h3', label: 'Heading 3', sub: 'Small Title' },
            { id: 'compute', label: 'Compute', sub: 'Math & Logic' },
            { id: 'smartCanvas', label: 'Canvas', sub: 'Draw & Map' },
            { id: 'voice', label: 'Voice', sub: 'Audio Memo' },
            { id: 'scan', label: 'Scan', sub: 'Image to Text' },
            { id: 'calendar', label: 'Event', sub: 'Schedule' }
        ];

        function el(tag, attributes = {}, ...children) {
            const element = document.createElement(tag);
            for (const [key, value] of Object.entries(attributes || {})) {
                if (key === 'style' && typeof value === 'object') Object.assign(element.style, value);
                else if (key === 'className') element.className = value;
                else if (key === 'innerHTML') element.innerHTML = value;
                else if (key === 'textContent') element.textContent = value;
                else if (key === 'value') element.value = value;
                else if (key.startsWith('on') && typeof value === 'function') element[key] = value;
                else if (value !== false && value !== undefined && value !== null) element.setAttribute(key, value);
            }
            children.flat().filter(Boolean).forEach(child => {
                if (typeof child === 'string' || typeof child === 'number') element.appendChild(document.createTextNode(child));
                else if (child instanceof Node) element.appendChild(child);
            });
            return element;
        }

        function setCaret(el, offset = -1) {
            el.focus();
            try {
                const range = document.createRange();
                const sel = window.getSelection();
                if (offset === -1) { range.selectNodeContents(el); range.collapse(false); }
                else { range.setStart(el, offset); range.collapse(true); }
                sel.removeAllRanges(); sel.addRange(range);
            } catch (e) { }
        }

        function debounce(func, wait) {
            let timeout;
            return function (...args) { clearTimeout(timeout); timeout = setTimeout(() => func(...args), wait); };
        }

        const UI = {
            button: (text, onClick, className = '') => el('button', { className: `raw-btn ${className}`.trim(), textContent: text, onclick: onClick }),
            row: (...children) => el('div', { style: { display: 'flex', gap: '12px', flexWrap: 'wrap', alignItems: 'center' } }, ...children),
            textarea: (props) => el('textarea', { className: 'raw-input', ...props })
        };

        const getLocalYYYYMMDD = (date) => `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        const normalizePlainText = (text = '') => String(text).replace(/<br\s*\/?>/gi, '\n').replace(/<[^>]*>?/gm, '').replace(/\s+/g, ' ').trim();
        const escapeHTML = (text = '') => String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');

        let todayStr = getLocalYYYYMMDD(new Date());
        window.currentDateStr = todayStr;

        const NotificationEngine = {
            timers: new Map(),
            schedule: function (id, dt, title) {
                this.cancel(id); if (typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
                const delay = new Date(dt).getTime() - Date.now();
                if (delay > 0) this.timers.set(id, setTimeout(() => { new Notification('Note Reminder', { body: title || 'Event Reached' }); this.timers.delete(id); }, delay));
            },
            cancel: function (id) { if (this.timers.has(id)) { clearTimeout(this.timers.get(id)); this.timers.delete(id); } }
        };



        // ============================================================================
        // 🧠 VECTOR EMBEDDING ENGINE (Transformers.js)
        // ============================================================================
        const VectorEmbedder = new (class {
            constructor() { this.embedder = null; this.promise = null; }
            async getEmbedder() {
                if (this.embedder) return this.embedder;
                if (!this.promise) {
                    this.promise = import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0-alpha.19/+esm').then(async ({ pipeline, env }) => {
                        env.allowRemoteModels = true; env.useBrowserCache = true;
                        let pipe;
                        try { pipe = await pipeline('feature-extraction', CONFIG.EMBEDDING_MODEL_ID, { device: 'webgpu' }); }
                        catch (e) { pipe = await pipeline('feature-extraction', CONFIG.EMBEDDING_MODEL_ID, { dtype: 'q8' }); }
                        this.embedder = pipe; return pipe;
                    });
                }
                return this.promise;
            }
            async embedText(text) {
                const normalized = normalizePlainText(text).slice(0, 1200);
                if (!normalized) return null;
                try {
                    const pipe = await this.getEmbedder();
                    const output = await pipe(normalized, { pooling: 'mean', normalize: true });
                    const list = typeof output.tolist === 'function' ? output.tolist() : Array.from(output.data);
                    return Array.isArray(list[0]) ? list[0] : list;
                } catch (e) { return null; }
            }
        })();

        // ============================================================================
        // 💾 ROBUST STORAGE ARCHITECTURE (PGlite + Vector + IDB Media)
        // ============================================================================
        class PGLiteDatabase {
            constructor() { this.pg = null; this.cache = {}; this.isReady = false; this.pendingDays = new Set(); }

            async init() {
                try {
                    const [{ PGlite }, { vector }] = await Promise.all([
                        import("https://cdn.jsdelivr.net/npm/@electric-sql/pglite/dist/index.js"),
                        import("https://cdn.jsdelivr.net/npm/@electric-sql/pglite/dist/vector/index.js")
                    ]);

                    this.pg = await PGlite.create({ dataDir: 'idb://infinotes-v2', extensions: { vector } });

                    await this.pg.exec(`
                        CREATE EXTENSION IF NOT EXISTS vector;
                        CREATE TABLE IF NOT EXISTS daily_notes (date_str TEXT PRIMARY KEY, data JSONB);
                        CREATE TABLE IF NOT EXISTS semantic_index (key TEXT PRIMARY KEY, date_str TEXT, block_id TEXT, block_type TEXT, search_text TEXT, embedding vector(384), timestamp BIGINT);
                        CREATE TABLE IF NOT EXISTS profile_settings (key TEXT PRIMARY KEY, value TEXT);
                    `);
                    this.isReady = true;
                    document.getElementById('db-status').textContent = 'pg_vector.ready';

                    const res = await this.pg.query(`SELECT date_str, data FROM daily_notes`);
                    res.rows.forEach(r => { this.cache[r.date_str] = typeof r.data === 'string' ? JSON.parse(r.data) : r.data; });

                    this.startBackgroundIndexer();
                } catch (e) {
                    console.error("PGlite Error", e);
                    document.getElementById('db-status').textContent = 'pg_vector.offline';
                    document.getElementById('storage-warning').style.display = 'inline';
                }
            }


            async getProfile() {
                if (!this.isReady) return {};
                const res = await this.pg.query(`SELECT key, value FROM profile_settings`);
                const profile = {};
                res.rows.forEach(r => profile[r.key] = r.value);
                return profile;
            }
            async updateProfile(key, value) {
                if (!this.isReady) return;
                await this.pg.query(`INSERT INTO profile_settings (key, value) VALUES ($1, $2) ON CONFLICT (key) DO UPDATE SET value = EXCLUDED.value`, [key, value]);
            }
            async removeProfile(key) {
                if (!this.isReady) return;
                await this.pg.query(`DELETE FROM profile_settings WHERE key = $1`, [key]);
            }
            async saveNote(dateStr, data) {
                this.cache[dateStr] = data;
                if (!this.isReady) return;
                await this.pg.query(`INSERT INTO daily_notes (date_str, data) VALUES ($1, $2) ON CONFLICT (date_str) DO UPDATE SET data = EXCLUDED.data`, [dateStr, JSON.stringify(data)]);
                this.pendingDays.add(dateStr);
            }

            startBackgroundIndexer() {
                setInterval(async () => {
                    if (this.pendingDays.size === 0 || !this.isReady) return;
                    const dateStr = Array.from(this.pendingDays)[0];
                    this.pendingDays.delete(dateStr);

                    const dayData = this.cache[dateStr];
                    if (!dayData || !dayData.blocks) return;

                    await this.pg.query(`DELETE FROM semantic_index WHERE date_str = $1`, [dateStr]);

                    for (const block of dayData.blocks) {
                        if (!block.data) continue;
                        const searchText = ['text', 'h1', 'h2', 'h3'].includes(block.type) ? normalizePlainText(block.data.text) : normalizePlainText(JSON.stringify(block.data));
                        if (!searchText) continue;
                        const vectorData = await VectorEmbedder.embedText(searchText);
                        if (!vectorData) continue;

                        try {
                            await this.pg.query(
                                `INSERT INTO semantic_index (key, date_str, block_id, block_type, search_text, embedding, timestamp) VALUES ($1, $2, $3, $4, $5, $6, $7)`,
                                [`${dateStr}::${block.id}`, dateStr, block.id, block.type, searchText, `[${vectorData.join(',')}]`, block.timestamp || Date.now()]
                            );
                        } catch (e) { }
                    }
                }, 5000);
            }

            async searchSemantic(queryText, excludeDate, limit = 5) {
                if (!this.isReady) return [];
                const vectorData = await VectorEmbedder.embedText(queryText);
                if (!vectorData) return [];
                const res = await this.pg.query(
                    `SELECT date_str as date, block_id as "blockId", block_type as type, search_text as "searchText", timestamp, 1 - (embedding <=> $1) AS score FROM semantic_index WHERE date_str != $2 ORDER BY embedding <=> $1 ASC LIMIT $3`,
                    [`[${vectorData.join(',')}]`, excludeDate || '', limit]
                );
                return res.rows;
            }
        }

        class MediaBlobStore {
            constructor() { this.db = null; this.isAvailable = true; }
            init() {
                return new Promise(resolve => {
                    try {
                        const req = indexedDB.open('InfiniteNotesMedia', 1);
                        req.onupgradeneeded = e => { if (!e.target.result.objectStoreNames.contains('media_blobs')) e.target.result.createObjectStore('media_blobs', { keyPath: 'id' }); };
                        req.onsuccess = e => { this.db = e.target.result; resolve(); };
                        req.onerror = () => { this.isAvailable = false; resolve(); };
                    } catch (e) { this.isAvailable = false; resolve(); }
                });
            }
            saveBlob(id, blob, kind) {
                return new Promise(resolve => {
                    if (!this.db || !this.isAvailable) return resolve();
                    const tx = this.db.transaction('media_blobs', 'readwrite');
                    tx.objectStore('media_blobs').put({ id, blob, kind, updatedAt: Date.now() });
                    tx.oncomplete = () => resolve(); tx.onerror = () => resolve();
                });
            }
            getBlob(id) {
                return new Promise(resolve => {
                    if (!this.db || !this.isAvailable) return resolve(null);
                    const req = this.db.transaction('media_blobs', 'readonly').objectStore('media_blobs').get(id);
                    req.onsuccess = () => resolve(req.result?.blob || null);
                    req.onerror = () => resolve(null);
                });
            }
        }

        class ComputeTool extends BaseTool {
            constructor(data, isReadOnly, onChange) { super({ title: data.title || '', code: data.code || '', output: data.output || '' }, isReadOnly, onChange); }
            render() {
                this.input = UI.textarea({ className: 'raw-input compute-code', placeholder: 'type logic or math (e.g. 10 * 4)...', value: this.data.code, readonly: this.readOnly ? true : null, oninput: () => { this.input.style.height = 'auto'; this.input.style.height = this.input.scrollHeight + 'px'; this.data.code = this.input.value; this.scheduleEval(); } });
                this.output = el('div', { className: 'compute-output', innerHTML: this.data.output });
                this.scheduleEval = debounce(() => this.evaluateLogic(), 400); setTimeout(() => { if (this.input) this.input.style.height = this.input.scrollHeight + 'px'; }, 0);
                return this.renderContainer([this.input, this.output]);
            }
            evaluateLogic() {
                if (!this.data.code.trim()) { this.output.innerHTML = ''; this.data.output = ''; if (this.onChange) this.onChange(); return; }
                const find = (query) => { let results = []; const q = query.toLowerCase(); Object.values(pgDB.cache).forEach(day => { if (!day.blocks) return; day.blocks.forEach(b => { if (b.type === 'compute') return; if (JSON.stringify(b.data).toLowerCase().includes(q) && b.data.text) results.push(normalizePlainText(b.data.text)); }); }); return results; };
                const nums = (query) => { let texts = find(query); let n = []; texts.forEach(t => { let m = t.match(/-?\d+(\.\d+)?/g); if (m) n.push(...m.map(Number)); }); return n; };
                const sum = (query) => nums(query).reduce((a, b) => a + b, 0); const avg = (query) => { let n = nums(query); return n.length ? sum(query) / n.length : 0; };

                try {
                    const code = this.data.code.replace(/sum\(['"](.*?)['"]\)/g, (_, q) => sum(q)).replace(/avg\(['"](.*?)['"]\)/g, (_, q) => avg(q));
                    const result = new Function(`return (${code})`)();
                    if (Array.isArray(result) && result.length >= 2 && result.every(n => typeof n === 'number')) {
                        const min = Math.min(...result); const max = Math.max(...result); const range = (max - min) || 1;
                        const points = result.map((val, i) => `${(i / (result.length - 1)) * 100},${40 - ((val - min) / range) * 40}`).join(' ');
                        this.data.output = `<div style="font-size: 11px; color: var(--muted-text); margin-bottom: 4px;">[${result.join(', ')}]</div><svg viewBox="0 -5 100 50" style="width: 100%; height: 60px; overflow: visible;" preserveAspectRatio="none"><polyline fill="none" stroke="var(--neon-purple)" stroke-width="2" points="${points}"></polyline></svg>`;
                    } else { this.data.output = typeof result === 'object' ? escapeHTML(JSON.stringify(result)) : escapeHTML(String(result)); }
                    this.output.innerHTML = this.data.output; this.output.classList.remove('compute-error');
                } catch (e) { this.data.output = `<span class="compute-error">${escapeHTML(e.message)}</span>`; this.output.innerHTML = this.data.output; }
                if (this.onChange) this.onChange();
            }
        }

        class VoiceTool extends BaseTool {
            constructor(data, isReadOnly, onChange) { super({ title: data.title || '', mediaId: data.mediaId || null }, isReadOnly, onChange); this.recorder = null; this.chunks = []; this.isPlaying = false; this.isRecording = false; this.objectUrl = ''; }
            async hydrate() { if (this.objectUrl || !this.data.mediaId) return; const blob = await mediaStore.getBlob(this.data.mediaId); if (blob) { this.objectUrl = URL.createObjectURL(blob); this.audio.src = this.objectUrl; this.updateUI(); } }
            render() {
                this.btn = UI.button('record', () => this.handleAction(), 'danger'); this.statusTxt = el('span', { className: 'voice-status-text' });
                this.audio = el('audio', { onplay: () => { this.isPlaying = true; this.updateUI(); }, onpause: () => { this.isPlaying = false; this.updateUI(); }, onended: () => { this.isPlaying = false; this.updateUI(); } });
                this.updateUI(); void this.hydrate(); return this.renderContainer([UI.row(this.btn, this.statusTxt, this.audio)]);
            }
            updateUI() {
                if (this.isPlaying) { this.btn.textContent = 'pause'; this.btn.className = 'raw-btn active'; this.statusTxt.textContent = 'playing...'; }
                else if (this.data.mediaId || this.audio.src) { this.btn.textContent = 'play'; this.btn.className = 'raw-btn'; this.statusTxt.textContent = 'ready.'; }
                else if (this.isRecording) { this.btn.textContent = 'stop'; this.btn.className = 'raw-btn danger active'; this.statusTxt.textContent = 'recording...'; }
                else if (this.readOnly) { this.btn.style.display = 'none'; this.statusTxt.textContent = 'no audio'; }
                else { this.btn.textContent = 'record'; this.btn.className = 'raw-btn danger'; this.statusTxt.textContent = 'idle.'; }
            }
            async handleAction() {
                if (this.readOnly && !this.audio.src) return;
                if (this.audio.src) { this.isPlaying ? this.audio.pause() : this.audio.play(); }
                else {
                    if (this.isRecording) { this.recorder.stop(); this.isRecording = false; }
                    else {
                        try {
                            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                            this.recorder = new MediaRecorder(stream); this.chunks = []; this.recorder.ondataavailable = e => this.chunks.push(e.data);
                            this.recorder.onstop = async () => {
                                const blob = new Blob(this.chunks, { type: 'audio/webm' }); const mediaId = this.data.mediaId || crypto.randomUUID();
                                await mediaStore.saveBlob(mediaId, blob, 'audio'); this.data.mediaId = mediaId; this.objectUrl = URL.createObjectURL(blob);
                                this.audio.src = this.objectUrl; this.updateUI(); if (this.onChange) this.onChange(); stream.getTracks().forEach(t => t.stop());
                            };
                            this.recorder.start(); this.isRecording = true; this.updateUI();
                        } catch (e) { alert("Mic access denied"); }
                    }
                }
            }
        }

        class LeanStreamEditor {
            constructor(containerId) {
                this.container = document.getElementById(containerId);
                this.blocks = []; this.activeBlockId = null;

                this.slashMenuEl = document.getElementById('slash-menu');
                this.slashMenuActive = false; this.slashMenuSelectedIndex = 0;

                this.isPredicting = false;

                });

            load(blocksData) {
                Array.from(this.container.children).forEach(child => { if (child.id !== 'slash-menu') this.container.removeChild(child); });
                this.blocks = []; this.closeSlashMenu();

                if (!blocksData || blocksData.length === 0) {
                    this.addBasicBlock('text', '', 'user');
                } else {
                    blocksData.forEach(b => {
                        if (['paragraph', 'text', 'h1', 'h2', 'h3', 'header', 'list', 'checklist'].includes(b.type)) {
                            let textContent = b.data?.text || '';
                            let typeToUse = ['paragraph', 'list', 'checklist'].includes(b.type) ? 'text' : (b.type === 'header' ? `h${b.data?.level || 2}` : b.type);
                            if (b.type === 'list') textContent = (b.data.items || []).map(i => `• ${i.content || i.text}`).join('<br>');
                            if (b.type === 'checklist') textContent = (b.data.items || []).map(i => `${i.checked ? '[x]' : '[ ]'} ${i.text}`).join('<br>');
                            this.addBasicBlock(typeToUse, textContent, b.author || 'user', b.id, b.timestamp);
                        } else if (TOOLS_MAP[b.type]) {
                            this.addToolBlock(b.type, b.data, b.author || 'user', b.id, b.timestamp);
                        }
                    });
                }
                if (this.blocks.length === 0 || !['text', 'h1', 'h2', 'h3'].includes(this.blocks[this.blocks.length - 1].type)) this.addBasicBlock('text', '', 'user');
            }

            save() {
                return {
                    blocks: this.blocks.map(b => {
                        let data = b.data;
                        if (['text', 'h1', 'h2', 'h3'].includes(b.type)) data = { text: b.dom.querySelector('.text-content').innerHTML };
                        else if (b.instance && b.instance.save) data = b.instance.save();
                        return { id: b.id, type: b.type, data, author: b.author, timestamp: b.timestamp };
                    })
                };
            }

            insertBlockIntoDOMArray(blockObj) {
                const activeIndex = this.blocks.findIndex(b => b.id === this.activeBlockId);
                const insertIndex = activeIndex !== -1 ? activeIndex + 1 : this.blocks.length;
                if (insertIndex >= this.blocks.length) { this.container.appendChild(blockObj.dom); this.blocks.push(blockObj); }
                else { this.container.insertBefore(blockObj.dom, this.blocks[insertIndex].dom); this.blocks.splice(insertIndex, 0, blockObj); }
            }

            replaceTextNodeType(block, newType) {
                const tag = newType === 'h1' ? 'h1' : (newType === 'h2' ? 'h2' : (newType === 'h3' ? 'h3' : 'div'));
                const oldContent = block.dom.querySelector('.text-content');
                const newContent = el(tag, {
                    className: `text-content ${newType === 'text' ? '' : newType}`,
                    contentEditable: window.currentDateStr === todayStr,
                    'data-placeholder': newType === 'text' ? "start writing, or type '/' for commands..." : "Heading...",
                    innerHTML: oldContent.innerHTML,
                    onfocus: () => { this.activeBlockId = block.id; },
                    oninput: () => { this.handleTextInput(block, newContent); scheduleSave(); },
                    onkeydown: (e) => this.handleTextKeydown(e, block, newContent)

                const block = { id, type, data: { text: html }, author, timestamp, dom: null };
                const content = el(tag, {
                    className: `text-content ${type === 'text' ? '' : type}`,
                    contentEditable: window.currentDateStr === todayStr,
                    'data-placeholder': author === 'user' ? (type === 'text' ? "start writing, or type '/' for commands..." : "Heading...") : "",
                    innerHTML: html,
                    onfocus: () => { this.activeBlockId = id; },

            }

            addToolBlock(type, data, author = 'user', id = crypto.randomUUID(), timestamp = Date.now()) {
                const ToolClass = TOOLS_MAP[type];
                if (!ToolClass) return null;
                const instance = new ToolClass(data, window.currentDateStr !== todayStr, () => scheduleSave());
                const block = { id, type, data, author, timestamp, instance, dom: null };
                const controls = el('div', { className: 'panel-controls' });
                if (window.currentDateStr === todayStr) {
                    controls.append(
                        el('button', { className: 'panel-ctrl-btn', textContent: '↑', onclick: () => this.moveBlock(id, -1) }),
                        el('button', { className: 'panel-ctrl-btn', textContent: '↓', onclick: () => this.moveBlock(id, 1) }),
                        el('button', { className: 'panel-ctrl-btn delete', textContent: '✕', onclick: () => this.deleteBlock(id) })
                    );
                }
                block.dom = el('div', { className: 'baritone-panel stream-block', 'data-id': id },
                    el('div', { className: 'panel-header' }, el('span', { textContent: `[ ${type} ]` }), controls), instance.render()

            async ambientPredict(block, content) {
                if (!aiEngine || isAILoading || this.isPredicting || !this.activeBlockId || this.slashMenuActive) return;

                const sel = window.getSelection();
                if (!sel.rangeCount) return;
                const currentText = content.textContent.trim();
                if (currentText.length < 5) return;

                const ambientContentSnapshot = content.textContent;

                this.isPredicting = true;
                aiStatusEl.className = 'neon-status ai-status loading';
                aiStatusEl.textContent = 'sys.ai.anticipating';

                try {
                    if (!this.cachedProfile && pgDB.isReady) {
                        const profileObj = await pgDB.getProfile();
                        const activeKeys = Object.keys(profileObj);
                        if (activeKeys.length > 0) {
                            this.cachedProfile = PROFILE_CATEGORIES
                                .filter(c => activeKeys.includes(c.id))
                                .map(c => `[${c.label}]: ${profileObj[c.id]}`)
                                .join('\n');
                        } else {
                            this.cachedProfile = 'Blank slate.';
                        }
                    }

                    let topicalContext = "";
                    if (pgDB.isReady) {
                        const hits = await pgDB.searchSemantic(currentText, window.currentDateStr, 3);
                        if (hits && hits.length > 0) topicalContext = hits.map(h => h.searchText).join('\n\n---\n\n');
                    }

                    const editorState = this.save();
                    let todaysContext = editorState.blocks.map(b => b.data?.text ? normalizePlainText(b.data.text) : '').join('\n');

                    const systemPrompt = `You are a silent ghostwriter seamlessly predicting the next words the user is about to type.
[USER PROFILE]:
${this.cachedProfile || 'Blank slate.'}

[RELEVANT PAST NOTES]:
${topicalContext || '(No relevant past notes)'}

INSTRUCTIONS:
1. Output ONLY the literal continuation of the user's last sentence. Use past notes for context if relevant.
2. NO quotes, NO explanation, NO formatting. Output the raw next few words to finish the thought.
3. If it starts a new word, start with a space. If finishing a word, do not use a space.`;

                    const response = await aiEngine.chat.completions.create({
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: todaysContext }
                        ],
                        temperature: 0.2, max_tokens: 30
                    });

                    let prediction = response.choices[0].message.content || "";
                    prediction = prediction.replace(/^["'`\n]+|["'`\n]+$/g, '').trimEnd();

                    if (prediction && document.activeElement === content && content.textContent === ambientContentSnapshot) {
                        if (!prediction.match(/^[.,!?;]/) && !prediction.startsWith(' ') && !currentText.endsWith(' ')) {
                            prediction = ' ' + prediction;
                        }
                        content.setAttribute('data-ghost', prediction);
                    }
                } catch (e) {
                } finally {
                    this.isPredicting = false;
                    aiStatusEl.className = 'neon-status ai-status'; aiStatusEl.textContent = 'sys.ai.online';
                }
            }

            handleTextInput(block, content) {
                if (content.hasAttribute('data-ghost')) content.removeAttribute('data-ghost');

                this.ambientTimer = setTimeout(() => this.ambientPredict(block, content), 1500);

                const text = content.textContent;

                if (block.type === 'text') {
                    if (text === '# ') { content.innerHTML = ''; this.replaceTextNodeType(block, 'h1'); return; }
                    if (text === '## ') { content.innerHTML = ''; this.replaceTextNodeType(block, 'h2'); return; }
                    if (text === '### ') { content.innerHTML = ''; this.replaceTextNodeType(block, 'h3'); return; }
                }

                this.slashMenuEl.style.top = `${rect.bottom - containerRect.top + this.container.scrollTop + 8}px`;
                this.slashMenuEl.style.left = `${Math.max(0, rect.left - containerRect.left)}px`;
                this.renderSlashMenu(filterText);
            }

            closeSlashMenu() { this.slashMenuActive = false; this.slashMenuEl.classList.remove('active'); this.slashContext = null; }

            renderSlashMenu(filterText) {
                this.slashMenuEl.innerHTML = ''; this.slashMenuCurrentFilter = filterText;
                this.slashMenuCurrentItems = SLASH_COMMANDS.filter(cmd => cmd.id.toLowerCase().includes(filterText) || cmd.label.toLowerCase().includes(filterText));
                if (this.slashMenuCurrentItems.length === 0) { this.closeSlashMenu(); return; }
                if (this.slashMenuSelectedIndex >= this.slashMenuCurrentItems.length) { this.slashMenuSelectedIndex = 0; }

                this.slashMenuCurrentItems.forEach((item, index) => {
                    const btn = el('button', {
                        className: `slash-item ${index === this.slashMenuSelectedIndex ? 'selected' : ''}`,
                        onmousedown: (e) => { e.preventDefault(); this.executeSlashCommand(item); }
                    }, el('span', { textContent: item.label }), el('span', { className: 'sub', textContent: item.sub }));
                    this.slashMenuEl.appendChild(btn);
                });
                this.slashMenuEl.classList.add('active');
            }

            executeSlashCommand(item) {
                const { block, content } = this.slashContext;

                content.innerHTML = content.innerHTML.replace(/\/[a-zA-Z0-9_]*$/, '');
                if (content.innerHTML === '<br>') content.innerHTML = '';

                const isEmpty = content.textContent.trim() === '';

                if (['h1', 'h2', 'h3'].includes(item.id)) {
                    this.replaceTextNodeType(block, item.id);
                } else {
                    this.addToolBlock(item.id, {});
                    if (isEmpty) this.deleteBlock(block.id);
                }
                this.closeSlashMenu();
            }

            handleTextKeydown(e, block, content) {
                if (e.key === 'Tab' && content.hasAttribute('data-ghost')) {
                    e.preventDefault();
                    const ghostText = content.getAttribute('data-ghost');
                    content.removeAttribute('data-ghost');

                    const sel = window.getSelection();
                    if (sel.rangeCount > 0) {
                        const range = sel.getRangeAt(0);
                        const textNode = document.createTextNode(ghostText);
                        range.insertNode(textNode);
                        range.setStartAfter(textNode);
                        range.collapse(true);
                        sel.removeAllRanges(); sel.addRange(range);
                    }
                    scheduleSave(); return;
                }

                if (content.hasAttribute('data-ghost')) { content.removeAttribute('data-ghost'); }

                if (this.slashMenuActive) {
                    if (e.key === 'ArrowDown') { e.preventDefault(); this.slashMenuSelectedIndex = (this.slashMenuSelectedIndex + 1) % this.slashMenuCurrentItems.length; this.renderSlashMenu(this.slashMenuCurrentFilter); return; }
                    if (e.key === 'ArrowUp') { e.preventDefault(); this.slashMenuSelectedIndex = (this.slashMenuSelectedIndex - 1 + this.slashMenuCurrentItems.length) % this.slashMenuCurrentItems.length; this.renderSlashMenu(this.slashMenuCurrentFilter); return; }
                    if (e.key === 'Enter') { e.preventDefault(); this.executeSlashCommand(this.slashMenuCurrentItems[this.slashMenuSelectedIndex]); return; }
                    if (e.key === 'Escape') { e.preventDefault(); this.closeSlashMenu(); return; }
                }

                if (e.key === 'Enter' && !e.shiftKey && !this.slashMenuActive) {
                    e.preventDefault();
                    const sel = window.getSelection();
                    if (sel.rangeCount > 0) {
                        const range = sel.getRangeAt(0);
                        const postCaretRange = range.cloneRange(); postCaretRange.selectNodeContents(content); postCaretRange.setStart(range.endContainer, range.endOffset);
                        const tempDiv = document.createElement('div'); tempDiv.appendChild(postCaretRange.extractContents());
                        let postHtml = tempDiv.innerHTML; if (postHtml === '<br>') postHtml = '';
                        if (content.innerHTML.endsWith('<br>')) content.innerHTML = content.innerHTML.slice(0, -4);

                        this.activeBlockId = block.id;
                        const newBlock = this.addBasicBlock('text', postHtml, 'user');
                        setTimeout(() => setCaret(newBlock.dom.querySelector('.text-content'), 0), 10);
                        scheduleSave();
                    }
                    return;
                }

                if (e.key === 'Backspace' && !this.slashMenuActive) {
                    const sel = window.getSelection();
                    if (sel.rangeCount > 0) {
                        const range = sel.getRangeAt(0); const preCaretRange = range.cloneRange(); preCaretRange.selectNodeContents(content); preCaretRange.setEnd(range.startContainer, range.startOffset);
                        if (preCaretRange.toString().length === 0) {
                            e.preventDefault(); const idx = this.blocks.findIndex(b => b.id === block.id);
                            if (idx > 0) {
                                const prevBlock = this.blocks[idx - 1]; const currentHtml = content.innerHTML.replace(/<br>$/, ''); const isEmpty = content.textContent.trim() === '';
                                if (!['text', 'h1', 'h2', 'h3'].includes(prevBlock.type)) { this.deleteBlock(prevBlock.id); }
                                else {
                                    const prevContentNode = prevBlock.dom.querySelector('.text-content');
                                    if (!isEmpty) {
                                        const originalChildCount = prevContentNode.childNodes.length;
                                        prevContentNode.innerHTML += currentHtml; this.deleteBlock(block.id);
                                        setTimeout(() => setCaret(prevContentNode, originalChildCount), 10);
                                    } else { this.deleteBlock(block.id); setCaret(prevContentNode); }
                                }
                            }
                        }
                    }
                }
            }
        }

        const editor = new LeanStreamEditor('lean-editor');

        // ============================================================================
        // APP LIFECYCLE & STORAGE SYNC
        // ============================================================================
        const saveIndicator = document.getElementById('save-indicator');

        const scheduleSave = debounce((immediate = false) => {
            if (window.currentDateStr !== todayStr || !pgDB.isReady) return;
            const data = editor.save();
            pgDB.saveNote(window.currentDateStr, data).then(() => {
                saveIndicator.classList.add('visible');
                setTimeout(() => saveIndicator.classList.remove('visible'), 1500);
            });
        }, 800);

        function renderDateHeader() {
            document.getElementById('date-header').textContent = new Date(window.currentDateStr + 'T00:00:00').toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' }).toLowerCase();
        }

        async function loadDay(dateStr) {
            window.currentDateStr = dateStr; renderDateHeader();
            const dayData = pgDB.cache[dateStr] || { blocks: [] };
            editor.load(dayData.blocks);


        }

        document.getElementById('date-header').onclick = () => {
            const [y, m, d] = window.currentDateStr.split('-');
            EditorialCalendar.open(new Date(y, m - 1, d), false, (selectedDate) => {
                const selectedStr = getLocalYYYYMMDD(selectedDate);
                if (window.currentDateStr !== selectedStr) { scheduleSave(true); loadDay(selectedStr); }
            });
        };

        // Boot Pipeline
        Promise.all([pgDB.init(), mediaStore.init()]).then(() => {
            loadDay(todayStr);
        });

    </script>
</body>
