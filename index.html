        const TOOLS_MAP = { voice: VoiceTool, smartCanvas: SmartCanvasTool, calendar: CalendarTool, scan: ScanTool, profile: ProfileTool, recall: RecallTool };

        // ============================================================================
        // 🖋 THE LEAN STREAM EDITOR 
        // ============================================================================
        const isEditable = () => CONFIG.DEV_ALLOW_PAST_EDITING || window.currentDateStr === todayStr || window.isRefPage;

        class LeanStreamEditor {
            constructor(containerId) {
                this.container = document.getElementById(containerId);
                this.blocks = []; this.activeBlockId = null;

                this.slashMenu = new FloatingMenu('slash-menu-ui', this.container);
                this.refMenu = new FloatingMenu('ref-menu-ui', this.container);

                this.ambientTimer = null;
                this.isPredicting = false;
                this.cachedProfile = null;

                document.addEventListener('mousedown', (e) => {
                    if (this.slashMenu.active && !this.slashMenu.el.contains(e.target)) this.slashMenu.close();
                    if (this.refMenu.active && !this.refMenu.el.contains(e.target)) this.refMenu.close();
                });

                document.addEventListener('click', (e) => {
                    const mention = e.target.closest('.ref-mention');
                    if (mention) { e.preventDefault(); e.stopPropagation(); const slug = mention.getAttribute('data-ref'); if (slug) loadRefPage(slug); return; }

                    // Global Checkbox Toggle Logic
                    const block = e.target.closest('.stream-block');
                    if (block && isEditable()) {
                        const content = block.querySelector('.todo, .todo-checked');
                        if (content) {
                            const rect = block.getBoundingClientRect();
                            if (e.clientX - rect.left < 30) {
                                const isChecked = content.classList.contains('todo-checked');
                                content.classList.remove(isChecked ? 'todo-checked' : 'todo');
                                content.classList.add(isChecked ? 'todo' : 'todo-checked');
                                
                                const editorBlock = this.blocks.find(b => b.id === block.getAttribute('data-id'));
                                if (editorBlock) {
                                    editorBlock.type = isChecked ? 'todo' : 'todo-checked';
                                    scheduleSave();
                                }
                                e.preventDefault();
                                e.stopPropagation();
                            }
                        }
                    }
                });
            }

            load(blocksData) {
                this.blocks.forEach(b => { if (b.instance && b.instance.destroy) b.instance.destroy(); });
                Array.from(this.container.children).forEach(child => { if (!child.classList.contains('floating-menu')) this.container.removeChild(child); });
                this.blocks = []; this.slashMenu.close(); this.refMenu.close();
                
                clearTimeout(this.ambientTimer); // Prevent ambient predictor bleed

                if (!blocksData || blocksData.length === 0) this.addBasicBlock('text', '', 'user');
                else {
                    blocksData.forEach(b => {
                        if (['paragraph', 'text', 'h1', 'h2', 'h3', 'header', 'list', 'checklist', 'ul', 'ol', 'quote', 'todo', 'todo-checked', 'hr'].includes(b.type)) {
                            let textContent = b.data?.text || '';
                            let typeToUse = b.type;
                            if (['paragraph'].includes(b.type)) typeToUse = 'text'; // Legacy mappings
                            if (b.type === 'header') typeToUse = `h${b.data?.level || 2}`;
                            if (b.type === 'list') { typeToUse = 'ul'; textContent = (b.data.items || []).map(i => `${i.content || i.text}`).join('<br>'); }
                            if (b.type === 'checklist') { typeToUse = 'todo'; textContent = (b.data.items || []).map(i => `${i.checked ? '[x]' : '[ ]'} ${i.text}`).join('<br>'); }
                            
                            this.addBasicBlock(typeToUse, textContent, b.author || 'user', b.id, b.timestamp, b.isSidebar);
                        } else if (TOOLS_MAP[b.type]) {
                            this.addToolBlock(b.type, b.data, b.author || 'user', b.id, b.timestamp, b.isVirtual, b.originalNoteKey, true);
                        }
                    });
                }
                if (this.blocks.length === 0 || !['text', 'h1', 'h2', 'h3', 'ul', 'ol', 'quote', 'todo', 'todo-checked', 'hr'].includes(this.blocks[this.blocks.length - 1].type)) this.addBasicBlock('text', '', 'user');
            }

            save() {
                return {
                    blocks: this.blocks.filter(b => !b.isVirtual).map(b => {
                        let data = b.data;
                        if (['text', 'h1', 'h2', 'h3', 'ul', 'ol', 'quote', 'todo', 'todo-checked', 'hr'].includes(b.type)) data = { text: b.dom.querySelector('.text-content').innerHTML };
                        else if (b.instance && b.instance.save) data = b.instance.save();
                        return { id: b.id, type: b.type, data, author: b.author, timestamp: b.timestamp, isSidebar: !!b.isSidebar };
                    })
                };
            }

            getBlockIndex(id) { return this.blocks.findIndex(b => b.id === id); }

            insertBlockIntoDOMArray(blockObj) {
                const activeIndex = this.getBlockIndex(this.activeBlockId);
                const insertIndex = activeIndex !== -1 ? activeIndex + 1 : this.blocks.length;
                if (insertIndex >= this.blocks.length) { this.container.appendChild(blockObj.dom); this.blocks.push(blockObj); }
                else { this.container.insertBefore(blockObj.dom, this.blocks[insertIndex].dom); this.blocks.splice(insertIndex, 0, blockObj); }
            }

            replaceTextNodeType(block, newType, clearContent = false) {
                const tag = ['h1', 'h2', 'h3'].includes(newType) ? newType : newType === 'quote' ? 'blockquote' : 'div';
                const oldContent = block.dom.querySelector('.text-content');
                
                let placeholder = "start writing, or type '/' for commands...";
                if (newType === 'hr') placeholder = "";
                else if (['h1', 'h2', 'h3'].includes(newType)) placeholder = "Heading...";
                else if (['ul', 'ol'].includes(newType)) placeholder = "List item...";
                else if (['todo', 'todo-checked'].includes(newType)) placeholder = "To-do...";
                else if (newType === 'quote') placeholder = "Quote...";

                const newContent = el(tag, { 
                    className: `text-content ${newType === 'text' ? '' : newType}`, 
                    contentEditable: newType !== 'hr' && isEditable(), 
                    'data-placeholder': placeholder, 
                    innerHTML: clearContent ? '' : oldContent.innerHTML, 
                    onfocus: () => { this.activeBlockId = block.id; }, 
                    oninput: () => { this.handleTextInput(block, newContent); scheduleSave(); }, 
                    onkeydown: (e) => this.handleTextKeydown(e, block, newContent) 
                });
                block.dom.replaceChild(newContent, oldContent); 
                block.type = newType; 
                if (clearContent && newType !== 'hr') setCaret(newContent);
            }

            addBasicBlock(type = 'text', html = '', author = 'user', id = crypto.randomUUID(), timestamp = Date.now(), isSidebar = false) {
                const tag = type === 'h1' ? 'h1' : type === 'h2' ? 'h2' : type === 'h3' ? 'h3' : type === 'quote' ? 'blockquote' : 'div';
                const block = { id, type, data: { text: html }, author, timestamp, dom: null, isSidebar };
                
                let placeholder = author === 'user' && type !== 'hr' ? "start writing, or type '/' for commands..." : "";
                if (type === 'hr') placeholder = "";
                else if (isSidebar && author === 'user') placeholder = "[sidebar chat] type message... (Esc to exit)";
                else if (['h1', 'h2', 'h3'].includes(type) && author === 'user') placeholder = "Heading...";
                else if (['ul', 'ol'].includes(type) && author === 'user') placeholder = "List item...";
                else if (['todo', 'todo-checked'].includes(type) && author === 'user') placeholder = "To-do...";
                else if (type === 'quote' && author === 'user') placeholder = "Quote...";

                const isReadonly = (author === 'ai' || !isEditable() || type === 'hr');

                const content = el(tag, { className: `text-content ${type === 'text' ? '' : type}`, contentEditable: !isReadonly, 'data-placeholder': placeholder, innerHTML: html, onfocus: () => { this.activeBlockId = id; }, oninput: () => { this.handleTextInput(block, content); scheduleSave(); }, onkeydown: (e) => this.handleTextKeydown(e, block, content) });
                block.dom = el('div', { className: `stream-block author-${author} ${isSidebar ? 'sidebar' : ''}`, 'data-id': id }, content);
                this.insertBlockIntoDOMArray(block); return block;
            }

            addToolBlock(type, data, author = 'user', id = crypto.randomUUID(), timestamp = Date.now(), isVirtual = false, originalNoteKey = null, fromLoad = false) {
                const ToolClass = TOOLS_MAP[type];
                if (!ToolClass) return null;
                
                const instance = new ToolClass(data, isVirtual || !isEditable(), () => scheduleSave());
                const block = { id, type, data, author, timestamp, instance, dom: null, isVirtual, originalNoteKey };
                
                const controls = el('div', { className: 'panel-controls' });
                if (isEditable() && !isVirtual) controls.append(el('button', { className: 'panel-ctrl-btn', textContent: '↑', onclick: () => this.moveBlock(id, -1) }), el('button', { className: 'panel-ctrl-btn', textContent: '↓', onclick: () => this.moveBlock(id, 1) }), el('button', { className: 'panel-ctrl-btn delete', textContent: '✕', onclick: () => this.deleteBlock(id) }));
                
                let headerContent = [el('span', { textContent: `[ ${type} ]` })];
                if (isVirtual) {
                    let sourceDisplay = originalNoteKey;
                    if (sourceDisplay.startsWith('ref::')) sourceDisplay = `@${sourceDisplay.replace('ref::', '').toUpperCase()}`;
                    else sourceDisplay = parseLocal(sourceDisplay).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });

                    headerContent = [
                        el('span', { textContent: `[ scheduled event ]` }),
                        el('button', { textContent: `↗ original: ${sourceDisplay}`, style: { background: 'none', border: 'none', color: 'var(--neon-purple)', fontSize: '10px', cursor: 'pointer', fontFamily: 'var(--font-mono)', textTransform: 'uppercase', letterSpacing: '0.05em', marginLeft: '8px', textDecoration: 'underline' }, onclick: () => { if (originalNoteKey.startsWith('ref::')) loadRefPage(originalNoteKey.replace('ref::', '')); else { scheduleSave(true); loadDay(originalNoteKey); } } })
                    ];
                }

                block.dom = el('div', { className: `baritone-panel stream-block ${isVirtual ? 'virtual-block' : ''}`, 'data-id': id }, el('div', { className: 'panel-header' }, el('div', { style: { display: 'flex', alignItems: 'center' } }, ...headerContent), controls), instance.render());
                this.insertBlockIntoDOMArray(block);
                
                if (isEditable() && !isVirtual && !fromLoad) { this.activeBlockId = id; const textBlock = this.addBasicBlock('text', '', 'user'); setTimeout(() => setCaret(textBlock.dom.querySelector('.text-content')), 50); }
                if (!isVirtual && !fromLoad) scheduleSave(); 
                return block;
            }

            moveBlock(id, direction) {
                const idx = this.getBlockIndex(id); if (idx === -1) return;
                if (direction === -1 && idx > 0) {
                    const prev = this.blocks[idx - 1]; this.container.insertBefore(this.blocks[idx].dom, prev.dom);
                    [this.blocks[idx - 1], this.blocks[idx]] = [this.blocks[idx], this.blocks[idx - 1]]; scheduleSave();
                } else if (direction === 1 && idx < this.blocks.length - 1) {
                    const next = this.blocks[idx + 1]; this.container.insertBefore(next.dom, this.blocks[idx].dom);
                    [this.blocks[idx + 1], this.blocks[idx]] = [this.blocks[idx], this.blocks[idx + 1]]; scheduleSave();
                }
            }

            deleteBlock(id) {
                const idx = this.getBlockIndex(id); if (idx === -1) return;
                const block = this.blocks[idx];
                if (block.instance && block.instance.destroy) block.instance.destroy();
                this.container.removeChild(block.dom); this.blocks.splice(idx, 1);
                if (this.blocks.length === 0) this.addBasicBlock('text', '', 'user');
                scheduleSave();
            }

            async getContextData(currentText) {
                let profileStr = '';
                let userName = 'USER';
                let collabName = 'AI COMPANION';
                
                if (pgDB.isReady) {
                    const profileObj = await pgDB.getProfile(); 
                    if (profileObj['user_name']) userName = profileObj['user_name'];
                    if (profileObj['collab_name']) collabName = profileObj['collab_name'];
                    
                    if (profileObj['user_context']) profileStr += `[About ${userName}]: ${profileObj['user_context']}\n`;
                    if (profileObj['collab_persona']) profileStr += `[Your Persona & Role]: ${profileObj['collab_persona']}\n`;
                }
                
                if (!profileStr) profileStr = "No specific persona instructions provided.";

                let topicalContext = "";
                if (pgDB.isReady && currentText) {
                    const hits = await pgDB.searchSemantic(currentText, window.currentDateStr, 3);
                    if (hits && hits.length > 0) topicalContext = hits.map(h => h.searchText).join('\n\n---\n\n');
                }

                return { profileStr, userName, collabName, topicalContext };
            }

            async ambientPredict(block, content) {
                if (!aiEngine || isAILoading || this.isPredicting || this.activeBlockId !== block.id || this.slashMenu.active || block.isSidebar) return;
                const sel = window.getSelection(); if (!sel.rangeCount) return;
                const currentText = content.textContent.trim(); if (currentText.length < 5) return;
                const ambientContentSnapshot = content.textContent;

                this.isPredicting = true; aiStatusEl.className = 'neon-status ai-status loading'; aiStatusEl.textContent = 'sys.ai.anticipating';

                try {
                    const { profileStr, userName, collabName, topicalContext } = await this.getContextData(currentText);

                    const editorState = this.save();
                    let todaysContext = editorState.blocks.map(b => b.data?.text ? normalizePlainText(b.data.text) : '').join('\n');

                    const systemPrompt = `You are ${collabName}, a silent ghostwriter seamlessly predicting the exact next words ${userName} is about to type.
[PROFILES & CONTEXT]:
${profileStr}

[RELEVANT PAST NOTES]:
${topicalContext || '(No relevant past notes)'}

CRITICAL INSTRUCTIONS:
1. Output ONLY the literal continuation of ${userName}'s last sentence. Use past notes for context if relevant.
2. NEVER introduce yourself. NO quotes, NO explanation, NO formatting, NO chat prefixes.
3. If it starts a new word, start with a space. If finishing a word, do not use a space.`;

                    const response = await aiEngine.chat.completions.create({ messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: todaysContext }], temperature: 0.2, max_tokens: 30 });
                    let prediction = response.choices[0].message.content || ""; prediction = prediction.replace(/^["'`\n]+|["'`\n]+$/g, '').trimEnd();

                    if (prediction && document.activeElement === content && content.textContent === ambientContentSnapshot) {
                        if (!prediction.match(/^[.,!?;]/) && !prediction.startsWith(' ') && !currentText.endsWith(' ')) prediction = ' ' + prediction;
                        content.setAttribute('data-ghost', prediction);
                    }
                } catch (e) {} finally { this.isPredicting = false; aiStatusEl.className = 'neon-status ai-status'; aiStatusEl.textContent = 'sys.ai.online'; }
            }

            async triggerSidebarChat(currentBlock, content) {
                if (!aiEngine || isAILoading || this.isPredicting) return;
                
                this.activeBlockId = currentBlock.id;
                const aiBlock = this.addBasicBlock('text', '<span class="neon-status ai-status loading">sys.ai.thinking...</span>', 'ai', crypto.randomUUID(), Date.now(), true);
                
                this.isPredicting = true;
                aiStatusEl.className = 'neon-status ai-status loading';
                aiStatusEl.textContent = 'sys.ai.sidebar';

                try {
                    const { profileStr, userName, collabName, topicalContext } = await this.getContextData(content.textContent.trim());

                    const systemPrompt = `You are ${collabName}, a supportive AI companion having a private sidebar conversation with ${userName}.
The following profile describes both you and ${userName}. You must remember these details to provide a personalized, empathetic response.

[PROFILES & CONTEXT]:
${profileStr}

[RELEVANT PAST CONTEXT]:
${topicalContext || '(No relevant past notes)'}

CRITICAL INSTRUCTIONS:
1. NEVER introduce yourself (e.g., never say "Hello, I am...").
2. DO NOT output conversational filler like "As an AI...".
3. DO NOT output prefixes like "${collabName}:" or "AI:". Just output your dialogue directly.
4. Respond conversationally, empathetically, and directly to their last message.
5. Keep your response concise (1-3 sentences).`;

                    const editorState = this.save();
                    const messages = [{ role: 'system', content: systemPrompt }];
                    
                    editorState.blocks.forEach(b => {
                        if (b.id === aiBlock.id) return; 
                        const txt = b.data?.text ? normalizePlainText(b.data.text) : '';
                        if (!txt) return;
                        
                        messages.push({
                            role: b.author === 'ai' ? 'assistant' : 'user',
                            content: b.isSidebar ? `[SIDEBAR]: ${txt}` : txt
                        });
                    });

                    const response = await aiEngine.chat.completions.create({ 
                        messages: messages, 
                        temperature: 0.7, 
                        max_tokens: 150 
                    });

                    let aiText = response.choices[0].message.content || ""; 
                    
                    const aiContentNode = aiBlock.dom.querySelector('.text-content');
                    aiContentNode.innerHTML = escapeHTML(aiText).replace(/\n/g, '<br>');
                    
                    this.activeBlockId = aiBlock.id;
                    const newUserBlock = this.addBasicBlock('text', '', 'user', crypto.randomUUID(), Date.now(), true);
                    setTimeout(() => setCaret(newUserBlock.dom.querySelector('.text-content'), 0), 10); 
                    scheduleSave();

                } catch (e) {
                    const aiContentNode = aiBlock.dom.querySelector('.text-content');
                    aiContentNode.innerHTML = '<span style="color:#ef4444">connection failed.</span>';
                } finally { 
                    this.isPredicting = false; 
                    aiStatusEl.className = 'neon-status ai-status'; 
                    aiStatusEl.textContent = 'sys.ai.online'; 
                }
            }

            handleTextInput(block, content) {
                if (content.hasAttribute('data-ghost')) content.removeAttribute('data-ghost');
                clearTimeout(this.ambientTimer);
                this.ambientTimer = setTimeout(() => this.ambientPredict(block, content), 750);

                const text = content.textContent.replace(/\u00A0/g, ' ');
                if (block.type === 'text') {
                    let newType = null;
                    if (text === '# ') newType = 'h1';
                    else if (text === '## ') newType = 'h2';
                    else if (text === '### ') newType = 'h3';
                    else if (text === '- ' || text === '* ') newType = 'ul';
                    else if (text === '1. ') newType = 'ol';
                    else if (text === '> ') newType = 'quote';
                    else if (text === '[] ' || text === '[ ] ') newType = 'todo';
                    else if (text === '[x] ' || text === '[X] ') newType = 'todo-checked';
                    else if (text === '---') newType = 'hr';

                    if (newType) {
                        this.replaceTextNodeType(block, newType, true);
                        if (newType === 'hr') {
                            const newBlock = this.addBasicBlock('text', '', 'user');
                            setTimeout(() => setCaret(newBlock.dom.querySelector('.text-content')), 10);
                        }
                        scheduleSave();
                        return;
                    }
                }

                const sel = window.getSelection();
                if (sel.rangeCount > 0) {
                    const range = sel.getRangeAt(0);
                    const preCaretRange = range.cloneRange(); preCaretRange.selectNodeContents(content); preCaretRange.setEnd(range.startContainer, range.startOffset);
                    const textBeforeCursor = preCaretRange.toString();

                    const slashMatch = textBeforeCursor.match(/(?:^|\n)\/([a-zA-Z0-9_]*)$/);
                    if (slashMatch) this.openSlashMenu(block, content, slashMatch[1].toLowerCase(), range); else this.slashMenu.close();

                    const refMatch = textBeforeCursor.match(/(?:^|\s|\n)@([a-zA-Z0-9_]*)$/);
                    if (refMatch && !this.slashMenu.active) this.openRefMenu(block, content, refMatch[1], range); else this.refMenu.close();
                }
            }

            openSlashMenu(block, content, filterText, currentRange) {
                const items = SLASH_COMMANDS.filter(cmd => cmd.id.toLowerCase().includes(filterText) || cmd.label.toLowerCase().includes(filterText));
                this.slashMenu.open({ block, content }, currentRange, items, 
                    (item, ctx) => {
                        ctx.content.innerHTML = ctx.content.innerHTML.replace(/\/[a-zA-Z0-9_]*$/, '');
                        if (ctx.content.innerHTML === '<br>') ctx.content.innerHTML = '';
                        const isEmpty = ctx.content.textContent.trim() === '';
                        this.addToolBlock(item.id, {}, 'user', crypto.randomUUID(), Date.now(), false, null, false);
                        if (isEmpty) this.deleteBlock(ctx.block.id);
                        this.slashMenu.close();
                    },
                    (item, isSelected) => el('button', { className: `menu-item ${isSelected ? 'selected' : ''}` }, el('span', { textContent: item.label }), el('span', { className: 'sub', textContent: item.sub }))
                );
            }

            async openRefMenu(block, content, filterText, currentRange) {
                const filterLower = filterText.toLowerCase().trim();
                if (!this.cachedRefs) {
                    const refs = await pgDB.getReferences(); const activeRefs = [];
                    for (const ref of refs) {
                        const backlinks = pgDB.findBacklinks(ref.slug); const refData = pgDB.cache[`ref::${ref.slug}`];
                        const hasContent = refData && refData.blocks && refData.blocks.length > 0 && !(refData.blocks.length === 1 && !refData.blocks[0].data.text);
                        if (backlinks.length > 0 || hasContent) activeRefs.push(ref); else await pgDB.pg.query(`DELETE FROM references_list WHERE slug = $1`, [ref.slug]);
                    }
                    this.cachedRefs = activeRefs;
                }

                const filtered = filterLower ? this.cachedRefs.filter(r => r.display_name.toLowerCase().includes(filterLower) || r.slug.includes(filterLower)) : this.cachedRefs;
                let items = filtered.map(r => ({ slug: r.slug, name: r.display_name, isNew: false }));
                if (filterLower && !this.cachedRefs.some(r => r.display_name.toLowerCase() === filterLower)) items.push({ slug: null, name: filterText.trim(), isNew: true });
                if (items.length === 0 && !filterLower) return;

                this.refMenu.open({ block, content }, currentRange, items, 
                    async (item, ctx) => {
                        let slug = item.slug; let displayName = item.name;
                        if (item.isNew) { slug = displayName.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'ref-' + Date.now(); await pgDB.createReference(slug, displayName); this.cachedRefs = null; }
                        
                        const sel = window.getSelection();
                        if (sel.rangeCount > 0) {
                            const range = sel.getRangeAt(0); const preCaretRange = range.cloneRange(); preCaretRange.selectNodeContents(ctx.content); preCaretRange.setEnd(range.startContainer, range.startOffset);
                            const atIdx = preCaretRange.toString().lastIndexOf('@');
                            if (atIdx >= 0) {
                                const walker = document.createTreeWalker(ctx.content, NodeFilter.SHOW_TEXT, null, false);
                                let charCount = 0, startNode = null, startOffset = 0;
                                while (walker.nextNode()) {
                                    const nodeLen = walker.currentNode.textContent.length;
                                    if (!startNode && charCount + nodeLen > atIdx) { startNode = walker.currentNode; startOffset = atIdx - charCount; }
                                    charCount += nodeLen;
                                }
                                if (startNode) {
                                    const deleteRange = document.createRange(); deleteRange.setStart(startNode, startOffset); deleteRange.setEnd(range.startContainer, range.startOffset); deleteRange.deleteContents();
                                    const mention = el('span', { className: 'ref-mention', 'data-ref': slug, contentEditable: 'false', textContent: `@${displayName.toUpperCase()}` });
                                    const spaceAfter = document.createTextNode('\u00A0');
                                    deleteRange.insertNode(spaceAfter); deleteRange.insertNode(mention);
                                    const newRange = document.createRange(); newRange.setStartAfter(spaceAfter); newRange.collapse(true);
                                    sel.removeAllRanges(); sel.addRange(newRange);
                                }
                            }
                        }
                        this.refMenu.close(); scheduleSave();
                    },
                    (item, isSelected) => el('button', { className: `menu-item ${item.isNew ? 'create-new' : ''} ${isSelected ? 'selected' : ''}` }, el('span', { textContent: item.isNew ? `+ ${item.name.toUpperCase()}` : item.name.toUpperCase() }), el('span', { className: 'sub', textContent: item.isNew ? 'create new' : 'reference' }))
                );
            }

            handleTextKeydown(e, block, content) {
                if (e.key === 'Escape') {
                    if (content.hasAttribute('data-ghost')) {
                        e.preventDefault();
                        content.removeAttribute('data-ghost');
                        return;
                    }
                    if (block.isSidebar) {
                        e.preventDefault();
                        block.dom.classList.remove('sidebar');
                        block.isSidebar = false;
                        content.setAttribute('data-placeholder', "start writing, or type '/' for commands...");
                        scheduleSave();
                        return;
                    }
                }

                if (e.key === 'Tab' && content.hasAttribute('data-ghost')) {
                    e.preventDefault(); const ghostText = content.getAttribute('data-ghost'); content.removeAttribute('data-ghost');
                    const sel = window.getSelection();
                    if (sel.rangeCount > 0) { const range = sel.getRangeAt(0); const textNode = document.createTextNode(ghostText); range.insertNode(textNode); range.setStartAfter(textNode); range.collapse(true); sel.removeAllRanges(); sel.addRange(range); }
                    scheduleSave(); return;
                }
                
                if (content.hasAttribute('data-ghost') && e.key !== 'Enter') {
                    content.removeAttribute('data-ghost');
                }

                if (this.slashMenu.handleKey(e)) return;
                if (this.refMenu.handleKey(e)) return;

                if (e.key === 'Enter' && !e.shiftKey) {
                    if (content.hasAttribute('data-ghost')) {
                        e.preventDefault();
                        content.removeAttribute('data-ghost');
                        
                        const newBlock = this.addBasicBlock('text', '', 'user', crypto.randomUUID(), Date.now(), true);
                        setTimeout(() => setCaret(newBlock.dom.querySelector('.text-content'), 0), 10);
                        scheduleSave();
                        return;
                    }

                    if (block.isSidebar) {
                        e.preventDefault();
                        if (content.textContent.trim() === '') {
                            block.dom.classList.remove('sidebar');
                            block.isSidebar = false;
                            content.setAttribute('data-placeholder', "start writing, or type '/' for commands...");
                            scheduleSave();
                            return;
                        }
                        this.triggerSidebarChat(block, content);
                        return;
                    }

                    e.preventDefault();
                    if (['ul', 'ol', 'quote', 'todo', 'todo-checked'].includes(block.type) && content.textContent.trim() === '') { 
                        this.replaceTextNodeType(block, 'text'); 
                        scheduleSave(); 
                        return; 
                    }
                    const sel = window.getSelection();
                    if (sel.rangeCount > 0) {
                        const range = sel.getRangeAt(0); const postCaretRange = range.cloneRange(); postCaretRange.selectNodeContents(content); postCaretRange.setStart(range.endContainer, range.endOffset);
                        const tempDiv = document.createElement('div'); tempDiv.appendChild(postCaretRange.extractContents());
                        let postHtml = tempDiv.innerHTML === '<br>' ? '' : tempDiv.innerHTML;
                        if (content.innerHTML.endsWith('<br>')) content.innerHTML = content.innerHTML.slice(0, -4);
                        this.activeBlockId = block.id; 
                        
                        let nextType = 'text';
                        if (['ul', 'ol', 'quote'].includes(block.type)) nextType = block.type;
                        if (['todo', 'todo-checked'].includes(block.type)) nextType = 'todo'; // Checked items create unchecked next lines
                        
                        const newBlock = this.addBasicBlock(nextType, postHtml, 'user');
                        setTimeout(() => setCaret(newBlock.dom.querySelector('.text-content'), 0), 10); scheduleSave();
                    }
                    return;
                }

                if (e.key === 'Backspace') {
                    const sel = window.getSelection();
                    if (sel.rangeCount > 0) {
                        const range = sel.getRangeAt(0); const preCaretRange = range.cloneRange(); preCaretRange.selectNodeContents(content); preCaretRange.setEnd(range.startContainer, range.startOffset);
                        if (preCaretRange.toString().length === 0) {
                            e.preventDefault(); 
                            if (block.type !== 'text') { this.replaceTextNodeType(block, 'text'); scheduleSave(); return; }
                            
                            if (block.isSidebar) {
                                block.dom.classList.remove('sidebar');
                                block.isSidebar = false;
                                content.setAttribute('data-placeholder', "start writing, or type '/' for commands...");
                                scheduleSave();
                                return;
                            }

                            const idx = this.getBlockIndex(block.id);
                            if (idx > 0) {
                                const prevBlock = this.blocks[idx - 1]; 
                                
                                // Deleting a divider block
                                if (prevBlock.type === 'hr') {
                                    this.deleteBlock(prevBlock.id);
                                    scheduleSave();
                                    return;
                                }

                                const currentHtml = content.innerHTML.replace(/<br>$/, ''); const isEmpty = content.textContent.trim() === '';
                                if (!['text', 'h1', 'h2', 'h3'].includes(prevBlock.type)) this.deleteBlock(prevBlock.id);
                                else {
                                    const prevContentNode = prevBlock.dom.querySelector('.text-content');
                                    if (!isEmpty) { const originalChildCount = prevContentNode.childNodes.length; prevContentNode.innerHTML += currentHtml; this.deleteBlock(block.id); setTimeout(() => setCaret(prevContentNode, originalChildCount), 10); }
                                    else { this.deleteBlock(block.id); setCaret(prevContentNode); }
                                }
                            }
                        }
                    }
                }
            }
        }

        const editor = new LeanStreamEditor('lean-editor');
        window.editor = editor;

        // ============================================================================
        // APP LIFECYCLE & STORAGE SYNC
        // ============================================================================
        window.isRefPage = false;
        window.currentRefSlug = null;

        const scheduleSave = debounce(async (immediate = false) => {
            if (!(CONFIG.DEV_ALLOW_PAST_EDITING || window.currentDateStr === todayStr || window.isRefPage)) return;
            const data = editor.save();
            const dbStatusEl = document.getElementById('db-status');
            try {
                await pgDB.saveNote(window.currentDateStr, data);
                dbStatusEl.textContent = 'db.saved'; dbStatusEl.classList.add('saving');
                setTimeout(() => { if (dbStatusEl.textContent === 'db.saved') { dbStatusEl.textContent = 'db.ready'; dbStatusEl.classList.remove('saving'); } }, 1500);
            } catch (e) {
                console.error("Schedule Save Error:", e);
                if (!pgDB.isReady) {
                    dbStatusEl.textContent = 'memory.saved [offline]';
                    setTimeout(() => { if (dbStatusEl.textContent === 'memory.saved [offline]') dbStatusEl.textContent = 'db.offline [memory mode]'; }, 1500);
                } else {
                    dbStatusEl.textContent = 'db.error [save failed]'; dbStatusEl.className = 'neon-status db-status error';
                    setTimeout(() => { if (dbStatusEl.textContent === 'db.error [save failed]') { dbStatusEl.textContent = 'db.ready'; dbStatusEl.className = 'neon-status db-status'; } }, 3000);
                }
            }
        }, 800);

        function renderDateHeader() {
            const headerEl = document.getElementById('date-header');
            if (window.isRefPage && window.currentRefSlug) {
                pgDB.getReferences().then(refs => { const ref = refs.find(r => r.slug === window.currentRefSlug); headerEl.textContent = `@${ref ? ref.display_name.toUpperCase() : window.currentRefSlug.toUpperCase()}`; });
            } else headerEl.textContent = parseLocal(window.currentDateStr).toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' }).toLowerCase();
        }

        function getVirtualCalendarBlocks(targetDateStr) {
            const virtuals = []; const targetTime = parseLocal(targetDateStr).getTime();
            for (const [noteDate, dayData] of Object.entries(pgDB.cache)) {
                if (noteDate === targetDateStr || !dayData || !dayData.blocks) continue;
                for (const block of dayData.blocks) {
                    if (block.type === 'calendar' && block.data && block.data.datetime) {
                        const eventDateObj = new Date(block.data.datetime);
                        const eventDateStr = getLocalYYYYMMDD(eventDateObj);
                        const eventTime = parseLocal(eventDateStr).getTime();
                        let matches = false;
                        
                        if (targetDateStr === eventDateStr) matches = true;
                        else if (targetTime > eventTime) {
                            const rec = block.data.recurrence || 'none';
                            if (rec === 'daily') matches = true;
                            else if (rec === 'weekly' && Math.round((targetTime - eventTime) / 86400000) % 7 === 0) matches = true;
                            else if (rec === 'monthly' && parseLocal(targetDateStr).getDate() === eventDateObj.getDate()) matches = true;
                            else if (rec === 'yearly' && targetDateStr.slice(5) === eventDateStr.slice(5)) matches = true;
                        }

                        if (matches) {
                            const vBlock = JSON.parse(JSON.stringify(block));
                            vBlock.isVirtual = true; vBlock.originalNoteKey = noteDate; 
                            virtuals.push(vBlock);
                        }
                    }
                }
            }
            return virtuals;
        }

        async function loadDay(dateStr) {
            if (pgDB.isReady && isEditable()) { try { await pgDB.saveNote(window.currentDateStr, editor.save()); } catch(e) {} }
            window.isRefPage = false; window.currentRefSlug = null; window.currentDateStr = dateStr;
            renderDateHeader(); removeBacklinksSection();
            
            let dayData = pgDB.cache[dateStr];
            if (!dayData || !dayData.blocks || dayData.blocks.length === 0) {
                const backup = localStorage.getItem(`infinotes_backup_${dateStr}`);
                if (backup) { try { dayData = JSON.parse(backup); pgDB.cache[dateStr] = dayData; } catch(e) {} }
            }
            if (!dayData) dayData = { blocks: [] };
            editor.load([...getVirtualCalendarBlocks(dateStr), ...dayData.blocks]);
        }

        async function loadRefPage(slug) {
            if (pgDB.isReady) { try { await pgDB.saveNote(window.currentDateStr, editor.save()); } catch(e) {} }
            window.isRefPage = true; window.currentRefSlug = slug; window.currentDateStr = `ref::${slug}`;
            renderDateHeader();
            editor.load((pgDB.cache[`ref::${slug}`] || { blocks: [] }).blocks);
            renderBacklinksSection(slug);
        }

        function renderBacklinksSection(slug) {
            removeBacklinksSection();
            const backlinks = pgDB.findBacklinks(slug);
            if (backlinks.length === 0) return;

            const section = el('div', { className: 'backlinks-section', id: 'backlinks-container' }, el('div', { className: 'backlinks-header' }, `[ ${backlinks.length} reference${backlinks.length !== 1 ? 's' : ''} ]`));
            backlinks.forEach(bl => {
                section.appendChild(el('button', { className: 'backlink-item', onclick: () => loadDay(bl.dateStr) },
                    el('span', { textContent: parseLocal(bl.dateStr).toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase() }),
                    el('span', { className: 'backlink-preview', textContent: bl.preview })
                ));
            });
            const appContainer = document.querySelector('.app-container');
            appContainer.insertBefore(section, appContainer.firstChild);
        }

        function removeBacklinksSection() { const existing = document.getElementById('backlinks-container'); if (existing) existing.remove(); }

        document.getElementById('date-header').onclick = () => {
            if (window.isRefPage) return loadDay(todayStr);
            const [y, m, d] = window.currentDateStr.split('-');
            EditorialCalendar.open(new Date(y, m - 1, d), false, null, (selectedDate) => {
                const selectedStr = getLocalYYYYMMDD(selectedDate);
                if (window.currentDateStr !== selectedStr) { scheduleSave(true); loadDay(selectedStr); }
            });
        };

        // Boot Pipeline
        Promise.all([pgDB.init(), mediaStore.init()]).then(() => loadDay(todayStr));

    </script>
</body>
</html>
