        class FloatingMenu {
            constructor(id, container) {
                this.el = el('div', { id, className: 'floating-menu' });
                container.appendChild(this.el);
                this.container = container;
                this.active = false;
                this.index = 0;
            }
            open(context, range, filterStr, onExecute, renderFn) {
                this.active = true;
                this.context = { ...context, range };
                this.index = 0;
                this.onExecute = onExecute;
                this.renderFn = renderFn;
                
                const rect = range.getBoundingClientRect().width === 0 ? context.content.getBoundingClientRect() : range.getBoundingClientRect();
                const containerRect = this.container.getBoundingClientRect();
                
                this.el.style.top = `${rect.bottom - containerRect.top + this.container.scrollTop + 8}px`;
                this.el.style.left = `${Math.max(0, rect.left - containerRect.left)}px`;
                this.update(filterStr);
            }
            close() {
                this.active = false;
                this.el.classList.remove('active');
                this.context = null;
            }
            update(items) {
                this.items = items;
                this.el.innerHTML = '';
                if (!items.length) return this.close();
                
                if (this.index >= items.length) this.index = 0;
                
                items.forEach((item, i) => {
                    const btn = this.renderFn(item, i === this.index);
                    btn.onmousedown = (e) => {
                        e.preventDefault();
                        this.onExecute(item, this.context);
                    };
                    this.el.appendChild(btn);
                });
                this.el.classList.add('active');
            }
            handleKey(e) {
                if (!this.active) return false;
                if (e.key === 'ArrowDown') { e.preventDefault(); this.index = (this.index + 1) % this.items.length; this.update(this.items); return true; }
                if (e.key === 'ArrowUp') { e.preventDefault(); this.index = (this.index - 1 + this.items.length) % this.items.length; this.update(this.items); return true; }
                if (e.key === 'Enter') { e.preventDefault(); this.onExecute(this.items[this.index], this.context); return true; }
                if (e.key === 'Escape') { e.preventDefault(); this.close(); return true; }
                return false;
            }
        }

        class InlineToolbar {
            constructor(editorRef) {
                this.editor = editorRef;
                this.el = el('div', { className: 'inline-toolbar' });
                document.body.appendChild(this.el);
                this.active = false;
                
                const handleContextCheck = debounce(() => this.updateContext(), 80);
                
                document.addEventListener('selectionchange', handleContextCheck);
                document.addEventListener('focusin', handleContextCheck);
                document.addEventListener('mousedown', (e) => {
                    if (this.active && !this.el.contains(e.target) && !e.target.closest('.stream-block')) {
                        this.hide();
                    }
                });
            }

            hide() {
                this.active = false;
                this.el.classList.remove('active');
            }

            updateContext() {
                if (!isEditable()) return this.hide();

                const sel = window.getSelection();
                const activeEl = document.activeElement;
                
                let targetNode = null;
                let hasSelection = false;

                if (sel && !sel.isCollapsed && sel.rangeCount > 0) {
                    targetNode = sel.getRangeAt(0).commonAncestorContainer;
                    if (targetNode.nodeType === 3) targetNode = targetNode.parentNode;
                    hasSelection = true;
                } else if (activeEl && (activeEl.classList.contains('table-cell-input') || activeEl.classList.contains('text-content'))) {
                    targetNode = activeEl;
                }

                if (!targetNode) return this.hide();

                const blockEl = targetNode.closest('.stream-block');
                if (!blockEl) return this.hide();

                const isTable = !!targetNode.closest('.infinotes-table');
                
                if (!hasSelection && !isTable) return this.hide();

                this.render(blockEl, hasSelection, isTable);
                this.position(sel, targetNode, hasSelection);
            }

            render(blockEl, hasSelection, isTable) {
                this.el.innerHTML = '';
                
                const makeBtn = (text, onClick, isDanger = false) => {
                    return el('button', {
                        className: `toolbar-btn ${isDanger ? 'danger' : ''}`,
                        innerHTML: text,
                        onmousedown: (e) => {
                            e.preventDefault(); 
                            onClick(e);
                        }
                    });
                };

                if (hasSelection) {
                    this.el.append(
                        makeBtn('BOLD', () => { document.execCommand('bold'); scheduleSave(); }),
                        makeBtn('ITALIC', () => { document.execCommand('italic'); scheduleSave(); }),
                        makeBtn('STRIKE', () => { document.execCommand('strikeThrough'); scheduleSave(); })
                    );
                }

                if (isTable) {
                    if (hasSelection) this.el.append(el('div', { className: 'toolbar-divider' }));
                    
                    const blockId = blockEl.getAttribute('data-id');
                    const toolInstance = this.editor.blocks.find(b => b.id === blockId)?.instance;
                    
                    if (toolInstance) {
                        this.el.append(
                            makeBtn('+ROW', () => toolInstance.addRow()),
                            makeBtn('+COL', () => toolInstance.addCol()),
                            makeBtn('-ROW', () => toolInstance.delRow(), true),
                            makeBtn('-COL', () => toolInstance.delCol(), true),
                            makeBtn(toolInstance.data.hasHeader ? 'H:ON' : 'H:OFF', (e) => {
                                toolInstance.data.hasHeader = !toolInstance.data.hasHeader;
                                toolInstance.renderTable();
                                scheduleSave();
                            }),
                            el('div', { className: 'toolbar-divider' }),
                            makeBtn('✕', () => this.editor.deleteBlock(blockId), true)
                        );
                    }
                }
            }

            position(sel, targetNode, hasSelection) {
                this.el.classList.add('active'); 
                
                let rect;
                if (hasSelection && sel.rangeCount > 0) {
                    rect = sel.getRangeAt(0).getBoundingClientRect();
                } else {
                    rect = targetNode.getBoundingClientRect();
                }
                
                const top = rect.top + window.scrollY - this.el.offsetHeight - 12;
                const left = rect.left + window.scrollX + (rect.width / 2) - (this.el.offsetWidth / 2);
                
                this.el.style.top = `${Math.max(10, top)}px`;
                this.el.style.left = `${Math.max(10, left)}px`;
                this.active = true;
            }
        }

        // ============================================================================
        // 🧱 EXTENSIBLE TOOL SYSTEM
        // ============================================================================
        class BaseTool {
            constructor(data, isReadOnly, onChange) {
                this.data = data || {};
                this.readOnly = isReadOnly;
                this.onChange = onChange;
                this.isPanel = true; 
            }
            renderContainer(contentElements) {
                const input = el('input', {
                    className: 'panel-title-input',
                    type: 'text',
                    placeholder: 'block title...',
                    value: this.data.title || '',
                    readonly: this.readOnly ? true : null,
                    oninput: (e) => {
                        this.data.title = e.target.value;
                        if (this.onChange) this.onChange();
                    }
                });
                return el('div', {}, input, ...contentElements);
            }
            save() { return this.data; }
            destroy() {}
        }

        class TableTool extends BaseTool {
            constructor(data, isReadOnly, onChange) { 
                const defaultData = { title: '', tableData: [['', '', ''], ['', '', ''], ['', '', '']], hasHeader: true };
                super(Object.assign(defaultData, data), isReadOnly, onChange); 
                this.isPanel = false; 
            }
            
            render() {
                this.tableWrapper = el('div', { style: { overflowX: 'auto', width: '100%' } });
                this.renderTable();
                return this.tableWrapper;
            }
            
            renderTable() {
                this.tableWrapper.innerHTML = '';
                const table = el('table', { className: 'infinotes-table' });
                
                this.data.tableData.forEach((rowData, rIndex) => {
                    const tr = el('tr');
                    rowData.forEach((cellData, cIndex) => {
                        const isHeader = this.data.hasHeader && rIndex === 0;
                        const cell = el(isHeader ? 'th' : 'td');
                        
                        const input = el('div', {
                            className: 'table-cell-input',
                            contentEditable: !this.readOnly,
                            innerHTML: cellData || '',
                            tabIndex: 0,
                            oninput: (e) => {
                                this.data.tableData[rIndex][cIndex] = e.target.innerHTML;
                                if (this.onChange) this.onChange();
                            }
                        });
                        
                        cell.appendChild(input);
                        tr.appendChild(cell);
                    });
                    table.appendChild(tr);
                });
                this.tableWrapper.appendChild(table);
            }
            
            addRow() {
                const cols = this.data.tableData[0]?.length || 1;
                this.data.tableData.push(Array(cols).fill(''));
                this.renderTable();
                if (this.onChange) this.onChange();
            }
            
            addCol() {
                if (this.data.tableData.length === 0) this.data.tableData.push([]);
                this.data.tableData.forEach(row => row.push(''));
                this.renderTable();
                if (this.onChange) this.onChange();
            }
            
            delRow() {
                if (this.data.tableData.length > 1) {
                    this.data.tableData.pop();
                    this.renderTable();
                    if (this.onChange) this.onChange();
                }
            }
            
            delCol() {
                if (this.data.tableData.length > 0 && this.data.tableData[0].length > 1) {
                    this.data.tableData.forEach(row => row.pop());
                    this.renderTable();
                    if (this.onChange) this.onChange();
                }
            }
        }

        class CalendarTool extends BaseTool {
            constructor(data, isReadOnly, onChange) { 
                super(Object.assign({ id: crypto.randomUUID(), title: '', datetime: new Date().toISOString(), notified: false, recurrence: 'none' }, data), isReadOnly, onChange); 
                if (!this.data.notified && !this.readOnly && new Date(this.data.datetime) > new Date()) {
                    NotificationEngine.schedule(this.data.id, this.data.datetime, this.data.title); 
                }
            }
            
            render() {
                this.dateDisp = el('div', { 
                    className: 'calendar-date-display', 
                    style: { cursor: this.readOnly ? 'default' : 'pointer', marginBottom: '8px' }, 
                    onclick: this.readOnly ? null : () => EditorialCalendar.open(new Date(this.data.datetime), true, this.data.recurrence, (newDate, recurrence) => { 
                        this.data.datetime = newDate.toISOString(); 
                        this.data.recurrence = recurrence; 
                        this.data.notified = false; 
                        this.updateDateDisplay(); 
                        NotificationEngine.schedule(this.data.id, this.data.datetime, this.data.title); 
                        if (this.onChange) this.onChange(); 
                    }) 
                });
                
                this.updateDateDisplay();
                
                const exportAction = UI.button('export ics', () => { 
                    const s = new Date(this.data.datetime);
                    const formatDt = d => d.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z'; 
                    const icsData = `BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nDTSTART:${formatDt(s)}\nDTEND:${formatDt(new Date(s.getTime() + 3600000))}\nSUMMARY:${this.data.title || 'Event'}\nRRULE:FREQ=${this.data.recurrence !== 'none' ? this.data.recurrence.toUpperCase() : ''}\nEND:VEVENT\nEND:VCALENDAR`;
                    
                    const a = document.createElement('a'); 
                    a.href = URL.createObjectURL(new Blob([icsData], { type: 'text/calendar;charset=utf-8' })); 
                    a.download = `${this.data.title?.replace(/\s+/g, '_') || 'event'}.ics`; 
                    a.click(); 
                });
                
                const actions = [exportAction];
                
                if (!this.readOnly) {
                    const hasNotifications = ('Notification' in window && Notification.permission === 'granted');
                    actions.push(UI.button(hasNotifications ? 'notifications on' : 'notify me', async (e) => { 
                        if (await Notification.requestPermission() === 'granted') { 
                            e.target.textContent = 'notifications on'; 
                            NotificationEngine.schedule(this.data.id, this.data.datetime, this.data.title); 
                        } 
                    }));
                }
                
                return this.renderContainer([this.dateDisp, UI.row(...actions)]);
            }
            
            updateDateDisplay() { 
                const d = new Date(this.data.datetime); 
                const dateString = d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
                const timeString = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
                const recurrenceString = this.data.recurrence !== 'none' ? ` ↻ ${this.data.recurrence}` : '';
                
                this.dateDisp.textContent = `${dateString} @ ${timeString}${recurrenceString}`; 
            }
        }

        class RecallTool extends BaseTool {
            constructor(data, isReadOnly, onChange) { super(Object.assign({ title: '', searchQuery: '', selectedItem: null }, data), isReadOnly, onChange); }
            
            render() {
                const els = [];
                if (this.data.selectedItem) {
                    const item = this.data.selectedItem;
                    const dateStr = item.date.startsWith('persona::') 
                        ? `@${item.date.replace('persona::', '').toUpperCase()}`
                        : parseLocal(item.date).toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
                    
                    const quoteBlock = el('div', { 
                        className: 'text-content', 
                        innerHTML: escapeHTML(item.text), 
                        style: { borderLeft: '2px solid #eab308', paddingLeft: '12px', opacity: '0.85', pointerEvents: 'none', color: '#eab308' } 
                    });
                    
                    const controls = UI.row(
                        UI.button('view original', () => { 
                            if (typeof loadDay === 'function') {
                                if (item.date.startsWith('persona::')) loadPersonaPage(item.date.replace('persona::', ''));
                                else loadDay(item.date);
                            }
                        }), 
                        el('span', { className: 'voice-status-text', textContent: `original: ${dateStr}`, style: { marginLeft: '8px' } })
                    );
                    
                    els.push(quoteBlock, controls);
                } else if (!this.readOnly) {
                    this.input = UI.textarea({ 
                        className: 'raw-input', 
                        placeholder: 'search past notes...', 
                        value: this.data.searchQuery, 
                        oninput: (e) => { 
                            this.data.searchQuery = e.target.value; 
                            this.input.style.height = 'auto'; 
                            this.input.style.height = this.input.scrollHeight + 'px'; 
                            this.scheduleSearch(); 
                        } 
                    });
                    
                    this.resultsContainer = el('div', { style: { display: 'flex', flexDirection: 'column', gap: '4px', marginTop: '8px' } });
                    this.scheduleSearch = debounce(() => this.performSearch(), 300); 
                    
                    els.push(this.input, this.resultsContainer);
                    
                    setTimeout(() => { if (this.input) this.input.style.height = this.input.scrollHeight + 'px'; }, 0); 
                    if (this.data.searchQuery) this.performSearch();
                } else {
                    els.push(el('div', { style: { padding: '24px', textAlign: 'center', color: 'var(--muted-text)', fontSize: '14px' }, textContent: 'Empty Recall' }));
                }
                
                return el('div', {}, this.renderContainer(els));
            }
            
            async performSearch() {
                if (!this.data.searchQuery.trim() || !pgDB.isReady || window.isAIGenerating) {
                    return this.resultsContainer.innerHTML = '';
                }
                
                const results = await pgDB.searchSemantic(this.data.searchQuery, window.currentDateStr, 5); 
                this.resultsContainer.innerHTML = '';
                
                if (!results.length) {
                    return this.resultsContainer.appendChild(el('div', { className: 'voice-status-text', textContent: 'no matches found.' }));
                }
                
                results.forEach(result => {
                    const btn = el('button', { 
                        className: 'menu-item', 
                        style: { width: '100%', marginBottom: '4px', border: '1px solid var(--baritone-bg)' }, 
                        onclick: () => { 
                            this.data.selectedItem = { date: result.date, blockId: result.blockId, text: result.searchText }; 
                            this.render(); 
                            if (this.onChange) this.onChange(); 
                        } 
                    });
                    
                    const previewText = result.searchText.substring(0, 60) + (result.searchText.length > 60 ? '...' : '');
                    const dateDisplay = result.date.startsWith('persona::') ? `@${result.date.replace('persona::', '')}` : result.date;
                    
                    btn.appendChild(el('span', { textContent: previewText }));
                    btn.appendChild(el('span', { className: 'sub', textContent: dateDisplay }));
                    
                    this.resultsContainer.appendChild(btn);
                });
            }
        }

        const TOOLS_MAP = { table: TableTool, calendar: CalendarTool, recall: RecallTool };

        // ============================================================================
        // 🖋 THE LEAN STREAM EDITOR 
        // ============================================================================
        const isEditable = () => CONFIG.DEV_ALLOW_PAST_EDITING || window.currentDateStr === todayStr || window.isPersonaPage;

        class LeanStreamEditor {
            constructor(containerId) {
                this.container = document.getElementById(containerId); 
                this.blocks = []; 
                this.activeBlockId = null;
                
                this.slashMenu = new FloatingMenu('slash-menu-ui', this.container); 
                this.personaMenu = new FloatingMenu('persona-menu-ui', this.container);
                this.inlineToolbar = new InlineToolbar(this);

                document.addEventListener('mousedown', (e) => {
                    if (this.slashMenu.active && !this.slashMenu.el.contains(e.target)) this.slashMenu.close();
                    if (this.personaMenu.active && !this.personaMenu.el.contains(e.target)) this.personaMenu.close();
                });

                document.addEventListener('click', (e) => {
                    const mention = e.target.closest('.persona-mention');
                    if (mention) { 
                        e.preventDefault(); e.stopPropagation(); 
                        loadPersonaPage(mention.getAttribute('data-slug')); 
                        return; 
                    }
                    
                    const block = e.target.closest('.stream-block');
                    if (block && isEditable()) {
                        const content = block.querySelector('.todo, .todo-checked');
                        if (content && e.clientX - block.getBoundingClientRect().left < 30) {
                            const isChecked = content.classList.contains('todo-checked');
                            content.className = `text-content ${isChecked ? 'todo' : 'todo-checked'}`;
                            
                            const edBlock = this.blocks.find(b => b.id === block.getAttribute('data-id'));
                            if (edBlock) { 
                                edBlock.type = isChecked ? 'todo' : 'todo-checked'; 
                                scheduleSave(); 
                            }
                            e.preventDefault(); e.stopPropagation();
                        }
                    }
                });
            }

            getPlaceholder(type, isBlockEditable) {
                if (!isBlockEditable || type === 'hr') return '';
                const placeholders = { h1: 'Heading...', h2: 'Heading...', h3: 'Heading...', ul: 'List item...', ol: 'List item...', todo: 'To-do...', 'todo-checked': 'To-do...', quote: 'Quote...' };
                return placeholders[type] || "start writing, or type '/' for commands...";
            }

            load(blocksData) {
                this.blocks.forEach(b => b.instance?.destroy?.());
                Array.from(this.container.children).filter(c => !c.classList.contains('floating-menu')).forEach(c => c.remove());
                this.blocks = []; 
                this.slashMenu.close(); 
                this.personaMenu.close(); 
                this.inlineToolbar.hide();

                const dataToLoad = blocksData?.length ? blocksData : [{ type: 'text', data: { text: '' } }];

                dataToLoad.forEach(b => {
                    if (['text', 'h1', 'h2', 'h3', 'ul', 'ol', 'quote', 'todo', 'todo-checked', 'hr'].includes(b.type)) {
                        this.addBasicBlock(b.type, b.data?.text || '', b.author || 'user', b.id, b.timestamp);
                    } else if (TOOLS_MAP[b.type]) {
                        this.addToolBlock(b.type, b.data, b.author || 'user', b.id, b.timestamp, b.isVirtual, b.originalNoteKey, true);
                    }
                });
                
                if (this.blocks.length === 0 || !['text', 'h1', 'h2', 'h3', 'ul', 'ol', 'quote', 'todo', 'todo-checked', 'hr'].includes(this.blocks[this.blocks.length - 1].type)) {
                    this.addBasicBlock('text', '', 'user');
                }
            }

            save() {
                return { 
                    blocks: this.blocks.filter(b => !b.isVirtual).map(b => ({
                        id: b.id, type: b.type, author: b.author, timestamp: b.timestamp,
                        data: TOOLS_MAP[b.type] ? b.instance.save() : { text: b.dom.querySelector('.text-content').innerHTML }
                    }))
                };
            }

            getBlockIndex(id) { return this.blocks.findIndex(b => b.id === id); }

            _insertIntoStream(blockDom, insertAfterId) {
                let insertIndex;
                if (insertAfterId) {
                    insertIndex = this.getBlockIndex(insertAfterId) + 1 || this.blocks.length;
                } else if (this.activeBlockId && this.getBlockIndex(this.activeBlockId) !== -1) {
                    insertIndex = this.getBlockIndex(this.activeBlockId) + 1;
                } else {
                    insertIndex = this.blocks.length;
                }

                this.container.insertBefore(blockDom, this.container.children[insertIndex] || null);
                return insertIndex;
            }

            replaceTextNodeType(block, newType, clearContent = false) {
                const tag = ['h1', 'h2', 'h3'].includes(newType) ? newType : newType === 'quote' ? 'blockquote' : 'div';
                const oldContent = block.dom.querySelector('.text-content');
                
                const newContent = el(tag, { 
                    className: `text-content ${newType === 'text' ? '' : newType}`, 
                    contentEditable: newType !== 'hr' && isEditable(), 
                    'data-placeholder': this.getPlaceholder(newType, isEditable()), 
                    innerHTML: clearContent ? '' : oldContent.innerHTML, 
                    onfocus: () => this.activeBlockId = block.id, 
                    oninput: () => { this.handleTextInput(block, newContent); scheduleSave(); }, 
                    onkeydown: (e) => this.handleTextKeydown(e, block, newContent) 
                });
                
                block.dom.replaceChild(newContent, oldContent); 
                block.type = newType;
                
                if (clearContent && newType !== 'hr') setCaret(newContent);
            }

            addBasicBlock(type = 'text', html = '', author = 'user', id = crypto.randomUUID(), timestamp = Date.now(), insertAfterId = null) {
                const block = { id, type, data: { text: html }, author, timestamp, dom: null };
                const tag = ['h1', 'h2', 'h3'].includes(type) ? type : type === 'quote' ? 'blockquote' : 'div';
                
                const content = el(tag, { 
                    className: `text-content ${type === 'text' ? '' : type}`, 
                    contentEditable: isEditable() && type !== 'hr', 
                    'data-placeholder': this.getPlaceholder(type, isEditable() && author === 'user'), 
                    innerHTML: html, 
                    onfocus: () => this.activeBlockId = id, 
                    oninput: () => { this.handleTextInput(block, content); scheduleSave(); }, 
                    onkeydown: (e) => this.handleTextKeydown(e, block, content) 
                });
                
                block.dom = el('div', { className: `stream-block author-${author.replace(/[^a-z0-9_-]/gi, '-')}`, 'data-id': id }, content);
                
                const insertIndex = this._insertIntoStream(block.dom, insertAfterId);
                this.blocks.splice(insertIndex, 0, block); 
                
                return block;
            }

            addToolBlock(type, data, author = 'user', id = crypto.randomUUID(), timestamp = Date.now(), isVirtual = false, originalNoteKey = null, fromLoad = false) {
                const ToolClass = TOOLS_MAP[type]; 
                if (!ToolClass) return null;
                
                const instance = new ToolClass(data, isVirtual || !isEditable(), () => scheduleSave());
                const block = { id, type, data, author, timestamp, instance, dom: null, isVirtual, originalNoteKey };

                if (!instance.isPanel) {
                    block.dom = el('div', { className: `stream-block author-${author.replace(/[^a-z0-9_-]/gi, '-')}`, 'data-id': id }, instance.render());
                } else {
                    const controls = el('div', { className: 'panel-controls' });
                    if (isEditable() && !isVirtual) {
                        controls.append(
                            UI.button('↑', () => this.moveBlock(id, -1), 'panel-ctrl-btn'), 
                            UI.button('↓', () => this.moveBlock(id, 1), 'panel-ctrl-btn'), 
                            UI.button('✕', () => this.deleteBlock(id), 'panel-ctrl-btn delete')
                        );
                    }
                    
                    let headerContent = [el('span', { textContent: `[ ${type} ]` })];
                    if (isVirtual) {
                        const originalDateStr = originalNoteKey.startsWith('persona::') 
                            ? `@${originalNoteKey.replace('persona::', '').toUpperCase()}` 
                            : parseLocal(originalNoteKey).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
                            
                        const navBtn = el('button', { 
                            textContent: `↗ original: ${originalDateStr}`, 
                            style: { background: 'none', border: 'none', color: 'var(--neon-purple)', fontSize: '10px', cursor: 'pointer', fontFamily: 'var(--font-mono)', textTransform: 'uppercase', letterSpacing: '0.05em', marginLeft: '8px', textDecoration: 'underline' }, 
                            onclick: () => { 
                                if (originalNoteKey.startsWith('persona::')) loadPersonaPage(originalNoteKey.replace('persona::', '')); 
                                else { scheduleSave(true); loadDay(originalNoteKey); } 
                            } 
                        });
                        
                        headerContent = [el('span', { textContent: `[ scheduled event ]` }), navBtn];
                    }

                    const headerEl = el('div', { className: 'panel-header' }, el('div', { style: { display: 'flex', alignItems: 'center' } }, ...headerContent), controls);
                    block.dom = el('div', { className: `baritone-panel stream-block author-${author.replace(/[^a-z0-9_-]/gi, '-')} ${isVirtual ? 'virtual-block' : ''}`, 'data-id': id }, headerEl, instance.render());
                }
                
                const insertIndex = this._insertIntoStream(block.dom);
                this.blocks.splice(insertIndex, 0, block); 
                
                if (isEditable() && !isVirtual && !fromLoad) { 
                    this.activeBlockId = id; 
                    const textBlock = this.addBasicBlock('text', '', 'user'); 
                    setTimeout(() => setCaret(textBlock.dom.querySelector('.text-content')), 50); 
                    scheduleSave(); 
                }
                return block;
            }

            moveBlock(id, direction) {
                const idx = this.getBlockIndex(id); 
                if (idx === -1) return;
                
                const swapIdx = idx + direction;
                if (swapIdx >= 0 && swapIdx < this.blocks.length) {
                    const targetDom = direction === -1 ? this.blocks[swapIdx].dom : this.blocks[idx].dom.nextSibling;
                    this.container.insertBefore(direction === -1 ? this.blocks[idx].dom : this.blocks[swapIdx].dom, targetDom);
                    [this.blocks[idx], this.blocks[swapIdx]] = [this.blocks[swapIdx], this.blocks[idx]]; 
                    scheduleSave();
                }
            }

            deleteBlock(id) {
                const idx = this.getBlockIndex(id); 
                if (idx === -1) return;
                
                this.blocks[idx].instance?.destroy?.(); 
                this.blocks[idx].dom.remove(); 
                this.blocks.splice(idx, 1);
                
                if (!this.blocks.length) this.addBasicBlock('text', '', 'user');
                this.inlineToolbar.hide();
                scheduleSave();
            }

            handleTextInput(block, content) {
                const text = content.textContent.replace(/\u00A0/g, ' ');
                
                if (block.type === 'text') {
                    if (MARKDOWN_MAP[text]) {
                        this.replaceTextNodeType(block, MARKDOWN_MAP[text], true);
                        if (MARKDOWN_MAP[text] === 'hr') {
                            setTimeout(() => setCaret(this.addBasicBlock('text', '', 'user').dom.querySelector('.text-content')), 10);
                        }
                        return scheduleSave();
                    }

                    const tableMatch = text.match(/^\[(\d+)x(\d+)\]\s$/);
                    if (tableMatch) {
                        const rows = Math.min(Math.max(1, parseInt(tableMatch[1])), 20);
                        const cols = Math.min(Math.max(1, parseInt(tableMatch[2])), 20);
                        const tableData = Array.from({ length: rows }, () => Array(cols).fill(''));
                        
                        const currId = block.id;
                        const newBlock = this.addToolBlock('table', { tableData, hasHeader: true }, 'user', crypto.randomUUID(), Date.now());
                        
                        this.deleteBlock(currId);
                        setTimeout(() => {
                            const firstCell = newBlock.dom.querySelector('.table-cell-input');
                            if (firstCell) firstCell.focus();
                        }, 50);
                        return scheduleSave();
                    }
                }
                
                const sel = window.getSelection();
                if (sel.rangeCount > 0) {
                    const range = sel.getRangeAt(0);
                    const preCaretRange = range.cloneRange(); 
                    preCaretRange.selectNodeContents(content); 
                    preCaretRange.setEnd(range.startContainer, range.startOffset);
                    
                    const textBeforeCursor = preCaretRange.toString();
                    const slashMatch = textBeforeCursor.match(/(?:^|\n)\/([a-zA-Z0-9_]*)$/);
                    
                    if (slashMatch) {
                        this.openSlashMenu(block, content, slashMatch[1].toLowerCase(), range); 
                    } else {
                        this.slashMenu.close();
                    }
                    
                    const refMatch = textBeforeCursor.match(/(?:^|\s|\n)@([a-zA-Z0-9_-]*)$/);
                    if (refMatch && !this.slashMenu.active) {
                        this.openPersonaMenu(block, content, refMatch[1], range); 
                    } else {
                        this.personaMenu.close();
                    }
                }
            }

            openSlashMenu(block, content, filterText, currentRange) {
                const items = SLASH_COMMANDS.filter(cmd => cmd.id.toLowerCase().includes(filterText) || cmd.label.toLowerCase().includes(filterText));
                this.slashMenu.open({ block, content }, currentRange, items, (item, ctx) => {
                    ctx.content.innerHTML = ctx.content.innerHTML.replace(/\/[a-zA-Z0-9_]*$/, '');
                    if (ctx.content.innerHTML === '<br>') ctx.content.innerHTML = '';
                    const isEmpty = ctx.content.textContent.trim() === '';
                    
                    this.addToolBlock(item.id, {}, 'user', crypto.randomUUID(), Date.now());
                    if (isEmpty) this.deleteBlock(ctx.block.id);
                    this.slashMenu.close();
                }, (item, isSelected) => el('button', { className: `menu-item ${isSelected ? 'selected' : ''}` }, el('span', { textContent: item.label }), el('span', { className: 'sub', textContent: item.sub })));
            }

            async openPersonaMenu(block, content, filterText, currentRange) {
                const filterLower = filterText.toLowerCase().trim();
                
                if (!this.cachedPersonas) {
                    const personas = await pgDB.getPersonas();
                    const activePersonas = [];
                    for (const persona of personas) {
                        const personaData = pgDB.cache[`persona::${persona.slug}`];
                        const hasBacklinks = pgDB.findBacklinks(persona.slug).length > 0;
                        const hasContent = personaData?.blocks?.length > 0 && !(personaData.blocks.length === 1 && !personaData.blocks[0].data.text);
                        
                        if (hasBacklinks || hasContent || ['me','manual','strategist','secretary'].includes(persona.slug)) {
                            activePersonas.push(persona);
                        } else {
                            await pgDB.pg.query(`DELETE FROM personas_list WHERE slug = $1`, [persona.slug]);
                        }
                    }
                    this.cachedPersonas = activePersonas;
                }

                const filtered = filterLower ? this.cachedPersonas.filter(r => r.display_name.toLowerCase().includes(filterLower) || r.slug.includes(filterLower)) : this.cachedPersonas;
                let items = filtered.map(r => ({ slug: r.slug, name: r.display_name, isNew: false }));
                
                if (filterLower && !this.cachedPersonas.some(r => r.display_name.toLowerCase() === filterLower)) {
                    items.push({ slug: null, name: filterText.trim(), isNew: true });
                }
                
                if (items.length === 0 && !filterLower) return;

                this.personaMenu.open({ block, content }, currentRange, items, async (item, ctx) => {
                    let { slug, name } = item;
                    if (item.isNew) { 
                        slug = name.toLowerCase().replace(/[^a-z0-9_-]+/g, '-').replace(/^-|-$/g, '') || 'persona-' + Date.now(); 
                        await pgDB.createPersona(slug, name); 
                        this.cachedPersonas = null; 
                    }
                    
                    const sel = window.getSelection();
                    if (sel.rangeCount > 0) {
                        const range = sel.getRangeAt(0);
                        const preCaretRange = range.cloneRange(); 
                        preCaretRange.selectNodeContents(ctx.content); 
                        preCaretRange.setEnd(range.startContainer, range.startOffset);
                        
                        const atIdx = preCaretRange.toString().lastIndexOf('@');
                        if (atIdx >= 0) {
                            const walker = document.createTreeWalker(ctx.content, NodeFilter.SHOW_TEXT, null, false);
                            let charCount = 0, startNode = null, startOffset = 0;
                            
                            while (walker.nextNode()) { 
                                const len = walker.currentNode.textContent.length; 
                                if (!startNode && charCount + len > atIdx) { 
                                    startNode = walker.currentNode; 
                                    startOffset = atIdx - charCount; 
                                } 
                                charCount += len; 
                            }
                            
                            if (startNode) {
                                const deleteRange = document.createRange(); 
                                deleteRange.setStart(startNode, startOffset); 
                                deleteRange.setEnd(range.startContainer, range.startOffset); 
                                deleteRange.deleteContents();
                                
                                const spaceAfter = document.createTextNode('\u00A0'); 
                                deleteRange.insertNode(spaceAfter); 
                                deleteRange.insertNode(el('span', { className: 'persona-mention', 'data-slug': slug, contentEditable: 'false', textContent: `@${name.toUpperCase()}` }));
                                
                                const newRange = document.createRange(); 
                                newRange.setStartAfter(spaceAfter); 
                                newRange.collapse(true); 
                                sel.removeAllRanges(); 
                                sel.addRange(newRange);
                            }
                        }
                    }
                    this.personaMenu.close(); 
                    scheduleSave();
                }, (item, isSelected) => el('button', { className: `menu-item ${item.isNew ? 'create-new' : ''} ${isSelected ? 'selected' : ''}` }, el('span', { textContent: item.isNew ? `+ ${item.name.toUpperCase()}` : item.name.toUpperCase() }), el('span', { className: 'sub', textContent: item.isNew ? 'create persona' : 'persona' })));
            }

            _parseAndTriggerAI(block, content) {
                const aiMentions = [];
                
                content.innerHTML = content.innerHTML.replace(/@([a-zA-Z0-9_-]+)\.collab/gi, (match, p1) => {
                    const slug = p1.toLowerCase(); 
                    pgDB.createPersona(slug, p1.toUpperCase()); 
                    this.cachedPersonas = null; 
                    aiMentions.push({ slug, name: p1.toUpperCase() });
                    return `<span class="persona-mention" data-slug="${slug}">@${p1.toUpperCase()}</span>`;
                });
                
                Array.from(content.querySelectorAll('.persona-mention')).forEach(m => {
                    let next = m.nextSibling;
                    if (next && next.nodeType === Node.TEXT_NODE && /^\s*\.collab/i.test(next.textContent)) {
                        aiMentions.push({ slug: m.getAttribute('data-slug'), name: m.textContent.replace('@', '') });
                        next.textContent = next.textContent.replace(/^\s*\.collab/i, '');
                    }
                });

                if (aiMentions.length > 0) {
                    this.triggerAIPersonas(block, content, aiMentions);
                }
            }

            handleTextKeydown(e, block, content) {
                if (this.slashMenu.handleKey(e) || this.personaMenu.handleKey(e)) return;

                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    if (['ul', 'ol', 'quote', 'todo', 'todo-checked'].includes(block.type) && content.textContent.trim() === '') {
                        return this.replaceTextNodeType(block, 'text'), scheduleSave();
                    }
                    
                    const sel = window.getSelection();
                    if (sel.rangeCount > 0) {
                        const range = sel.getRangeAt(0);
                        const postCaretRange = range.cloneRange(); 
                        postCaretRange.selectNodeContents(content); 
                        postCaretRange.setStart(range.endContainer, range.endOffset);
                        
                        const tempDiv = document.createElement('div'); 
                        tempDiv.appendChild(postCaretRange.extractContents());
                        let postHtml = tempDiv.innerHTML === '<br>' ? '' : tempDiv.innerHTML;
                        
                        if (content.innerHTML.endsWith('<br>')) content.innerHTML = content.innerHTML.slice(0, -4);
                        
                        this.activeBlockId = block.id; 
                        const newType = ['ul', 'ol', 'quote'].includes(block.type) ? block.type : ['todo', 'todo-checked'].includes(block.type) ? 'todo' : 'text';
                        const newBlock = this.addBasicBlock(newType, postHtml, 'user');

                        this._parseAndTriggerAI(block, content);
                        
                        setTimeout(() => setCaret(newBlock.dom.querySelector('.text-content'), 0), 10); 
                        scheduleSave();
                    }
                    return;
                }

                if (e.key === 'Backspace') {
                    const sel = window.getSelection();
                    if (sel.rangeCount > 0) {
                        const range = sel.getRangeAt(0);
                        const preCaretRange = range.cloneRange(); 
                        preCaretRange.selectNodeContents(content); 
                        preCaretRange.setEnd(range.startContainer, range.startOffset);
                        
                        if (preCaretRange.toString().length === 0) {
                            e.preventDefault(); 
                            if (block.type !== 'text') {
                                return this.replaceTextNodeType(block, 'text'), scheduleSave();
                            }

                            const idx = this.getBlockIndex(block.id);
                            if (idx > 0) {
                                const prevBlock = this.blocks[idx - 1]; 
                                if (prevBlock.type === 'hr' || !['text', 'h1', 'h2', 'h3'].includes(prevBlock.type)) {
                                    return this.deleteBlock(prevBlock.id);
                                }
                                
                                const currentHtml = content.innerHTML.replace(/<br>$/, '');
                                const prevContentNode = prevBlock.dom.querySelector('.text-content');
                                
                                if (content.textContent.trim() !== '') { 
                                    const childCount = prevContentNode.childNodes.length; 
                                    prevContentNode.innerHTML += currentHtml; 
                                    this.deleteBlock(block.id); 
                                    setTimeout(() => setCaret(prevContentNode, childCount), 10); 
                                } else { 
                                    this.deleteBlock(block.id); 
                                    setCaret(prevContentNode); 
                                }
                            }
                        }
                    }
                }
            }

            _parseAIMarkdownToBlocks(markdownStr, author, insertAfterId) {
                const lines = markdownStr.split('\n');
                let currentId = insertAfterId;
                let currentText = [];
                let chainedMentions = [];
                let inTable = false;
                let tableData = [];

                const processText = (rawText) => {
                    let escaped = escapeHTML(rawText.trim());
                    escaped = escaped.replace(/@([a-zA-Z0-9_-]+)(\.collab)?/gi, (match, p1, p2) => {
                        const slug = p1.toLowerCase();
                        const parentSlug = author !== 'user' ? author : null;
                        pgDB.createPersona(slug, p1.toUpperCase(), parentSlug);
                        if (p2) chainedMentions.push({ slug, name: p1.toUpperCase() });
                        return `<span class="persona-mention" data-slug="${slug}" contenteditable="false">@${p1.toUpperCase()}</span>`;
                    });
                    return escaped;
                };

                const flushText = () => {
                    if (currentText.length > 0) {
                        const htmlText = processText(currentText.join('\n')).replace(/\n/g, '<br>');
                        const block = this.addBasicBlock('text', htmlText, author, crypto.randomUUID(), Date.now(), currentId);
                        currentId = block.id;
                        currentText = [];
                    }
                };

                const flushTable = () => {
                    if (tableData.length > 0) {
                        const maxCols = Math.max(...tableData.map(r => r.length));
                        const paddedData = tableData.map(r => {
                            while(r.length < maxCols) r.push('');
                            return r;
                        });
                        const block = this.addToolBlock('table', { tableData: paddedData, hasHeader: true }, author, crypto.randomUUID(), Date.now(), false, null, true);
                        if (block) currentId = block.id;
                        tableData = [];
                    }
                    inTable = false;
                };

                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i];
                    
                    if (line.trim().startsWith('|')) {
                        flushText();
                        inTable = true;
                        if (!line.replace(/[\s|-]/g, '').length) continue; 
                        const row = line.split('|').slice(1, -1).map(c => processText(c.trim()));
                        if (row.length > 0) tableData.push(row);
                        continue;
                    } else if (inTable) {
                        flushTable();
                    }

                    const h1Match = line.match(/^#\s+(.*)/);
                    const h2Match = line.match(/^##\s+(.*)/);
                    const h3Match = line.match(/^###\s+(.*)/);
                    const ulMatch = line.match(/^[-*]\s+(.*)/);
                    const olMatch = line.match(/^\d+\.\s+(.*)/);
                    const quoteMatch = line.match(/^>\s+(.*)/);

                    if (h1Match) { flushText(); currentId = this.addBasicBlock('h1', processText(h1Match[1]), author, crypto.randomUUID(), Date.now(), currentId).id; }
                    else if (h2Match) { flushText(); currentId = this.addBasicBlock('h2', processText(h2Match[1]), author, crypto.randomUUID(), Date.now(), currentId).id; }
                    else if (h3Match) { flushText(); currentId = this.addBasicBlock('h3', processText(h3Match[1]), author, crypto.randomUUID(), Date.now(), currentId).id; }
                    else if (ulMatch) { flushText(); currentId = this.addBasicBlock('ul', processText(ulMatch[1]), author, crypto.randomUUID(), Date.now(), currentId).id; }
                    else if (olMatch) { flushText(); currentId = this.addBasicBlock('ol', processText(olMatch[1]), author, crypto.randomUUID(), Date.now(), currentId).id; }
                    else if (quoteMatch) { flushText(); currentId = this.addBasicBlock('quote', processText(quoteMatch[1]), author, crypto.randomUUID(), Date.now(), currentId).id; }
                    else {
                        if (line.trim() !== '') currentText.push(line);
                        else if (currentText.length > 0) flushText(); 
                    }
                }
                flushText();
                if (inTable) flushTable();
                
                return { lastId: currentId, chainedMentions };
            }

            // MODIFIED: LIVE STREAMING OUTPUT & TRUE LOCAL RAG
            async triggerAIPersonas(triggerBlock, triggerContent, aiMentions, depth = 0) {
                if (depth > 2) return; 
                let lastInsertId = triggerBlock.id;
                
                if (!aiEngine || isAILoading) {
                    const thinkingBlock = this.addBasicBlock('text', '', 'system', crypto.randomUUID(), Date.now(), lastInsertId);
                    thinkingBlock.dom.querySelector('.text-content').innerHTML = '<span style="color:#ef4444; font-weight: 700; font-family: var(--font-mono); font-size: 12px; text-transform: uppercase;">[sys.ai.offline] Tap the top menu status to boot an AI engine first.</span>';
                    return scheduleSave();
                }
                
                const userPrompt = normalizePlainText(triggerContent.textContent) || "Please continue the collaboration.";
                const meContext = (pgDB.cache['persona::me']?.blocks?.map(b => normalizePlainText(b.data?.text)).join('\n') || '').substring(0, 800);
                
                // --- TRUE LOCAL RAG (Ask Your Notes) ---
                let topicalContext = '';
                if (pgDB.isReady && userPrompt.length > 5 && depth === 0) {
                    const searchResults = await pgDB.searchSemantic(userPrompt, '', 2, true); // bypass lock for immediate lookup
                    if (searchResults.length > 0) {
                        topicalContext = searchResults.map(r => r.searchText).join('\n---\n').substring(0, 800);
                    }
                }
                
                let nextMentions = [];

                try {
                    window.isAIGenerating = true; 

                    for (const mention of aiMentions) {
                        const { slug, name } = mention;
                        const aiInstructions = (pgDB.cache[`persona::${slug}`]?.blocks?.map(b => normalizePlainText(b.data?.text)).join('\n') || '').substring(0, 1000);
                        
                        let currentDayContext = "";
                        if (slug === 'secretary') {
                            currentDayContext = `\n[Today's Unorganized Notes]:\n` + (pgDB.cache[window.currentDateStr]?.blocks?.map(b => normalizePlainText(b.data?.text)).join('\n') || '').substring(0, 1500);
                        }
                        
                        const ragString = topicalContext ? `\n[Relevant Past Notes Found in Database]:\n${topicalContext}` : '';

                        const thinkingBlock = this.addBasicBlock('text', `<span class="neon-status ai-status loading">${name} is thinking...</span>`, slug, crypto.randomUUID(), Date.now(), lastInsertId);
                        const contentNode = thinkingBlock.dom.querySelector('.text-content');
                        
                        try {
                            const chunks = await aiEngine.chat.completions.create({
                                messages: [
                                    { role: 'system', content: `You are embodying the persona "${name}".\n[User Info]:\n${meContext || 'None'}${ragString}${currentDayContext}\n\n[Your Instructions]:\n${aiInstructions || `Act as a helpful expert.`}\n\nCRITICAL RULES:\n1. Respond using Markdown headers (#), lists (-), quotes (>), and tables (|Col1|Col2|).\n2. You may invite another persona by outputting @Name.collab` },
                                    { role: 'user', content: userPrompt }
                                ], 
                                temperature: 0.7, 
                                max_tokens: 400,
                                stream: true // ENABLING LIVE STREAMING
                            });
                            
                            let aiText = "";
                            
                            // LIVE STREAMING RENDER LOOP
                            for await (const chunk of chunks) {
                                aiText += chunk.choices[0]?.delta?.content || "";
                                contentNode.innerHTML = escapeHTML(aiText).replace(/\n/g, '<br>') + '<span class="ai-cursor"></span>';
                                // Scroll into view smoothly if offscreen
                                const rect = thinkingBlock.dom.getBoundingClientRect();
                                if (rect.bottom > window.innerHeight) window.scrollBy(0, rect.bottom - window.innerHeight + 20);
                            }
                            
                            // Replace stream block with final parsed native blocks
                            this.deleteBlock(thinkingBlock.id);
                            
                            const parseResult = this._parseAIMarkdownToBlocks(aiText, slug, lastInsertId);
                            lastInsertId = parseResult.lastId;
                            
                            if (parseResult.chainedMentions.length > 0) nextMentions.push(...parseResult.chainedMentions);
                            await this.appendToPersonaPage(slug, userPrompt, aiText);
                            
                        } catch (err) {
                            contentNode.innerHTML = '<span style="color:#ef4444">connection failed (memory limit exceeded).</span>'; 
                            lastInsertId = thinkingBlock.id;
                        }
                        await new Promise(r => setTimeout(r, 100)); 
                    }
                } finally {
                    window.isAIGenerating = false; 
                    scheduleSave();
                }

                if (nextMentions.length > 0) {
                    const uniqueMentions = Array.from(new Set(nextMentions.map(m => m.slug)))
                        .map(slug => nextMentions.find(m => m.slug === slug));
                    
                    setTimeout(() => {
                        const handoffBlock = this.blocks.find(b => b.id === lastInsertId) || triggerBlock;
                        this.triggerAIPersonas(handoffBlock, el('div', { textContent: "It is your turn. Respond based on the recent context." }), uniqueMentions, depth + 1);
                    }, 500);
                }
            }

            async appendToPersonaPage(slug, userText, aiText) {
                const pageKey = `persona::${slug}`;
                if (!pgDB.cache[pageKey]) pgDB.cache[pageKey] = { blocks: [] };
                
                pgDB.cache[pageKey].blocks.push(
                    { id: crypto.randomUUID(), type: 'quote', data: { text: escapeHTML(userText) }, author: 'user', timestamp: Date.now() },
                    { id: crypto.randomUUID(), type: 'text', data: { text: escapeHTML(aiText).replace(/\n/g, '<br>') }, author: slug, timestamp: Date.now() }
                );
                
                if (pgDB.isReady) await pgDB.saveNote(pageKey, pgDB.cache[pageKey]);
            }
        }

        const editor = new LeanStreamEditor('lean-editor'); 
        window.editor = editor;

        // ============================================================================
        // APP LIFECYCLE & STORAGE SYNC
        // ============================================================================
        window.isPersonaPage = false; 
        window.currentPersonaSlug = null;

        const scheduleSave = debounce(async () => {
            if (!(CONFIG.DEV_ALLOW_PAST_EDITING || window.currentDateStr === todayStr || window.isPersonaPage)) return;
            const statusEl = document.getElementById('db-status');
            
            try {
                await pgDB.saveNote(window.currentDateStr, editor.save());
                statusEl.textContent = 'db.saved'; 
                statusEl.classList.add('saving');
                
                setTimeout(() => { 
                    if (statusEl.textContent === 'db.saved') { 
                        statusEl.textContent = 'db.ready'; 
                        statusEl.classList.remove('saving'); 
                    } 
                }, 1500);
            } catch (e) {
                statusEl.textContent = pgDB.isReady ? 'db.error [save failed]' : 'memory.saved [offline]';
                if (pgDB.isReady) statusEl.className = 'neon-status db-status error';
                
                setTimeout(() => { 
                    if (statusEl.textContent.includes('saved')) { 
                        statusEl.textContent = pgDB.isReady ? 'db.ready' : 'db.offline [memory mode]'; 
                        if (pgDB.isReady) statusEl.className = 'neon-status db-status'; 
                    } 
                }, pgDB.isReady ? 3000 : 1500);
            }
        }, 800);

        function renderDateHeader() {
            const h = document.getElementById('date-header');
            if (window.isPersonaPage && window.currentPersonaSlug) {
                pgDB.getPersonas().then(personas => {
                    const found = personas.find(x => x.slug === window.currentPersonaSlug);
                    const displayName = found ? found.display_name.toUpperCase() : window.currentPersonaSlug.toUpperCase();
                    
                    let parentBadge = '';
                    if (found && found.parent_slug) {
                        parentBadge = `<span style="font-size: 0.35em; color: var(--neon-purple); vertical-align: middle; font-family: var(--font-mono); letter-spacing: 0.1em; border: 1px solid var(--neon-purple); padding: 2px 6px; border-radius: 4px;">SPAWNED BY @${found.parent_slug.toUpperCase()}</span>`;
                    }
                    
                    h.innerHTML = `@${displayName}${parentBadge}`;
                });
            } else {
                h.textContent = parseLocal(window.currentDateStr).toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' }).toLowerCase();
            }
        }

        async function loadDay(dateStr) {
            if (pgDB.isReady && isEditable()) {
                try { await pgDB.saveNote(window.currentDateStr, editor.save()); } catch{}
            }
            
            window.isPersonaPage = false; 
            window.currentPersonaSlug = null; 
            window.currentDateStr = dateStr;
            
            renderDateHeader(); 
            document.getElementById('backlinks-container')?.remove();
            
            let dayData = pgDB.cache[dateStr] || JSON.parse(localStorage.getItem(`infinotes_backup_${dateStr}`) || '{"blocks":[]}');
            pgDB.cache[dateStr] = dayData;
            
            const virtuals = []; 
            const targetTime = parseLocal(dateStr).getTime();
            
            for (const [noteDateStr, dData] of Object.entries(pgDB.cache)) {
                if (noteDateStr === dateStr || noteDateStr.startsWith('persona::') || !dData?.blocks) continue;
                
                for (const block of dData.blocks) {
                    if (block.type === 'calendar' && block.data?.datetime) {
                        const eventDate = new Date(block.data.datetime);
                        const eventDateStr = getLocalYYYYMMDD(eventDate);
                        const eventTime = parseLocal(eventDateStr).getTime();
                        const rec = block.data.recurrence || 'none';
                        
                        const isMatch = dateStr === eventDateStr || (targetTime > eventTime && (
                            rec === 'daily' || 
                            (rec === 'weekly' && Math.round((targetTime - eventTime) / 86400000) % 7 === 0) || 
                            (rec === 'monthly' && parseLocal(dateStr).getDate() === eventDate.getDate()) || 
                            (rec === 'yearly' && dateStr.slice(5) === eventDateStr.slice(5))
                        ));
                        
                        if (isMatch) {
                            virtuals.push(Object.assign({}, block, { isVirtual: true, originalNoteKey: noteDateStr }));
                        }
                    }
                }
            }
            
            editor.load([...virtuals, ...dayData.blocks]);
        }

        async function loadPersonaPage(slug) {
            if (pgDB.isReady && isEditable()) {
                try { await pgDB.saveNote(window.currentDateStr, editor.save()); } catch{}
            }
            
            window.isPersonaPage = true; 
            window.currentPersonaSlug = slug; 
            window.currentDateStr = `persona::${slug}`;
            
            renderDateHeader(); 
            editor.load((pgDB.cache[`persona::${slug}`] || { blocks: [] }).blocks);
            
            document.getElementById('backlinks-container')?.remove();
            
            const backlinks = pgDB.findBacklinks(slug); 
            if (!backlinks.length) return;
            
            const section = el('div', { className: 'backlinks-section', id: 'backlinks-container' }, 
                el('div', { className: 'backlinks-header' }, `[ ${backlinks.length} backlink${backlinks.length > 1 ? 's' : ''} ]`)
            );
            
            backlinks.forEach(b => {
                const isPersona = b.dateStr.startsWith('persona::');
                const targetStr = isPersona ? b.dateStr.replace('persona::', '') : b.dateStr;
                const titleStr = isPersona ? `@${targetStr.toUpperCase()}` : parseLocal(b.dateStr).toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase();
                
                const btn = el('button', { 
                    className: 'backlink-item', 
                    onclick: () => isPersona ? loadPersonaPage(targetStr) : loadDay(b.dateStr) 
                }, 
                    el('span', { textContent: titleStr }), 
                    el('span', { className: 'backlink-preview', textContent: b.preview })
                );
                
                section.appendChild(btn);
            });
            
            document.querySelector('.app-container').insertBefore(section, document.querySelector('.app-container').firstChild);
        }

        document.getElementById('date-header').onclick = () => {
            if (window.isPersonaPage) return loadDay(todayStr);
            const [y, m, d] = window.currentDateStr.split('-');
            
            EditorialCalendar.open(new Date(y, m - 1, d), false, null, (sd) => { 
                const selectedStr = getLocalYYYYMMDD(sd); 
                if (window.currentDateStr !== selectedStr) { 
                    scheduleSave(); 
                    loadDay(selectedStr); 
                } 
            });
        };

        pgDB.init().then(() => loadDay(todayStr));
    </script>
</body>
</html>
