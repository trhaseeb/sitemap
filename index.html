<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Infinite Notes</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Notes">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#121212">
    
    <link id="pwa-manifest" rel="manifest" href="">
    <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzAwMDAwMCI+PHBhdGggZD0iTTE0IDJINmEyIDIgMCAwIDAtMiAydjE2YTIgMiAwIDAgMCAyIDJoMTJhMiAyIDAgMCAwIDItMlY4bC02LTZ6Ii8+PC9zdmc+">

    <!-- Editor.js Core & Core Plugins -->
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/header@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/nested-list@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/checklist@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/code@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/table@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/delimiter@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/editorjs-alert@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/editorjs-drag-drop@latest"></script>

    <style>
        /* --- Standardized Theme Variables --- */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border-color: #e0e0e0;
            --muted-bg: #f5f5f5;
            --muted-text: #666666;
            --accent-color: #000000;
            --editor-toolbar-bg: #ffffff;
            --editor-hover-bg: #ebebeb;
            --overlay-bg: transparent; 
            
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --keyboard-offset: 0px; 
            --safe-area-top: env(safe-area-inset-top, 0px);

            --std-border-radius: 8px;
            --std-padding: 12px 14px;
            --std-margin: 8px 0;
            --std-icon-size: 20px;
            --std-control-height: 36px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-color: #ffffff;
                --border-color: #333333;
                --muted-bg: #1e1e1e;
                --muted-text: #aaaaaa;
                --accent-color: #ffffff;
                --editor-toolbar-bg: #1e1e1e;
                --editor-hover-bg: #2a2a2a;
            }
        }

        body { background-color: var(--bg-color); color: var(--text-color); font-family: var(--font-main); margin: 0; padding: 0; line-height: 1.6; width: 100vw; overflow-x: hidden; }
        #editorjs { max-width: 750px; width: 100%; margin: 0 auto; padding: calc(10vh + var(--safe-area-top)) 20px 65vh 20px; box-sizing: border-box; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        .ce-toolbar__plus, .ce-toolbar__settings-btn { background-color: var(--bg-color) !important; color: var(--text-color) !important; border: 1px solid transparent; }
        .ce-toolbar__plus:hover, .ce-toolbar__settings-btn:hover { background-color: var(--editor-hover-bg) !important; border-color: var(--border-color); }
        .ce-popover__overlay, .cdx-overlay { background: var(--overlay-bg) !important; box-shadow: none !important; backdrop-filter: none !important; }
        .ce-popover-item__icon svg { width: var(--std-icon-size) !important; height: var(--std-icon-size) !important; }

        /* --- GLOBAL EDITOR STYLES & CLEANUP --- */
        
        /* Global Smartlink Style */
        .ce-block__content a {
            color: #3B82F6;
            text-decoration: underline;
            cursor: pointer;
            word-break: break-word;
        }

        /* Completely hide the inline formatting popup */
        .ce-inline-toolbar { display: none !important; }

        /* Hide default move up/down block settings (Replaced by native Drag & Drop) */
        div[data-item-name="move-up"],
        div[data-item-name="move-down"],
        .ce-settings__button[data-tune="moveUp"],
        .ce-settings__button[data-tune="moveDown"] { display: none !important; }

        @media (prefers-color-scheme: dark) {
            .ce-popover, .ce-settings, .tc-popover { background: var(--editor-toolbar-bg) !important; border-color: var(--border-color) !important; box-shadow: none !important; }
            .ce-popover-item { color: var(--text-color) !important; }
            .ce-popover-item:hover { background-color: var(--editor-hover-bg) !important; }
            .ce-popover-item__icon { background-color: var(--muted-bg) !important; color: var(--text-color) !important; border-color: var(--border-color) !important; }
            .cdx-search-field { background-color: var(--muted-bg) !important; color: var(--text-color) !important; border-color: var(--border-color) !important; }
            .ce-block--selected .ce-block__content { background-color: var(--editor-hover-bg) !important; }
            ::selection { background: #444444 !important; color: #ffffff; }
            .tc-cell { border-color: var(--border-color) !important; background-color: var(--bg-color) !important; color: var(--text-color) !important; }
        }

        .tc-wrap { overflow-x: auto; width: 100%; max-width: 100%; box-sizing: border-box; }

        @media (max-width: 650px) {
            .ce-popover, .ce-settings {
                bottom: var(--keyboard-offset, 0px) !important;
                max-height: calc(100vh - var(--keyboard-offset, 0px) - 20px) !important;
                transition: bottom 0.2s cubic-bezier(0.1, 0.7, 0.1, 1);
            }
        }

        /* --- BASE BLOCK ARCHITECTURE STYLES --- */
        .custom-block-wrapper { margin: var(--std-margin); border-radius: var(--std-border-radius); border: 1px solid var(--border-color); background: var(--bg-color); box-sizing: border-box; width: 100%; overflow: hidden; }
        .custom-block-wrapper svg { flex-shrink: 0; }
        .cb-inner { padding: var(--std-padding); }

        .cb-btn { padding: 8px 12px; background: transparent; border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-color); cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; white-space: nowrap; font-family: inherit; }
        .cb-btn svg { width: 16px; height: 16px; }
        .cb-btn:hover { background: var(--editor-hover-bg); }
        .cb-btn.primary { background: var(--text-color); color: var(--bg-color); border-color: var(--text-color); }
        .cb-btn.success { background: #10B981; color: white; border-color: #10B981; }
        .cb-btn.danger { background: #EF4444; color: white; border-color: #EF4444; }
        .cb-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Component-Specific Overrides */
        .cal-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .cal-title { flex-grow: 1; border: none; background: transparent; color: var(--text-color); font-size: 16px; font-weight: 500; outline: none; font-family: inherit; }
        .cp-container { border: 1px solid var(--border-color); border-radius: 6px; padding: 12px; background: var(--bg-color); margin: 8px 0; display: none; }
        .cp-container.open { display: block; animation: fadeIn 0.2s ease; }
        .cp-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: bold; }
        .cp-weekdays, .cp-grid { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; }
        .cp-weekdays { font-size: 11px; color: var(--muted-text); font-weight: 600; margin-bottom: 4px; }
        .cp-day { padding: 6px 0; font-size: 13px; cursor: pointer; border-radius: 4px; color: var(--text-color); }
        .cp-day:hover { background: var(--editor-hover-bg); }
        .cp-day.active { background: var(--text-color); color: var(--bg-color); font-weight: bold; }
        .cp-day.muted { color: var(--border-color); pointer-events: none; }
        .cp-time { display: flex; justify-content: center; gap: 6px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-color); }
        .cp-time input, .cp-time select { background: var(--muted-bg); border: 1px solid var(--border-color); color: var(--text-color); border-radius: 4px; padding: 4px; font-family: inherit; }

        .v-memo-container { display: flex; align-items: center; gap: 12px; }
        .v-memo__btn { width: var(--std-control-height); height: var(--std-control-height); border-radius: 50%; border: 1px solid var(--border-color); background: var(--muted-bg); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-color); flex-shrink: 0; }
        .v-memo__btn.recording { color: #ffffff; border-color: #ef4444; background: #ef4444; animation: pulse 1.5s infinite; }
        .v-memo__btn.playing { color: #ffffff; border-color: #3B82F6; background: #3B82F6; }

        .canvas-wrapper { width: 100%; display: flex; justify-content: center; position: relative; }
        .canvas-color-grid { display: flex; gap: 12px; width: 100%; justify-content: space-between; padding: 6px 12px; box-sizing: border-box; margin-bottom: 8px;}
        .canvas-color-setting { width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--border-color); cursor: pointer; transition: transform 0.1s; }
        .canvas-color-setting.active { transform: scale(1.15); box-shadow: 0 0 0 2px var(--editor-toolbar-bg), 0 0 0 4px var(--text-color); }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="editorjs"></div>

    <script>
        const STORAGE_KEY = 'ultimate_notes_pure_flat_v6';
        window.CalendarInstances = new Set();

        // --- Standardized Centralized Asset Library ---
        const ICONS = {
            mic: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>',
            stop: '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"></rect></svg>',
            play: '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>',
            pause: '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"></rect><rect x="14" y="4" width="4" height="16" rx="1"></rect></svg>',
            image: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>',
            trash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2-2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>',
            download: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>',
            calendar: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>',
            bell: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>',
            chevronDown: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>',
            brush: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle></svg>'
        };

        // --- CORE BASE BLOCK CLASS ---
        class BaseEditorBlock {
            constructor({ data, api, config }) {
                this.api = api;
                this.config = config || {};
                this.data = data || {};
                this.wrapper = null;
            }

            render() {
                this.wrapper = document.createElement('div');
                this.wrapper.className = 'custom-block-wrapper';
                const content = this.renderContent();
                if (content) this.wrapper.appendChild(content);
                return this.wrapper;
            }

            save() { return this.data; }
            renderContent() { return document.createElement('div'); }

            createButton(text, iconHtml, onClick, extraClass = '') {
                const btn = document.createElement('button');
                btn.className = `cb-btn ${extraClass}`.trim();
                if (iconHtml) btn.innerHTML = `${iconHtml} <span>${text}</span>`;
                else btn.textContent = text;
                btn.addEventListener('click', onClick);
                return btn;
            }
        }

        // --- BACKUP TOOL ---
        class BackupTool extends BaseEditorBlock {
            static get toolbox() { return { title: 'Export Backup', icon: ICONS.download }; }

            renderContent() {
                const container = document.createElement('div');
                container.className = 'cb-inner';
                container.style.display = 'flex';
                container.style.justifyContent = 'space-between';
                container.style.alignItems = 'center';

                container.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <div style="background: var(--text-color); color: var(--bg-color); border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;">
                            ${ICONS.download}
                        </div>
                        <div>
                            <div style="font-weight: 600; font-size: 15px;">Backup Note Data</div>
                            <div style="font-size: 12px; color: var(--muted-text);">Export state as JSON file</div>
                        </div>
                    </div>
                `;

                const btn = this.createButton('Save', null, () => this.executeBackup(btn), 'primary');
                container.appendChild(btn);

                this.wrapper.style.cursor = 'pointer';
                this.wrapper.onmouseover = () => this.wrapper.style.background = 'var(--editor-hover-bg)';
                this.wrapper.onmouseout = () => this.wrapper.style.background = 'var(--bg-color)';
                this.wrapper.onclick = (e) => { if (e.target !== btn) btn.click(); };

                return container;
            }

            async executeBackup(btnElement) {
                const outputData = await this.api.saver.save();
                const blob = new Blob([JSON.stringify(outputData, null, 2)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = `Infinite_Notes_Backup_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
                
                btnElement.textContent = "Saved!";
                btnElement.classList.add('success');
                setTimeout(() => {
                    btnElement.textContent = "Save";
                    btnElement.classList.remove('success');
                }, 2000);
            }
        }

        // --- VOICE MEMO TOOL ---
        class VoiceMemo extends BaseEditorBlock {
            static get toolbox() { return { title: 'Voice Memo', icon: ICONS.mic }; }

            constructor(opts) {
                super(opts);
                this.data = opts.data.url || null; 
                this.recorder = null; 
                this.chunks = [];
                this.isPlaying = false;
                this.isRecording = false;
                this.audio = new Audio();
                
                if (this.data) this.audio.src = this.data;
                this.audio.onplay = () => { this.isPlaying = true; this.updateUI(); };
                this.audio.onpause = () => { this.isPlaying = false; this.updateUI(); };
                this.audio.onended = () => { this.isPlaying = false; this.updateUI(); };
            }

            renderContent() {
                const container = document.createElement('div');
                container.className = 'cb-inner v-memo-container';

                this.btn = document.createElement('button');
                this.btn.className = 'v-memo__btn';
                this.btn.onclick = () => this.handleAction();

                this.statusText = document.createElement('div');
                this.statusText.style.flexGrow = '1';
                this.statusText.style.fontSize = '14px';

                container.append(this.btn, this.statusText);
                this.updateUI();
                return container;
            }

            updateUI() {
                this.btn.className = 'v-memo__btn'; 
                if (this.isPlaying) {
                    this.btn.innerHTML = ICONS.pause;
                    this.statusText.innerText = 'Playing...';
                    this.btn.classList.add('playing');
                } else if (this.data) {
                    this.btn.innerHTML = ICONS.play;
                    this.statusText.innerText = 'Voice Memo (Ready)';
                } else if (this.isRecording) {
                    this.btn.innerHTML = ICONS.stop;
                    this.statusText.innerText = 'Recording...';
                    this.btn.classList.add('recording');
                } else {
                    this.btn.innerHTML = ICONS.mic;
                    this.statusText.innerText = 'Click to record';
                }
            }

            async handleAction() {
                if (this.data) {
                    this.isPlaying ? this.audio.pause() : this.audio.play();
                } else {
                    if (this.isRecording) {
                        this.recorder.stop();
                        this.isRecording = false;
                        this.statusText.innerText = 'Processing...';
                    } else {
                        try {
                            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                            this.recorder = new MediaRecorder(stream); this.chunks = [];
                            this.recorder.ondataavailable = (e) => this.chunks.push(e.data);
                            this.recorder.onstop = () => {
                                const reader = new FileReader();
                                reader.onloadend = () => { 
                                    this.data = reader.result; 
                                    this.audio.src = this.data; 
                                    this.updateUI(); 
                                };
                                reader.readAsDataURL(new Blob(this.chunks, { type: 'audio/ogg; codecs=opus' }));
                                stream.getTracks().forEach(track => track.stop());
                            };
                            this.recorder.start();
                            this.isRecording = true;
                            this.updateUI();
                        } catch (err) { this.statusText.innerText = 'Mic access denied'; }
                    }
                }
            }

            destroy() {
                if (this.recorder && this.recorder.state !== 'inactive') this.recorder.stop();
                if (this.recorder?.stream) this.recorder.stream.getTracks().forEach(t => t.stop());
                this.audio.pause();
            }

            save() { return { url: this.data }; }
        }

        // --- CALENDAR TOOL ---
        class CalendarTool extends BaseEditorBlock {
            static get toolbox() { return { title: 'Calendar Event', icon: ICONS.calendar }; }
            
            constructor(opts) {
                super(opts);
                this.data = {
                    title: opts.data.title || '',
                    datetime: opts.data.datetime || new Date().toISOString(),
                    notified: opts.data.notified || false
                };
                this.viewDate = new Date(this.data.datetime); 
                window.CalendarInstances.add(this);
            }

            renderContent() {
                const container = document.createElement('div');
                container.className = 'cb-inner';

                const header = document.createElement('div');
                header.className = 'cal-header';
                header.innerHTML = ICONS.calendar;
                this.titleInput = document.createElement('input');
                this.titleInput.className = 'cal-title';
                this.titleInput.placeholder = 'Event Name / Reminder...';
                this.titleInput.value = this.data.title;
                this.titleInput.oninput = (e) => this.data.title = e.target.value;
                header.appendChild(this.titleInput);

                this.displayBtn = this.createButton(this.getFormattedDate(), ICONS.chevronDown);
                this.displayBtn.style.width = '100%';
                this.displayBtn.style.justifyContent = 'space-between';
                this.displayBtn.onclick = () => {
                    this.picker.classList.toggle('open');
                    this.renderGrid();
                };

                this.picker = document.createElement('div');
                this.picker.className = 'cp-container';
                this.picker.innerHTML = `
                    <div class="cp-header">
                        <button class="cb-btn cp-prev">&lt;</button>
                        <span class="cp-month-label"></span>
                        <button class="cb-btn cp-next">&gt;</button>
                    </div>
                    <div class="cp-weekdays"><span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span></div>
                    <div class="cp-grid"></div>
                    <div class="cp-time">
                        <input type="number" class="cp-hour" min="1" max="12"> : 
                        <input type="number" class="cp-minute" min="0" max="59">
                        <select class="cp-ampm"><option value="AM">AM</option><option value="PM">PM</option></select>
                    </div>
                `;
                
                this.setupPickerEvents();

                const actions = document.createElement('div');
                actions.style.display = 'flex'; actions.style.gap = '8px'; actions.style.marginTop = '12px';
                
                const exportBtn = this.createButton('Add to Calendar', ICONS.download, () => this.exportICS(), 'primary');
                exportBtn.style.flex = '1';
                
                const isGranted = typeof Notification !== 'undefined' && Notification.permission === 'granted';
                this.notifyBtn = this.createButton(isGranted ? 'On' : 'Notify', ICONS.bell, () => this.toggleNotify(), isGranted ? 'success' : '');
                this.notifyBtn.style.flex = '1';

                actions.append(exportBtn, this.notifyBtn);
                container.append(header, this.displayBtn, this.picker, actions);
                return container;
            }

            getFormattedDate() {
                const d = new Date(this.data.datetime);
                return `${d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' })} at ${d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' })}`;
            }

            setupPickerEvents() {
                this.picker.querySelector('.cp-prev').onclick = () => { this.viewDate.setMonth(this.viewDate.getMonth() - 1); this.renderGrid(); };
                this.picker.querySelector('.cp-next').onclick = () => { this.viewDate.setMonth(this.viewDate.getMonth() + 1); this.renderGrid(); };
                
                const updateTime = () => {
                    const d = new Date(this.data.datetime);
                    let h = parseInt(this.picker.querySelector('.cp-hour').value) || 12;
                    if (h === 12 && this.picker.querySelector('.cp-ampm').value === 'AM') h = 0;
                    if (h < 12 && this.picker.querySelector('.cp-ampm').value === 'PM') h += 12;
                    d.setHours(h, parseInt(this.picker.querySelector('.cp-minute').value) || 0);
                    this.updateDate(d);
                };
                
                this.picker.querySelectorAll('input, select').forEach(el => el.onchange = updateTime);
            }

            renderGrid() {
                const active = new Date(this.data.datetime);
                const year = this.viewDate.getFullYear(), month = this.viewDate.getMonth();
                
                this.picker.querySelector('.cp-month-label').innerText = this.viewDate.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
                
                let h = active.getHours();
                this.picker.querySelector('.cp-ampm').value = h >= 12 ? 'PM' : 'AM';
                this.picker.querySelector('.cp-hour').value = h % 12 || 12;
                this.picker.querySelector('.cp-minute').value = active.getMinutes().toString().padStart(2, '0');

                const grid = this.picker.querySelector('.cp-grid');
                grid.innerHTML = '';
                
                for (let i = 0; i < new Date(year, month, 1).getDay(); i++) {
                    const empty = document.createElement('div'); empty.className = 'cp-day muted'; grid.appendChild(empty);
                }
                
                for (let i = 1; i <= new Date(year, month + 1, 0).getDate(); i++) {
                    const day = document.createElement('div');
                    day.className = `cp-day ${active.getFullYear() === year && active.getMonth() === month && active.getDate() === i ? 'active' : ''}`;
                    day.innerText = i;
                    day.onclick = () => {
                        const d = new Date(this.data.datetime); d.setFullYear(year, month, i);
                        this.updateDate(d); this.renderGrid();
                    };
                    grid.appendChild(day);
                }
            }

            updateDate(newDateObj) {
                this.data.datetime = newDateObj.toISOString();
                this.data.notified = false;
                this.displayBtn.querySelector('span').innerText = this.getFormattedDate();
            }

            exportICS() {
                const start = new Date(this.data.datetime);
                const end = new Date(start.getTime() + 60 * 60 * 1000); 
                const format = (d) => d.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
                const ics = `BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nDTSTART:${format(start)}\nDTEND:${format(end)}\nSUMMARY:${this.data.title || 'Note Event'}\nEND:VEVENT\nEND:VCALENDAR`;
                
                const a = document.createElement('a');
                a.href = URL.createObjectURL(new Blob([ics], { type: 'text/calendar;charset=utf-8' }));
                a.download = `${this.data.title ? this.data.title.replace(/\s+/g, '_') : 'event'}.ics`;
                a.click();
            }

            async toggleNotify() {
                if (!('Notification' in window)) return alert('Not supported.');
                if (Notification.permission === 'granted') return alert('Active! Keep app open.');
                if (await Notification.requestPermission() === 'granted') {
                    this.notifyBtn.querySelector('span').innerText = 'On';
                    this.notifyBtn.classList.add('success');
                }
            }

            destroy() { window.CalendarInstances.delete(this); }
        }

        // --- CANVAS TOOL ---
        class CanvasTool extends BaseEditorBlock {
            static get toolbox() { return { title: 'Drawing/Photo', icon: ICONS.brush }; }

            constructor(opts) {
                super(opts);
                this.baseImage = this.data.baseImage || 'blank'; 
                this.image = this.data.image || null; 
                this.currentColor = 'theme-ink'; 
                this.isDrawing = false;
                
                this.startDraw = this.startDraw.bind(this);
                this.draw = this.draw.bind(this);
                this.stopDraw = this.stopDraw.bind(this);
            }

            renderContent() {
                const container = document.createElement('div');
                container.className = 'canvas-wrapper';
                
                this.canvas = document.createElement('canvas');
                this.ctx = this.canvas.getContext('2d');

                this.resizeObserver = new ResizeObserver(entries => {
                    const width = entries[0].contentRect.width;
                    if (width > 0 && !this.initialized) {
                        this.initialized = true;
                        this.loadAndDraw(width);
                    }
                });
                this.resizeObserver.observe(this.wrapper);

                this.canvas.addEventListener('mousedown', this.startDraw); 
                this.canvas.addEventListener('mousemove', this.draw);
                this.canvas.addEventListener('mouseup', this.stopDraw); 
                this.canvas.addEventListener('mouseleave', this.stopDraw);
                this.canvas.addEventListener('touchstart', this.startDraw, {passive: false}); 
                this.canvas.addEventListener('touchmove', this.draw, {passive: false}); 
                this.canvas.addEventListener('touchend', this.stopDraw);

                container.appendChild(this.canvas);
                return container;
            }

            loadAndDraw(width) {
                const dpr = window.devicePixelRatio || 1;
                
                const executeDraw = (imgSource, setHeight) => {
                    this.canvas.style.width = `${width}px`; 
                    this.canvas.style.height = `${setHeight}px`;
                    this.canvas.width = width * dpr; 
                    this.canvas.height = setHeight * dpr;
                    this.ctx.scale(dpr, dpr);
                    this.ctx.lineCap = 'round'; 
                    this.ctx.lineJoin = 'round';

                    if (imgSource) this.ctx.drawImage(imgSource, 0, 0, width, setHeight);
                    if (this.image && this.image !== 'blank' && this.image !== this.baseImage) {
                        const overlay = new Image();
                        overlay.onload = () => this.ctx.drawImage(overlay, 0, 0, width, setHeight);
                        overlay.src = this.image;
                    }
                };

                if (this.baseImage && this.baseImage !== 'blank') {
                    const img = new Image();
                    img.onload = () => executeDraw(img, width * (img.height / img.width));
                    img.src = this.baseImage;
                } else {
                    executeDraw(null, Math.min(400, width * 0.75));
                }
            }

            getCoords(e) {
                const rect = this.canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: clientX - rect.left, y: clientY - rect.top };
            }

            startDraw(e) { if(e.type === 'touchstart') e.preventDefault(); this.isDrawing = true; const {x, y} = this.getCoords(e); this.ctx.beginPath(); this.ctx.moveTo(x, y); }
            draw(e) { 
                if (!this.isDrawing) return; e.preventDefault();
                const {x, y} = this.getCoords(e); this.ctx.lineTo(x, y); 
                let color = this.currentColor;
                const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (color === 'theme-ink') color = isDark ? '#ffffff' : '#000000';
                if (color === 'theme-paper') color = isDark ? '#121212' : '#ffffff';
                this.ctx.strokeStyle = color; this.ctx.lineWidth = 4; this.ctx.stroke(); 
            }
            stopDraw() { if(this.isDrawing) { this.isDrawing = false; clearTimeout(this.saveTimeout); this.saveTimeout = setTimeout(() => this.image = this.canvas.toDataURL('image/png'), 400); } }

            renderSettings() {
                const wrap = document.createElement('div');
                wrap.style.padding = '8px'; wrap.style.display = 'flex'; wrap.style.flexDirection = 'column'; wrap.style.gap = '8px';

                const grid = document.createElement('div'); grid.className = 'canvas-color-grid';
                ['theme-ink', '#EF4444', '#3B82F6', '#10B981', 'theme-paper'].forEach(color => {
                    const btn = document.createElement('button'); btn.className = 'canvas-color-setting';
                    btn.style.backgroundColor = color === 'theme-ink' ? 'var(--text-color)' : color === 'theme-paper' ? 'var(--bg-color)' : color;
                    if (this.currentColor === color) btn.classList.add('active');
                    btn.onclick = () => {
                        this.currentColor = color;
                        grid.querySelectorAll('button').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                    };
                    grid.appendChild(btn);
                });

                const fileInput = document.createElement('input'); fileInput.type = 'file'; fileInput.accept = 'image/*'; fileInput.style.display = 'none';
                fileInput.onchange = (e) => {
                    if (e.target.files[0]) {
                        const reader = new FileReader();
                        reader.onload = (re) => {
                            this.baseImage = this.image = re.target.result;
                            this.loadAndDraw(this.wrapper.clientWidth);
                            this.api.toolbar.close(); 
                        };
                        reader.readAsDataURL(e.target.files[0]);
                    }
                };

                wrap.append(grid, 
                    this.createButton('Set Background', ICONS.image, () => fileInput.click()),
                    this.createButton('Clear Drawing', ICONS.trash, () => {
                        this.image = this.baseImage === 'blank' ? null : this.baseImage;
                        this.loadAndDraw(this.wrapper.clientWidth);
                        this.api.toolbar.close();
                    }, 'danger'), fileInput
                );
                return wrap;
            }

            destroy() {
                if (this.resizeObserver) this.resizeObserver.disconnect();
                if (this.canvas) {
                    this.canvas.removeEventListener('mousedown', this.startDraw); this.canvas.removeEventListener('mousemove', this.draw);
                    this.canvas.removeEventListener('mouseup', this.stopDraw); this.canvas.removeEventListener('mouseleave', this.stopDraw);
                }
            }
            save() { return { image: this.image, baseImage: this.baseImage }; }
        }

        // --- SYSTEM ENGINE ---
        const pwaManifest = { "name": "Infinite Notes", "short_name": "Notes", "start_url": ".", "display": "standalone", "background_color": "#ffffff", "theme_color": "#ffffff", "icons": [{"src": "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzAwMDAwMCI+PHBhdGggZD0iTTE0IDJINmEyIDIgMCAwIDAtMiAydjE2YTIgMiAwIDAgMCAyIDJoMTJhMiAyIDAgMCAwIDItMlY4bC02LTZ6Ii8+PC9zdmc+", "sizes": "192x192", "type": "image/svg+xml"}] };
        document.getElementById('pwa-manifest').setAttribute('href', 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(JSON.stringify(pwaManifest)));

        if (window.visualViewport) {
            let raf, timer;
            const fixOffset = () => {
                cancelAnimationFrame(raf);
                raf = requestAnimationFrame(() => {
                    const off = Math.max(0, window.innerHeight - window.visualViewport.height);
                    document.documentElement.style.setProperty('--keyboard-offset', `${off}px`);
                    if (off > 100) {
                        clearTimeout(timer);
                        timer = setTimeout(() => { const b = document.activeElement?.closest('.ce-block'); if(b) b.scrollIntoView({behavior:'smooth', block:'center'}); }, 100);
                    }
                });
            };
            window.visualViewport.addEventListener('resize', fixOffset);
            window.visualViewport.addEventListener('scroll', fixOffset);
        }

        setInterval(() => {
            if (Notification.permission !== 'granted' || window.CalendarInstances.size === 0) return;
            let dirty = false;
            window.CalendarInstances.forEach(inst => {
                if (inst.data.datetime && !inst.data.notified && new Date(inst.data.datetime).getTime() <= Date.now()) {
                    new Notification('Note Reminder', { body: inst.data.title || 'Scheduled Event Reached' });
                    inst.data.notified = dirty = true;
                }
            });
            if (dirty && window.editor) window.editor.save().then(d => localStorage.setItem(STORAGE_KEY, JSON.stringify(d)));
        }, 5000);

        // --- ROBUST NATIVE SMARTLINK INTERCEPTOR ---
        // Uses the 'capture phase' (true) to intercept the paste BEFORE Editor.js does.
        document.addEventListener('paste', (e) => {
            const target = e.target;
            if (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA' || !target.closest('.ce-block')) return;

            const text = (e.clipboardData || window.clipboardData).getData('text');
            const urlRegex = /^(https?:\/\/[^\s]+)$/i;

            if (urlRegex.test(text.trim())) {
                e.preventDefault();
                e.stopImmediatePropagation(); // CRITICAL: Stop Editor.js from seeing the paste and doubling it!

                const selection = window.getSelection();
                if (!selection.rangeCount) return;
                const range = selection.getRangeAt(0);

                const a = document.createElement('a');
                a.href = text.trim();
                a.target = "_blank";
                a.rel = "noopener noreferrer";

                if (!range.collapsed) {
                    a.appendChild(range.extractContents());
                } else {
                    a.textContent = text.trim();
                }
                
                range.insertNode(a);
                
                // Move cursor directly after the newly pasted link
                range.setStartAfter(a);
                range.collapse(true);
                selection.removeAllRanges();
                selection.addRange(range);

                // Notify Editor.js that the content was updated manually so it saves
                target.dispatchEvent(new Event('input', { bubbles: true }));
            }
        }, true);

        window.editor = new EditorJS({
            holder: 'editorjs',
            placeholder: 'Type "/" for commands...',
            data: localStorage.getItem(STORAGE_KEY) ? JSON.parse(localStorage.getItem(STORAGE_KEY)) : { blocks: [{ type: "header", data: { text: "Infinite Notes", level: 1 } }] },
            
            // CRITICAL: Global Sanitizer explicitly allowing <a> tags so EditorJS doesn't strip them on save.
            sanitizer: {
                a: { href: true, target: true, rel: true }
            },
            
            tools: {
                header: { class: Header, config: { levels: [1, 2, 3], defaultLevel: 2 } },
                list: { class: NestedList },
                checklist: { class: Checklist },
                code: CodeTool, table: Table, delimiter: Delimiter, alert: Alert,
                calendar: CalendarTool, canvas: CanvasTool, voice: VoiceMemo, backup: BackupTool
            },
            onReady: () => {
                new DragDrop(window.editor);
            },
            onChange: () => {
                clearTimeout(window.saveTimer);
                window.saveTimer = setTimeout(() => window.editor.save().then(d => localStorage.setItem(STORAGE_KEY, JSON.stringify(d))), 500); 
            }
        });

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden' && window.editor) window.editor.save().then(d => localStorage.setItem(STORAGE_KEY, JSON.stringify(d)));
        });
    </script>
