            setupMap() {
                this.map = L.map(this.mediaContainer, { crs: L.CRS.Simple, zoomControl: false, attributionControl: false, minZoom: -4 });

        class PhotoTool extends BaseCanvasTool {
            getCanvasDefaultData(data) { return { lat: data?.lat || 0, lng: data?.lng || 0, zoom: data?.zoom || 0, baseImage: data?.baseImage || null, imgWidth: data?.imgWidth || null, imgHeight: data?.imgHeight || null, hasInitializedView: data?.hasInitializedView || false }; }
            getPlaceholder() { return 'PHOTO TITLE...'; }
            needsSetup() { return !this.data.baseImage; }
            
            renderSetup() {
                const header = createEl('div', 'tool-header');
                const titleInput = createEl('input', 'tool-title-input', { placeholder: 'UPLOAD PHOTO...', readOnly: true });
                titleInput.addEventListener('keydown', e => {
                    if (e.key === 'Backspace') { e.preventDefault(); const idx = this.api.getIndex(this); this.api.deleteBlock(idx); if (idx > 0) this.api.focusPrev(this); }
                });
                header.append(titleInput); this.wrapper.appendChild(header);

                const body = createEl('div', '', {style: 'padding: 24px; text-align: center; border: 1px dashed var(--border-color); cursor: pointer;'});
                body.innerHTML = '<div style="margin: 0 auto; width: 32px; height: 32px;">' + ICONS.image + '</div><div style="font-weight: bold; margin-top: 8px;">TAP TO UPLOAD</div>';
                const fileInput = createEl('input', '', { type: 'file', accept: 'image/*', style: 'display: none;' });
                body.onclick = () => fileInput.click();
                fileInput.onchange = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();

                            img.src = re.target.result;
                        }; reader.readAsDataURL(file);
                    }
                };
                this.wrapper.append(body, fileInput); setTimeout(() => titleInput.focus(), 0);
            }

            setupMap() {
                this.map = L.map(this.mediaContainer, { crs: L.CRS.Simple, zoomControl: false, attributionControl: false, minZoom: -4 });
                const bounds = [[0, 0], [this.data.imgHeight || 600, this.data.imgWidth || 800]];
                L.imageOverlay(this.data.baseImage, bounds).addTo(this.map);
                if (!this.data.hasInitializedView && !this.readOnly) { this.map.fitBounds(bounds); this.data.hasInitializedView = true; this.api.onChange(); } 
                else { this.map.setView([this.data.lat, this.data.lng], this.data.zoom); }
            }
        }

        window.EDITOR_TOOLS = {
            paragraph: ParagraphBlock, header: HeaderBlock, checklist: ChecklistBlock, list: ListBlock,
            quote: QuoteBlock, table: TableBlock,

            map: MapTool, photo: PhotoTool, blankCanvas: BlankCanvasTool,
            calendar: CalendarTool, voice: VoiceMemo, recall: RecallTool
        };

        // ============================================================================
        // CORE BLOCK MANAGER & MENUS (Slash + Tags)
        // ============================================================================
        class BlockManager {
            constructor(containerId, options) {
                this.container = document.getElementById(containerId);
                this.readOnly = options.readOnly || false;
                this.onChange = options.onChange || function(){};
                this.blocks = []; 
                
                this.slashMenuEl = document.getElementById('slash-menu');
                this.slashActiveBlock = null; this.slashSelectedIndex = 0;
                this.slashOptions = [
                    {id: 'map', icon: ICONS.map, name: 'Map Location', keywords: 'map location geography'},
                    {id: 'photo', icon: ICONS.image, name: 'Photo Annotation', keywords: 'photo image picture paint draw'},
                    {id: 'blankCanvas', icon: ICONS.canvas, name: 'Blank Canvas', keywords: 'draw paint sketch blank empty whiteboard'},
                    {id: 'scan', icon: ICONS.scan, name: 'Scan OCR', keywords: 'photo text document read'},
                    {id: 'compute', icon: ICONS.compute, name: 'Compute Logic', keywords: 'math calc logic sum code function'},
                    {id: 'calendar', icon: ICONS.calendar, name: 'Event', keywords: 'date time schedule notify reminder'},
                    {id: 'voice', icon: ICONS.mic, name: 'Voice Memo', keywords: 'audio record memo dictation sound'},
                    {id: 'recall', icon: ICONS.recall, name: 'Recall Database', keywords: 'search find past query historical'},
                    {id: 'table', icon: ICONS.canvas, name: 'Table', keywords: 'table grid columns rows'}
                ];
                this.slashFiltered = [...this.slashOptions];

                // Tag Menu state
                this.tagMenuEl = document.getElementById('tag-menu');
                this.tagActiveBlock = null; 
                this.tagSelectedIndex = 0;
                this.tagFiltered = [];
                this.tagCallback = null;
                
                this.container.innerHTML = '';
                const dataBlocks = options.data?.blocks || [];
                if (dataBlocks.length === 0 && !this.readOnly) this.insertBlock('paragraph', {}, 0, false); 
                else dataBlocks.forEach((b, i) => this.insertBlock(b.type, b.data, i, false, b.dynamicInfo));

                document.addEventListener('click', (e) => { 
                    if (!this.slashMenuEl.contains(e.target)) this.hideSlashMenu(); 
                    if (!this.tagMenuEl.contains(e.target)) this.hideTagMenu();
                });
            }

            createBlockAPI(instanceId) {
                return {
                    onChange: () => this.onChange(),
                    getIndex: (instance) => { for(let i=0; i<this.blocks.length; i++) { if (this.blocks[i].instance === instance) return i; } return -1; },
                    getBlock: (index) => this.blocks[index],
                    getBlockCount: () => this.blocks.length,
                    insertBlock: (type, data, index, focus) => {
                        const block = this.insertBlock(type, data, index, focus);
                        if (!['paragraph', 'header', 'list', 'checklist', 'quote', 'table'].includes(type) && !this.readOnly) this.insertBlock('paragraph', {}, index + 1, false);
                        return block;
                    },
                    deleteBlock: (index) => this.deleteBlock(index),
                    focus: (index) => this.focus(index),

                    focusNext: (instance) => {
                        const idx = this.createBlockAPI().getIndex(instance);
                        if (idx === this.blocks.length - 1) {
                            this.insertBlock('paragraph', {}, idx + 1, true);
                        } else {
                            const nextBlock = this.blocks[idx + 1];
                            if (typeof nextBlock.instance.focus === 'function') nextBlock.instance.focus(false);
                        }
                    },
                    focusPrev: (instance) => {
                        const idx = this.createBlockAPI().getIndex(instance);
                        if (idx > 0) {
                            const prevBlock = this.blocks[idx - 1];
                            if (typeof prevBlock.instance.focus === 'function') prevBlock.instance.focus(true);
                        }
                    },
                    
                    showSlashMenu: (block, rect, query) => this.showSlashMenu(block, rect, query),
                    hideSlashMenu: () => this.hideSlashMenu(),
                    isSlashMenuVisible: () => this.slashMenuEl.classList.contains('active'),
                    slashNavigate: (dir) => this.slashNavigate(dir),
                    slashExecute: (block) => this.slashExecute(block),

                    showTagMenu: async (block, rect, query, cb) => await this.showTagMenu(block, rect, query, cb),
                    hideTagMenu: () => this.hideTagMenu(),
                    isTagMenuVisible: () => this.tagMenuEl.classList.contains('active'),
                    tagNavigate: (dir) => this.tagNavigate(dir),
                    tagExecute: () => this.tagExecute(),
                };
            }

            showSlashMenu(blockInstance, rect, query) {
                this.slashActiveBlock = blockInstance;
                this.slashMenuEl.style.top = `${rect.bottom + window.scrollY + 5}px`;
                this.slashMenuEl.style.left = `${Math.max(rect.left, 16)}px`;
                this.slashFiltered = this.slashOptions.filter(o => o.name.toLowerCase().includes(query) || o.keywords.includes(query));
                if (this.slashFiltered.length === 0) { this.hideSlashMenu(); return; }
                this.slashSelectedIndex = 0; this.renderSlashMenu(); this.slashMenuEl.classList.add('active');
            }

            hideSlashMenu() { this.slashMenuEl.classList.remove('active'); this.slashActiveBlock = null; }
            renderSlashMenu() {
                this.slashMenuEl.innerHTML = '';
                this.slashFiltered.forEach((opt, idx) => {
                    const item = createEl('div', `slash-item ${idx === this.slashSelectedIndex ? 'selected' : ''}`, {}, [createEl('div', '', {innerHTML: opt.icon}), createEl('span', '', {textContent: opt.name})]);
                    item.onmousedown = (e) => { e.preventDefault(); this.slashSelectedIndex = idx; this.slashExecute(this.slashActiveBlock); };
                    this.slashMenuEl.appendChild(item);
                });
            }
            slashNavigate(dir) {
                this.slashSelectedIndex = (this.slashSelectedIndex + dir + this.slashFiltered.length) % this.slashFiltered.length;
                this.renderSlashMenu(); const selectedEl = this.slashMenuEl.children[this.slashSelectedIndex];
                if (selectedEl) selectedEl.scrollIntoView({ block: 'nearest' });
            }
            slashExecute(blockInstance) {
                const selected = this.slashFiltered[this.slashSelectedIndex]; this.hideSlashMenu();
                if (selected && blockInstance) {
                    const idx = this.createBlockAPI().getIndex(blockInstance);
                    this.deleteBlock(idx); this.insertBlock(selected.id, {}, idx, true);
                    if (!this.readOnly) this.insertBlock('paragraph', {}, idx + 1, false);
                }
            }

            async showTagMenu(blockInstance, rect, query, cb) {
                this.tagActiveBlock = blockInstance;
                this.tagCallback = cb;
                this.tagMenuEl.style.top = `${rect.bottom + window.scrollY + 5}px`;
                this.tagMenuEl.style.left = `${Math.max(rect.left, 16)}px`;
                
                const allTags = await getAllTags();
                this.tagFiltered = allTags.filter(t => t.toLowerCase().includes(query.toLowerCase()) && t !== query);
                
                if (this.tagFiltered.length === 0) { this.hideTagMenu(); return; }
                
                this.tagSelectedIndex = 0; 
                this.renderTagMenu(); 
                this.tagMenuEl.classList.add('active');
            }

            hideTagMenu() { this.tagMenuEl.classList.remove('active'); this.tagActiveBlock = null; this.tagCallback = null; }
            
            renderTagMenu() {
                this.tagMenuEl.innerHTML = '';
                this.tagFiltered.forEach((opt, idx) => {
                    const item = createEl('div', `slash-item ${idx === this.tagSelectedIndex ? 'selected' : ''}`, {}, [
                        createEl('span', '', {textContent: opt, style: 'font-family: monospace; letter-spacing: 1px;'})
                    ]);
                    item.onmousedown = (e) => { e.preventDefault(); this.tagSelectedIndex = idx; this.tagExecute(); };
                    this.tagMenuEl.appendChild(item);
                });
            }

            tagNavigate(dir) {
                this.tagSelectedIndex = (this.tagSelectedIndex + dir + this.tagFiltered.length) % this.tagFiltered.length;
                this.renderTagMenu(); const selectedEl = this.tagMenuEl.children[this.tagSelectedIndex];
                if (selectedEl) selectedEl.scrollIntoView({ block: 'nearest' });
            }

            tagExecute() {
                const selected = this.tagFiltered[this.tagSelectedIndex]; 
                const cb = this.tagCallback;
                this.hideTagMenu();
                if (selected && cb) cb(selected);
            }

            insertBlock(type, data, index = this.blocks.length, focus = true, dynamicInfo = null) {
                const BlockClass = window.EDITOR_TOOLS[type]; if (!BlockClass) return;

                const blockId = crypto.randomUUID(); const api = this.createBlockAPI(blockId);
                const isBlockReadOnly = this.readOnly || !!dynamicInfo; 
                
                const instance = new BlockClass({ data, api, readOnly: isBlockReadOnly });
                const wrapper = createEl('div', `block-wrapper ${isBlockReadOnly ? 'is-readonly' : ''}`); 
                wrapper.dataset.id = blockId;
                
                if (isBlockReadOnly && dynamicInfo && dynamicInfo.source) {
                    wrapper.onclick = (e) => { if (!e.target.closest('a') && !e.target.closest('button') && !e.target.closest('input') && !e.target.closest('.tool-controls')) window.loadVirtualPage(dynamicInfo.source); };
                }

                let timeEl = createEl('div', 'block-time');
                if (dynamicInfo) {
                    const dateObj = dynamicInfo.timestamp ? new Date(dynamicInfo.timestamp) : new Date(...dynamicInfo.source.split('-').map((v, i) => i === 1 ? v - 1 : v), 12, 0);
                    timeEl = createEl('a', 'block-time v-link', { textContent: `${dateObj.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' })} @ ${dateObj.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' })}`, 'data-target': dynamicInfo.source });
                    timeEl.title = 'Jump to Date'; timeEl.onclick = (e) => { e.preventDefault(); window.loadVirtualPage(dynamicInfo.source); };
                } else {
                    if (window.timestamps && window.timestamps[blockId]) timeEl.textContent = new Date(window.timestamps[blockId]).toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
                    else if (!this.readOnly && window.timestamps) { window.timestamps[blockId] = Date.now(); timeEl.textContent = new Date(window.timestamps[blockId]).toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' }); }
                }

                wrapper.append(createEl('div', 'block-content', {}, [instance.render()]), timeEl);
                const blockDef = { id: blockId, type, instance, wrapper, dynamicInfo };
                
                if (index >= this.blocks.length) { this.blocks.push(blockDef); this.container.appendChild(wrapper); } 
                else { this.blocks.splice(index, 0, blockDef); this.container.insertBefore(wrapper, this.container.children[index]); }

                if (focus && typeof instance.focus === 'function' && !isBlockReadOnly) setTimeout(() => instance.focus(), 0);
                this.onChange(); return blockDef;
            }

            deleteBlock(index) {
                if (index < 0 || index >= this.blocks.length) return; const block = this.blocks[index];
                if (typeof block.instance.destroy === 'function') block.instance.destroy();
                block.wrapper.remove(); this.blocks.splice(index, 1);
                if (this.blocks.length === 0 && !this.readOnly) this.insertBlock('paragraph', {}, 0, true);
                this.onChange();
            }

            focus(index) { if (index >= 0 && index < this.blocks.length && typeof this.blocks[index].instance.focus === 'function') this.blocks[index].instance.focus(); }
            
            async save() {
                const output = [];
                for (let block of this.blocks) { if (!block.dynamicInfo && typeof block.instance.save === 'function') output.push({ id: block.id, type: block.type, data: await block.instance.save() }); }
                return { blocks: output };
            }
            
            destroy() { this.hideSlashMenu(); this.hideTagMenu(); this.blocks.forEach(b => { if (typeof b.instance.destroy === 'function') b.instance.destroy(); }); this.container.innerHTML = ''; this.blocks = []; }
        }

        // ============================================================================
        // CORE APP LIFECYCLE & ASYNC STORAGE QUEUE
        // ============================================================================
        window.editor = null; window.timestamps = {};
        let saveTimeout; let activeSavePromise = Promise.resolve();
        let todayStr = getLocalYYYYMMDD(new Date()); 
        window.currentDateStr = todayStr;

        function getDisplayDate(dateStr) { const [y, m, d] = dateStr.split('-'); const date = new Date(y, m - 1, d); return `${date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })}<br>${date.toLocaleDateString(undefined, { weekday: 'long' })}`; }

        async function executeSave(targetKey = window.currentDateStr) {
            if (!window.editor) return Promise.resolve();
            const outputData = await window.editor.save(); 
            const timestampsToSave = { ...window.timestamps };
            
            activeSavePromise = activeSavePromise.then(async () => {
                try {
                    await appDB.savePage(targetKey, outputData.blocks, timestampsToSave);
                    const indicator = document.getElementById('save-indicator');
                    if (indicator && !appDB.isMemoryOnly) { indicator.classList.add('visible'); setTimeout(() => indicator.classList.remove('visible'), 1500); }
                } catch(e) { console.error("Save Error:", e); }
            });
            return activeSavePromise;
        }

        function scheduleSave(immediate = false) {
            if (appDB.isMemoryOnly) return; 
            clearTimeout(saveTimeout);
            if (immediate) executeSave(window.currentDateStr); 
            else saveTimeout = setTimeout(() => { executeSave(window.currentDateStr); }, 800);
        }

        document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') scheduleSave(true); }); 
        window.addEventListener('pagehide', () => scheduleSave(true));
        
        document.getElementById('date-header').onclick = async () => {
            scheduleSave(true); 
            let dateToOpen = new Date();
            if (/^\d{4}-\d{2}-\d{2}$/.test(window.currentDateStr)) { const [y, m, d] = window.currentDateStr.split('-').map(Number); dateToOpen = new Date(y, m - 1, d); }
            
            const activePagesSet = await appDB.getAllPageIds();

            DatePicker.open(dateToOpen, activePagesSet, (selectedDate) => {
                const selectedStr = getLocalYYYYMMDD(selectedDate);
                if (window.currentDateStr !== selectedStr) window.loadVirtualPage(selectedStr);
            }, { showTime: false, disableFuture: true, onlyNotes: false }); 
        };

        // ============================================================================
        // VIRTUAL ROUTING & EDITOR INITIALIZATION
        // ============================================================================
        window.loadVirtualPage = async function(key) {
            const oldStorageKey = window.currentDateStr; 
            let storageKey = key; let tagParts = [];
            
            if (key.startsWith('tag-')) {
                tagParts = key.substring(4).split('.').filter(Boolean);
                storageKey = 'tag-' + tagParts[0]; 
            }
            
            window.currentDateStr = storageKey;
            const dateHeader = document.getElementById('date-header');
            
            if (/^\d{4}-\d{2}-\d{2}$/.test(storageKey)) dateHeader.innerHTML = getDisplayDate(storageKey);
            else if (storageKey.startsWith('tag-')) dateHeader.innerHTML = '#' + tagParts[0].toUpperCase();
            else dateHeader.innerHTML = storageKey.toUpperCase();

            await initEditor(storageKey, oldStorageKey, tagParts);
            
            if (tagParts.length > 1) {
                setTimeout(() => {
                    const targetName = tagParts[tagParts.length - 1].toUpperCase();
                    const headers = Array.from(document.querySelectorAll('.native-header-' + tagParts.length));
                    const targetEl = headers.find(h => h.textContent.trim().toUpperCase().startsWith(targetName));
                    if (targetEl) targetEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 150);
            }
        };

        async function initEditor(newStorageKey, oldStorageKey, tagParts = []) {
            if (window.editor) { 
                await executeSave(oldStorageKey); 
                window.editor.destroy(); 
                window.editor = null; 
            }
            
            const isEditable = /^\d{4}-\d{2}-\d{2}$/.test(newStorageKey) ? newStorageKey === todayStr : true; 
            
            const loadedData = await appDB.loadPage(newStorageKey);
            let editorData = { blocks: loadedData.blocks || [] };
            window.timestamps = loadedData.timestamps || {};

            if (newStorageKey.startsWith('tag-')) {
                const baseTag = tagParts[0] || newStorageKey.substring(4);
                const safeBaseTag = baseTag.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const regex = new RegExp(`(?:^|\\s)#${safeBaseTag}((?:\\.[a-zA-Z0-9_]+)*)\\b`, 'gi');
                let mentionsByPath = { '': [] };
                
                try {
                    const res = await appDB.db.query("SELECT * FROM blocks WHERE content ILIKE $1 ORDER BY created_at DESC;", [`%#${baseTag}%`]);
                    res.rows.forEach(row => {
                        const cleanText = row.content;
                        regex.lastIndex = 0;
                        let match;
                        let matchedPaths = new Set();
                        while ((match = regex.exec(cleanText)) !== null) {
                            matchedPaths.add(match[1] ? match[1].substring(1).toLowerCase() : '');
                        }
                        
                        const b = { id: row.id, type: row.type, data: row.data };
                        matchedPaths.forEach(path => {
                            if (!mentionsByPath[path]) mentionsByPath[path] = [];
                            mentionsByPath[path].push({ day: row.page_id, block: b, timestamp: Number(row.created_at) });
                        });
                    });
                } catch (e) { console.error("Tag Fetch Error:", e); }

                if (editorData.blocks.length === 0) editorData.blocks.push({ type: 'paragraph', data: {}, id: crypto.randomUUID() });

                const scaffoldHeading = (path) => {
                    if (!path) { const idx = editorData.blocks.findIndex(b => b.type === 'header' && b.data.level === 2); return idx !== -1 ? idx : editorData.blocks.length; }
                    const parts = path.split('.'); let searchStartIdx = 0; let searchEndIdx = editorData.blocks.length; let currentLevel = 2;
                    
                    for(let i=0; i<parts.length; i++) {
                        const partName = parts[i].toUpperCase(); let existingIdx = -1;
                        for (let j = searchStartIdx; j < searchEndIdx; j++) {
                            const b = editorData.blocks[j];
                            if (b.type === 'header' && b.data.level === currentLevel && !b.dynamicInfo && (b.data.text || '').replace(/<[^>]*>?/gm, '').trim().toUpperCase().startsWith(partName)) { existingIdx = j; break; }
                        }
                        
                        if (existingIdx !== -1) {
                            searchStartIdx = existingIdx + 1; let nextHeaderIdx = -1;
                            for (let j = searchStartIdx; j < editorData.blocks.length; j++) { if (editorData.blocks[j].type === 'header' && editorData.blocks[j].data.level <= currentLevel && !editorData.blocks[j].dynamicInfo) { nextHeaderIdx = j; break; } }
                            searchEndIdx = nextHeaderIdx !== -1 ? nextHeaderIdx : editorData.blocks.length;
                        } else {
                            const newId = crypto.randomUUID(); const pId = crypto.randomUUID();
                            editorData.blocks.splice(searchEndIdx, 0, { type: 'header', data: { text: partName, level: currentLevel }, id: newId }, { type: 'paragraph', data: {}, id: pId });
                            window.timestamps[newId] = Date.now(); window.timestamps[pId] = Date.now();
                            searchStartIdx = searchEndIdx + 2; searchEndIdx = searchEndIdx + 2;
                        }
                        currentLevel++;
                    }
                    return searchEndIdx;
                };

                Object.keys(mentionsByPath).sort().forEach(path => {
                    let insertIdx = scaffoldHeading(path);
                    mentionsByPath[path].sort((a,b) => (b.timestamp || new Date(b.day).getTime()) - (a.timestamp || new Date(a.day).getTime())).forEach(m => {
                        const blockClone = JSON.parse(JSON.stringify(m.block));
                        blockClone.dynamicInfo = { source: m.day, timestamp: m.timestamp }; blockClone.id = 'dyn-' + crypto.randomUUID();
                        editorData.blocks.splice(insertIdx, 0, blockClone); insertIdx++;
                    });
                });
            }

            window.editor = new BlockManager('editor-container', { readOnly: !isEditable, data: editorData, onChange: () => { if (isEditable) scheduleSave(); } });
        }

        // Initialize App & trigger lazy model load on startup
        appDB.init().then(() => { 
            window.loadVirtualPage(window.currentDateStr); 
            getExtractor(); // Pre-warm the AI cache in the background
        });
    </script>
</body>
</html>
