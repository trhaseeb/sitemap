<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>Infinite Notes</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Notes">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0a0a">

    <link id="pwa-manifest" rel="manifest" href="">
    <link id="pwa-icon" rel="apple-touch-icon" href="">

    <!-- Explicitly Loaded for Offline PWA Caching -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* --- CORE THEME & EXPRESSIVE TYPOGRAPHY --- */
        :root {
            --bg-color: #ffffff;
            --bg-color-transparent: rgba(255, 255, 255, 0.85);
            --text-color: #000000;
            --muted-text: #888888;
            --neon-purple: #a855f7;
            --neon-green: #10b981;
            --baritone-bg: #f2f2f2;
            --baritone-text: #333333;
            --font-main: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Inter", sans-serif;
            --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0a0a0a;
                --bg-color-transparent: rgba(10, 10, 10, 0.85);
                --text-color: #f0f0f0;
                --muted-text: #666666;
                --baritone-bg: #151515;
                --baritone-text: #cccccc;
            }
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            margin: 0;
            padding: 0;
            width: 100vw;
            overflow-x: hidden;
            overscroll-behavior-y: none;
        }

        .app-container {
            max-width: 680px;
            width: 100%;
            margin: 0 auto;
            padding: 0 24px 60vh 24px;
            position: relative;
        }

        /* --- THE HEADER --- */
        #header-container {
            position: relative;
            width: 100%;
            min-height: 24vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 6vh 24px 24px 24px;
            z-index: 100;
        }

        .header-max-width {
            max-width: 632px;
            margin: 0 auto;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        /* --- BRUTALIST HEADER TEXT --- */
        #date-header {
            text-align: left;
            font-size: clamp(40px, 14vw, 110px);
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            line-height: 0.9;
            color: var(--text-color);
            margin: 0 0 10px -2px;
            cursor: pointer;
            transition: opacity 0.2s;
            user-select: none;
            display: inline-block;
        }

        #date-header:active {
            opacity: 0.5;
        }

        .status-row {
            display: flex;
            align-items: center;
            gap: 16px;
            user-select: none;
            flex-wrap: wrap;
        }

        .neon-status {
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: lowercase;
        }

        .ai-status {
            color: var(--neon-purple);
            opacity: 0.8;
            transition: opacity 0.3s ease;
        }

        .ai-status.loading {
            animation: neon-pulse 1.5s infinite ease-in-out;
        }

        .ai-status.error {
            color: #ef4444;
            opacity: 1;
        }

        /* Unified DB Status */
        .db-status {
            color: var(--neon-green);
            opacity: 0.8;
            transition: opacity 0.3s ease, color 0.3s ease, text-shadow 0.3s ease;
        }

        .db-status.saving {
            opacity: 1;
            text-shadow: 0 0 8px rgba(16, 185, 129, 0.4);
        }

        .db-status.error {
            color: #ef4444;
            opacity: 1;
            text-shadow: none;
        }

        @keyframes neon-pulse {
            0%, 100% { opacity: 0.8; text-shadow: 0 0 8px rgba(168, 85, 247, 0.4); }
            50% { opacity: 0.3; text-shadow: none; }
        }

        /* --- EXPRESSIVE TEXT BLOCKS --- */
        #lean-editor {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 2px;
            width: 100%;
            margin-top: 16px;
            counter-reset: lean-ol;
        }

        .stream-block {
            position: relative;
            width: 100%;
            transition: opacity 0.2s;
        }

        .stream-block:not(:has(.ol)) {
            counter-reset: lean-ol;
        }

        .text-content {
            font-size: clamp(18px, 4.5vw, 22px);
            font-weight: 500;
            letter-spacing: -0.02em;
            line-height: 1.5;
            color: var(--text-color);
            outline: none;
            min-height: 1.5em;
            word-wrap: break-word;
            padding: 4px 0;
            width: 100%;
            position: relative;
        }

        .text-content[data-placeholder]:empty:before {
            content: attr(data-placeholder);
            color: var(--muted-text);
            font-style: italic;
            font-weight: 400;
            opacity: 0.5;
            pointer-events: none;
        }

        .text-content[data-ghost]::after {
            content: attr(data-ghost) "   [↵ chat]";
            color: var(--neon-purple);
            opacity: 0.6;
            pointer-events: none;
            user-select: none;
            display: inline;
        }

        .text-content.h1 {
            font-size: clamp(36px, 8vw, 48px);
            font-weight: 900;
            letter-spacing: -0.04em;
            line-height: 1.1;
            margin-top: 36px;
            margin-bottom: 8px;
            text-transform: uppercase;
            padding: 0;
        }

        .text-content.h2 {
            font-size: clamp(28px, 6vw, 36px);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.2;
            margin-top: 28px;
            margin-bottom: 6px;
            padding: 0;
        }

        .text-content.h3 {
            font-size: clamp(22px, 5vw, 28px);
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.3;
            margin-top: 20px;
            margin-bottom: 4px;
            padding: 0;
        }

        .text-content.quote {
            font-size: clamp(20px, 5vw, 26px);
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--baritone-text);
            background: var(--baritone-bg);
            border-left: 4px solid var(--text-color);
            padding: 16px 20px;
            margin: 8px 0;
            font-style: italic;
        }

        .text-content.ul,
        .text-content.ol,
        .text-content.todo,
        .text-content.todo-checked {
            padding-left: 32px;
            margin-top: 4px;
            margin-bottom: 4px;
        }
        
        .stream-block:has(.ul)::after {
            content: '—';
            position: absolute;
            left: 0;
            top: 4px;
            color: var(--text-color);
            font-weight: 900;
            pointer-events: none;
        }

        .stream-block:has(.ol) { counter-increment: lean-ol; }
        
        .stream-block:has(.ol)::after {
            content: counter(lean-ol) ".";
            position: absolute;
            left: 0;
            top: 4px;
            font-family: var(--font-mono);
            font-weight: 700;
            color: var(--text-color);
            font-size: 0.9em;
            pointer-events: none;
        }

        /* CHECKBOXES (TODO) STYLING */
        .stream-block:has(.todo)::after,
        .stream-block:has(.todo-checked)::after {
            position: absolute;
            left: 4px;
            top: 8px;
            width: 16px;
            height: 16px;
            border-radius: 3px;
            cursor: pointer;
            pointer-events: none; /* Pointer events handled by the parent stream block listener */
        }
        .stream-block:has(.todo)::after {
            content: '';
            border: 2px solid var(--muted-text);
        }
        .stream-block:has(.todo-checked)::after {
            content: '✔';
            background: var(--text-color);
            color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 900;
        }
        .stream-block:has(.todo-checked) .text-content {
            text-decoration: line-through;
            color: var(--muted-text);
            opacity: 0.8;
        }

        /* HORIZONTAL DIVIDER STYLING */
        .text-content.hr {
            border-bottom: 2px solid var(--baritone-bg);
            margin: 24px 0;
            padding: 0;
            min-height: 0;
            height: 0;
            font-size: 0;
        }
        .text-content.hr:empty:before { display: none; }

        .stream-block.author-ai .text-content {
            font-weight: 400;
            color: var(--neon-purple);
        }

        .stream-block.author-ai::before {
            content: '';
            position: absolute;
            left: -16px;
            top: 10px;
            bottom: 10px;
            width: 3px;
            background: var(--neon-purple);
            opacity: 0.5;
        }

        /* --- SIDEBAR MODE STYLING --- */
        .stream-block.sidebar {
            margin-left: 24px;
            padding-left: 16px;
            border-left: 2px dashed var(--muted-text);
            margin-top: 8px;
            margin-bottom: 8px;
        }
        
        /* Make sidebar text slightly smaller */
        .stream-block.sidebar .text-content {
            font-size: clamp(15px, 3.8vw, 18px);
            line-height: 1.4;
        }

        .stream-block.sidebar.author-ai {
            border-left-color: var(--neon-purple);
            border-left-style: solid;
        }

        .stream-block.sidebar.author-ai::before {
            display: none; /* Hide default AI marker in favor of sidebar border */
        }

        /* --- MENUS --- */
        .floating-menu {
            position: absolute;
            background: var(--bg-color);
            border: 2px solid var(--text-color);
            box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.15);
            z-index: 1000;
            display: none;
            flex-direction: column;
            width: 260px;
            border-radius: 4px;
            overflow: hidden;
            padding: 8px 0;
            transition: opacity 0.1s;
        }

        .floating-menu.active {
            display: flex;
        }

        .menu-item {
            padding: 10px 16px;
            font-family: var(--font-mono);
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            color: var(--text-color);
            background: transparent;
            border: none;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-item .sub {
            color: var(--muted-text);
            font-size: 10px;
            font-weight: 500;
        }

        .menu-item.selected,
        .menu-item:hover {
            background: var(--text-color);
            color: var(--bg-color);
        }

        .menu-item.selected .sub,
        .menu-item:hover .sub {
            color: var(--bg-color);
            opacity: 0.7;
        }

        .menu-item.create-new {
            color: #3b82f6;
            border-top: 1px solid var(--baritone-bg);
        }

        .menu-item.create-new.selected,
        .menu-item.create-new:hover {
            background: #3b82f6;
            color: #fff;
        }

        /* --- BARITONE PANELS --- */
        .baritone-panel {
            background: var(--baritone-bg);
            border-radius: 2px;
            padding: 16px 20px;
            margin: 16px 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }
        
        .baritone-panel.virtual-block {
            border: 2px dashed var(--muted-text);
            background: transparent;
            opacity: 0.95;
        }
        .virtual-block .panel-header { color: var(--neon-purple); }

        .panel-header {
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted-text);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
            user-select: none;
        }

        .panel-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .panel-ctrl-btn {
            background: none;
            border: none;
            padding: 0;
            color: var(--muted-text);
            font-size: 14px;
            cursor: pointer;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .panel-ctrl-btn:hover { color: var(--text-color); }
        .panel-ctrl-btn.delete:hover { color: #ef4444; }

        .panel-title-input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-color);
            font-family: var(--font-main);
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.02em;
            width: 100%;
            margin-bottom: 8px;
            border-bottom: 2px solid transparent;
            transition: border-color 0.2s;
        }

        .panel-title-input::placeholder { color: var(--muted-text); font-weight: 600; opacity: 0.4; }
        .panel-title-input:focus { border-bottom-color: var(--text-color); }

        .raw-input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-color);
            font-family: var(--font-main);
            font-size: 18px;
            font-weight: 500;
            width: 100%;
        }

        .raw-input::placeholder { color: var(--muted-text); }

        .raw-btn {
            background: var(--bg-color);
            border: 2px solid var(--text-color);
            color: var(--text-color);
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            padding: 8px 12px;
            border-radius: 2px;
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.15);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .raw-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.15);
        }

        .raw-btn.active {
            background: var(--text-color);
            color: var(--bg-color);
        }

        .raw-btn.danger {
            color: #ef4444;
            border-color: #ef4444;
        }

        .raw-btn.danger.active {
            background: #ef4444;
            border-color: #ef4444;
            color: #fff;
        }

        .voice-status-text { font-family: var(--font-mono); font-size: 11px; color: var(--muted-text); }
        .scan-output { font-family: var(--font-mono); font-size: 14px; min-height: 80px; resize: none; line-height: 1.5; color: var(--baritone-text); }
        
        .calendar-date-display {
            font-family: var(--font-mono);
            font-size: 15px;
            color: var(--neon-purple);
            font-weight: 700;
            display: inline-block;
            transition: opacity 0.2s;
            margin-bottom: 4px;
            cursor: pointer;
        }
        .calendar-date-display:hover { opacity: 0.8; }

        /* --- SMART CANVAS --- */
        .smart-canvas-selector { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; justify-content: center; }
        .smart-canvas-option {
            flex: 1; min-width: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 8px; padding: 24px 16px; background: transparent; border: 2px dashed var(--muted-text); border-radius: 2px;
            color: var(--text-color); font-family: var(--font-mono); font-size: 13px; font-weight: 700; text-transform: uppercase;
            cursor: pointer; transition: all 0.2s;
        }
        .smart-canvas-option:hover { border-color: var(--text-color); border-style: solid; background: var(--text-color); color: var(--bg-color); }

        .canvas-relative-frame.full-bleed {
            position: relative; margin-left: -20px; width: calc(100% + 40px); max-width: none; border-radius: 0;
            overflow: hidden; margin-top: 8px; height: 60vh; min-height: 400px;
        }

        .leaflet-container { background: var(--bg-color) !important; width: 100%; height: 100% !important; z-index: 1; position: absolute; top: 0; left: 0; }
        .leaflet-container.drawing-mode, .leaflet-container.drawing-mode .leaflet-interactive { cursor: crosshair !important; touch-action: none !important; }
        .leaflet-container.locked-mode { cursor: default !important; }

        /* --- REFERENCE MENTIONS --- */
        .ref-mention {
            color: #3b82f6; font-weight: 700; cursor: pointer; text-decoration: none; border-bottom: 2px solid transparent;
            transition: border-color 0.2s, opacity 0.2s; padding: 0 1px;
        }
        .ref-mention:hover { border-bottom-color: #3b82f6; opacity: 0.8; }

        /* --- BACKLINKS SECTION --- */
        .backlinks-section { margin-bottom: 24px; padding: 16px 20px; background: var(--baritone-bg); border-radius: 2px; }
        .backlinks-header { font-family: var(--font-mono); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted-text); margin-bottom: 12px; user-select: none; }
        .backlink-item {
            font-family: var(--font-mono); font-size: 13px; font-weight: 600; color: #3b82f6; cursor: pointer;
            padding: 6px 0; border: none; background: none; text-align: left; display: flex; gap: 8px; align-items: baseline;
            transition: opacity 0.2s; width: 100%;
        }
        .backlink-item:hover { opacity: 0.7; }
        .backlink-item .backlink-preview { color: var(--muted-text); font-weight: 400; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }

        /* --- EDITORIAL CALENDAR MODAL --- */
        .editorial-cal-modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-color-transparent);
            backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 10000; display: none;
            justify-content: center; align-items: center; padding: 20px;
        }
        .editorial-cal-modal.active { display: flex; }

        .cal-modal-panel {
            background: var(--bg-color); width: 100%; max-width: 400px; padding: 24px; display: flex; flex-direction: column;
            border: 2px solid var(--text-color); box-shadow: 8px 8px 0 rgba(0, 0, 0, 0.15); max-height: 90vh; overflow-y: auto;
        }

        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }

        .cal-day {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono);
            font-size: 14px; font-weight: 700; cursor: pointer; background: var(--baritone-bg); color: var(--text-color);
            transition: background 0.2s, color 0.2s;
        }
        .cal-day:active, .cal-day.selected { background: var(--text-color); color: var(--bg-color); }
        .cal-day.muted { opacity: 0.15; pointer-events: none; }

        .time-row {
            display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 8px; padding-bottom: 8px;
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .time-row::-webkit-scrollbar { display: none; }
        .time-row .raw-btn { flex: 0 0 auto; scroll-snap-align: center; border-radius: 20px; box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.15); }
        .time-row .raw-btn:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 rgba(0, 0, 0, 0.15); }
    </style>
</head>

<body>

    <!-- THE HEADER -->
    <div id="header-container">
        <div class="header-max-width">
            <div id="date-header">today</div>
            <div class="status-row">
                <span id="ai-inline-status" class="neon-status ai-status loading">sys.ai.booting</span>
                <span id="db-status" class="neon-status db-status">db.init</span>
            </div>
        </div>
    </div>

    <!-- THE LEAN EDITOR -->
    <div class="app-container">
        <div id="lean-editor">
            <!-- Menus are dynamically generated -->
        </div>
    </div>

    <!-- Editorial Calendar Overlay -->
    <div id="editorial-cal" class="editorial-cal-modal">
        <div class="cal-modal-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <button id="ecal-prev" class="raw-btn">&larr;</button>
                <div id="ecal-title" style="font-size: 20px; font-weight: 900; font-style: italic; text-transform: uppercase; font-family: var(--font-main);">month</div>
                <button id="ecal-next" class="raw-btn">&rarr;</button>
            </div>
            
            <div id="ecal-grid" class="cal-grid"></div>
            
            <div id="ecal-time-container" style="display: none; flex-direction: column; gap: 16px; margin-top: 24px; border-top: 2px solid var(--text-color); padding-top: 20px;">
                <div style="font-family: var(--font-mono); font-size: 10px; color: var(--muted-text); text-transform: uppercase; margin-bottom: -8px;">Time</div>
                <div class="time-row" id="ecal-hour-row"></div>
                <div class="time-row" id="ecal-minute-row"></div>
                <div style="font-family: var(--font-mono); font-size: 10px; color: var(--muted-text); text-transform: uppercase; margin-bottom: -8px; margin-top: 8px;">Recurrence</div>
                <div class="time-row" id="ecal-recurrence-row"></div>
            </div>
            
            <button id="ecal-close" class="raw-btn active" style="margin-top: 24px; width: 100%; padding: 12px; font-size: 14px;">CONFIRM</button>
        </div>
    </div>

    <script type="module">
        // ============================================================================
        // ⚙️ SYSTEM UTILS & HELPERS
        // ============================================================================
        const CONFIG = {
            EMBEDDING_MODEL_ID: "Xenova/all-MiniLM-L6-v2",
            DEV_ALLOW_PAST_EDITING: true // Toggle this to false later to lock the past
        };

        const SLASH_COMMANDS = [
            { id: 'profile', label: 'Persona', sub: 'My Identity & AI Settings' },
            { id: 'smartCanvas', label: 'Canvas', sub: 'Draw & Map' },
            { id: 'voice', label: 'Voice', sub: 'Audio Memo' },
            { id: 'scan', label: 'Scan', sub: 'Image to Text' },
            { id: 'calendar', label: 'Event', sub: 'Schedule & Recurring' },
            { id: 'recall', label: 'Recall', sub: 'Search Past Notes' }
        ];

        function el(tag, attributes = {}, ...children) {
            const element = document.createElement(tag);
            for (const [key, value] of Object.entries(attributes || {})) {
                if (key === 'style' && typeof value === 'object') Object.assign(element.style, value);
                else if (key === 'className') element.className = value;
                else if (key === 'innerHTML') element.innerHTML = value;
                else if (key === 'textContent') element.textContent = value;
                else if (key === 'value') element.value = value;
                else if (key.startsWith('on') && typeof value === 'function') element[key] = value;
                else if (value !== false && value !== undefined && value !== null) element.setAttribute(key, value);
            }
            children.flat().filter(Boolean).forEach(child => {
                if (typeof child === 'string' || typeof child === 'number') element.appendChild(document.createTextNode(child));
                else if (child instanceof Node) element.appendChild(child);
            });
            return element;
        }

        function setCaret(el, offset = -1) {
            el.focus();
            try {
                const range = document.createRange();
                const sel = window.getSelection();
                if (offset === -1) { range.selectNodeContents(el); range.collapse(false); }
                else { range.setStart(el, offset); range.collapse(true); }
                sel.removeAllRanges(); sel.addRange(range);
            } catch (e) { }
        }

        function debounce(func, wait) {
            let timeout;
            return function (...args) { clearTimeout(timeout); timeout = setTimeout(() => func.apply(this, args), wait); };

        const parseLocal = (dateStr) => new Date(dateStr + 'T00:00:00'); // Centralized standard to prevent timezone shifting
        const normalizePlainText = (text = '') => String(text).replace(/<br\s*\/?>/gi, '\n').replace(/<[^>]*>?/gm, '').replace(/\s+/g, ' ').trim();
        const escapeHTML = (text = '') => String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');

                if (delay > 0) this.timers.set(id, setTimeout(() => { new Notification('Note Reminder', { body: title || 'Event Reached' }); this.timers.delete(id); }, delay));

        // ============================================================================
        // 🧠 VECTOR EMBEDDING ENGINE (Transformers.js)
        // ============================================================================
        const VectorEmbedder = new (class {
            constructor() { this.embedder = null; this.promise = null; }
            async getEmbedder() {
                if (this.embedder) return this.embedder;
                if (!this.promise) {
                    this.promise = import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0-alpha.19/+esm').then(async ({ pipeline, env }) => {
                        env.allowRemoteModels = true; env.useBrowserCache = true;
                        if (env.backends && env.backends.onnx) env.backends.onnx.logLevel = 'fatal';
                        let pipe;
                        try { pipe = await pipeline('feature-extraction', CONFIG.EMBEDDING_MODEL_ID, { device: 'webgpu' }); }
                        catch (e) { pipe = await pipeline('feature-extraction', CONFIG.EMBEDDING_MODEL_ID, { dtype: 'q8' }); }
                        this.embedder = pipe; return pipe;
                    });
                }
                return this.promise;
            }
            async embedText(text) {
                const normalized = normalizePlainText(text).slice(0, 1200);
                if (!normalized) return null;
                try {
                    const pipe = await this.getEmbedder();
                    const output = await pipe(normalized, { pooling: 'mean', normalize: true });
                    const list = typeof output.tolist === 'function' ? output.tolist() : Array.from(output.data);
                    return Array.isArray(list[0]) ? list[0] : list;
                } catch (e) { return null; }
            }
        })();

        // ============================================================================
        // 💾 ROBUST STORAGE ARCHITECTURE (PGlite + Vector + IDB Media)
        // ============================================================================
        class PGLiteDatabase {
            constructor() { this.pg = null; this.cache = {}; this.isReady = false; this.pendingDays = new Set(); }

            async init() {
                const dbStatusEl = document.getElementById('db-status');
                try {
                    const [{ PGlite }, { vector }] = await Promise.all([
                        import("https://cdn.jsdelivr.net/npm/@electric-sql/pglite/dist/index.js"),
                        import("https://cdn.jsdelivr.net/npm/@electric-sql/pglite/dist/vector/index.js")
                    ]);

                    this.pg = await PGlite.create({ dataDir: 'idb://infinotes-v2', extensions: { vector } });
                    await this.pg.exec(`
                        CREATE EXTENSION IF NOT EXISTS vector;
                        CREATE TABLE IF NOT EXISTS daily_notes (date_str TEXT PRIMARY KEY, data JSONB);
                        CREATE TABLE IF NOT EXISTS semantic_index (key TEXT PRIMARY KEY, date_str TEXT, block_id TEXT, block_type TEXT, search_text TEXT, embedding vector(384), timestamp BIGINT);
                        CREATE TABLE IF NOT EXISTS profile_settings (key TEXT PRIMARY KEY, value TEXT);
                        CREATE TABLE IF NOT EXISTS references_list (slug TEXT PRIMARY KEY, display_name TEXT NOT NULL, created_at BIGINT);
                    `);
                    
                    this.isReady = true;
                    dbStatusEl.textContent = 'db.ready';
                    dbStatusEl.className = 'neon-status db-status';

                    const res = await this.pg.query(`SELECT date_str, data FROM daily_notes`);
                    res.rows.forEach(r => { this.cache[r.date_str] = typeof r.data === 'string' ? JSON.parse(r.data) : r.data; });

                    this.startBackgroundIndexer();
                } catch (e) {
                    console.error("PGlite Error", e);
                    dbStatusEl.textContent = 'db.offline [memory mode]';
                    dbStatusEl.className = 'neon-status db-status error';
                }
            }

            async getProfile() {
                if (!this.isReady) return {};
                const res = await this.pg.query(`SELECT key, value FROM profile_settings`);
                const profile = {};
                res.rows.forEach(r => profile[r.key] = r.value);
                return profile;
            }
            async updateProfile(key, value) {
                if (!this.isReady) return;
                await this.pg.query(`INSERT INTO profile_settings (key, value) VALUES ($1, $2) ON CONFLICT (key) DO UPDATE SET value = EXCLUDED.value`, [key, value]);
            }
            
            async saveNote(dateStr, data) {
                this.cache[dateStr] = data;
                localStorage.setItem(`infinotes_backup_${dateStr}`, JSON.stringify(data));
                if (!this.isReady) throw new Error("Database is offline, saved to memory/localStorage only.");
                
                try {
                    await this.pg.query(`INSERT INTO daily_notes (date_str, data) VALUES ($1, $2) ON CONFLICT (date_str) DO UPDATE SET data = EXCLUDED.data`, [dateStr, JSON.stringify(data)]);
                    this.pendingDays.add(dateStr);
                } catch (e) {
                    console.error("Save Note SQL Error:", e);
                    throw e; 
                }
            }

            async getReferences() {
                if (!this.isReady) return [];
                const res = await this.pg.query(`SELECT slug, display_name, created_at FROM references_list ORDER BY created_at DESC`);
                return res.rows;
            }

            async createReference(slug, displayName) {
                if (!this.isReady) return;
                await this.pg.query(`INSERT INTO references_list (slug, display_name, created_at) VALUES ($1, $2, $3) ON CONFLICT (slug) DO NOTHING`, [slug, displayName, Date.now()]);
            }

            findBacklinks(slug) {
                const backlinks = [];
                const searchAttr = `data-ref="${slug}"`;
                for (const [key, dayData] of Object.entries(this.cache)) {
                    if (key.startsWith('ref::')) continue;
                    if (!dayData || !dayData.blocks) continue;
                    for (const block of dayData.blocks) {
                        if (!block.data || !block.data.text) continue;
                        if (block.data.text.includes(searchAttr)) {
                            const preview = decodeHTML(normalizePlainText(block.data.text)).substring(0, 80);
                            backlinks.push({ dateStr: key, blockId: block.id, preview });
                            break;
                        }
                    }
                }
                backlinks.sort((a, b) => b.dateStr.localeCompare(a.dateStr));
                return backlinks;
            }

            startBackgroundIndexer() {
                setInterval(async () => {
                    if (this.pendingDays.size === 0 || !this.isReady) return;
                    const dateStr = Array.from(this.pendingDays)[0];
                    this.pendingDays.delete(dateStr);

                    const dayData = this.cache[dateStr];
                    if (!dayData || !dayData.blocks) return;

                    try {
                        await this.pg.query(`DELETE FROM semantic_index WHERE date_str = $1`, [dateStr]);

                        for (const block of dayData.blocks) {
                            if (!block.data) continue;
                            const searchText = ['text', 'h1', 'h2', 'h3'].includes(block.type) ? normalizePlainText(block.data.text) : normalizePlainText(JSON.stringify(block.data));
                            if (!searchText) continue;
                            const vectorData = await VectorEmbedder.embedText(searchText);
                            if (!vectorData) continue;

                            await this.pg.query(
                                `INSERT INTO semantic_index (key, date_str, block_id, block_type, search_text, embedding, timestamp) VALUES ($1, $2, $3, $4, $5, $6::vector, $7)`,
                                [`${dateStr}::${block.id}`, dateStr, block.id, block.type, searchText, `[${vectorData.join(',')}]`, block.timestamp || Date.now()]
                            );
                        }
                    } catch (e) {
                        console.warn("Indexer error:", e);
                    }
                }, 5000);
            }

            async searchSemantic(queryText, excludeDate, limit = 5) {
                if (!this.isReady) return [];
                const vectorData = await VectorEmbedder.embedText(queryText);
                if (!vectorData) return [];
                const res = await this.pg.query(
                    `SELECT date_str as date, block_id as "blockId", block_type as type, search_text as "searchText", timestamp, 1 - (embedding <=> $1::vector) AS score FROM semantic_index WHERE date_str != $2 ORDER BY embedding <=> $1::vector ASC LIMIT $3`,
                    [`[${vectorData.join(',')}]`, excludeDate || '', limit]
                );
                return res.rows;
            }
        }

        class MediaBlobStore {
            constructor() { this.db = null; this.isAvailable = true; }
            init() {
                return new Promise(resolve => {
                    try {
                        const req = indexedDB.open('InfiniteNotesMedia', 1);
                        req.onupgradeneeded = e => { if (!e.target.result.objectStoreNames.contains('media_blobs')) e.target.result.createObjectStore('media_blobs', { keyPath: 'id' }); };
                        req.onsuccess = e => { this.db = e.target.result; resolve(); };
                        req.onerror = () => { this.isAvailable = false; resolve(); };
                    } catch (e) { this.isAvailable = false; resolve(); }
                });
            }
            saveBlob(id, blob, kind) {
                return new Promise(resolve => {
                    if (!this.db || !this.isAvailable) return resolve();
                    const tx = this.db.transaction('media_blobs', 'readwrite');
                    tx.objectStore('media_blobs').put({ id, blob, kind, updatedAt: Date.now() });
                    tx.oncomplete = () => resolve(); tx.onerror = () => resolve();
                });
            }
            getBlob(id) {
                return new Promise(resolve => {
                    if (!this.db || !this.isAvailable) return resolve(null);
                    const req = this.db.transaction('media_blobs', 'readonly').objectStore('media_blobs').get(id);
                    req.onsuccess = () => resolve(req.result?.blob || null);
                    req.onerror = () => resolve(null);
                });
            }
        }

        // ============================================================================
        // ⬛ FLOATING MENU SYSTEM (Consolidated Abstracted Menus)
        // ============================================================================
        class FloatingMenu {
            constructor(id, container) {
                this.el = el('div', { id, className: 'floating-menu' });
                container.appendChild(this.el);
                this.container = container;
                this.active = false; this.index = 0; this.items = []; this.context = null; this.onExecute = null;
            }
            open(context, range, filterStr, onExecute, renderFn) {
                this.active = true; this.context = { ...context, range }; this.index = 0;
                this.onExecute = onExecute; this.renderFn = renderFn;
                
                let rect = range.getBoundingClientRect();
                if (rect.width === 0) rect = context.content.getBoundingClientRect();
                const cRect = this.container.getBoundingClientRect();
                
                this.el.style.top = `${rect.bottom - cRect.top + this.container.scrollTop + 8}px`;
                this.el.style.left = `${Math.max(0, rect.left - cRect.left)}px`;
                this.update(filterStr);
            }
            close() { this.active = false; this.el.classList.remove('active'); this.context = null; }
            update(items) {
                this.items = items; this.el.innerHTML = '';
                if (!items.length) { this.close(); return; }
                if (this.index >= items.length) this.index = 0;
                items.forEach((item, i) => {
                    const btn = this.renderFn(item, i === this.index);
                    btn.onmousedown = (e) => { e.preventDefault(); this.onExecute(item, this.context); };
                    this.el.appendChild(btn);
                });
                this.el.classList.add('active');
            }
            handleKey(e) {
                if (!this.active) return false;
                if (e.key === 'ArrowDown') { e.preventDefault(); this.index = (this.index + 1) % this.items.length; this.update(this.items); return true; }
                if (e.key === 'ArrowUp') { e.preventDefault(); this.index = (this.index - 1 + this.items.length) % this.items.length; this.update(this.items); return true; }
                if (e.key === 'Enter') { e.preventDefault(); this.onExecute(this.items[this.index], this.context); return true; }
                if (e.key === 'Escape') { e.preventDefault(); this.close(); return true; }
                return false;
            }
        }
