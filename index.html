<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Infinite Notes</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Notes">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#121212">
    
    <!-- Dynamic Manifest Injection -->
    <link id="pwa-manifest" rel="manifest" href="">
    <link id="pwa-icon" rel="apple-touch-icon" href="">

    <!-- Core Editor & Plugins -->
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/paragraph@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/header@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/nested-list@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/checklist@latest"></script>

    <!-- Leaflet for Map Tool -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* --- Standardized Pure Flat Theme --- */
        :root {
            --bg-color: #ffffff; --text-color: #000000; --border-color: #e0e0e0;
            --muted-bg: #f5f5f5; --muted-text: #666666; --accent-color: #000000;
            --recall-bg: #fcfcfc; --recall-border: #cccccc;
            --editor-toolbar-bg: #ffffff; --editor-hover-bg: #ebebeb; --overlay-bg: transparent; 
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --keyboard-offset: 0px; --safe-area-top: env(safe-area-inset-top, 0px);
            --std-border-radius: 8px; --std-icon-size: 20px; --std-control-height: 36px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212; --text-color: #ffffff; --border-color: #333333;
                --muted-bg: #1e1e1e; --muted-text: #aaaaaa; --accent-color: #ffffff;
                --recall-bg: #1a1a1a; --recall-border: #444444;
                --editor-toolbar-bg: #1e1e1e; --editor-hover-bg: #2a2a2a;
            }
        }

        html, body { background-color: var(--bg-color); color: var(--text-color); font-family: var(--font-main); margin: 0; padding: 0; line-height: 1.6; width: 100vw; overflow-x: hidden; }
        .app-container { max-width: 800px; width: 100%; margin: 0 auto; padding: calc(10vh + var(--safe-area-top)) 40px 65vh 40px; box-sizing: border-box; }
        #editorjs { padding: 0; max-width: 100%; box-sizing: border-box; min-height: 50vh; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        ::-webkit-scrollbar:horizontal { display: none; }
        svg { flex-shrink: 0; }

        /* Editor.js Overrides */
        .ce-block { position: relative; z-index: auto !important; } 
        .ce-toolbar { z-index: 10000 !important; }
        .ce-popover, .ce-settings, .tc-popover, .cdx-settings, .ce-tooltip { z-index: 10005 !important; }
        .ce-block__content { max-width: 100% !important; }
        .ce-toolbar__plus, .ce-toolbar__settings-btn { background-color: var(--bg-color) !important; color: var(--text-color) !important; border: 1px solid transparent; }
        .ce-toolbar__plus:hover, .ce-toolbar__settings-btn:hover { background-color: var(--editor-hover-bg) !important; border-color: var(--border-color); }
        .ce-popover__overlay, .ce-popover-overlay, .cdx-overlay { background: var(--overlay-bg) !important; box-shadow: none !important; backdrop-filter: none !important; }
        .ce-popover-item__icon svg { width: var(--std-icon-size) !important; height: var(--std-icon-size) !important; }
        .ce-popover-item__title { font-size: 14px !important; font-weight: 500 !important; }

        @media (prefers-color-scheme: dark) {
            .ce-popover, .ce-popover__container, .ce-popover__panel, .ce-popover__items, .ce-inline-toolbar, .ce-conversion-toolbar, .ce-settings, .ce-tooltip { background: var(--editor-toolbar-bg) !important; border-color: var(--border-color) !important; box-shadow: none !important; }
            .ce-tooltip { color: var(--text-color) !important; }
            .ce-popover-item, .ce-inline-tool, .ce-conversion-tool, .ce-settings__button { background-color: transparent !important; color: var(--text-color) !important; }
            .ce-popover-item__title { color: var(--text-color) !important; }
            .ce-popover-item:hover, .ce-inline-tool:hover, .ce-conversion-tool:hover, .ce-settings__button:hover { background-color: var(--editor-hover-bg) !important; }
            .ce-popover-item__icon, .ce-popover-item__icon--active, .ce-popover__item-icon { background-color: var(--muted-bg) !important; color: var(--text-color) !important; box-shadow: none !important; border-color: var(--border-color) !important; }
            .cdx-search-field, .cdx-input { background-color: var(--muted-bg) !important; color: var(--text-color) !important; border: 1px solid var(--border-color) !important; box-shadow: none !important; }
            .cdx-search-field__icon { color: var(--muted-text) !important; }
            .ce-block--selected .ce-block__content { background-color: var(--editor-hover-bg) !important; }
            ::selection { background: var(--border-color) !important; color: var(--text-color); }
        }

        @media (max-width: 650px) {
            .ce-popover, .ce-settings, .ce-inline-toolbar { bottom: var(--keyboard-offset, 0px) !important; max-height: calc(100vh - var(--keyboard-offset, 0px) - 20px) !important; transition: bottom 0.2s cubic-bezier(0.1, 0.7, 0.1, 1), max-height 0.2s ease; }
        }

        /* UI Components */
        #date-header { text-align: left; font-size: clamp(60px, 18vw, 150px); font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: -0.06em; line-height: 0.8; color: var(--text-color); margin: -20px 0 40px -25px; cursor: pointer; transition: opacity 0.2s; user-select: none; white-space: nowrap; }
        #date-header:hover { opacity: 0.7; }
        #date-header:active { opacity: 0.5; }

        .ce-block-time { font-size: 11px; color: var(--muted-text); text-align: right; padding: 6px 2px 2px 0; user-select: none; opacity: 0.7; font-weight: 500; }
        
        .cal-btn { padding: 8px 12px; background: transparent; border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-color); cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; white-space: nowrap; }
        .cal-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
        .cal-btn:hover { background: var(--editor-hover-bg); }
        .cal-btn.primary { background: var(--text-color); color: var(--bg-color); border-color: var(--text-color); }
        .cal-btn.primary:hover { opacity: 0.9; }

        .tool-title-input, .cal-title, .v-memo__title { width: 100%; border: none; background: transparent; color: var(--text-color); outline: none; font-family: inherit; }
        .tool-title-input { font-size: 16px; font-weight: 600; padding: 4px 0; margin-bottom: 8px; }
        .tool-title-input::placeholder { color: var(--muted-text); font-weight: 500; opacity: 0.6; }

        /* Date Picker Modal */
        .global-calendar-modal { position: fixed; inset: 0; background-color: rgba(0,0,0,0.4); z-index: 100000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s ease; backdrop-filter: blur(2px); }
        .global-calendar-modal.show { display: flex; opacity: 1; }
        .cp-container { background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; width: 90%; max-width: 340px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: flex; flex-direction: column; gap: 12px; }
        .cp-header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .cp-header button { background: var(--muted-bg); border: 1px solid var(--border-color); color: var(--text-color); border-radius: 6px; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .cp-header button:hover { background: var(--editor-hover-bg); }
        .cp-weekdays, .cp-grid { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; }
        .cp-weekdays { font-size: 12px; color: var(--muted-text); font-weight: 600; margin-bottom: 4px; }
        .cp-grid { gap: 4px; }
        .cp-day { padding: 8px 0; font-size: 14px; cursor: pointer; border-radius: 6px; color: var(--text-color); transition: background 0.1s; }
        .cp-day:hover:not(.muted) { background: var(--editor-hover-bg); }
        .cp-day.active { background: var(--text-color) !important; color: var(--bg-color) !important; font-weight: bold; }
        .cp-day.muted { color: var(--border-color); pointer-events: none; opacity: 0.3; }
        .cp-time { display: flex; justify-content: center; align-items: center; gap: 6px; padding-top: 16px; border-top: 1px solid var(--border-color); }
        #dp-time-input { width: 100%; padding: 10px; font-size: 16px; text-align: center; border-radius: 6px; border: 1px solid var(--border-color); background: var(--muted-bg); color: var(--text-color); font-family: inherit; outline: none; }

        /* Block Tools */
        .compute-tool-container { border: 1px solid var(--border-color); border-radius: var(--std-border-radius); background: var(--muted-bg); overflow: hidden; margin: 8px 0; display: flex; flex-direction: column; }
        .compute-input { width: 100%; padding: 16px 16px 12px 16px; background: transparent; border: none; outline: none; font-family: monospace; font-size: 14px; color: var(--text-color); resize: none; box-sizing: border-box; line-height: 1.5; min-height: 50px; font-weight: bold; }
        .compute-input::placeholder { color: var(--muted-text); opacity: 0.5; font-weight: normal; }
        .compute-output { padding: 12px 16px; border-top: 1px dashed var(--border-color); font-family: monospace; font-size: 16px; font-weight: 700; color: var(--text-color); background: var(--bg-color); word-break: break-word; min-height: 20px; }
        .compute-error { color: #EF4444; font-weight: 400; font-size: 13px; }

        .ai-tool-container { border: 1px solid var(--border-color); border-radius: var(--std-border-radius); background: var(--muted-bg); padding: 12px; margin: 8px 0; display: flex; flex-direction: column; gap: 8px; }
        .ai-header { display: flex; align-items: center; gap: 8px; color: var(--text-color); font-weight: 600; font-size: 14px; margin-bottom: 4px; }
        .ai-icon svg { width: 18px; height: 18px; color: #8B5CF6; } 
        .ai-input { width: 100%; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 6px; padding: 10px; color: var(--text-color); font-family: inherit; font-size: 14px; resize: none; outline: none; box-sizing: border-box; }
        .ai-btn { align-self: flex-end; background: var(--text-color); color: var(--bg-color); border: none; padding: 8px 16px; border-radius: 6px; font-weight: 600; font-size: 13px; cursor: pointer; transition: opacity 0.2s; }
        .ai-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .ai-output { background: var(--bg-color); border-left: 3px solid #8B5CF6; padding: 10px 12px; font-size: 14px; line-height: 1.5; color: var(--text-color); border-radius: 0 6px 6px 0; white-space: pre-wrap; word-break: break-word; }
        .ai-status { font-size: 11px; font-family: monospace; color: var(--muted-text); }

        .scan-wrapper { margin: 8px 0; width: 100%; border: 1px dashed var(--border-color); border-radius: var(--std-border-radius); display: flex; flex-direction: column; overflow: hidden; }
        .scan-action-area { padding: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; cursor: pointer; transition: background 0.2s; }
        .scan-action-area:hover { background: var(--editor-hover-bg); }
        .scan-icon { color: var(--muted-text); }
        .scan-icon svg { width: 32px; height: 32px; }
        .scan-label { font-size: 14px; font-weight: 600; color: var(--text-color); letter-spacing: 1px; }
        .scan-status { font-family: monospace; font-size: 12px; font-weight: bold; color: var(--muted-text); margin-top: 10px; }
        .scan-output-textarea { width: 100%; min-height: 100px; padding: 16px; border: none; background: var(--muted-bg); color: var(--text-color); font-family: monospace; font-size: 13px; line-height: 1.5; resize: none; outline: none; box-sizing: border-box; }

        .recall-search-wrapper { position: relative; width: 100%; margin: 8px 0; }
        .recall-search-input { width: 100%; padding: 12px 14px 12px 40px; border-radius: var(--std-border-radius); border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-color); font-family: inherit; font-size: 15px; outline: none; box-sizing: border-box; transition: border-color 0.2s; }
        .recall-search-input:focus { border-color: var(--text-color); }
        .recall-search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; color: var(--muted-text); }
        .recall-dropdown { position: absolute; top: 100%; left: 0; width: 100%; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: var(--std-border-radius); margin-top: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); z-index: 1000; max-height: 250px; overflow-y: auto; display: none; }
        .recall-dropdown.active { display: block; }
        .recall-result-item { padding: 12px 14px; cursor: pointer; border-bottom: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 4px; }
        .recall-result-item:last-child { border-bottom: none; }
        .recall-result-item:hover { background: var(--editor-hover-bg); }
        .recall-result-meta { font-size: 11px; color: var(--text-color); font-weight: 600; opacity: 0.7; }
        .recall-result-snippet { font-size: 14px; color: var(--muted-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .recalled-block { margin: 8px 0; padding: 12px 16px; background: var(--recall-bg); border-left: 4px solid var(--recall-border); border-radius: 4px var(--std-border-radius) var(--std-border-radius) 4px; position: relative; }
        .recalled-orig-meta { font-size: 10px; color: var(--muted-text); font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .recalled-orig-meta svg { width: 12px; height: 12px; }

        .calendar-tool-container { display: flex; flex-direction: column; gap: 12px; width: 100%; margin: 8px 0; }
        .cal-header { display: flex; align-items: center; gap: 10px; }
        .cal-header svg { color: var(--muted-text); }
        .cal-title { font-size: 18px; font-weight: 600; }
        .cal-display-btn { border: 1px solid var(--border-color); background: var(--muted-bg); color: var(--text-color); border-radius: 6px; padding: 10px 14px; font-family: inherit; font-size: 14px; outline: none; cursor: pointer; text-align: left; display: flex; align-items: center; justify-content: space-between; }
        .cal-display-btn:hover { background: var(--editor-hover-bg); }
        .cal-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .cal-actions .cal-btn { flex: 1; min-width: 130px; }

        .voice-tool-container { display: flex; align-items: center; gap: 12px; margin: 8px 0; }
        .v-memo__btn { width: var(--std-control-height); height: var(--std-control-height); border-radius: 50%; border: 1px solid var(--border-color); background: var(--muted-bg); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-color); flex-shrink: 0; transition: all 0.2s; }
        .v-memo__btn:hover { background: var(--editor-hover-bg); }
        .v-memo__btn.recording { color: #ffffff; border-color: #ef4444; background: #ef4444; animation: pulse 1.5s infinite; }
        .v-memo__btn.playing { color: #ffffff; border-color: #3B82F6; background: #3B82F6; }
        .v-memo__title { font-size: 15px; font-weight: 600; min-width: 0; flex-grow: 1; }
        .v-memo__status { font-size: 13px; color: var(--muted-text); white-space: nowrap; font-weight: 500; }
        
        .smart-canvas-selector { display: flex; gap: 12px; padding: 12px 0; justify-content: center; flex-wrap: wrap; }
        .smart-canvas-option { flex: 1; min-width: 100px; display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 24px 10px; border: 1px dashed var(--border-color); border-radius: 8px; background: transparent; color: var(--text-color); cursor: pointer; transition: all 0.2s; font-size: 13px; font-weight: 500; font-family: inherit; }
        .smart-canvas-option:hover { background: var(--editor-hover-bg); border-style: solid; }
        .smart-canvas-option svg { width: 32px; height: 32px; color: var(--muted-text); }
        
        .canvas-relative-frame { position: relative; width: 100%; border-radius: var(--std-border-radius); border: 1px solid var(--border-color); overflow: hidden; margin: 8px 0; }
        .block-controls-stack { position: absolute; top: 10px; left: 10px; display: flex; flex-direction: column; gap: 8px; z-index: 401 !important; }
        .canvas-action-btn { width: 32px; height: 32px; border-radius: 6px; background: var(--editor-toolbar-bg); border: 1px solid var(--border-color); color: var(--text-color); cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0.8; transition: all 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.15); }
        .canvas-action-btn.active { background: var(--text-color); color: var(--bg-color); opacity: 1; border-color: var(--text-color); }
        
        .leaflet-container { background: var(--bg-color) !important; z-index: 1 !important; width: 100%; height: 400px; border: none; }
        .leaflet-container.drawing-mode, .leaflet-container.drawing-mode .leaflet-interactive { cursor: crosshair !important; touch-action: none; }
        .leaflet-container.locked-mode { cursor: default !important; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Brutalist Header -->
        <div id="date-header"></div>
        <div id="editorjs"></div>
    </div>

    <!-- UI Modal -->
    <div id="global-calendar-modal" class="global-calendar-modal">
        <div class="cp-container" onclick="event.stopPropagation()">
            <div class="cp-header">
                <button id="dp-prev"><</button>
                <span id="dp-month-label">Month Year</span>
                <button id="dp-next">></button>
            </div>
            <div class="cp-weekdays">
                <span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span>
            </div>
            <div id="dp-grid" class="cp-grid"></div>
            <div id="dp-time-section" class="cp-time" style="display: none;">
                <input type="time" id="dp-time-input" required>
            </div>
            <div style="margin-top: 12px; display: flex; gap: 8px;">
                <button id="dp-today-btn" class="cal-btn" style="flex: 1;">Today</button>
                <button id="dp-confirm-btn" class="cal-btn primary" style="flex: 1;">Confirm</button>
            </div>
        </div>
    </div>

    <script type="module">
        // ============================================================================
        // ⚙️ CONFIGURATION & UTILS
        // ============================================================================
        const CONFIG = { PWA_LOGO_URL: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzAwMDAwMCI+PHBhdGggZD0iTTE0IDJINmEyIDIgMCAwIDAtMiAydjE2YTIgMiAwIDAgMCAyIDJoMTJhMiAyIDAgMCAwIDItMlY4bC02LTZ6Ii8+PC9zdmc+" };

        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.getElementById('pwa-icon').href = CONFIG.PWA_LOGO_URL;
        document.getElementById('pwa-manifest').href = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(JSON.stringify({
            "name": "Infinite Notes", "short_name": "Notes", "start_url": ".", "display": "standalone",
            "background_color": isDark ? "#121212" : "#ffffff", "theme_color": isDark ? "#121212" : "#ffffff",
            "icons": [{"src": CONFIG.PWA_LOGO_URL, "sizes": "192x192", "type": "image/svg+xml"}]
        }));

        window.addEventListener('error', e => e.message?.includes('ResizeObserver') && e.stopImmediatePropagation());

        if (window.visualViewport) {
            const updateKeyboardOffset = () => document.documentElement.style.setProperty('--keyboard-offset', `${Math.max(0, window.innerHeight - window.visualViewport.height)}px`);
            window.visualViewport.addEventListener('resize', updateKeyboardOffset); updateKeyboardOffset();
        }

        const ICONS = {
            mic: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>',
            stop: '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"></rect></svg>',
            play: '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>',
            pause: '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"></rect><rect x="14" y="4" width="4" height="16" rx="1"></rect></svg>',
            image: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>',
            download: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>',
            lock: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>',
            unlock: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>',
            calendar: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>',

        const createEl = (tag, className = '', attrs = {}, children = []) => {
            const el = document.createElement(tag);
            if (className) el.className = className;
            for (const [k, v] of Object.entries(attrs)) {
                if (k === 'style') el.style.cssText = v;
                else if (k in el) el[k] = v;
                else el.setAttribute(k, v);
            }
            if (children.length) el.append(...children.filter(Boolean));
            return el;
        };

        const NotificationEngine = {
            timers: new Map(),
            schedule(id, dt, title) {
                this.cancel(id); if (!window.Notification || Notification.permission !== 'granted') return;
                const delay = new Date(dt).getTime() - Date.now();
                if (delay > 0) this.timers.set(id, setTimeout(() => { new Notification('Note Reminder', { body: title || 'Scheduled Event' }); this.timers.delete(id); }, delay));
            },
            cancel(id) { if (this.timers.has(id)) { clearTimeout(this.timers.get(id)); this.timers.delete(id); } }
        };

        const getLocalYYYYMMDD = d => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;

        // ============================================================================
        // DATABASE ADAPTER & GLOBAL MANAGERS
        // ============================================================================
        class IndexedDBAdapter {
            constructor() { this.dbName = 'InfiniteNotesDB'; this.storeName = 'daily_notes'; this.cache = {}; this.isMemoryOnly = false; }
            init() {
                return new Promise(resolve => {
                    try {
                        const req = indexedDB.open(this.dbName, 1);
                        req.onupgradeneeded = e => e.target.result.createObjectStore(this.storeName);
                        req.onsuccess = e => { this.db = e.target.result; this.loadAll().then(data => { this.cache = data; resolve(); }); };
                        req.onerror = () => { this.isMemoryOnly = true; resolve(); };
                    } catch { this.isMemoryOnly = true; resolve(); }
                });
            }
            save(dateStr, data) { 
                this.cache[dateStr] = data; 
                if (this.isMemoryOnly) return;
                try { this.db.transaction(this.storeName, 'readwrite').objectStore(this.storeName).put(data, dateStr); } catch {}
            }
            loadAll() {
                return new Promise(resolve => {
                    if (this.isMemoryOnly) return resolve({});
                    try {
                        const tx = this.db.transaction(this.storeName, 'readonly'), store = tx.objectStore(this.storeName);
                        const valReq = store.getAll(), keyReq = store.getAllKeys();
                        tx.oncomplete = () => { const res = {}; keyReq.result.forEach((k, i) => res[k] = valReq.result[i]); resolve(res); };
                    } catch { resolve({}); }
                });
            }
        }
        const appDB = new IndexedDBAdapter();

        // LLM Singleton for WebGPU On-Device AI
        const AI_MODEL = 'Llama-3.2-1B-Instruct-q4f16_1-MLC';
        const AIEngine = {
            instance: null, isInitializing: false, subscribers: [],
            async getEngine(onProgress) {
                if (this.instance) return this.instance;
                this.subscribers.push(onProgress);
                if (this.isInitializing) return new Promise(res => {
                    const check = setInterval(() => { if (this.instance) { clearInterval(check); res(this.instance); } }, 500);
                });
                this.isInitializing = true;
                try {
                    const { CreateMLCEngine } = await import('https://esm.run/@mlc-ai/web-llm');
                    this.instance = await CreateMLCEngine(AI_MODEL, {
                        initProgressCallback: (info) => this.subscribers.forEach(cb => cb(info.text))
                    });
                    return this.instance;
                } catch (e) {
                    this.isInitializing = false;
                    throw new Error("WebGPU initialization failed. Ensure WebGPU is enabled in iOS Settings > Apps > Safari > Advanced > Feature Flags.");
                }
            }
        };

        // ============================================================================
        // GLOBAL UI: DATE PICKER MODAL
        // ============================================================================
        const DatePicker = (() => {
            let activeDate, viewDate, onConfirm, config;
            const modal = document.getElementById('global-calendar-modal');
            const els = { grid: document.getElementById('dp-grid'), label: document.getElementById('dp-month-label'), timeSec: document.getElementById('dp-time-section'), timeInput: document.getElementById('dp-time-input') };

            const render = () => {
                const year = viewDate.getFullYear(), month = viewDate.getMonth();
                els.label.textContent = viewDate.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
                els.grid.innerHTML = '';
                
                els.timeSec.style.display = config.showTime ? 'block' : 'none';
                if (config.showTime) els.timeInput.value = `${String(activeDate.getHours()).padStart(2, '0')}:${String(activeDate.getMinutes()).padStart(2, '0')}`;
                
                for (let i = 0; i < new Date(year, month, 1).getDay(); i++) els.grid.appendChild(createEl('div', 'cp-day muted', {style: "opacity: 0"}));
                const daysInMonth = new Date(year, month + 1, 0).getDate(), todayStr = getLocalYYYYMMDD(new Date());

                for (let i = 1; i <= daysInMonth; i++) {
                    const dayEl = createEl('div', 'cp-day', { textContent: i });
                    const cellStr = getLocalYYYYMMDD(new Date(year, month, i));

                    if (year === activeDate.getFullYear() && month === activeDate.getMonth() && i === activeDate.getDate()) dayEl.classList.add('active');
                    if (cellStr === todayStr) { dayEl.style.borderBottom = "2px solid var(--text-color)"; dayEl.style.borderRadius = "4px 4px 0 0"; }

                    let isMuted = (config.disableFuture && cellStr > todayStr) || (config.disablePast && cellStr < todayStr) || (config.onlyNotes && cellStr !== todayStr && (!appDB.cache[cellStr]?.blocks?.length));

                    if (isMuted) dayEl.classList.add('muted'); 
                    else {
                        dayEl.onclick = () => { activeDate.setFullYear(year, month, i); render(); };
                        if (!config.showTime && appDB.cache[cellStr]?.blocks?.length > 0 && cellStr !== todayStr) {
                            dayEl.style.cssText += "font-weight:bold;text-decoration:underline;text-underline-offset:4px;text-decoration-color:var(--border-color);";
                        }
                    }
                    els.grid.appendChild(dayEl);
                }
            };

            document.getElementById('dp-prev').onclick = () => { viewDate.setMonth(viewDate.getMonth() - 1); render(); };
            document.getElementById('dp-next').onclick = () => { viewDate.setMonth(viewDate.getMonth() + 1); render(); };
            document.getElementById('dp-today-btn').onclick = () => { activeDate = new Date(); viewDate = new Date(activeDate); render(); };
            document.getElementById('dp-confirm-btn').onclick = () => {
                if (config.showTime && els.timeInput.value) {
                    const [h, m] = els.timeInput.value.split(':'); activeDate.setHours(+h, +m, 0, 0);
                    if (config.disablePast && activeDate < new Date()) activeDate = new Date(); 
                }
                modal.classList.remove('show'); setTimeout(() => modal.style.display = 'none', 200);
                onConfirm?.(new Date(activeDate));
            };
            modal.onclick = e => { if (e.target === modal) { modal.classList.remove('show'); setTimeout(() => modal.style.display = 'none', 200); } };

            return {
                open(initDate, callback, opts = {}) {
                    activeDate = new Date(initDate); viewDate = new Date(activeDate); onConfirm = callback;
                    config = { showTime: !!opts.showTime, disableFuture: !!opts.disableFuture, disablePast: !!opts.disablePast, onlyNotes: !!opts.onlyNotes };
                    render(); modal.style.display = 'flex'; void modal.offsetWidth; modal.classList.add('show');
                }
            };
        })();

        // ============================================================================
        // EDITOR.JS PLUGINS
        // ============================================================================
        const fireChange = cfg => cfg.onChange && cfg.onChange();

        class AITool {
            static get toolbox() { return { title: 'Ask AI (On-Device)', icon: ICONS.sparkles }; }
            constructor({data, config, readOnly}) {
                this.config = config; this.readOnly = readOnly;
                this.data = { prompt: data.prompt || '', response: data.response || '' };
                this.wrapper = createEl('div', 'ai-tool-container');
            }
            render() {
                this.wrapper.innerHTML = '';
                const header = createEl('div', 'ai-header', {}, [createEl('div', 'ai-icon', {innerHTML: ICONS.sparkles}), createEl('span', '', {textContent: 'On-Device Assistant (Llama 3.2 1B)'})]);
                this.statusEl = createEl('div', 'ai-status', {style: 'display:none'});
                this.input = createEl('textarea', 'ai-input', { placeholder: 'Ask AI (e.g. Summarize this note, rewrite formal...)', value: this.data.prompt, readOnly: this.readOnly });
                this.output = createEl('div', 'ai-output', { innerHTML: this.data.response });
                if (!this.data.response) this.output.style.display = 'none';

                this.actionBtn = createEl('button', 'ai-btn', { textContent: 'Generate' });
                if (this.readOnly) {
                    this.actionBtn.style.display = 'none';
                    if (!this.data.response) this.wrapper.innerHTML = '<div style="color:var(--muted-text);font-size:13px;padding:12px;">Empty AI Block</div>';
                    else this.wrapper.append(header, this.input, this.output);
                    return this.wrapper;
                }

                this.input.oninput = e => { 
                    this.data.prompt = e.target.value; 
                    this.input.style.height = 'auto'; this.input.style.height = this.input.scrollHeight + 'px';
                    fireChange(this.config); 
                };
                setTimeout(() => { this.input.style.height = 'auto'; this.input.style.height = this.input.scrollHeight + 'px'; }, 0);
                this.actionBtn.onclick = () => this.generate();

                this.wrapper.append(header, this.statusEl, this.input, this.actionBtn, this.output); return this.wrapper;
            }
            async getContext() {
                if (!activeEditor) return '';
                const d = await activeEditor.save(); let ctx = '';
                d.blocks.forEach(b => {
                    if (b.type !== 'ai' && b.type !== 'compute') {
                        if (b.data.text) ctx += b.data.text.replace(/<[^>]*>?/gm, '') + "\n";
                        else if (b.data.items) ctx += b.data.items.map(i=>i.content.replace(/<[^>]*>?/gm, '')).join(', ') + "\n";
                    }
                });
                return ctx ? `\n\n--- CURRENT NOTE CONTEXT ---\n${ctx}\n--- END CONTEXT ---\n` : '';
            }
            async generate() {
                if (!this.data.prompt.trim()) return;
                this.actionBtn.disabled = this.input.readOnly = true;
                this.statusEl.style.display = this.output.style.display = 'block';
                this.output.innerHTML = this.data.response = '';
                try {
                    this.statusEl.textContent = 'Loading Engine (Takes time on first run to download model)...';
                    const engine = await AIEngine.getEngine(txt => this.statusEl.textContent = txt);
                    this.statusEl.textContent = 'Generating...';
                    const context = await this.getContext();
                    const chunks = await engine.chat.completions.create({
                        messages: [
                            { role: 'system', content: 'You are a helpful, extremely concise on-device AI assistant integrated into a notes app. The user may provide current note context below.' },
                            { role: 'user', content: this.data.prompt + context }
                        ],
                        stream: true, temperature: 0.7,
                    });
                    for await (const chunk of chunks) {
                        this.data.response += chunk.choices[0]?.delta?.content || '';
                        this.output.textContent = this.data.response;
                        fireChange(this.config);
                    }
                    this.statusEl.style.display = 'none';
                } catch (e) { this.statusEl.textContent = 'Error: ' + e.message; } 
                finally { this.actionBtn.disabled = this.input.readOnly = false; fireChange(this.config); }
            }
            save() { return this.data; }
        }

        class ScanTool {
            static get toolbox() { return { title: 'Scan Text', icon: ICONS.scan }; }
            constructor({data, config, readOnly}) { this.config = config; this.readOnly = readOnly; this.data = { text: data.text || '' }; this.wrapper = createEl('div', 'scan-wrapper'); }
            render() {
                this.wrapper.innerHTML = '';
                if (this.data.text) {
                    this.input = createEl('textarea', 'scan-output-textarea', { value: this.data.text, readOnly: this.readOnly });
                    if (this.readOnly) { this.input.style.background = 'transparent'; this.wrapper.style.cssText = 'border:none;border-left:4px solid var(--border-color);border-radius:0;'; } 
                    else this.input.oninput = e => { this.data.text = e.target.value; this.adjustHeight(); fireChange(this.config); };
                    this.wrapper.appendChild(this.input); setTimeout(() => this.adjustHeight(), 0);
                } else if (!this.readOnly) {
                    this.actionArea = createEl('div', 'scan-action-area', {}, [
                        createEl('div', 'scan-icon', {innerHTML: ICONS.scan}),
                        createEl('div', 'scan-label', {textContent: 'SCAN DOCUMENT'}),
                        this.status = createEl('div', 'scan-status')
                    ]);
                    this.fileInput = createEl('input', '', { type: 'file', accept: 'image/*', capture: 'environment', style: 'display: none;' });
                    this.actionArea.onclick = () => this.fileInput.click();
                    this.fileInput.onchange = e => this.handleScan(e.target.files[0]);
                    this.wrapper.append(this.actionArea, this.fileInput);
                } else this.wrapper.innerHTML = '<div style="padding: 12px; color: var(--muted-text); font-size: 13px;">Empty Scan Block</div>';
                return this.wrapper;
            }
            adjustHeight() { if (this.input) { this.input.style.height = 'auto'; this.input.style.height = this.input.scrollHeight + 'px'; } }
            async handleScan(file) {
                if (!file) return;
                this.actionArea.onclick = null; this.actionArea.style.cursor = 'default';
                this.actionArea.querySelectorAll('div:not(.scan-status)').forEach(el => el.style.display = 'none');
                this.status.textContent = 'INITIALIZING OCR...';
                try {
                    if (!window.Tesseract) {
                        await new Promise((res, rej) => document.head.appendChild(createEl('script', '', { src: 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js', onload: res, onerror: rej })));
                    }
                    const worker = await Tesseract.createWorker('eng', 1, { logger: m => { if(m.status === 'recognizing text') this.status.textContent = `ANALYZING: ${Math.round(m.progress * 100)}%`; } });
                    const { data: { text } } = await worker.recognize(file);
                    await worker.terminate();
                    this.data.text = text.trim(); this.render(); fireChange(this.config);
                } catch(e) { this.status.textContent = 'SCAN FAILED.'; this.actionArea.onclick = () => this.fileInput.click(); this.actionArea.style.cursor = 'pointer'; }
            }
            save() { return this.data; }
        }

        class ComputeTool {
            static get toolbox() { return { title: 'Compute Logic', icon: ICONS.compute }; }
            constructor({data, config, readOnly}) { this.config = config; this.readOnly = readOnly; this.data = { code: data.code || '', output: data.output || '' }; this.wrapper = createEl('div', 'compute-tool-container'); }
            render() {
                this.wrapper.innerHTML = '';
                this.input = createEl('textarea', 'compute-input', { placeholder: 'Type logic: 10 * 4 or groceries / 2...', value: this.data.code, readOnly: this.readOnly });
                this.output = createEl('div', 'compute-output', { innerHTML: this.data.output });
                const adjustHeight = () => { this.input.style.height = 'auto'; this.input.style.height = this.input.scrollHeight + 'px'; };
                setTimeout(adjustHeight, 0);

                let evalTimeout;
                this.input.oninput = e => { adjustHeight(); this.data.code = e.target.value; clearTimeout(evalTimeout); evalTimeout = setTimeout(() => this.evaluateLogic(), 400); };
                this.wrapper.append(this.input, this.output); return this.wrapper;
            }
            async evaluateLogic() {
                if (!this.data.code.trim()) { this.output.innerHTML = this.data.output = ''; fireChange(this.config); return; }
                const find = q => Object.values(appDB.cache).flatMap(d => d.blocks?.filter(b => b.type !== 'compute' && b.type !== 'recall' && b.type !== 'ai' && JSON.stringify(b.data).toLowerCase().includes(q.toLowerCase())).flatMap(b => b.data.text ? b.data.text.replace(/<[^>]*>?/gm, '') : b.data.items ? b.data.items.map(i=>i.content.replace(/<[^>]*>?/gm, '')) : b.data.title || []) || []);
                const nums = q => find(q).flatMap(t => (t.match(/-?\d+(\.\d+)?/g) || []).map(Number));
                const sum = q => nums(q).reduce((a,b)=>a+b, 0);
                const avg = q => { const n = nums(q); return n.length ? sum(q)/n.length : 0; };
                const allowed = { Math, Date, Number, String, Array, sum, avg, nums, find };
                const ctx = new Proxy({}, { has: () => true, get: (t, p) => p === Symbol.unscopables ? undefined : (p in allowed ? allowed[p] : (typeof p === 'string' ? sum(p) : undefined)) });

                try {
                    const res = await new (Object.getPrototypeOf(async function(){}).constructor)('ctx', `with(ctx){return eval(${JSON.stringify(this.data.code)})}`)(ctx);
                    if (res == null || Number.isNaN(res)) this.output.innerHTML = this.data.output = '';
                    else {
                        this.data.output = Array.isArray(res) && res.length > 1 && res.every(n => typeof n === 'number' && !isNaN(n)) ? this.generateSparkline(res) : (typeof res === 'object' ? JSON.stringify(res) : String(res));
                        this.output.innerHTML = this.data.output; this.output.classList.remove('compute-error');
                    }
                } catch(e) { this.data.output = `<span class="compute-error">${e.message}</span>`; this.output.innerHTML = this.data.output; }
                fireChange(this.config);
            }
            generateSparkline(d) {
                const min = Math.min(...d), range = (Math.max(...d) - min) || 1, h = 40;
                const pts = d.map((v, i) => `${(i / (d.length - 1)) * 100},${h - ((v - min) / range) * h}`).join(' ');
                return `<div style="font-size:11px;color:var(--muted-text);margin-bottom:4px;">Array: [${d.join(', ')}]</div><svg viewBox="0 -5 100 50" style="width:100%;height:60px;overflow:visible;" preserveAspectRatio="none"><polyline fill="none" stroke="var(--text-color)" stroke-width="2" points="${pts}"></polyline><circle cx="100" cy="${h - ((d[d.length - 1] - min) / range) * h}" r="3" fill="#EF4444"></circle></svg>`;
            }
            save() { return this.data; }
        }

        class RecallTool {
            static get toolbox() { return { title: 'Recall', icon: ICONS.recall }; }
            constructor({data, config, api, readOnly}) { this.api = api; this.config = config; this.readOnly = readOnly; this.data = data?.recalled ? data : { recalled: false, sourceDate: null, sourceTime: null, sourceBlock: null }; this.wrapper = createEl('div'); }
            render() {
                this.wrapper.innerHTML = '';
                if (this.data.recalled) this.wrapper.appendChild(this.renderRecalledState());
                else if (!this.readOnly) this.wrapper.appendChild(this.renderSearchState());
                else this.wrapper.innerHTML = '<div style="color:var(--muted-text);font-size:13px;">Empty Recall Block</div>';
                return this.wrapper;
            }
            renderSearchState() {
                const searchWrapper = createEl('div', 'recall-search-wrapper');
                const input = createEl('input', 'recall-search-input', { type: 'text', placeholder: 'Search past notes...' });
                const dropdown = createEl('div', 'recall-dropdown');

                input.onfocus = async () => { if (activeEditor) appDB.cache[currentDateStr] = await activeEditor.save(); };
                
                let debounce;
                input.oninput = e => {
                    clearTimeout(debounce);
                    debounce = setTimeout(() => {
                        const q = e.target.value.toLowerCase().trim(); dropdown.innerHTML = '';
                        if (!q) return dropdown.classList.remove('active');
                        
                        let results = [];
                        Object.entries(appDB.cache).forEach(([date, d]) => d.blocks?.forEach(b => {
                            if (b.type === 'recall' || b.type === 'ai') return;
                            const text = `${b.type} ${b.data.text||''} ${b.data.title||''} ${(b.data.items||[]).map(i=>i.content||i.text).join(' ')}`.toLowerCase();
                            if (text.includes(q) || (q.includes('canvas') && b.type==='smartCanvas') || (q.includes('voice') && b.type==='voice')) results.push({ date, block: b, timestamp: d.timestamps?.[b.id] });
                        }));
                        
                        results.sort((a, b) => new Date(b.date) - new Date(a.date) || (b.timestamp || 0) - (a.timestamp || 0));
                        
                        if (results.length) {
                            results.forEach(res => {
                                const item = createEl('div', 'recall-result-item', {}, [
                                    createEl('div', 'recall-result-meta', {textContent: `${new Date(res.date + 'T00:00:00').toLocaleDateString()} ${res.timestamp ? new Date(res.timestamp).toLocaleTimeString() : ''}`}),
                                    createEl('div', 'recall-result-snippet', {textContent: (res.block.data.text || res.block.data.title || res.block.type).replace(/<[^>]*>?/gm, '').substring(0, 60)})
                                ]);
                                item.onclick = () => { this.data = { recalled: true, sourceDate: res.date, sourceTime: res.timestamp, sourceBlock: res.block }; this.render(); fireChange(this.config); };
                                dropdown.appendChild(item);
                            });
                        } else dropdown.appendChild(createEl('div', 'recall-result-item', {textContent: 'No matches found', style: 'color:var(--muted-text);cursor:default;'}));
                        dropdown.classList.add('active');
                    }, 300);
                };
                document.addEventListener('click', e => { if (!searchWrapper.contains(e.target)) dropdown.classList.remove('active'); });
                searchWrapper.append(createEl('div', 'recall-search-icon', {innerHTML: ICONS.search}), input, dropdown); 
                setTimeout(() => input.focus(), 50); return searchWrapper;
            }
            renderRecalledState() {
                const container = createEl('div', 'recalled-block', {}, [
                    createEl('div', 'recalled-orig-meta', {}, [createEl('div', '', {innerHTML: ICONS.recall}), createEl('span', '', {textContent: `Recalled from ${new Date(this.data.sourceDate + 'T00:00:00').toLocaleDateString()}`})])
                ]);
                const targetDef = window.EDITOR_TOOLS_CONFIG[this.data.sourceBlock.type];
                if (targetDef) {
                    try {
                        const node = new targetDef.class({ data: this.data.sourceBlock.data, readOnly: true, api: this.api, config: targetDef.config || {} }).render();
                        node.style.pointerEvents = this.data.sourceBlock.type === 'voice' ? 'auto' : 'none'; container.appendChild(node);
                    } catch (e) { container.appendChild(createEl('div', '', {textContent: 'Render error.'})); }
                }
                return container;
            }
            save() { return this.data; }
        }

        class SmartCanvasTool {
            static get toolbox() { return { title: 'Media Canvas', icon: ICONS.pen }; }
            constructor({data, config, api, readOnly}) {
                this.api = api; this.config = config; this.readOnly = readOnly;
                this.data = { mode: data.mode || null, title: data.title || '', lat: data.lat || 51.505, lng: data.lng || -0.09, zoom: data.zoom || 13, isLocked: !!data.isLocked, baseImage: data.baseImage || null, imgWidth: data.imgWidth || null, imgHeight: data.imgHeight || null, hasInitializedView: !!data.hasInitializedView, lines: data.lines || [], isDrawingActive: !!data.isDrawingActive };
                if (!this.data.title && !this.data.mode) this.data.title = `Canvas - ${new Date().toLocaleTimeString([], {hour: 'numeric', minute: '2-digit'})}`;
                this.wrapper = createEl('div'); this.relativeFrame = createEl('div', 'canvas-relative-frame'); this.controls = createEl('div', 'block-controls-stack');
                this.currentColor = '#EF4444'; this.lineLayers = []; this.currentPolyline = null; this.currentPoints = [];
            }
            render() {
                this.wrapper.innerHTML = ''; 
                if (!this.data.mode) {
                    if (this.readOnly) this.wrapper.innerHTML = '<div style="padding:24px;text-align:center;color:var(--muted-text);font-size:14px;">Blank Canvas</div>';
                    else this.renderSelector();
                } else {
                    this.titleInput = createEl('input', 'tool-title-input', { type: 'text', value: this.data.title, placeholder: 'Name canvas...', readOnly: this.readOnly });
                    this.titleInput.oninput = e => { this.data.title = e.target.value; fireChange(this.config); };
                    this.wrapper.appendChild(this.titleInput);
                    this.renderUniversalCanvas();
                    if (!this.readOnly) { this.buildControls(); this.relativeFrame.appendChild(this.controls); }
                    this.wrapper.appendChild(this.relativeFrame);
                }
                return this.wrapper;
            }
            renderSelector() {
                const setMode = mode => { this.data.mode = mode; this.data.isLocked = this.data.isDrawingActive = false; this.render(); fireChange(this.config); };
                const selector = createEl('div', 'smart-canvas-selector', {}, [
                    createEl('button', 'smart-canvas-option', {onclick: () => setMode('map')}, [createEl('div', '', {innerHTML: ICONS.map}), createEl('span', '', {textContent: 'Map'})]),
                    createEl('button', 'smart-canvas-option', {onclick: () => fileInput.click()}, [createEl('div', '', {innerHTML: ICONS.image}), createEl('span', '', {textContent: 'Photo'})]),
                    createEl('button', 'smart-canvas-option', {onclick: () => setMode('blank')}, [createEl('div', '', {innerHTML: ICONS.canvas}), createEl('span', '', {textContent: 'Blank'})])
                ]);
                const fileInput = createEl('input', '', { type: 'file', accept: 'image/*', style: 'display:none', onchange: e => {
                    const f = e.target.files[0]; if (!f) return;
                    const r = new FileReader(); r.onload = re => { 
                        const img = new Image(); img.onload = () => { this.data.baseImage = re.target.result; this.data.imgWidth = img.width; this.data.imgHeight = img.height; setMode('image'); }; img.src = re.target.result;
                    }; r.readAsDataURL(f);
                }});
                selector.appendChild(fileInput); this.wrapper.appendChild(selector);
            }
            buildControls() {
                this.lockBtn = createEl('button', 'canvas-action-btn', { innerHTML: this.data.isLocked ? ICONS.lock : ICONS.unlock, onclick: () => { this.data.isLocked = !this.data.isLocked; this.updateInteractions(); fireChange(this.config); }});
                this.colorPicker = createEl('input', '', { type: 'color', value: this.currentColor, style: 'position:absolute;opacity:0;width:0;height:0;pointer-events:none;', oninput: e => this.currentColor = e.target.value });
                this.drawBtn = createEl('button', `canvas-action-btn draw-btn ${this.data.isDrawingActive ? 'active' : ''}`, { innerHTML: ICONS.pen });
                this.drawBtn.ondblclick = e => { e.preventDefault(); this.colorPicker.click(); };
                this.drawBtn.onclick = e => { e.preventDefault(); if (this.wasLongPress) return this.wasLongPress = false; this.data.isDrawingActive = !this.data.isDrawingActive; this.drawBtn.classList.toggle('active', this.data.isDrawingActive); this.updateInteractions(); fireChange(this.config); };
                const press = e => { if (e.type === 'touchstart') e.stopPropagation(); this.wasLongPress = false; this.pressTimer = setTimeout(() => { this.wasLongPress = true; this.clearDrawing(); this.drawBtn.style.transform = 'scale(0.8)'; setTimeout(() => this.drawBtn.style.transform = '', 150); }, 600); };
                ['mousedown','touchstart'].forEach(evt => this.drawBtn.addEventListener(evt, press, {passive: true}));
                ['mouseup','mouseleave','touchend','touchcancel'].forEach(evt => this.drawBtn.addEventListener(evt, () => clearTimeout(this.pressTimer)));
                this.controls.append(this.lockBtn, this.drawBtn, this.colorPicker);
            }
            renderUniversalCanvas() {
                if (this.map) { this.map.remove(); this.map = null; }
                this.mediaContainer = createEl('div', 'leaflet-container'); this.relativeFrame.appendChild(this.mediaContainer);
                
                const ro = new ResizeObserver(() => {
                    ro.disconnect();
                    if (this.data.mode === 'map') {
                        this.map = L.map(this.mediaContainer, { zoomControl: false, attributionControl: false }).setView([this.data.lat, this.data.lng], this.data.zoom);
                        L.tileLayer(`https://{s}.basemaps.cartocdn.com/${isDark ? 'dark' : 'light'}_all/{z}/{x}/{y}{r}.png`, { maxZoom: 20 }).addTo(this.map);
                    } else {
                        this.map = L.map(this.mediaContainer, { crs: L.CRS.Simple, zoomControl: false, attributionControl: false, minZoom: -4 });
                        if (this.data.mode === 'image' && this.data.baseImage) {
                            const bounds = [[0, 0], [this.data.imgHeight || 600, this.data.imgWidth || 800]];
                            L.imageOverlay(this.data.baseImage, bounds).addTo(this.map);
                            if (!this.data.hasInitializedView && !this.readOnly) { this.map.fitBounds(bounds); this.data.hasInitializedView = true; fireChange(this.config); } 
                            else this.map.setView([this.data.lat, this.data.lng], this.data.zoom);
                        } else this.map.setView([this.data.lat || 0, this.data.lng || 0], this.data.zoom || 0);
                    }
                    this.renderExistingLines(); this.initDrawingTracker(); this.updateInteractions();
                    this.map.on('moveend', () => fireChange(this.config));
                });
                ro.observe(this.mediaContainer);
            }
            renderExistingLines() {
                this.lineLayers.forEach(l => this.map.removeLayer(l)); this.lineLayers = [];
                this.data.lines.forEach(l => this.lineLayers.push(L.polyline(l.points, { color: l.color, weight: l.weight, lineCap: 'round', lineJoin: 'round', smoothFactor: 1.5 }).addTo(this.map)));
            }
            initDrawingTracker() {
                if (this.readOnly) return; let isDown = false;
                this.mediaContainer.onpointerdown = e => {
                    if (!this.data.isDrawingActive) return; isDown = true; this.mediaContainer.setPointerCapture(e.pointerId);
                    this.currentPoints = [this.map.mouseEventToLatLng(e)];
                    this.currentPolyline = L.polyline(this.currentPoints, { color: this.currentColor, weight: 4, lineCap: 'round', lineJoin: 'round', smoothFactor: 1.5 }).addTo(this.map);
                };
                this.mediaContainer.onpointermove = e => { if (this.data.isDrawingActive && isDown && this.currentPolyline) { this.currentPoints.push(this.map.mouseEventToLatLng(e)); this.currentPolyline.setLatLngs(this.currentPoints); } };
                const end = () => {
                    if (!isDown) return; isDown = false; if (!this.currentPolyline || !this.data.isDrawingActive) return;
                    this.data.lines.push({ color: this.currentColor, weight: 4, points: this.currentPoints.map(p => [p.lat, p.lng]) });
                    this.lineLayers.push(this.currentPolyline); this.currentPolyline = null; this.currentPoints = []; fireChange(this.config);
                };
                this.mediaContainer.onpointerup = this.mediaContainer.onpointercancel = end;
            }
            clearDrawing() { this.lineLayers.forEach(l => this.map?.removeLayer(l)); this.lineLayers = this.data.lines = []; fireChange(this.config); }
            updateInteractions() {
                if (!this.map) return; this.mediaContainer.classList.remove('drawing-mode', 'locked-mode');
                const t = m => ['dragging','touchZoom','doubleClickZoom','scrollWheelZoom','boxZoom','keyboard','tap'].forEach(k => this.map[k]?.[m]());
                if (this.readOnly) { t('disable'); this.mediaContainer.classList.add('locked-mode'); if(this.lockBtn) this.lockBtn.style.display = 'none'; if(this.drawBtn) this.drawBtn.style.display = 'none'; return; }
                if (!this.data.isLocked) {
                    this.data.isDrawingActive = false; t('enable');
                    if (this.lockBtn) this.lockBtn.innerHTML = ICONS.unlock;
                    if (this.drawBtn) { this.drawBtn.style.display = 'none'; this.drawBtn.classList.remove('active'); }
                } else {
                    t('disable'); this.mediaContainer.classList.add('locked-mode');
                    if (this.lockBtn) this.lockBtn.innerHTML = ICONS.lock;
                    if (this.drawBtn) { this.drawBtn.style.display = 'flex'; if (this.data.isDrawingActive) { this.drawBtn.classList.add('active'); this.mediaContainer.classList.add('drawing-mode'); } else this.drawBtn.classList.remove('active'); }
                }
            }
            save() { if (this.map && this.data.mode) { const c = this.map.getCenter(); this.data.lat = c.lat; this.data.lng = c.lng; this.data.zoom = this.map.getZoom(); } return this.data; }
            destroy() { if (this.map) this.map.remove(); }
        }

        class CalendarTool {
            static get toolbox() { return { title: 'Calendar Event', icon: ICONS.calendar }; }
            constructor({data, config, readOnly}) {
                this.id = crypto.randomUUID(); this.config = config; this.readOnly = readOnly;
                this.data = { title: data.title || '', datetime: data.datetime || new Date().toISOString(), notified: data.notified || false };
                if (!this.data.notified && !this.readOnly && new Date(this.data.datetime) > new Date()) NotificationEngine.schedule(this.id, this.data.datetime, this.data.title);
                this.wrapper = createEl('div', 'calendar-tool-container'); 
            }
            render() {
                this.titleInput = createEl('input', 'cal-title', { type: 'text', placeholder: 'Event Name / Reminder...', value: this.data.title, readOnly: this.readOnly });
                if (this.readOnly) this.titleInput.style.pointerEvents = 'none';
                else this.titleInput.oninput = e => { this.data.title = e.target.value; NotificationEngine.schedule(this.id, this.data.datetime, this.data.title); fireChange(this.config); };

                const header = createEl('div', 'cal-header', {}, [createEl('div', '', { innerHTML: ICONS.calendar }), this.titleInput]);
                const d = new Date(this.data.datetime);
                this.displayTxt = createEl('span', 'cal-display-text', { textContent: `${d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' })} at ${d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })}` });
                const displayBtn = createEl('button', 'cal-display-btn', {}, [this.displayTxt]);
                
                if (!this.readOnly) {
                    displayBtn.appendChild(createEl('div', '', { innerHTML: ICONS.chevronDown }));
                    displayBtn.onclick = () => DatePicker.open(new Date(this.data.datetime), newDate => {
                        this.data.datetime = newDate.toISOString(); this.data.notified = false;
                        this.displayTxt.textContent = `${newDate.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' })} at ${newDate.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })}`;
                        NotificationEngine.schedule(this.id, this.data.datetime, this.data.title); fireChange(this.config);
                    }, { showTime: true, disablePast: true });
                } else displayBtn.style.cssText = 'cursor:default;border:none;background:transparent;padding:8px 0;';

                const exportBtn = createEl('button', 'cal-btn primary', { onclick: () => {
                    const start = new Date(this.data.datetime), f = dt => dt.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
                    const ics = `BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nDTSTART:${f(start)}\nDTEND:${f(new Date(start.getTime() + 36e5))}\nSUMMARY:${this.data.title || 'Note Event'}\nEND:VEVENT\nEND:VCALENDAR`;
                    Object.assign(document.createElement('a'), { href: URL.createObjectURL(new Blob([ics], { type: 'text/calendar' })), download: `${(this.data.title||'event').replace(/\s+/g, '_')}.ics` }).click();
                }}, [createEl('div', '', { innerHTML: ICONS.download }), document.createTextNode(' Add to Calendar')]);

                const actions = [exportBtn];
                if (!this.readOnly) {
                    const granted = window.Notification?.permission === 'granted';
                    this.notifyBtn = createEl('button', `cal-btn ${granted ? 'granted' : ''}`, { onclick: async () => {
                        if (!window.Notification) { this.notifyBtn.textContent = "Not Supported"; return; }
                        if (await Notification.requestPermission() === 'granted') { this.notifyBtn.innerHTML = ICONS.bell + ' On'; this.notifyBtn.classList.add('granted'); NotificationEngine.schedule(this.id, this.data.datetime, this.data.title); }
                    }}, [createEl('div', '', { innerHTML: ICONS.bell }), document.createTextNode(granted ? ' On' : ' Notify')]);
                    actions.push(this.notifyBtn);
                }
                this.wrapper.append(header, displayBtn, createEl('div', 'cal-actions', {}, actions)); return this.wrapper;
            }
            destroy() { NotificationEngine.cancel(this.id); }
            save() { return this.data; }
        }

        class VoiceMemo {
            static get toolbox() { return { title: 'Voice Memo', icon: ICONS.mic }; }
            constructor({data, config, readOnly}) {
                this.config = config; this.readOnly = readOnly; this.data = { url: data.url || null, title: data.title || '' };
                if (!this.data.title && !this.data.url) this.data.title = `Voice Memo - ${new Date().toLocaleTimeString([], {hour: 'numeric', minute: '2-digit'})}`;
                this.recorder = null; this.chunks = []; this.isPlaying = this.isRecording = false;
                this.nodes = { 
                    wrapper: createEl('div', 'voice-tool-container'), button: createEl('button', 'v-memo__btn', { onclick: () => this.handleAction() }), 
                    title: createEl('input', 'v-memo__title', { type: 'text', value: this.data.title, placeholder: 'Name memo...', readOnly: this.readOnly, oninput: e => { this.data.title = e.target.value; fireChange(this.config); }}), 
                    status: createEl('div', 'v-memo__status'), audio: createEl('audio', '', { style: 'display: none;', src: this.data.url || '' }) 
                };
            }
            render() {
                const update = () => this.updateUI();
                this.nodes.audio.onplay = () => { this.isPlaying = true; update(); };
                this.nodes.audio.onpause = this.nodes.audio.onended = () => { this.isPlaying = false; update(); };
                this.nodes.wrapper.append(this.nodes.button, this.nodes.title, this.nodes.status, this.nodes.audio); update(); return this.nodes.wrapper;
            }
            updateUI() {
                this.nodes.button.className = 'v-memo__btn'; 
                if (this.isPlaying) { this.nodes.button.innerHTML = ICONS.pause; this.nodes.status.innerText = 'Playing...'; this.nodes.button.classList.add('playing'); } 
                else if (this.data.url) { this.nodes.button.innerHTML = ICONS.play; this.nodes.status.innerText = 'Ready'; } 
                else if (this.isRecording) { this.nodes.button.innerHTML = ICONS.stop; this.nodes.status.innerText = 'Recording...'; this.nodes.button.classList.add('recording'); } 
                else if (this.readOnly) { this.nodes.button.style.display = 'none'; this.nodes.status.innerText = 'No audio'; }
                else { this.nodes.button.innerHTML = ICONS.mic; this.nodes.status.innerText = 'Record'; }
            }
            async handleAction() {
                if (this.readOnly && !this.data.url) return;
                if (this.data.url) this.isPlaying ? this.nodes.audio.pause() : this.nodes.audio.play();
                else if (this.isRecording) { this.recorder.stop(); this.isRecording = false; this.nodes.status.innerText = 'Processing...'; } 
                else {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        this.recorder = new MediaRecorder(stream); this.chunks = []; this.recorder.ondataavailable = e => this.chunks.push(e.data);
                        this.recorder.onstop = () => { const r = new FileReader(); r.onloadend = () => { this.data.url = r.result; this.nodes.audio.src = this.data.url; this.updateUI(); fireChange(this.config); }; r.readAsDataURL(new Blob(this.chunks, { type: 'audio/ogg; codecs=opus' })); stream.getTracks().forEach(t => t.stop()); };
                        this.recorder.start(); this.isRecording = true; this.updateUI();
                    } catch { this.nodes.status.innerText = 'Mic denied'; }
                }
            }
            destroy() { if (this.recorder?.state !== 'inactive') this.recorder?.stop(); this.recorder?.stream?.getTracks().forEach(t => t.stop()); this.nodes.audio.pause(); }
            save() { return this.data; }
        }

        // ============================================================================
        // CORE APP INITIALIZATION
        // ============================================================================
        let activeEditor = null, currentDateStr = getLocalYYYYMMDD(new Date()), timestamps = {}, updateRaf, saveTimeout;
        const todayStr = currentDateStr;

        const getDisplayDate = dStr => { const [y, m, d] = dStr.split('-'); const date = new Date(y, m - 1, d); return `${date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })}<br>${date.toLocaleDateString(undefined, { weekday: 'long' })}`; };
        document.getElementById('date-header').innerHTML = getDisplayDate(currentDateStr);

        window.EDITOR_TOOLS_CONFIG = {
            paragraph: { class: Paragraph, inlineToolbar: ['link', 'bold', 'italic'] },
            header: { class: Header, inlineToolbar: ['link', 'bold', 'italic'], config: { levels: [1, 2, 3], defaultLevel: 2 } },
            list: { class: NestedList, inlineToolbar: ['link', 'bold', 'italic'] },
            checklist: { class: Checklist, inlineToolbar: ['link', 'bold', 'italic'] },
            ai: { class: AITool, config: { onChange: scheduleSave } },
            scan: { class: ScanTool, config: { onChange: scheduleSave } },
            compute: { class: ComputeTool, config: { onChange: scheduleSave } },
            smartCanvas: { class: SmartCanvasTool, config: { onChange: scheduleSave } },
            calendar: { class: CalendarTool, config: { onChange: scheduleSave } },
            voice: { class: VoiceMemo, config: { onChange: scheduleSave } },
            recall: { class: RecallTool, config: { onChange: scheduleSave } }
        };

        document.getElementById('date-header').onclick = () => {
            const [y, m, d] = currentDateStr.split('-').map(Number);
            DatePicker.open(new Date(y, m - 1, d), sel => {
                const selStr = getLocalYYYYMMDD(sel);
                if (currentDateStr !== selStr) { currentDateStr = selStr; document.getElementById('date-header').innerHTML = getDisplayDate(selStr); initEditor(selStr); }
            }, { disableFuture: true, onlyNotes: true }); 
        };

        const domObserver = new MutationObserver(records => { 
            if (records.some(r => Array.from(r.addedNodes).some(n => n.classList?.contains('ce-block') && !n.querySelector('.ce-block-time')))) {
                cancelAnimationFrame(updateRaf); updateRaf = requestAnimationFrame(updateAllTimestamps); 
            }
        });

        function updateAllTimestamps() {
            document.querySelectorAll('.ce-block').forEach(block => {
                const id = block.getAttribute('data-id'); if (!id) return;
                let timeEl = block.querySelector('.ce-block-time');
                if (!timeEl) { timeEl = createEl('div', 'ce-block-time'); block.appendChild(timeEl); }
                if (timestamps[id]) timeEl.textContent = new Date(timestamps[id]).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
                else if (currentDateStr === todayStr && activeEditor && !activeEditor.readOnly) {
                    timestamps[id] = Date.now(); timeEl.textContent = new Date(timestamps[id]).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
                    scheduleSave(); 
                }
            });
        }

        function scheduleSave() {
            if (activeEditor && !activeEditor.readOnly) {
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(async () => { const data = await activeEditor.save(); data.timestamps = timestamps; appDB.save(currentDateStr, data); }, 500);
            }
        }

        async function initEditor(date) {
            if (activeEditor) { domObserver.disconnect(); await activeEditor.destroy(); activeEditor = null; }
            
            const isToday = date === todayStr;
            let savedData = appDB.cache[date] || { blocks: [] };
            if (isToday && !savedData.blocks?.length) savedData = { blocks: [{ type: "paragraph", data: { text: `Type '/' for commands or start writing...` } }] };

            timestamps = savedData.timestamps || {};
            document.getElementById('editorjs').innerHTML = '';

            activeEditor = new EditorJS({
                holder: 'editorjs',
                placeholder: isToday ? 'Type "/" for commands...' : 'No notes available for this day.',
                readOnly: !isToday, data: savedData, tools: window.EDITOR_TOOLS_CONFIG,
                onChange: () => { if (isToday) scheduleSave(); },
                onReady: () => { domObserver.observe(document.getElementById('editorjs'), { childList: true, subtree: true }); updateAllTimestamps(); }
            });
        }

        appDB.init().then(() => initEditor(currentDateStr)).catch(() => initEditor(currentDateStr));

    </script>
</body>
