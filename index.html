        class LeanStreamEditor {
            constructor(containerId) {
                this.container = document.getElementById(containerId);
                this.inlineMenu = document.getElementById('inline-menu');
                this.inlinePlus = document.getElementById('inline-plus');
                
                this.blocks = []; this.activeBlockId = null;

                this.inlinePlus.onmousedown = (e) => { e.preventDefault(); this.inlineMenu.classList.toggle('expanded'); };
                document.querySelectorAll('.inline-tool-btn').forEach(btn => {
                    btn.onmousedown = (e) => {
                        e.preventDefault(); if (window.currentDateStr !== todayStr) return;
                        const toolType = btn.getAttribute('data-insert');
                        
                        if (['h1', 'h2', 'h3'].includes(toolType)) {
                            // Convert active block in place
                            const activeBlock = this.blocks.find(b => b.id === this.activeBlockId);
                            if (activeBlock && ['text', 'h1', 'h2', 'h3'].includes(activeBlock.type)) {
                                this.replaceTextNodeType(activeBlock, toolType);
                            } else {
                                this.addBasicBlock(toolType, ''); // fallback
                            }
                        } else {
                            this.addToolBlock(toolType, {});
                        }
                        this.inlineMenu.classList.remove('expanded', 'visible');
                    };
                });
            }

            load(blocksData) {
                Array.from(this.container.children).forEach(child => { if (child.id !== 'inline-menu') this.container.removeChild(child); });
                this.blocks = []; this.inlineMenu.classList.remove('visible', 'expanded');

                if (!blocksData || blocksData.length === 0) {
                    this.addBasicBlock('text', '', 'user');
                } else {
                    blocksData.forEach(b => {
                        if (b.type === 'header') {
                            const level = b.data?.level || 2;
                            this.addBasicBlock(`h${level}`, b.data?.text || '', b.author || 'user', b.id, b.timestamp);
                        } else if (['paragraph', 'text', 'h1', 'h2', 'h3', 'list', 'checklist'].includes(b.type)) {
                            let textContent = b.data.text || '';
                            let typeToUse = b.type;
                            if (typeToUse === 'paragraph') typeToUse = 'text';
                            
                            if (b.type === 'list') { textContent = (b.data.items||[]).map(i => `• ${i.content||i.text}`).join('<br>'); typeToUse = 'text'; }
                            if (b.type === 'checklist') { textContent = (b.data.items||[]).map(i => `${i.checked ? '[x]' : '[ ]'} ${i.text}`).join('<br>'); typeToUse = 'text'; }
                            
                            this.addBasicBlock(typeToUse, textContent, b.author || 'user', b.id, b.timestamp);
                        } else {
                            this.addToolBlock(b.type, b.data, b.author || 'user', b.id, b.timestamp);
                        }
                    });
                }
                if (this.blocks.length === 0 || !['text', 'h1', 'h2', 'h3'].includes(this.blocks[this.blocks.length - 1].type)) this.addBasicBlock('text', '', 'user');
            }

            save() {
                return {
                    blocks: this.blocks.map(b => {
                        let data = b.data;
                        if (['text', 'h1', 'h2', 'h3'].includes(b.type)) data = { text: b.dom.querySelector('.text-content').innerHTML };
                        else if (b.instance && b.instance.save) data = b.instance.save();
                        return { id: b.id, type: b.type, data, author: b.author, timestamp: b.timestamp };
                    })
                };
            }

            insertBlockIntoDOMArray(blockObj) {
                let insertIndex = this.blocks.length;
                if (this.activeBlockId) {
                    const activeIndex = this.blocks.findIndex(b => b.id === this.activeBlockId);
                    if (activeIndex !== -1) insertIndex = activeIndex + 1; 
                }
                
                if (insertIndex >= this.blocks.length) {
                    this.container.appendChild(blockObj.dom); this.blocks.push(blockObj);
                } else {
                    this.container.insertBefore(blockObj.dom, this.blocks[insertIndex].dom); this.blocks.splice(insertIndex, 0, blockObj);
                }
                blockObj.dom.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            replaceTextNodeType(block, newType) {
                const div = block.dom;
                const oldContent = div.querySelector('.text-content');
                let tag = 'div';
                if (newType === 'h1') tag = 'h1'; else if (newType === 'h2') tag = 'h2'; else if (newType === 'h3') tag = 'h3';

                const newContent = document.createElement(tag); 
                newContent.className = `text-content ${newType === 'text' ? '' : newType}`;
                newContent.contentEditable = window.currentDateStr === todayStr; 
                newContent.dataset.placeholder = newType === 'text' ? "start writing..." : "Heading...";
                newContent.innerHTML = oldContent.innerHTML; // preserve existing text
                
                newContent.addEventListener('focus', () => { this.activeBlockId = block.id; this.updateInlineMenuPosition(div, newContent); });
                newContent.addEventListener('input', () => { this.checkMarkdownShortcuts(block, newContent); this.updateInlineMenuPosition(div, newContent); scheduleSave(); });
                newContent.addEventListener('blur', () => { setTimeout(() => { if (!this.container.contains(document.activeElement) && !this.inlineMenu.contains(document.activeElement)) { this.inlineMenu.classList.remove('visible', 'expanded'); } }, 100); });
                newContent.addEventListener('keydown', (e) => this.handleTextKeydown(e, block, newContent));

                div.replaceChild(newContent, oldContent);
                block.type = newType;
                newContent.focus();
                
                // Move cursor to end of text
                const range = document.createRange();
                const sel = window.getSelection();
                range.selectNodeContents(newContent);
                range.collapse(false);
                sel.removeAllRanges();
                sel.addRange(range);
            }

            checkMarkdownShortcuts(block, content) {
                if (block.type !== 'text') return;
                const text = content.innerText;
                if (text === '# ') { content.innerHTML = ''; this.replaceTextNodeType(block, 'h1'); }
                else if (text === '## ') { content.innerHTML = ''; this.replaceTextNodeType(block, 'h2'); }
                else if (text === '### ') { content.innerHTML = ''; this.replaceTextNodeType(block, 'h3'); }
            }

            addBasicBlock(type = 'text', html = '', author = 'user', id = crypto.randomUUID(), timestamp = Date.now()) {
                const block = { id, type, data: {text: html}, author, timestamp, dom: null };
                const div = document.createElement('div'); div.className = `stream-block author-${author}`; div.dataset.id = id;

                let tag = 'div';
                if (type === 'h1') tag = 'h1'; else if (type === 'h2') tag = 'h2'; else if (type === 'h3') tag = 'h3';

                const content = document.createElement(tag); 
                content.className = `text-content ${type === 'text' ? '' : type}`;
                content.contentEditable = window.currentDateStr === todayStr; 
                content.dataset.placeholder = author === 'user' ? (type==='text' ? "start writing..." : "Heading...") : "";
                content.innerHTML = html;
                
                content.addEventListener('focus', () => { this.activeBlockId = id; this.updateInlineMenuPosition(div, content); });
                content.addEventListener('input', () => { this.checkMarkdownShortcuts(block, content); this.updateInlineMenuPosition(div, content); scheduleSave(); });
                content.addEventListener('blur', () => { setTimeout(() => { if (!this.container.contains(document.activeElement) && !this.inlineMenu.contains(document.activeElement)) { this.inlineMenu.classList.remove('visible', 'expanded'); } }, 100); });
                content.addEventListener('keydown', (e) => this.handleTextKeydown(e, block, content));

                div.appendChild(content); block.dom = div; this.insertBlockIntoDOMArray(block); return block;
            }

            addToolBlock(type, data, author = 'user', id = crypto.randomUUID(), timestamp = Date.now()) {
                const ToolClass = TOOLS_MAP[type];
                if (!ToolClass) return null;

                const block = { id, type, data, author, timestamp, dom: null, instance: null };
                const instance = new ToolClass(data, window.currentDateStr !== todayStr, () => scheduleSave());
                block.instance = instance;
                
                // Unified stream-block wrapper
                const panel = document.createElement('div'); 
                panel.className = 'baritone-panel stream-block';
                panel.dataset.id = id;
                const header = document.createElement('div'); header.className = 'panel-header';
                
                const titleSpan = document.createElement('span'); titleSpan.textContent = `[ ${type} ]`;
                const controls = document.createElement('div'); controls.className = 'panel-controls';
                
                if (window.currentDateStr === todayStr) {
                    const upBtn = document.createElement('button'); upBtn.className = 'panel-ctrl-btn'; upBtn.innerHTML = '↑';
                    const downBtn = document.createElement('button'); downBtn.className = 'panel-ctrl-btn'; downBtn.innerHTML = '↓';
                    const delBtn = document.createElement('button'); delBtn.className = 'panel-ctrl-btn delete'; delBtn.innerHTML = '✕';
                    upBtn.onclick = () => this.moveBlock(id, -1); downBtn.onclick = () => this.moveBlock(id, 1); delBtn.onclick = () => this.deleteBlock(id);
                    controls.append(upBtn, downBtn, delBtn);
                }
                
                header.append(titleSpan, controls); 
                panel.append(header, instance.render());
                
                block.dom = panel; this.insertBlockIntoDOMArray(block);
                
                if (window.currentDateStr === todayStr) {
                    this.activeBlockId = id; const textBlock = this.addBasicBlock('text', '', 'user');
                    setTimeout(() => textBlock.dom.querySelector('.text-content').focus(), 50);
                }
                scheduleSave(); return block;
            }

            moveBlock(id, direction) {
                const idx = this.blocks.findIndex(b => b.id === id); if (idx === -1) return;
                if (direction === -1 && idx > 0) {
                    const prev = this.blocks[idx - 1]; this.container.insertBefore(this.blocks[idx].dom, prev.dom);
                    [this.blocks[idx - 1], this.blocks[idx]] = [this.blocks[idx], this.blocks[idx - 1]]; scheduleSave();
                } else if (direction === 1 && idx < this.blocks.length - 1) {
                    const next = this.blocks[idx + 1]; this.container.insertBefore(next.dom, this.blocks[idx].dom); 
                    [this.blocks[idx + 1], this.blocks[idx]] = [this.blocks[idx], this.blocks[idx + 1]]; scheduleSave();
                }
            }

            deleteBlock(id) {
                const idx = this.blocks.findIndex(b => b.id === id); if (idx === -1) return;
                this.container.removeChild(this.blocks[idx].dom); this.blocks.splice(idx, 1);
                if (this.blocks.length === 0) this.addBasicBlock('text', '', 'user'); scheduleSave();
            }

            updateInlineMenuPosition(blockDiv, contentNode) {
                if (window.currentDateStr !== todayStr) return;
                const isEmpty = contentNode.innerText.trim() === '';
                if (isEmpty) {
                    this.inlineMenu.style.top = `${blockDiv.offsetTop}px`; this.inlineMenu.classList.add('visible');
                } else { this.inlineMenu.classList.remove('visible', 'expanded'); }
            }

            handleTextKeydown(e, block, content) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    const textContent = content.innerText; const lines = textContent.split('\n');
                    const lastLine = lines[lines.length - 1].trim(); const trigger = `@${CONFIG.AI_NAME} `;

                    if (lastLine.toLowerCase().startsWith(trigger.toLowerCase())) {
                        e.preventDefault(); const prompt = lastLine.substring(trigger.length).trim();
                        lines.pop(); content.innerHTML = lines.join('<br>') || '<br>';
                        this.triggerAI(prompt, block.id);
                    } else if (textContent.trim() !== '') {
                        const sel = window.getSelection();
                        if (sel.getRangeAt(0).endOffset >= content.innerText.length) {
                            e.preventDefault(); this.activeBlockId = block.id; 
                            const textBlock = this.addBasicBlock('text', '', 'user'); 
                            setTimeout(() => textBlock.dom.querySelector('.text-content').focus(), 10);
                        }
                    }
                }
                
                if (e.key === 'Backspace' && content.innerText.trim() === '' && this.blocks.length > 1) {
                    e.preventDefault(); const idx = this.blocks.findIndex(b => b.id === block.id);
                    if (idx > 0) {
                        this.deleteBlock(block.id); this.inlineMenu.classList.remove('visible', 'expanded'); 
                        for (let i = idx - 1; i >= 0; i--) {
                            if (['text', 'h1', 'h2', 'h3'].includes(this.blocks[i].type)) {
                                const prevContent = this.blocks[i].dom.querySelector('.text-content');
                                prevContent.focus(); this.activeBlockId = this.blocks[i].id;
                                const range = document.createRange(); const sel = window.getSelection();
                                range.selectNodeContents(prevContent); range.collapse(false);
                                sel.removeAllRanges(); sel.addRange(range); break;
                            }
                        }
                    }
                }
            }

            async triggerAI(prompt, sourceBlockId) {
                if (!aiEngine) return alert("AI offline.");
                this.activeBlockId = sourceBlockId;
                const aiBlock = this.addBasicBlock('text', "<em>analyzing context...</em>", "ai");
                const aiContentNode = aiBlock.dom.querySelector('.text-content');
                aiContentNode.contentEditable = false;
                
                aiStatusEl.className = 'neon-status ai-status loading';
                aiStatusEl.textContent = 'sys.ai.generating';

                try {
                    let docContext = this.blocks.map(b => ['text','h1','h2','h3'].includes(b.type) ? b.dom.innerText : `[${b.type}]`).join('\n');
                    
                    // Pull memory
                    let memoryContext = "";
                    try {
                        const hits = await vectorDB.search(prompt, { excludeDate: todayStr });
                        if(hits.length > 0) {
                            memoryContext = hits.map(h => {
                                const b = appDB.cache[h.date]?.blocks?.find(x => x.id === h.blockId);
                                return `[${h.date}] ${buildRecallSnippet(b)}`;
                            }).join('\n');
                        }
                    } catch(e) {}

                    const systemMsg = `${CONFIG.AI_PERSONALITY}\nContext:\n${docContext}\nMemories:\n${memoryContext || 'none'}`;
                    
                    const chunks = await aiEngine.chat.completions.create({
                        messages: [{ role: 'system', content: systemMsg }, { role: 'user', content: prompt }],
                        stream: true
                    });

                    let fullHtml = '';
                    for await (const chunk of chunks) {
                        const delta = chunk.choices[0]?.delta?.content || '';
                        fullHtml += delta.replace(/\n/g, '<br>');
                        aiContentNode.innerHTML = fullHtml;
                    }
                    aiContentNode.contentEditable = true; 
                    
                    this.activeBlockId = aiBlock.id;
                    const textBlock = this.addBasicBlock('text', '', 'user');
                    setTimeout(() => textBlock.dom.querySelector('.text-content').focus(), 50);

                    scheduleSave();
                } catch (e) { aiContentNode.innerHTML = "<em>error. connection lost.</em>"; } 
                finally {
                    aiStatusEl.className = 'neon-status ai-status';
                    aiStatusEl.textContent = 'sys.ai.online';
                }
            }
        }

        const editor = new LeanStreamEditor('lean-editor');

        // ============================================================================
        // APP LIFECYCLE & STORAGE SYNC
        // ============================================================================
        let saveTimeout;
        const saveIndicator = document.getElementById('save-indicator');

        function scheduleSave(immediate = false) {
            if (window.currentDateStr !== todayStr || appDB.isMemoryOnly) return;
            clearTimeout(saveTimeout);
            const doSave = () => {
                const data = editor.save();
                appDB.save(window.currentDateStr, data).then(() => {
                    saveIndicator.classList.add('visible');
                    setTimeout(() => saveIndicator.classList.remove('visible'), 1500);
                    vectorDB.scheduleIndexDay(window.currentDateStr, data);
                });
            };
            if(immediate) doSave(); else saveTimeout = setTimeout(doSave, 800);
        }

        function renderDateHeader() {
            const d = new Date(window.currentDateStr + 'T00:00:00');
            const str = d.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
            document.getElementById('date-header').textContent = str.toLowerCase();
        }

        async function loadDay(dateStr) {
            window.currentDateStr = dateStr;
            renderDateHeader();
            const data = appDB.cache[dateStr] || { blocks: [] };
            editor.load(data.blocks);
        }

        document.getElementById('date-header').onclick = () => {
            const [y, m, d] = window.currentDateStr.split('-');
            EditorialCalendar.open(new Date(y, m-1, d), false, (selectedDate) => {
                const selectedStr = getLocalYYYYMMDD(selectedDate);
                if (window.currentDateStr !== selectedStr) {
                    scheduleSave(true);
                    loadDay(selectedStr);
                }
            });
        };

        // Boot Pipeline
        Promise.all([appDB.init(), vectorDB.init(), mediaStore.init()]).then(() => { 
            loadDay(todayStr); 
            vectorDB.ensureBackfill(appDB.cache);
        });

    </script>
</body>
