<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Infinite Notes</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Notes">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#121212">

    <!-- Leaflet for Map Tool -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* --- Strict Pure Flat & Brutalist Theme --- */
        :root {
            --bg-color: #ffffff; --text-color: #000000; --border-color: #d0d0d0;
            --muted-bg: #f9f9f9; --muted-text: #666666;
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --safe-area-top: env(safe-area-inset-top, 0px);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212; --text-color: #ffffff; --border-color: #333333;
                --muted-bg: #1a1a1a; --muted-text: #aaaaaa;
            }
        }

        * { box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: var(--font-main); margin: 0; padding: 0; line-height: 1.6; overflow-x: hidden; }
        
        .app-container { max-width: 800px; width: 100%; margin: 0 auto; padding: calc(8vh + var(--safe-area-top)) 16px 50vh 16px; cursor: text; }
        
        ::-webkit-scrollbar { display: none; }
        ::selection { background: var(--text-color) !important; color: var(--bg-color); }
        
        svg:not(.leaflet-container svg) { flex-shrink: 0; width: 18px; height: 18px; }

        /* --- STYLISH BRUTALIST HEADER --- */
        #date-header { 
            text-align: left; font-size: clamp(48px, 16vw, 150px); font-weight: 900; 
            font-style: italic; text-transform: uppercase; letter-spacing: -0.06em; 
            line-height: 0.8; margin: 0 0 10px 0; cursor: pointer; user-select: none; 
            word-wrap: break-word; hyphens: auto; transition: color 0.1s;
        }
        #date-header:hover { color: var(--muted-text); }
        
        .header-status-row { display: flex; align-items: center; margin: 0 0 30px 0; user-select: none; font-size: 12px; font-weight: bold; letter-spacing: 0.5px; text-transform: uppercase; flex-wrap: wrap; gap: 12px; cursor: default; }
        .save-indicator { color: var(--muted-text); opacity: 0; transition: opacity 0.3s; }
        .save-indicator.visible { opacity: 1; }
        .storage-warning { color: #ef4444; display: none; border: 1px solid #ef4444; padding: 2px 6px; }
        .ai-indicator { color: var(--text-color); display: none; border: 1px solid var(--text-color); padding: 2px 6px; background: var(--bg-color); }

        /* --- NAVIGATION ACTIONS --- */
        .v-link { cursor: pointer; transition: all 0.1s; }
        .v-link:hover { color: var(--muted-text); }
        .persona-link { 
            background: var(--text-color); color: var(--bg-color); padding: 2px 6px; 
            font-weight: bold; font-family: monospace; text-transform: uppercase; 
            letter-spacing: 1px; border-radius: 0; text-decoration: none; 
            display: inline-block; user-select: none;
        }
        .persona-link:hover { opacity: 0.8; }

        /* --- PROTRUDING BLOCK FOOTER ARCHITECTURE --- */
        #editor-container { position: relative; width: 100%; min-height: 20vh; outline: none; display: flex; flex-direction: column; gap: 12px; cursor: default; }
        .block-wrapper { position: relative; padding: 0 0 16px 0; border-bottom: 1px solid transparent; transition: border-color 0.2s; cursor: text; }
        .block-wrapper:hover, .block-wrapper:focus-within { border-bottom-color: var(--border-color); }
        .block-wrapper.is-readonly { cursor: pointer; border-radius: 6px; transition: background-color 0.15s, border-color 0.15s; }
        .block-wrapper.is-readonly:hover { background-color: var(--muted-bg); border-bottom-color: transparent !important; }
        .block-wrapper.is-readonly:focus-within { border-bottom-color: transparent !important; }
        
        .block-content { flex-grow: 1; min-width: 0; outline: none; }
        .block-time { font-size: 10px; font-weight: bold; font-family: monospace; color: var(--muted-text); position: absolute; right: 0; top: 0; user-select: none; opacity: 0.5; }
        .block-time.v-link:hover { opacity: 1; color: var(--text-color); }

        /* --- GLOBAL FLAT UTILITIES --- */
        .flat-input { border: none; background: transparent; color: var(--text-color); font-family: inherit; font-size: 16px; width: 100%; outline: none; padding: 4px 0; }
        .flat-input::placeholder { color: var(--muted-text); opacity: 0.5; }
        .flat-btn { background: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-color); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 8px 12px; font-weight: bold; font-family: inherit; font-size: 13px; text-transform: uppercase; transition: all 0.1s; }
        .flat-btn:hover { background: var(--text-color); color: var(--bg-color); border-color: var(--text-color); }
        .flat-row { display: flex; align-items: center; gap: 12px; width: 100%; }

        /* --- NATIVE TEXT STYLES --- */
        .native-text-block { outline: none; line-height: 1.6; font-size: 16px; min-height: 24px; word-break: break-word; }
        .native-text-block[data-placeholder]:empty::before { content: attr(data-placeholder); color: var(--muted-text); pointer-events: none; }
        .native-header-1 { font-size: 2.2em; font-weight: 900; margin-top: 0.8em; text-transform: uppercase; letter-spacing: -1px; line-height: 1.1; }
        .native-header-2 { font-size: 1.5em; font-weight: bold; margin-top: 0.8em; border-bottom: 2px solid var(--text-color); padding-bottom: 4px; display: inline-block; line-height: 1.2; }
        .native-header-3 { font-size: 1.2em; font-weight: bold; margin-top: 0.8em; text-decoration: underline; line-height: 1.3; }
        .native-quote { border-left: 4px solid var(--text-color); padding-left: 14px; margin: 8px 0; font-style: italic; color: var(--muted-text); background: var(--muted-bg); padding-top: 8px; padding-bottom: 8px; }
        .native-table-wrapper { overflow-x: auto; margin: 8px 0; border: 1px solid var(--border-color); cursor: default; }
        .native-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .native-table td { border: 1px solid var(--border-color); padding: 8px; min-width: 80px; outline: none; vertical-align: top; cursor: text; }
        .native-table td:focus { background: var(--muted-bg); }
        .checklist-item, .list-item-row { display: flex; align-items: flex-start; gap: 12px; margin: 8px 0; }
        .checklist-checkbox { appearance: none; -webkit-appearance: none; width: 18px; height: 18px; border: 2px solid var(--text-color); background: transparent; cursor: pointer; margin-top: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .checklist-checkbox:checked::after { content: ''; width: 10px; height: 10px; background: var(--text-color); }
        .checklist-text.checked { text-decoration: line-through; opacity: 0.4; }
        .list-bullet { margin-top: 2px; font-weight: bold; font-size: 1.2em; line-height: 1; flex-shrink: 0; }

        /* --- WIDGET SLASH MENU SYSTEM --- */
        .slash-menu { position: absolute; z-index: 10000; background: var(--bg-color); border: 2px solid var(--text-color); box-shadow: 4px 4px 0 var(--text-color); padding: 0; display: none; flex-direction: column; width: 280px; max-width: calc(100vw - 32px); max-height: 320px; overflow-y: auto; cursor: default; }
        .slash-menu.active { display: flex; }
        .slash-item { display: flex; align-items: center; gap: 12px; padding: 12px; cursor: pointer; border-bottom: 1px solid var(--border-color); font-size: 12px; font-weight: bold; text-transform: uppercase; color: var(--text-color); transition: background 0.1s, color 0.1s; }
        .slash-item:last-child { border-bottom: none; }
        .slash-item.selected, .slash-item:hover { background: var(--text-color); color: var(--bg-color); }
        
        /* --- STANDARDIZED NON-TEXT WIDGET STYLES --- */
        .tool-box { border: 1px solid var(--border-color); background: var(--bg-color); margin: 8px 0; display: flex; flex-direction: column; overflow: hidden; cursor: default; }
        .tool-header { display: flex; align-items: center; padding: 8px 12px; border-bottom: 1px solid var(--border-color); background: var(--muted-bg); gap: 12px; }
        .tool-title-input { flex: 1; font-weight: bold; letter-spacing: 1px; padding: 4px; border: none; background: transparent; color: var(--text-color); font-family: inherit; font-size: 14px; outline: none; text-transform: uppercase; }
        .tool-title-input::placeholder { color: var(--muted-text); opacity: 0.5; }
        .tool-controls { display: flex; align-items: center; gap: 4px; }
        .tool-icon-btn { width: 30px; height: 30px; border: none; background: transparent; color: var(--text-color); cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 0; transition: background 0.1s; }
        .tool-icon-btn:hover { background: var(--border-color); }
        .tool-icon-btn.active { background: var(--text-color) !important; color: var(--bg-color) !important; }

        /* --- SPECIFIC TOOL OVERRIDES --- */
        .compute-code { font-family: monospace; font-weight: bold; border: none; }
        .compute-output { font-family: monospace; padding: 12px; background: var(--muted-bg); min-height: 30px; border-top: 1px dashed var(--border-color); }
        .recall-dropdown { display: none; border-top: 1px solid var(--text-color); max-height: 300px; overflow-y: auto; }
        .recall-dropdown.active { display: block; }
        .recall-item { padding: 12px; border-bottom: 1px solid var(--border-color); cursor: pointer; display: flex; flex-direction: column; gap: 4px;}
        .recall-item:hover { background: var(--text-color); color: var(--bg-color); }
        .sim-score { font-size: 9px; font-family: monospace; color: var(--muted-text); align-self: flex-end; }
        .recall-item:hover .sim-score { color: var(--bg-color); opacity: 0.8; }

        .leaflet-container { z-index: 1 !important; width: 100%; height: 400px; background: var(--bg-color) !important; touch-action: auto; cursor: crosshair; }

        .global-calendar-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s ease; padding: 16px; cursor: default; }
        .global-calendar-modal.show { display: flex; opacity: 1; }
        .cp-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 11px; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        .cp-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border-color); border: 1px solid var(--border-color); }
        .cp-day { background: var(--bg-color); padding: 12px 0; text-align: center; font-size: 14px; cursor: pointer; }
        .cp-day:hover:not(.muted) { background: var(--text-color); color: var(--bg-color); }
        .cp-day.active { background: var(--text-color); color: var(--bg-color); font-weight: bold; }
        .cp-day.muted { opacity: 0.3; pointer-events: none; }
    </style>
</head>
<body>

    <div class="app-container" id="app-wrapper">
        <div id="date-header"></div>
        <div class="header-status-row">
            <span id="storage-warning" class="storage-warning"></span>
            <span id="ai-status" class="ai-indicator">INIT MODEL...</span>
            <span id="save-indicator" class="save-indicator">SYNCED</span>
        </div>
        
        <div id="editor-container"></div>
        
        <!-- Slash & Tag Menus -->
        <div id="slash-menu" class="slash-menu"></div>
        <div id="tag-menu" class="slash-menu"></div>
    </div>

    <!-- Modals -->
    <div id="global-calendar-modal" class="global-calendar-modal">
        <div class="tool-box" style="width: 100%; max-width: 360px; box-shadow: 8px 8px 0 var(--text-color); border-color: var(--text-color); padding: 16px;" onclick="event.stopPropagation()">
            <div class="flat-row" style="justify-content: space-between; margin-bottom: 16px;">
                <button id="dp-prev" class="flat-btn" style="padding: 4px 12px;"><</button>
                <span id="dp-month-label" style="font-weight: bold; text-transform: uppercase;"></span>
                <button id="dp-next" class="flat-btn" style="padding: 4px 12px;">></button>
            </div>
            <div class="cp-weekdays"><span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span></div>
            <div id="dp-grid" class="cp-grid"></div>
            <div id="dp-time-section" style="margin-top: 16px; display: none;">
                <input type="time" id="dp-time-input" class="flat-input tool-box" style="padding: 8px;" required>
            </div>
            <div class="flat-row" style="margin-top: 16px;">
                <button id="dp-today-btn" class="flat-btn" style="flex: 1;">TODAY</button>
                <button id="dp-confirm-btn" class="flat-btn" style="flex: 1; background: var(--text-color); color: var(--bg-color);">CONFIRM</button>
            </div>
        </div>
    </div>

    <!-- Application Logic -->
    <script type="module">
        import { PGlite } from "https://cdn.jsdelivr.net/npm/@electric-sql/pglite@0.2.0/dist/index.js";
        import { vector } from "https://cdn.jsdelivr.net/npm/@electric-sql/pglite@0.2.0/dist/vector/index.js";
        import { pipeline, env } from "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/transformers.min.js";

        // Prevent transformers from trying to load local path files
        env.allowLocalModels = false;
        
        // ============================================================================
        // 🧠 LOCAL AI EMBEDDING ENGINE
        // ============================================================================
        let extractorPipeline = null;
        const aiIndicator = document.getElementById('ai-status');

        async function getExtractor() {
            if (!extractorPipeline) {
                aiIndicator.style.display = 'inline-block';
                aiIndicator.textContent = 'LOADING AI MODEL...';
                try {
                    extractorPipeline = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2');
                    aiIndicator.style.display = 'none';
                } catch (e) {
                    console.error("AI Model failed to load:", e);
                    aiIndicator.textContent = 'AI OFFLINE';
                    setTimeout(() => aiIndicator.style.display = 'none', 3000);
                    return null;
                }
            }
            return extractorPipeline;
        }

        async function generateEmbedding(text) {
            if (!text || text.trim() === '') return null;
            const fn = await getExtractor();
            if (!fn) return null;
            try {
                // Generate embeddings and mean pool them
                const output = await fn(text, { pooling: 'mean', normalize: true });
                return Array.from(output.data);
            } catch (e) {
                console.error("Embedding generation failed:", e);
                return null;
            }
        }


        // ============================================================================
        // ⚙️ APP CONFIGURATION & SVG ICONS
        // ============================================================================
        const ICONS = {
            mic: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>',
            stop: '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12"></rect></svg>',
            play: '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>',
            pause: '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>',
            image: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>',
            download: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>',
            lock: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>',
            unlock: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>',
            calendar: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>',
            bell: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>',
            canvas: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path></svg>',
            map: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon><line x1="9" y1="3" x2="9" y2="21"></line><line x1="15" y1="3" x2="15" y2="21"></line></svg>',
            pen: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>',
            search: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>',
            recall: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><polyline points="3 3 3 8 8 8"></polyline><polyline points="12 7 12 12 15 15"></polyline></svg>',
            scan: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h3"></path><path d="M20 7V4h-3"></path><path d="M4 17v3h3"></path><path d="M20 17v3h-3"></path><line x1="8" y1="12" x2="16" y2="12"></line></svg>',
            compute: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 14 10 14 13 8 18 8"></polyline><circle cx="20" cy="8" r="2"></circle><circle cx="2" cy="14" r="2"></circle></svg>'
        };

        function createEl(tag, classNames = '', attributes = {}, children = []) {
            const el = document.createElement(tag); if (classNames) el.className = classNames;
            for (const [k, v] of Object.entries(attributes)) { 
                if (k === 'innerHTML') el.innerHTML = v; 
                else if (k === 'textContent') el.textContent = v; 
                else if (k === 'style') el.style.cssText = v; 
                else if (k.startsWith('on') && typeof v === 'function') el[k] = v; 
                else el.setAttribute(k, v); 
            }
            children.forEach(c => c && el.append(c)); return el;
        }

        const NotificationEngine = {
            timers: new Map(),
            schedule: function(id, dt, title) {
                this.cancel(id); if (typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
                const delay = new Date(dt).getTime() - Date.now();
                if (delay > 0) this.timers.set(id, setTimeout(() => { new Notification('Note Reminder', { body: title || 'Scheduled Event' }); this.timers.delete(id); }, delay));
            },
            cancel: function(id) { if (this.timers.has(id)) { clearTimeout(this.timers.get(id)); this.timers.delete(id); } }
        };

        function getLocalYYYYMMDD(date) { return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`; }

        function extractBlockText(block) {
            let text = block.type + " ";
            if (block.data.text) text += block.data.text + " ";
            if (block.data.title) text += block.data.title + " ";
            if (block.data.items) text += block.data.items.map(i => i.content || i.text || '').join(' ') + " ";
            return text.replace(/<[^>]*>?/gm, ' ').trim();
        }

        // ============================================================================
        // 💾 PGLITE DATABASE ADAPTER (Relational Storage with pgvector)
        // ============================================================================
        class PGliteAdapter {
            constructor() { 
                this.db = null; 
                this.isMemoryOnly = false; 
                this.saveQueue = Promise.resolve(); 
            }
            
            async init() {
                try {
                    this.db = await PGlite.create({
                        dataDir: 'idb://infinite-notes-pglite',
                        extensions: { vector }
                    });
                    await this.setupSchema();
                } catch(e) { 
                    console.warn("PGlite IndexedDB persistence failed, falling back to Memory-only DB.", e);
                    await this.enableFallback(); 
                }
            }

            async enableFallback() {
                this.isMemoryOnly = true; 
                const warningEl = document.getElementById('storage-warning');
                warningEl.style.display = 'inline-block'; 
                warningEl.textContent = 'MEMORY DB ONLY (NO PERSISTENCE)';
                this.db = await PGlite.create({ extensions: { vector } }); 
                await this.setupSchema();
            }

            async setupSchema() {
                await this.db.exec(`
                    CREATE EXTENSION IF NOT EXISTS vector;
                    
                    CREATE TABLE IF NOT EXISTS pages (
                        id TEXT PRIMARY KEY,
                        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
                    );
                    
                    CREATE TABLE IF NOT EXISTS blocks (
                        id TEXT PRIMARY KEY,
                        page_id TEXT REFERENCES pages(id) ON DELETE CASCADE,
                        type TEXT NOT NULL,
                        content TEXT,
                        data JSONB,
                        position INTEGER,
                        created_at BIGINT,
                        embedding vector(384)
                    );
                    
                    CREATE INDEX IF NOT EXISTS idx_blocks_page_id ON blocks(page_id);
                `);
            }

            async savePage(pageId, blocks, timestamps) {
                if (!this.db) return;
                
                const existingData = await this.loadPage(pageId);
                const existingMap = new Map(existingData.blocks.map(b => [b.id, b]));

                // Prepare blocks and generate embeddings ONLY for modified content
                const blocksToSave = await Promise.all(blocks.map(async b => {
                    const contentText = extractBlockText(b);
                    const existing = existingMap.get(b.id);
                    
                    let emb = null;
                    if (existing && existing.content === contentText && existing.embedding) {
                        emb = existing.embedding; // Reuse
                    } else if (contentText.trim().length > 2) {
                        // Background generation
                        emb = await generateEmbedding(contentText);
                    }
                    return { ...b, content: contentText, embedding: emb };
                }));

                this.saveQueue = this.saveQueue.then(async () => {
                    try {
                        await this.db.query("BEGIN;");
                        await this.db.query(
                            "INSERT INTO pages (id, updated_at) VALUES ($1, CURRENT_TIMESTAMP) ON CONFLICT (id) DO UPDATE SET updated_at = CURRENT_TIMESTAMP;", 
                            [pageId]
                        );
                        await this.db.query("DELETE FROM blocks WHERE page_id = $1;", [pageId]);
                        
                        for (let i = 0; i < blocksToSave.length; i++) {
                            const b = blocksToSave[i];
                            const ts = timestamps[b.id] || Date.now();
                            const embStr = b.embedding ? JSON.stringify(b.embedding) : null;
                            
                            await this.db.query(
                                "INSERT INTO blocks (id, page_id, type, content, data, position, created_at, embedding) VALUES ($1, $2, $3, $4, $5, $6, $7, $8);",
                                [b.id, pageId, b.type, b.content, JSON.stringify(b.data), i, ts, embStr]
                            );
                        }
                        await this.db.query("COMMIT;");
                    } catch (e) {
                        await this.db.query("ROLLBACK;");
                        console.error("PGlite Save Error:", e);
                    }
                });
                return this.saveQueue;
            }

            async loadPage(pageId) {
                if (!this.db) return { blocks: [], timestamps: {} };
                try {
                    const res = await this.db.query("SELECT * FROM blocks WHERE page_id = $1 ORDER BY position ASC;", [pageId]);
                    const blocks = [];
                    const timestamps = {};
                    res.rows.forEach(row => {
                        blocks.push({ id: row.id, type: row.type, data: row.data, content: row.content, embedding: row.embedding });
                        if (row.created_at) timestamps[row.id] = Number(row.created_at);
                    });
                    return { blocks, timestamps };
                } catch (e) {
                    console.error("PGlite Load Error:", e);
                    return { blocks: [], timestamps: {} };
                }
            }
            
            async getAllPageIds() {
                if (!this.db) return new Set();
                try {
                    const res = await this.db.query("SELECT id FROM pages;");
                    return new Set(res.rows.map(r => r.id));
                } catch (e) {
                    return new Set();
                }
            }
        }

        function getCaretCoordinates() {
            const sel = window.getSelection();
            if (sel.rangeCount === 0) return null;
            const range = sel.getRangeAt(0).cloneRange();
            range.collapse(false);
            const rect = range.getBoundingClientRect();
            if (rect.width === 0 && rect.height === 0) {
                const span = document.createElement('span'); range.insertNode(span);
                const fallback = span.getBoundingClientRect(); span.parentNode.removeChild(span); return fallback;
            }
            return rect;
        }

        function saveSelection(containerEl) {
            const sel = window.getSelection();
            if (sel.rangeCount === 0) return null;
            const range = sel.getRangeAt(0);
            if (!containerEl.contains(range.startContainer)) return null;
            const preSelectionRange = range.cloneRange(); preSelectionRange.selectNodeContents(containerEl);
            preSelectionRange.setEnd(range.startContainer, range.startOffset);
            const start = preSelectionRange.toString().length;
            return { start: start, end: start + range.toString().length };
        }

        function restoreSelection(containerEl, savedSel) {
            if (!savedSel) return;
            let charIndex = 0, range = document.createRange(); range.setStart(containerEl, 0); range.collapse(true);
            let nodeStack = [containerEl], node, foundStart = false, stop = false;
            while (!stop && (node = nodeStack.pop())) {
                if (node.nodeType === 3) {
                    const nextCharIndex = charIndex + node.length;
                    if (!foundStart && savedSel.start >= charIndex && savedSel.start <= nextCharIndex) { range.setStart(node, savedSel.start - charIndex); foundStart = true; }
                    if (foundStart && savedSel.end >= charIndex && savedSel.end <= nextCharIndex) { range.setEnd(node, savedSel.end - charIndex); stop = true; }
                    charIndex = nextCharIndex;
                } else { let i = node.childNodes.length; while (i--) nodeStack.push(node.childNodes[i]); }
            }
            const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
        }

        async function getAllTags() {
            const tags = new Set();
            const regex = /(?:^|\s)(#[a-zA-Z0-9_]+(?:\.[a-zA-Z0-9_]+)*)/g;
            
            try {
                const res = await appDB.db.query("SELECT content FROM blocks WHERE content LIKE '%#%';");
                res.rows.forEach(row => {
                    let match; regex.lastIndex = 0; 
                    while ((match = regex.exec(row.content)) !== null) tags.add(match[1]);
                });
            } catch (e) { console.error(e); }

            const scanText = (text) => { let match; regex.lastIndex = 0; while ((match = regex.exec(text)) !== null) tags.add(match[1]); };
            if (window.editor) { window.editor.blocks.forEach(b => { if (b.instance && b.instance.el) scanText(b.instance.el.textContent || ''); else scanText(extractBlockText({ type: b.type, data: typeof b.instance.save === 'function' ? b.instance.save() : {} })); }); }
            
            return Array.from(tags).sort();
        }

        function linkifyTextNode(el) {
            if (!el) return false;
            const html = el.innerHTML;
            const temp = document.createElement('div'); temp.innerHTML = html;
            let changed = false;
            
            const walker = document.createTreeWalker(temp, NodeFilter.SHOW_TEXT, null, false);
            const nodesToReplace = [];
            
            while(walker.nextNode()) {
                const node = walker.currentNode;
                if (node.parentNode.closest('a.persona-link')) continue;
                if (/(^|\s)(#[a-zA-Z0-9_]+(?:\.[a-zA-Z0-9_]+)*)/g.test(node.nodeValue)) nodesToReplace.push(node);
            }
            
            nodesToReplace.forEach(node => {
                const span = document.createElement('span');
                span.innerHTML = node.nodeValue.replace(/(^|\s)(#[a-zA-Z0-9_]+(?:\.[a-zA-Z0-9_]+)*)/g, (match, space, tag) => {
                    return `${space}<a class="v-link persona-link" data-target="tag-${tag.replace('#', '').toLowerCase()}">${tag}</a>`;
                });
                const parent = node.parentNode;
                parent.replaceChild(span, node);
                while(span.firstChild) parent.insertBefore(span.firstChild, span);
                parent.removeChild(span);
                changed = true;
            });
            if (changed) el.innerHTML = temp.innerHTML;
            return changed;
        }

        function linkifyAndPreserveCaret(el) {
            const saved = saveSelection(el);
            const changed = linkifyTextNode(el);
            if (changed && saved) restoreSelection(el, saved);
            return changed;
        }

        async function handleTextInteraction(e, el, api, blockInstance) {
            if (e.type === 'input') {
                if (e.data === ' ' || (e.inputType === 'insertText' && e.data === ' ')) {
                    api.hideTagMenu();
                    if (linkifyAndPreserveCaret(el)) api.onChange();
                    return;
                }

                const sel = window.getSelection();
                if (sel.rangeCount > 0) {
                    const node = sel.focusNode;
                    if (node && node.nodeType === 3) {
                        const textBeforeCaret = node.nodeValue.substring(0, sel.focusOffset);
                        const match = textBeforeCaret.match(/(?:^|\s)(#[a-zA-Z0-9_.]+)$/);
                        
                        if (match) {
                            const query = match[1];
                            const rect = getCaretCoordinates() || el.getBoundingClientRect();
                            await api.showTagMenu(blockInstance, rect, query, (selectedTag) => {
                                node.nodeValue = textBeforeCaret.substring(0, textBeforeCaret.length - query.length) + selectedTag + ' ' + node.nodeValue.substring(sel.focusOffset);
                                const newOffset = textBeforeCaret.length - query.length + selectedTag.length + 1;
                                const newRange = document.createRange(); newRange.setStart(node, newOffset); newRange.collapse(true);
                                sel.removeAllRanges(); sel.addRange(newRange);
                                linkifyAndPreserveCaret(el); api.onChange();
                            });
                        } else {
                            api.hideTagMenu();
                        }
                    }
                }
            }
        }

        function handleTagMenuKeydown(e, api) {
            if (api.isTagMenuVisible()) {
                if (e.key === 'ArrowDown') { e.preventDefault(); api.tagNavigate(1); return true; }
                if (e.key === 'ArrowUp') { e.preventDefault(); api.tagNavigate(-1); return true; }
                if (e.key === 'Enter' || e.key === 'Tab') { e.preventDefault(); api.tagExecute(); return true; }
                if (e.key === 'Escape') { e.preventDefault(); api.hideTagMenu(); return true; }
            }
            return false;
        }

        document.addEventListener('click', (e) => {
            const link = e.target.closest('.v-link');
            if (link) { e.preventDefault(); const target = link.getAttribute('data-target'); if (target) window.loadVirtualPage(target); }
        });

        document.getElementById('app-wrapper').addEventListener('click', (e) => {
            if ((e.target.id === 'app-wrapper' || e.target.id === 'editor-container') && window.editor && !window.editor.readOnly) {
                const count = window.editor.blocks.length;
                if (count > 0) {
                    const lastBlock = window.editor.blocks[count - 1];
                    if (lastBlock.type === 'paragraph' && !lastBlock.instance.el.textContent.trim()) {
                        if (typeof lastBlock.instance.focus === 'function') lastBlock.instance.focus();
                    } else {
                        window.editor.insertBlock('paragraph', {}, count, true);
                    }
                }
            }
        });

        function moveCaretToEnd(el) { try { const range = document.createRange(); range.selectNodeContents(el); range.collapse(false); const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range); } catch(e) {} }

        // ============================================================================
        // NATIVE TEXT BLOCKS
        // ============================================================================
        function handleArrowNavigation(e, api, blockInstance, el) {
            if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                const sel = window.getSelection();
                if (sel.rangeCount > 0) {
                    const r = sel.getRangeAt(0).cloneRange();
                    r.selectNodeContents(el);
                    if (e.key === 'ArrowUp') r.setEnd(sel.getRangeAt(0).startContainer, sel.getRangeAt(0).startOffset);
                    else r.setStart(sel.getRangeAt(0).endContainer, sel.getRangeAt(0).endOffset);
                    
                    if (r.toString().length === 0) {
                        e.preventDefault();
                        if (e.key === 'ArrowUp') api.focusPrev(blockInstance);
                        if (e.key === 'ArrowDown') api.focusNext(blockInstance);
                    }
                }
            }
        }

        function handleTextBackspace(e, api, blockInstance, el, blockType) {
            if (e.key === 'Backspace') {
                const sel = window.getSelection();
                if (sel.rangeCount > 0) {
                    const r = sel.getRangeAt(0).cloneRange();
                    r.selectNodeContents(el);
                    r.setEnd(sel.getRangeAt(0).startContainer, sel.getRangeAt(0).startOffset);
                    if (r.toString().length === 0) {
                        e.preventDefault();
                        const idx = api.getIndex(blockInstance);
                        const isEmpty = el.textContent.replace(/[\u200B-\u200D\uFEFF\u00A0]/g, '').trim() === '';
                        
                        if (isEmpty) {
                            if (idx > 0) {
                                const prevBlock = api.getBlock(idx - 1);
                                if (prevBlock && !['paragraph', 'header', 'list', 'checklist', 'quote', 'table'].includes(prevBlock.type)) api.deleteBlock(idx - 1);
                                else { api.deleteBlock(idx); api.focus(idx - 1, true); }
                            } else if (blockType !== 'paragraph') { api.deleteBlock(0); api.insertBlock('paragraph', {}, 0, true); }
                        } else {
                            if (idx > 0) {
                                const prevBlock = api.getBlock(idx - 1);
                                if (prevBlock && ['paragraph', 'header', 'quote'].includes(prevBlock.type)) {
                                    let prevHtml = prevBlock.instance.el.innerHTML;
                                    if (prevHtml.endsWith('<br>')) prevHtml = prevHtml.slice(0, -4);
                                    prevBlock.instance.el.innerHTML = prevHtml + el.innerHTML;
                                    api.deleteBlock(idx);
                                    prevBlock.instance.focus(true); 
                                } else api.focusPrev(blockInstance);
                            } else if (blockType !== 'paragraph') {
                                const currentHtml = el.innerHTML; api.deleteBlock(0);
                                const newP = api.insertBlock('paragraph', {text: currentHtml}, 0, false);
                                setTimeout(() => { newP.instance.focus(); }, 10);
                            }
                        }
                    }
                }
            }
        }

        function handleListKeydown(e, api, blockInstance, textEl, itemsArray, index, rebuildCallback) {
            if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                const sel = window.getSelection();
                if (sel.rangeCount > 0) {
                    const r = sel.getRangeAt(0).cloneRange();
                    r.selectNodeContents(textEl);
                    if (e.key === 'ArrowUp') r.setEnd(sel.getRangeAt(0).startContainer, sel.getRangeAt(0).startOffset);
                    else r.setStart(sel.getRangeAt(0).endContainer, sel.getRangeAt(0).endOffset);

                    if (r.toString().length === 0) {
                        e.preventDefault();
                        if (e.key === 'ArrowUp') {
                            if (index > 0) { const prevInput = blockInstance.wrapper.children[index - 1].querySelector('.checklist-text, .list-text'); prevInput.focus(); moveCaretToEnd(prevInput); } 
                            else { api.focusPrev(blockInstance); }
                        } else {
                            if (index < itemsArray.length - 1) { const nextInput = blockInstance.wrapper.children[index + 1].querySelector('.checklist-text, .list-text'); nextInput.focus(); } 
                            else { api.focusNext(blockInstance); }
                        }
                    }
                }
            }
            if (e.key === 'Backspace') {
                const sel = window.getSelection();
                if (sel.rangeCount > 0) {
                    const r = sel.getRangeAt(0).cloneRange(); r.selectNodeContents(textEl); r.setEnd(sel.getRangeAt(0).startContainer, sel.getRangeAt(0).startOffset);
                    if (r.toString().length === 0) {
                        e.preventDefault();
                        if (textEl.textContent.replace(/[\u200B-\u200D\uFEFF\u00A0]/g, '').trim() === '') {
                            if (itemsArray.length <= 1) { const idx = api.getIndex(blockInstance); if (idx > 0) { api.deleteBlock(idx); api.focus(idx - 1, true); } else { api.deleteBlock(0); api.insertBlock('paragraph', {}, 0, true); } } 
                            else { itemsArray.splice(index, 1); rebuildCallback(Math.max(0, index - 1)); }
                        } else {
                            if (index > 0) {
                                let cleanHtml = blockInstance.wrapper.children[index - 1].querySelector('.list-text, .checklist-text').innerHTML;
                                if (cleanHtml.endsWith('<br>')) cleanHtml = cleanHtml.slice(0, -4);
                                if (itemsArray[index - 1].hasOwnProperty('text')) itemsArray[index - 1].text = cleanHtml + textEl.innerHTML; 
                                if (itemsArray[index - 1].hasOwnProperty('content')) itemsArray[index - 1].content = cleanHtml + textEl.innerHTML; 
                                itemsArray.splice(index, 1); rebuildCallback(index - 1);
                            } else if (itemsArray.length === 1) {
                                const idx = api.getIndex(blockInstance); api.deleteBlock(idx); api.insertBlock('paragraph', {text: textEl.innerHTML}, idx, true);
                            }
                        }
                    }
                }
            }
        }

        class ParagraphBlock {
            constructor({ data, api, readOnly }) { this.data = data; this.api = api; this.readOnly = readOnly; }
            render() {
                this.el = createEl('div', 'native-text-block', { contentEditable: !this.readOnly, innerHTML: this.data.text || '', 'data-placeholder': "Type '/' for widgets, or use markdown..." });
                this.el.addEventListener('keydown', this.handleKeydown.bind(this));
                this.el.addEventListener('input', this.handleInput.bind(this));
                this.el.addEventListener('blur', () => { setTimeout(() => { this.api.hideSlashMenu(); this.api.hideTagMenu(); }, 150); if (linkifyTextNode(this.el)) this.api.onChange(); });
                return this.el;
            }
            handleInput(e) {
                handleTextInteraction(e, this.el, this.api, this);
                
                const rawText = this.el.textContent.replace(/[\u200B-\u200D\uFEFF]/g, '').replace(/\u00A0/g, ' ');
                const isTagPage = window.currentDateStr && window.currentDateStr.startsWith('tag-');
                
                if (rawText.startsWith('/')) { this.api.showSlashMenu(this, this.el.getBoundingClientRect(), rawText.slice(1).trim().toLowerCase()); this.api.onChange(); return; } 
                else this.api.hideSlashMenu();

                if (rawText === '# ') { if (!isTagPage) this.transformTo('header', { level: 1 }); return; }
                if (rawText === '## ') { if (!isTagPage) this.transformTo('header', { level: 2 }); return; }
                if (rawText === '### ') { if (!isTagPage) this.transformTo('header', { level: 3 }); return; }
                if (rawText === '- ' || rawText === '* ') { this.transformTo('list', { style: 'unordered' }); return; }
                if (rawText === '1. ') { this.transformTo('list', { style: 'ordered' }); return; }
                if (rawText === '[] ' || rawText === '[ ] ' || rawText === '- [ ] ' || rawText === '- [] ') { this.transformTo('checklist', {}); return; }
                if (rawText === '> ') { this.transformTo('quote', {}); return; }
                if (rawText === '| ') { this.transformTo('table', {}); return; }

                this.api.onChange();
            }
            transformTo(type, data) { const idx = this.api.getIndex(this); this.api.deleteBlock(idx); this.api.insertBlock(type, data, idx, true); }
            handleKeydown(e) {
                if (handleTagMenuKeydown(e, this.api)) return;
                
                if (this.api.isSlashMenuVisible()) {
                    if (e.key === 'ArrowDown') { e.preventDefault(); this.api.slashNavigate(1); return; }
                    if (e.key === 'ArrowUp') { e.preventDefault(); this.api.slashNavigate(-1); return; }
                    if (e.key === 'Enter') { e.preventDefault(); this.api.slashExecute(this); return; }
                    if (e.key === 'Escape') { e.preventDefault(); this.api.hideSlashMenu(); return; }
                }
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this.api.insertBlock('paragraph', {}, this.api.getIndex(this) + 1, true); return; }
                handleArrowNavigation(e, this.api, this, this.el); handleTextBackspace(e, this.api, this, this.el, 'paragraph');
            }
            focus(atEnd = false) { this.el.focus(); if (atEnd) moveCaretToEnd(this.el); }
            save() { return { text: this.el.innerHTML }; }
        }

        class HeaderBlock {
            constructor({ data, api, readOnly }) { this.data = data; this.api = api; this.readOnly = readOnly; this.level = data.level || 2; }
            render() {
                this.el = createEl('div', `native-text-block native-header-${this.level}`, { contentEditable: !this.readOnly, innerHTML: this.data.text || '', 'data-placeholder': `HEADING ${this.level}...` });
                this.el.addEventListener('keydown', (e) => {
                    if (handleTagMenuKeydown(e, this.api)) return;
                    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this.api.insertBlock('paragraph', {}, this.api.getIndex(this) + 1, true); return; }
                    handleArrowNavigation(e, this.api, this, this.el); handleTextBackspace(e, this.api, this, this.el, 'header');
                });
                this.el.addEventListener('input', (e) => { handleTextInteraction(e, this.el, this.api, this); this.api.onChange(); });
                this.el.addEventListener('blur', () => { setTimeout(() => this.api.hideTagMenu(), 150); if (linkifyTextNode(this.el)) this.api.onChange(); });
                return this.el;
            }
            focus(atEnd = false) { this.el.focus(); if (atEnd) moveCaretToEnd(this.el); }
            save() { return { text: this.el.innerHTML, level: this.level }; }
        }

        class QuoteBlock {
            constructor({ data, api, readOnly }) { this.data = data; this.api = api; this.readOnly = readOnly; }
            render() {
                this.el = createEl('blockquote', 'native-quote native-text-block', { contentEditable: !this.readOnly, innerHTML: this.data.text || '', 'data-placeholder': 'Quote...' });
                this.el.addEventListener('keydown', (e) => {
                    if (handleTagMenuKeydown(e, this.api)) return;
                    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this.api.insertBlock('paragraph', {}, this.api.getIndex(this) + 1, true); return; }
                    handleArrowNavigation(e, this.api, this, this.el); handleTextBackspace(e, this.api, this, this.el, 'quote');
                });
                this.el.addEventListener('input', (e) => { handleTextInteraction(e, this.el, this.api, this); this.api.onChange(); });
                this.el.addEventListener('blur', () => { setTimeout(() => this.api.hideTagMenu(), 150); if (linkifyTextNode(this.el)) this.api.onChange(); });
                return this.el;
            }
            focus(atEnd = false) { this.el.focus(); if (atEnd) moveCaretToEnd(this.el); }
            save() { return { text: this.el.innerHTML }; }
        }

        class TableBlock {
            constructor({ data, api, readOnly }) { this.data = data; this.api = api; this.readOnly = readOnly; this.rows = data.rows || [['', ''], ['', '']]; }
            render() {
                this.wrapper = createEl('div', 'native-table-wrapper'); this.table = createEl('table', 'native-table');
                this.renderRows(); this.wrapper.appendChild(this.table);

                if (!this.readOnly) {
                    this.wrapper.appendChild(createEl('div', 'table-controls', {style: 'display: flex; gap: 8px; padding: 4px; background: var(--muted-bg);'}, [
                        createEl('button', 'flat-btn', { textContent: '+ ROW', style: 'font-size: 10px; padding: 4px 8px;', onclick: () => { this.rows.push(new Array(this.rows[0].length).fill('')); this.renderRows(); this.api.onChange(); } }),

        class ScanTool extends BaseWidgetTool {
            getDefaultData(data) { return { title: data?.title || '', text: data?.text || '' }; }
            getPlaceholder() { return 'DOCUMENT TITLE...'; }
            constructor(args) { super(args); this.isScanning = false; this.scanProgress = ''; }
            
            render() { this.buildUI(); return this.wrapper; }
            buildUI() {
                this.wrapper.innerHTML = '';
                let controls = [];
                if (!this.readOnly) {
                    const rescanBtn = createEl('button', 'tool-icon-btn', { innerHTML: ICONS.scan });
                    const fileInput = createEl('input', '', { type: 'file', accept: 'image/*', capture: 'environment', style: 'display: none;' });
                    rescanBtn.onclick = () => fileInput.click();
                    fileInput.onchange = (e) => { this.handleScan(e.target.files[0]); e.target.value = ''; };
                    controls.push(rescanBtn, fileInput);
                }
                this.wrapper.appendChild(this.buildHeader(controls));

                const body = createEl('div', '', { style: 'display: flex; flex-direction: column; flex: 1;' });
                if (this.data.text) {
                    this.input = createEl('textarea', 'flat-input', { value: this.data.text, style: 'padding: 12px; resize: vertical; min-height: 100px;' });
                    if (this.readOnly) this.input.readOnly = true; 
                    else {
                        this.input.addEventListener('input', (e) => { this.data.text = e.target.value; this.adjustHeight(); this.api.onChange(); });
                        this.input.addEventListener('keydown', (e) => {
                            if (e.key === 'ArrowUp' && this.input.selectionStart === 0) { e.preventDefault(); this.api.focusPrev(this); }
                            if (e.key === 'ArrowDown' && this.input.selectionStart === this.input.value.length) { e.preventDefault(); this.api.focusNext(this); }
                        });
                    }
                    body.appendChild(this.input); setTimeout(() => this.adjustHeight(), 0);
                } else if (this.isScanning) {
                    body.style.padding = '24px'; body.style.textAlign = 'center';
                    body.appendChild(createEl('div', '', { textContent: 'SCANNING DOCUMENT...', style: 'font-weight: bold;' }));
                    this.statusEl = createEl('div', '', { textContent: this.scanProgress, style: 'font-size: 11px; margin-top: 8px; color: var(--muted-text);' });
                    body.appendChild(this.statusEl);
                } else if (!this.readOnly) {
                    body.style.padding = '24px'; body.style.cursor = 'pointer'; body.style.textAlign = 'center';
                    body.onclick = () => this.wrapper.querySelector('input[type="file"]').click();
                    body.append(createEl('div', '', {innerHTML: ICONS.scan, style: 'margin: 0 auto; width: 32px; height: 32px;'}), createEl('div', '', {textContent: 'TAP TO SCAN', style: 'font-weight: bold; margin-top: 8px; letter-spacing: 1px;'}));
                }
                this.wrapper.appendChild(body);
            }
            adjustHeight() { if (this.input) { this.input.style.height = 'auto'; this.input.style.height = (this.input.scrollHeight) + 'px'; } }
            async handleScan(file) {
                if (!file) return;
                this.isScanning = true; this.scanProgress = 'INIT OCR...'; this.buildUI();
                try {
                    if (typeof Tesseract === 'undefined') {
                        this.scanProgress = 'LOADING ENGINE...'; if (this.statusEl) this.statusEl.textContent = this.scanProgress;
                        await new Promise((res, rej) => { const s = document.createElement('script'); s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'; s.onload = res; s.onerror = rej; document.head.appendChild(s); });
                    }
                    const worker = await Tesseract.createWorker('eng', 1, { logger: m => { if(m.status === 'recognizing text') { this.scanProgress = `ANALYZING: ${Math.round(m.progress * 100)}%`; if (this.statusEl) this.statusEl.textContent = this.scanProgress; } } });
                    const { data: { text } } = await worker.recognize(file); await worker.terminate();
                    this.data.text = text.trim(); 
                } catch(e) { alert('Scan failed: ' + e.message); } 
                finally { this.isScanning = false; this.buildUI(); this.api.onChange(); }
            }
        }

        class ComputeTool extends BaseWidgetTool {
            getDefaultData(data) { return { title: data?.title || '', code: data?.code || '', output: data?.output || '' }; }
            getPlaceholder() { return 'LOGIC TITLE...'; }
            
            render() {
                this.wrapper.innerHTML = '';
                const iconContainer = createEl('div', '', { innerHTML: `<div style="padding: 4px; color: var(--muted-text); margin-right: 4px;">${ICONS.compute}</div>` });
                this.wrapper.appendChild(this.buildHeader([iconContainer]));
                
                this.input = createEl('textarea', 'flat-input compute-code', { placeholder: 'Type logic: await sum("groceries") * 0.2', value: this.data.code, style: 'padding: 12px; resize: vertical;' });
                if (this.readOnly) this.input.readOnly = true;
                this.output = createEl('div', 'compute-output', { innerHTML: this.data.output });
                
                const adjustHeight = () => { this.input.style.height = 'auto'; this.input.style.height = (this.input.scrollHeight) + 'px'; };
                setTimeout(adjustHeight, 0);

                let evalTimeout;
                this.input.addEventListener('input', (e) => { adjustHeight(); this.data.code = e.target.value; clearTimeout(evalTimeout); evalTimeout = setTimeout(() => this.evaluateLogic(), 400); });
                this.input.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowUp' && this.input.selectionStart === 0) { e.preventDefault(); this.api.focusPrev(this); }
                    if (e.key === 'ArrowDown' && this.input.selectionStart === this.input.value.length) { e.preventDefault(); this.api.focusNext(this); }
                });
                
                this.wrapper.append(this.input, this.output); return this.wrapper;
            }
            
            async evaluateLogic() {
                if (!this.data.code.trim()) { this.output.innerHTML = ''; this.data.output = ''; this.api.onChange(); return; }
                
                const find = async (query) => {
                    if (!appDB.db) return [];
                    const emb = await generateEmbedding(query);
                    if(!emb) return [];
                    
                    // Semantic search using pgvector cosine distance!
                    const res = await appDB.db.query(
                        "SELECT content FROM blocks WHERE type NOT IN ('compute', 'recall') AND embedding IS NOT NULL ORDER BY embedding <=> $1 LIMIT 10;", 
                        [JSON.stringify(emb)]
                    );
                    return res.rows.map(r => r.content);
                };
                const nums = async (query) => { 
                    let texts = await find(query); 
                    let numbers = []; 
                    texts.forEach(t => { 
                        let matches = t.match(/-?\d+(\.\d+)?/g); 
                        if (matches) numbers.push(...matches.map(Number)); 
                    }); 
                    return numbers; 
                };
                const sum = async (query) => { let n = await nums(query); return n.reduce((a,b)=>a+b, 0); };
                const avg = async (query) => { let n = await nums(query); return n.length ? (n.reduce((a,b)=>a+b, 0))/n.length : 0; };
                const allowed = { Math, Date, Number, String, Array, sum, avg, nums, find };
                const ctx = new Proxy({}, { has: () => true, get: (target, prop) => { if (prop === Symbol.unscopables) return undefined; if (prop in allowed) return allowed[prop]; if (typeof prop === 'string') return sum(prop.toLowerCase()); return undefined; } });

                try {
                    // Safe execution of user math script
                    const fn = new (Object.getPrototypeOf(async function(){}).constructor)('ctx', `with (ctx) { return eval(${JSON.stringify(this.data.code)}); }`);
                    const result = await fn(ctx);
                    if (result === undefined || result === null || Number.isNaN(result)) { this.output.innerHTML = ''; this.data.output = ''; } 
                    else if (Array.isArray(result) && result.length >= 2 && result.every(n => typeof n === 'number')) {
                        const min = Math.min(...result); const max = Math.max(...result); const range = (max - min) || 1;
                        const points = result.map((val, i) => `${(i / (result.length - 1)) * 100},${40 - ((val - min) / range) * 40}`).join(' ');
                        this.data.output = `<div style="font-size: 11px; margin-bottom: 8px;">ARRAY: [${result.join(', ')}]</div><svg viewBox="0 -5 100 50" style="width: 100%; height: 60px; overflow: visible;" preserveAspectRatio="none"><polyline fill="none" stroke="var(--text-color)" stroke-width="2" points="${points}"></polyline></svg>`;
                        this.output.innerHTML = this.data.output; 
                    } else { this.data.output = typeof result === 'object' ? JSON.stringify(result) : String(result); this.output.innerHTML = this.data.output; }
                } catch(e) { this.data.output = `<span style="color: #ef4444">${e.message}</span>`; this.output.innerHTML = this.data.output; }
                this.api.onChange();
            }
        }

        class VoiceMemo extends BaseWidgetTool {
            getDefaultData(data) { return { url: data?.url || null, title: data?.title || '' }; }
            getPlaceholder() { return 'MEMO TITLE...'; }
            constructor(args) {
                super(args);
                this.recorder = null; this.chunks = []; this.isPlaying = false; this.isRecording = false;
            }
            render() {
                this.wrapper.innerHTML = '';
                this.statusText = createEl('div', '', { style: 'font-size: 11px; font-weight: bold; color: var(--muted-text); margin-right: 8px; text-transform: uppercase;' });
                this.btn = createEl('button', 'tool-icon-btn');
                this.audio = createEl('audio', '', { style: 'display: none;', src: this.data.url || '' });
                
                this.audio.onplay = () => { this.isPlaying = true; this.updateUI(); }; 
                this.audio.onpause = () => { this.isPlaying = false; this.updateUI(); }; 
                this.audio.onended = () => { this.isPlaying = false; this.updateUI(); };
                this.btn.onclick = () => this.handleAction();
                
                this.wrapper.appendChild(this.buildHeader([this.statusText, this.btn, this.audio]));
                this.updateUI(); return this.wrapper;
            }
            updateUI() {
                this.btn.style.background = 'transparent'; this.btn.style.color = 'var(--text-color)';
                if (this.isPlaying) { this.btn.innerHTML = ICONS.pause; this.statusText.innerText = 'PLAYING'; this.btn.classList.add('active'); } 
                else if (this.data.url) { this.btn.innerHTML = ICONS.play; this.statusText.innerText = 'READY'; this.btn.classList.remove('active'); } 
                else if (this.isRecording) { this.btn.innerHTML = ICONS.stop; this.statusText.innerText = 'REC...'; this.btn.style.background = '#ef4444'; this.btn.style.color = '#ffffff'; } 
                else if (this.readOnly) { this.btn.style.display = 'none'; this.statusText.innerText = 'NO AUDIO'; }
                else { this.btn.innerHTML = ICONS.mic; this.statusText.innerText = 'RECORD'; this.btn.classList.remove('active'); }
            }
            async handleAction() {
                if (this.readOnly && !this.data.url) return;
                if (this.data.url) { this.isPlaying ? this.audio.pause() : this.audio.play(); } 
                else {
                    if (this.isRecording) { this.recorder.stop(); this.isRecording = false; this.statusText.innerText = 'PROC...'; } 
                    else {
                        try {
                            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                            this.recorder = new MediaRecorder(stream); this.chunks = []; this.recorder.ondataavailable = (e) => this.chunks.push(e.data);
                            this.recorder.onstop = () => { const reader = new FileReader(); reader.onloadend = () => { this.data.url = reader.result; this.audio.src = this.data.url; this.updateUI(); this.api.onChange(); }; reader.readAsDataURL(new Blob(this.chunks, { type: 'audio/webm' })); stream.getTracks().forEach(track => track.stop()); };
                            this.recorder.start(); this.isRecording = true; this.updateUI();
                        } catch (err) { this.statusText.innerText = 'DENIED'; }
                    }
                }
            }
            destroy() { if (this.recorder && this.recorder.state !== 'inactive') this.recorder.stop(); if (this.recorder && this.recorder.stream) this.recorder.stream.getTracks().forEach(track => track.stop()); this.audio.pause(); }
        }

                const searchWrapper = createEl('div');
                const row = createEl('div', 'flat-row', {style: 'padding: 12px; gap: 8px;'});
                const input = createEl('input', 'flat-input', { type: 'text', placeholder: 'Recall from the past...' });
                const dropdown = createEl('div', 'recall-dropdown');

                let searchTimeout;
                input.addEventListener('input', (e) => {
                    clearTimeout(searchTimeout);
                    searchTimeout = setTimeout(async () => {
                        const query = e.target.value.trim(); dropdown.innerHTML = '';
                        if (!query || !appDB.db) { dropdown.classList.remove('active'); return; }
                        
                        dropdown.innerHTML = '<div class="recall-item" style="color: var(--muted-text);">Searching vectors...</div>';
                        dropdown.classList.add('active');

                        try {
                            const queryEmbedding = await generateEmbedding(query);
                            if (!queryEmbedding) { dropdown.innerHTML = '<div class="recall-item">Search failed.</div>'; return; }
                            
                            // Semantic Vector Search using pgvector's cosine distance operator (<=>)
                            const res = await appDB.db.query(
                                `SELECT page_id, id, type, data, created_at, content, 
                                 1 - (embedding <=> $1) AS similarity 
                                 FROM blocks 
                                 WHERE type != 'recall' AND embedding IS NOT NULL 
                                 ORDER BY embedding <=> $1 LIMIT 10;`,
                                [JSON.stringify(queryEmbedding)]
                            );

                            dropdown.innerHTML = '';
                            if (res.rows.length > 0) {
                                res.rows.forEach(row => {
                                    // Skip very low relevance returns
                                    if (row.similarity < 0.15) return; 
                                    
                                    const item = createEl('div', 'recall-item');
                                    let displayDate = row.page_id;
                                    if (/^\d{4}-\d{2}-\d{2}$/.test(row.page_id)) {
                                        displayDate = new Date(row.page_id + 'T00:00:00').toLocaleDateString(undefined, {month: 'short', day: 'numeric', year: 'numeric'});
                                    }
                                    
                                    let snippet = row.data.text || row.data.title || "📄 " + row.type.toUpperCase();
                                    
                                    item.appendChild(createEl('div', '', {textContent: `${displayDate}`, style: 'font-size: 10px; font-weight: bold;'}));
                                    item.appendChild(createEl('div', '', {textContent: snippet.substring(0, 80) + '...', style: 'font-size: 14px;'}));
                                    item.appendChild(createEl('div', 'sim-score', {textContent: `SIMILARITY: ${Math.round(row.similarity * 100)}%`}));
                                    
                                    item.onclick = () => { 
                                        this.data = { recalled: true, sourceDate: row.page_id, sourceTime: Number(row.created_at), sourceBlock: { id: row.id, type: row.type, data: row.data }, title: this.data.title }; 
                                        this.render(); this.api.onChange(); 
                                    };
                                    dropdown.appendChild(item);
                                });
                                if(dropdown.innerHTML === '') dropdown.appendChild(createEl('div', 'recall-item', {textContent: 'No highly relevant matches'}));
                            } else { dropdown.appendChild(createEl('div', 'recall-item', {textContent: 'No matches found'})); }
                        } catch (err) {
                            console.error("Recall Error:", err);
                        }
                    }, 400); // Debounce
                });
                
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowUp' && input.selectionStart === 0) { e.preventDefault(); this.api.focusPrev(this); }
                    if (e.key === 'ArrowDown' && input.selectionStart === input.value.length && !dropdown.classList.contains('active')) { e.preventDefault(); this.api.focusNext(this); }
                });

                row.append(createEl('div', '', {innerHTML: ICONS.search}), input); searchWrapper.append(row, dropdown); setTimeout(() => input.focus(), 50); return searchWrapper;
            }
            
            renderRecalledState() {
                const container = createEl('div');
                let displayDate = this.data.sourceDate;
                if (/^\d{4}-\d{2}-\d{2}$/.test(this.data.sourceDate)) {
                    displayDate = new Date(this.data.sourceDate + 'T00:00:00').toLocaleDateString(undefined, {month: 'short', day: 'numeric', year: 'numeric'});
                }
                const meta = createEl('div', 'flat-row', {style: 'padding: 8px 12px; background: var(--text-color); color: var(--bg-color); font-size: 10px; font-weight: bold;'});
                meta.appendChild(createEl('div', '', {innerHTML: ICONS.recall, style: 'color: var(--bg-color);'})); meta.appendChild(createEl('span', '', {textContent: `RECALLED FROM ${displayDate}`})); container.appendChild(meta);

                const TargetClass = window.EDITOR_TOOLS[this.data.sourceBlock.type];
                if (TargetClass) {
                    try {
                        const instance = new TargetClass({ data: this.data.sourceBlock.data, readOnly: true, api: this.api });
                        const renderedNode = instance.render();
                        renderedNode.style.pointerEvents = this.data.sourceBlock.type === 'voice' ? 'auto' : 'none'; 
                        renderedNode.style.margin = '0'; renderedNode.style.border = 'none';
                        container.appendChild(renderedNode);
                    } catch (e) { container.appendChild(createEl('div', '', {textContent: 'Error rendering block.'})); }
                }
                return container;
            }
        }

        class BaseCanvasTool extends BaseWidgetTool {
            getDefaultData(data) { 
                return { title: data?.title || '', isLocked: data?.isLocked || false, lines: data?.lines || [], isDrawingActive: data?.isDrawingActive || false, ...this.getCanvasDefaultData(data) };
            }
            getCanvasDefaultData(data) { return {}; }
            getPlaceholder() { return 'CANVAS TITLE...'; }
            needsSetup() { return false; }
            renderSetup() { return null; }

            constructor(args) {
                super(args);
                this.currentColor = '#EF4444'; this.lineLayers = []; this.currentPolyline = null; this.currentPoints = [];
            }

            render() {
                this.wrapper.innerHTML = ''; 
                if (this.needsSetup()) {
                    if (this.readOnly) this.wrapper.innerHTML = '<div style="padding: 24px; text-align: center;">Empty Block</div>';
                    else this.renderSetup();
                    return this.wrapper;
                }

                let controls = [];
                if (!this.readOnly) {
                    this.colorPicker = createEl('input', '', { type: 'color', value: this.currentColor, style: 'width: 28px; height: 28px; border: none; padding: 0; background: transparent; cursor: pointer; display: none;' });
                    this.colorPicker.addEventListener('input', (e) => { this.currentColor = e.target.value; });
                    
                    this.drawBtn = createEl('button', 'tool-icon-btn', { innerHTML: ICONS.pen, style: 'display: none;' });
                    this.drawBtn.onclick = () => { 
                        this.data.isDrawingActive = !this.data.isDrawingActive; 
                        if (this.data.isDrawingActive) this.drawBtn.classList.add('active'); else this.drawBtn.classList.remove('active');
                        this.updateInteractions(); this.api.onChange(); 
                    };
                    
                    this.lockBtn = createEl('button', 'tool-icon-btn', { innerHTML: this.data.isLocked ? ICONS.lock : ICONS.unlock });
                    this.lockBtn.onclick = () => { this.data.isLocked = !this.data.isLocked; this.updateInteractions(); this.api.onChange(); };
                    controls.push(this.colorPicker, this.drawBtn, this.lockBtn);
                }
                
                this.wrapper.appendChild(this.buildHeader(controls)); 
                this.renderUniversalCanvas();
                return this.wrapper;
            }

            renderUniversalCanvas() {
                if (this.map) { this.map.remove(); this.map = null; }
                this.canvasWrapper = createEl('div', '', { style: 'position: relative; width: 100%; height: 400px;' });
                this.mediaContainer = createEl('div', 'leaflet-container', {style: 'width: 100%; height: 100%; display: block; z-index: 1; border: none;'}); 
                this.drawOverlay = createEl('div', '', {style: 'position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 1000; display: none; touch-action: none; cursor: crosshair;'});
                
                this.canvasWrapper.append(this.mediaContainer, this.drawOverlay);
                this.wrapper.appendChild(this.canvasWrapper);
                
                requestAnimationFrame(() => {
                    if (!this.mediaContainer.isConnected) return;
                    this.setupMap();
                    this.renderExistingLines(); this.initDrawingTracker(); this.updateInteractions();
                    this.map.on('moveend', () => this.api.onChange());
                    setTimeout(() => { if (this.map) this.map.invalidateSize(); }, 100);
                });
            }

            setupMap() {}

            renderExistingLines() {
                this.lineLayers.forEach(layer => this.map.removeLayer(layer)); this.lineLayers = [];
                this.data.lines.forEach(line => { this.lineLayers.push(L.polyline(line.points, { color: line.color, weight: line.weight, lineCap: 'round', lineJoin: 'round', smoothFactor: 1.5 }).addTo(this.map)); });
            }

            initDrawingTracker() {
                if (this.readOnly || !this.map || !this.drawOverlay) return; 
                let isPointerDown = false;
                
                this.drawOverlay.addEventListener('pointerdown', (e) => {
                    if (!this.data.isDrawingActive || !this.data.isLocked) return; 
                    isPointerDown = true; this.drawOverlay.setPointerCapture(e.pointerId);
                    const rect = this.drawOverlay.getBoundingClientRect();
                    const latlng = this.map.containerPointToLatLng([e.clientX - rect.left, e.clientY - rect.top]);
                    this.currentPoints = [latlng];
                    this.currentPolyline = L.polyline(this.currentPoints, { color: this.currentColor, weight: 4, lineCap: 'round', lineJoin: 'round', smoothFactor: 1.5 }).addTo(this.map);
                });
                
                this.drawOverlay.addEventListener('pointermove', (e) => {
                    if (!this.data.isDrawingActive || !isPointerDown || !this.currentPolyline) return;
                    const rect = this.drawOverlay.getBoundingClientRect();
                    const latlng = this.map.containerPointToLatLng([e.clientX - rect.left, e.clientY - rect.top]);
                    this.currentPoints.push(latlng); this.currentPolyline.setLatLngs(this.currentPoints);
                });
                
                const endDraw = (e) => {
                    if (!isPointerDown) return; 
                    isPointerDown = false; this.drawOverlay.releasePointerCapture(e.pointerId);
                    if (!this.currentPolyline || !this.data.isDrawingActive) return;
                    this.data.lines.push({ color: this.currentColor, weight: 4, points: this.currentPoints.map(p => [p.lat, p.lng]) });
                    this.lineLayers.push(this.currentPolyline); this.currentPolyline = null; this.currentPoints = []; this.api.onChange();
                };
                
                this.drawOverlay.addEventListener('pointerup', endDraw); this.drawOverlay.addEventListener('pointercancel', endDraw);
            }

            updateInteractions() {
                if (!this.map) return;
                const disableAll = () => { this.map.dragging.disable(); this.map.touchZoom.disable(); this.map.doubleClickZoom.disable(); this.map.scrollWheelZoom.disable(); this.map.boxZoom.disable(); this.map.keyboard.disable(); if (this.map.tap) this.map.tap.disable(); };
                const enableAll = () => { this.map.dragging.enable(); this.map.touchZoom.enable(); this.map.doubleClickZoom.enable(); this.map.scrollWheelZoom.enable(); this.map.boxZoom.enable(); this.map.keyboard.enable(); if (this.map.tap) this.map.tap.enable(); };

                if (this.readOnly) { disableAll(); if (this.drawOverlay) this.drawOverlay.style.display = 'none'; return; }
                if (!this.data.isLocked) {
                    this.data.isDrawingActive = false; enableAll();
                    if (this.drawOverlay) this.drawOverlay.style.display = 'none';
                    if (this.lockBtn) this.lockBtn.innerHTML = ICONS.unlock;
                    if (this.drawBtn) { this.drawBtn.style.display = 'none'; this.colorPicker.style.display = 'none'; this.drawBtn.classList.remove('active'); }
                } else {
                    disableAll();
                    if (this.lockBtn) this.lockBtn.innerHTML = ICONS.lock;
                    if (this.drawBtn) { 
                        this.drawBtn.style.display = 'flex'; this.colorPicker.style.display = 'block'; 
                        if (this.data.isDrawingActive) { if (this.drawOverlay) this.drawOverlay.style.display = 'block'; this.drawBtn.classList.add('active'); } 
                        else { if (this.drawOverlay) this.drawOverlay.style.display = 'none'; this.drawBtn.classList.remove('active'); }
                    }
                }
            }

            save() { if (this.map) { const center = this.map.getCenter(); this.data.lat = center.lat; this.data.lng = center.lng; this.data.zoom = this.map.getZoom(); } return this.data; }
            destroy() { super.destroy(); if (this.map) { this.map.remove(); this.map = null; } }
        }

        class MapTool extends BaseCanvasTool {
            getCanvasDefaultData(data) { return { lat: data?.lat || 51.505, lng: data?.lng || -0.09, zoom: data?.zoom || 13 }; }
            getPlaceholder() { return 'MAP TITLE...'; }
            setupMap() {
                this.map = L.map(this.mediaContainer, { zoomControl: false, attributionControl: false }).setView([this.data.lat, this.data.lng], this.data.zoom);
                const tileUrl = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png' : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
                L.tileLayer(tileUrl, { maxZoom: 20 }).addTo(this.map);
            }
        }

        class BlankCanvasTool extends BaseCanvasTool {
            getCanvasDefaultData(data) { return { lat: data?.lat || 0, lng: data?.lng || 0, zoom: data?.zoom || 0 }; }
