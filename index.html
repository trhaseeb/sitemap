<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Infinite Notes</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Notes">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#121212">
    
    <!-- Dynamic Manifest Injection -->
    <link id="pwa-manifest" rel="manifest" href="">
    <link id="pwa-icon" rel="apple-touch-icon" href="">

    <!-- Leaflet for Map Tool -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* --- Strict Pure Flat & Brutalist Theme --- */
        :root {
            --bg-color: #ffffff; --text-color: #000000; --border-color: #d0d0d0;
            --muted-bg: #f9f9f9; --muted-text: #666666;
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --safe-area-top: env(safe-area-inset-top, 0px);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212; --text-color: #ffffff; --border-color: #333333;
                --muted-bg: #1a1a1a; --muted-text: #aaaaaa;
            }
        }

        * { box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: var(--font-main); margin: 0; padding: 0; line-height: 1.6; overflow-x: hidden; }
        
        /* Edge-to-edge layout with minimal safe padding */
        .app-container { max-width: 800px; width: 100%; margin: 0 auto; padding: calc(8vh + var(--safe-area-top)) 16px 50vh 16px; }
        
        ::-webkit-scrollbar { display: none; }
        ::selection { background: var(--text-color) !important; color: var(--bg-color); }
        svg { flex-shrink: 0; width: 18px; height: 18px; }

        /* --- STYLISH BRUTALIST HEADER --- */
        #date-header { 
            text-align: left; font-size: clamp(48px, 16vw, 150px); font-weight: 900; 
            font-style: italic; text-transform: uppercase; letter-spacing: -0.06em; 
            line-height: 0.8; margin: 0 0 10px 0; cursor: pointer; user-select: none; 
            word-wrap: break-word; hyphens: auto;
        }
        #date-header:hover { color: var(--muted-text); }
        
        .header-status-row { display: flex; align-items: center; margin: 0 0 30px 0; user-select: none; font-size: 12px; font-weight: bold; letter-spacing: 0.5px; text-transform: uppercase; }
        .ai-inline-status { color: #a855f7; margin-right: 12px; }
        #vector-status { color: #3b82f6; margin-right: 12px; }
        .ai-inline-status.loading { animation: pulse 2s infinite; }
        .ai-inline-status.error { color: #ef4444; }
        .save-indicator { color: var(--muted-text); opacity: 0; transition: opacity 0.3s; }
        .save-indicator.visible { opacity: 1; }
        .storage-warning { color: #ef4444; margin-left: 12px; display: none; }
        @keyframes pulse { 0%, 100% { opacity: 0.8; } 50% { opacity: 0.3; } }

        /* --- GLOBAL FLAT UTILITIES --- */
        .flat-input { border: none; background: transparent; color: var(--text-color); font-family: inherit; font-size: 16px; width: 100%; outline: none; padding: 4px 0; }
        .flat-input::placeholder { color: var(--muted-text); opacity: 0.5; }
        .flat-btn { background: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-color); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 8px 12px; font-weight: bold; font-family: inherit; font-size: 13px; text-transform: uppercase; transition: all 0.1s; }
        .flat-btn:hover { background: var(--text-color); color: var(--bg-color); border-color: var(--text-color); }
        .flat-row { display: flex; align-items: center; gap: 12px; width: 100%; }
        
        /* --- PROTRUDING BLOCK FOOTER ARCHITECTURE --- */
        #editor-container { position: relative; width: 100%; min-height: 50vh; outline: none; display: flex; flex-direction: column; gap: 12px; }
        
        .block-wrapper { position: relative; padding: 0 0 16px 0; border-bottom: 1px solid transparent; transition: border-color 0.2s; group: block; }
        .block-wrapper:hover, .block-wrapper:focus-within { border-bottom-color: var(--border-color); }
        
        .block-actions { position: absolute; bottom: -16px; right: 0; display: flex; background: var(--bg-color); border: 1px solid var(--text-color); z-index: 10; opacity: 0; transition: opacity 0.2s; box-shadow: 2px 2px 0 var(--text-color); }
        .block-wrapper:hover .block-actions, .block-wrapper:focus-within .block-actions { opacity: 1; }
        
        .action-btn { width: 30px; height: 30px; border: none; background: transparent; color: var(--text-color); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .action-btn:hover { background: var(--text-color); color: var(--bg-color); }
        .action-btn:not(:first-child) { border-left: 1px solid var(--text-color); }
        
        .block-content { flex-grow: 1; min-width: 0; outline: none; }
        .block-time { font-size: 10px; font-weight: bold; font-family: monospace; color: var(--muted-text); position: absolute; right: 0; top: 0; user-select: none; opacity: 0.5; }

        /* --- NATIVE TEXT STYLES --- */
        .native-text-block { outline: none; line-height: 1.6; font-size: 16px; min-height: 24px; word-break: break-word; }
        .native-text-block[data-placeholder]:empty::before { content: attr(data-placeholder); color: var(--muted-text); pointer-events: none; }
        .native-header-1 { font-size: 2.2em; font-weight: 900; margin-top: 0.8em; text-transform: uppercase; letter-spacing: -1px; line-height: 1.1; }
        .native-header-2 { font-size: 1.5em; font-weight: bold; margin-top: 0.8em; border-bottom: 2px solid var(--text-color); padding-bottom: 4px; display: inline-block; line-height: 1.2; }
        
        .checklist-item, .list-item-row { display: flex; align-items: flex-start; gap: 12px; margin: 8px 0; }
        .checklist-checkbox { appearance: none; -webkit-appearance: none; width: 18px; height: 18px; border: 2px solid var(--text-color); background: transparent; cursor: pointer; margin-top: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .checklist-checkbox:checked::after { content: ''; width: 10px; height: 10px; background: var(--text-color); }
        .checklist-text.checked { text-decoration: line-through; opacity: 0.4; }
        .list-bullet { margin-top: 2px; font-weight: bold; font-size: 1.2em; line-height: 1; flex-shrink: 0; }

        /* Block Type Menu Popover */
        .block-menu-popover { position: absolute; z-index: 10000; background: var(--bg-color); border: 1px solid var(--text-color); box-shadow: 4px 4px 0 var(--text-color); padding: 0; display: none; grid-template-columns: 1fr 1fr; width: 280px; max-width: calc(100vw - 32px); }
        .block-menu-popover.active { display: grid; }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 12px; cursor: pointer; border: 1px solid transparent; border-bottom: 1px solid var(--border-color); font-size: 12px; font-weight: bold; text-transform: uppercase; color: var(--text-color); }
        .menu-item:nth-child(odd) { border-right: 1px solid var(--border-color); }
        .menu-item:hover { background: var(--text-color); color: var(--bg-color); }
        
        /* --- STANDARDIZED NON-TEXT TOOL STYLES --- */
        .tool-box { border: 1px solid var(--border-color); background: var(--bg-color); margin: 8px 0; display: flex; flex-direction: column; overflow: hidden; }
        .tool-header { display: flex; align-items: center; padding: 8px 12px; border-bottom: 1px solid var(--border-color); background: var(--muted-bg); gap: 12px; }
        .tool-title-input { flex: 1; font-weight: bold; letter-spacing: 1px; padding: 4px; border: none; background: transparent; color: var(--text-color); font-family: inherit; font-size: 14px; outline: none; text-transform: uppercase; }
        .tool-title-input::placeholder { color: var(--muted-text); opacity: 0.5; }
        .tool-controls { display: flex; align-items: center; gap: 4px; }
        .tool-icon-btn { width: 30px; height: 30px; border: none; background: transparent; color: var(--text-color); cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 0; transition: background 0.1s; }
        .tool-icon-btn:hover { background: var(--border-color); }
        .tool-icon-btn.active { background: var(--text-color) !important; color: var(--bg-color) !important; }

        .ai-stream-wrapper { margin: 8px 0; padding-left: 12px; border-left: 4px solid #a855f7; }
        .ai-cursor { display: inline-block; width: 10px; height: 1em; background: #a855f7; animation: blink 1s step-end infinite; vertical-align: text-bottom; margin-left: 4px; }

        .compute-code { font-family: monospace; font-weight: bold; border: none; }
        .compute-output { font-family: monospace; padding: 12px; background: var(--muted-bg); min-height: 30px; border-top: 1px dashed var(--border-color); }
        
        .recall-dropdown { display: none; border-top: 1px solid var(--text-color); max-height: 250px; overflow-y: auto; }
        .recall-dropdown.active { display: block; }
        .recall-item { padding: 12px; border-bottom: 1px solid var(--border-color); cursor: pointer; }
        .recall-item:hover { background: var(--text-color); color: var(--bg-color); }

        .leaflet-container { z-index: 1 !important; width: 100%; height: 400px; background: var(--bg-color) !important; }
        .drawing-mode, .drawing-mode * { cursor: crosshair !important; touch-action: none !important; }

        .global-calendar-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s ease; padding: 16px; }
        .global-calendar-modal.show { display: flex; opacity: 1; }
        .cp-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 11px; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        .cp-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border-color); border: 1px solid var(--border-color); }
        .cp-day { background: var(--bg-color); padding: 12px 0; text-align: center; font-size: 14px; cursor: pointer; }
        .cp-day:hover:not(.muted) { background: var(--text-color); color: var(--bg-color); }
        .cp-day.active { background: var(--text-color); color: var(--bg-color); font-weight: bold; }
        .cp-day.muted { opacity: 0.3; pointer-events: none; }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="date-header"></div>
        <div class="header-status-row">
            <div id="ai-inline-status" class="ai-inline-status loading">Starting AI...</div>
            <div id="vector-status" class="ai-inline-status loading">VectorDB: Init</div>
            <span id="save-indicator" class="save-indicator">SYNCED</span>
            <span id="storage-warning" class="storage-warning">LOCAL ONLY</span>
        </div>
        
        <div id="editor-container"></div>
        <div id="block-menu" class="block-menu-popover"></div>
    </div>

    <!-- Modals -->
    <div id="global-calendar-modal" class="global-calendar-modal">
        <div class="tool-box" style="width: 100%; max-width: 360px; box-shadow: 8px 8px 0 var(--text-color); border-color: var(--text-color); padding: 16px;" onclick="event.stopPropagation()">
            <div class="flat-row" style="justify-content: space-between; margin-bottom: 16px;">
                <button id="dp-prev" class="flat-btn" style="padding: 4px 12px;"><</button>
                <span id="dp-month-label" style="font-weight: bold; text-transform: uppercase;"></span>
                <button id="dp-next" class="flat-btn" style="padding: 4px 12px;">></button>
            </div>
            <div class="cp-weekdays"><span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span></div>
            <div id="dp-grid" class="cp-grid"></div>
            <div id="dp-time-section" style="margin-top: 16px; display: none;">
                <input type="time" id="dp-time-input" class="flat-input tool-box" style="padding: 8px;" required>
            </div>
            <div class="flat-row" style="margin-top: 16px;">
                <button id="dp-today-btn" class="flat-btn" style="flex: 1;">TODAY</button>
                <button id="dp-confirm-btn" class="flat-btn" style="flex: 1; background: var(--text-color); color: var(--bg-color);">CONFIRM</button>
            </div>
        </div>
    </div>

    <script type="module">
        // ============================================================================
        // ⚙️ AI & APP CONFIGURATION
        // ============================================================================
        const CONFIG = {

            PWA_LOGO_URL: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzAwMDAwMCI+PHBhdGggZD0iTTE0IDJINmEyIDIgMCAwIDAtMiAydjE2YTIgMiAwIDAgMCAyIDJoMTJhMiAyIDAgMCAwIDItMlY4bC02LTZ6Ii8+PC9zdmc+"
        };

        const ICONS = {
            plus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>',

            unlock: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>',

            bell: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>',
            canvas: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path></svg>',
            map: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon><line x1="9" y1="3" x2="9" y2="21"></line><line x1="15" y1="3" x2="15" y2="21"></line></svg>',
            pen: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>',
            search: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>',

            scan: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h3"></path><path d="M20 7V4h-3"></path><path d="M4 17v3h3"></path><path d="M20 17v3h-3"></path><line x1="8" y1="12" x2="16" y2="12"></line></svg>',
            compute: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 14 10 14 13 8 18 8"></polyline><circle cx="20" cy="8" r="2"></circle><circle cx="2" cy="14" r="2"></circle></svg>'
        };

        function createEl(tag, classNames = '', attributes = {}, children = []) {
            const el = document.createElement(tag); if (classNames) el.className = classNames;
            for (const [k, v] of Object.entries(attributes)) { 
                if (k === 'innerHTML') el.innerHTML = v; 
                else if (k === 'textContent') el.textContent = v; 
                else if (k === 'style') el.style.cssText = v; 
                else el.setAttribute(k, v); 
            }
            children.forEach(c => c && el.append(c)); return el;
        }

        const NotificationEngine = {
            timers: new Map(),
            schedule: function(id, dt, title) {
                this.cancel(id); if (typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
                const delay = new Date(dt).getTime() - Date.now();
                if (delay > 0) this.timers.set(id, setTimeout(() => { new Notification('Note Reminder', { body: title || 'Scheduled Event' }); this.timers.delete(id); }, delay));
            },
            cancel: function(id) { if (this.timers.has(id)) { clearTimeout(this.timers.get(id)); this.timers.delete(id); } }
        };

        function getLocalYYYYMMDD(date) { return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`; }

        // ============================================================================
        // 💾 ASYNCHRONOUS STORAGE ADAPTER
        // ============================================================================
        class IndexedDBAdapter {
            constructor() { 
                this.dbName = 'InfiniteNotesDB'; this.storeName = 'daily_notes'; 
                this.cache = {}; this.isMemoryOnly = false; this.saveQueue = Promise.resolve(); 
            }
            init() {
                return new Promise((resolve) => {
                    try {
                        const req = indexedDB.open(this.dbName, 1);
                        req.onupgradeneeded = (e) => { if (!e.target.result.objectStoreNames.contains(this.storeName)) e.target.result.createObjectStore(this.storeName); };
                        req.onsuccess = (e) => { this.db = e.target.result; this.loadAll().then(data => { this.cache = data; resolve(); }); };
                        req.onerror = () => { this.enableFallback(resolve); };
                    } catch(e) { this.enableFallback(resolve); }
                });
            }
            enableFallback(resolve) { this.isMemoryOnly = true; document.getElementById('storage-warning').style.display = 'inline-block'; resolve(); }
            save(dateStr, data) {
                this.cache[dateStr] = data;
                if (this.isMemoryOnly || !this.db) return Promise.resolve();
                this.saveQueue = this.saveQueue.then(() => new Promise((res, rej) => {
                    const req = this.db.transaction(this.storeName, 'readwrite').objectStore(this.storeName).put(data, dateStr);
                    req.onsuccess = res; req.onerror = () => rej(req.error);
                })).catch(err => console.error("IDB Save Error:", err));
                return this.saveQueue;
            }
            loadAll() {
                return new Promise(resolve => {
                    if (this.isMemoryOnly || !this.db) return resolve({});
                    try {
                        const tx = this.db.transaction(this.storeName, 'readonly'); const store = tx.objectStore(this.storeName);
                        const valReq = store.getAll(); const keyReq = store.getAllKeys();
                        tx.oncomplete = () => { const result = {}; if (keyReq.result && valReq.result) keyReq.result.forEach((k, i) => result[k] = valReq.result[i]); resolve(result); };
                        tx.onerror = () => resolve({});
                    } catch(e) { resolve({}); }
                });
            }
        }
        let appDB = new IndexedDBAdapter();

        // ============================================================================
        // 🧠 LOCAL VECTOR DATABASE (Embeddings & Semantic Search)
        // ============================================================================
        let embedPipeline = null;
        let isEmbeddingLoading = false;
        const vectorStatusEl = document.getElementById('vector-status');

        async function initVectorDB() {
            if (embedPipeline || isEmbeddingLoading) return;
            isEmbeddingLoading = true;
            try {
                // Dynamically import the lightweight Transformers.js library
                const { pipeline, env } = await import("https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1");
                env.allowLocalModels = false; 
                env.useBrowserCache = true; // Automatically caches the 20MB model in browser IDB
                
                vectorStatusEl.textContent = 'VectorDB: Loading Model...';
                embedPipeline = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2', {
                    progress_callback: (x) => {
                        if(x.status === 'downloading') vectorStatusEl.textContent = `VectorDB: DL ${Math.round(x.progress||0)}%`;
                    }
                });
                vectorStatusEl.textContent = 'VectorDB: Active';
                vectorStatusEl.className = 'ai-inline-status';
            } catch (err) {
                vectorStatusEl.textContent = 'VectorDB: Offline';

        async function generateEmbedding(text) {
            if (!embedPipeline || !text) return null;
            try {
                const output = await embedPipeline(text, { pooling: 'mean', normalize: true });
                return Array.from(output.data);
            } catch (e) { return null; }
        }

        function cosineSimilarity(vecA, vecB) {
            let dotProduct = 0, normA = 0, normB = 0;
            for (let i = 0; i < vecA.length; i++) {
                dotProduct += vecA[i] * vecB[i];
                normA += vecA[i] * vecA[i];
                normB += vecB[i] * vecB[i];
            }
            if (normA === 0 || normB === 0) return 0;
            return dotProduct / (Math.sqrt(normA) * Math.sqrt(normB));
        }

        function getBlockText(block) {
            let text = block.type.toLowerCase() + " ";
            if (block.data.text) text += block.data.text + " ";
            if (block.data.title) text += block.data.title + " ";
            if (block.data.items) text += block.data.items.map(i => i.content || i.text).join(' ') + " ";
            return text.replace(/<[^>]*>?/gm, '').trim();
        }

                        if (vec) {

                            dbUpdated = true;
                        }
                    }

            }

        async function getDocumentContext(queryPrompt = null) {
            let context = "";
            
            // Vector RAG (Retrieval-Augmented Generation) 
            // If semantic search is loaded and a prompt was provided, grab the 15 most mathematically relevant past blocks
            if (embedPipeline && queryPrompt) {
                const queryVec = await generateEmbedding(queryPrompt);
                let allBlocks = [];
                Object.entries(appDB.cache).forEach(([dateStr, dayData]) => {
                    if (!dayData.blocks) return;
                    dayData.blocks.forEach(block => {
                        if (block.data._embedding) {
                            allBlocks.push({
                                date: dateStr,
                                type: block.type,
                                text: getBlockText(block),
                                score: cosineSimilarity(queryVec, block.data._embedding)
                            });
                        }
                    });
                });
                
                allBlocks.sort((a,b) => b.score - a.score);
                const topBlocks = allBlocks.slice(0, 15);
                
                context += "--- SEMANTIC RECALL (Relevant Past Notes) ---\n";
                topBlocks.forEach(b => {
                    if(b.score > 0.25) context += `[Date: ${b.date}] ${b.text}\n`;
                });
                context += "-------------------------------------------\n\n";
            }

            // Always append the CURRENT day's entire context
            if (window.editor) {
                context += "--- CURRENT DAY'S NOTES ---\n";
                const data = await window.editor.save();
                data.blocks.forEach(b => {
                    if (['paragraph', 'header', 'scan'].includes(b.type)) context += (b.data.text||'').replace(/<[^>]*>?/gm, '') + "\n";
                    if (['list', 'checklist'].includes(b.type)) context += (b.data.items||[]).map(i => "- " + (i.content||i.text||'').replace(/<[^>]*>?/gm, '')).join("\n") + "\n";
                    if (b.type === 'compute') context += `[Calculation: ${b.data.code} = ${b.data.output}]\n`;
                });
            }
            return context.trim();
        }

        class AIStreamBlock {
            constructor({data, api}) { this.api = api; this.prompt = data.prompt || ""; this.fullMarkdown = ""; this.wrapper = createEl('div', 'ai-stream-wrapper'); }
            render() {

                this.contentEl.appendChild(this.cursor); this.wrapper.appendChild(this.contentEl);
                setTimeout(() => this.generateResponse(), 50); return this.wrapper;

            focus() {}
            async generateResponse() {
                if (!aiEngine) { this.contentEl.textContent = "AI Engine offline."; return; }
                const sys = `You are ${CONFIG.AI_NAME}. ${CONFIG.AI_PERSONALITY}\nContext:\n${await getDocumentContext(this.prompt)}\nRules: Output markdown. Use '- [ ] task', '- task', or wrap math: [COMPUTE] 10*4 [/COMPUTE].`;
                try {
                    const chunks = await aiEngine.chat.completions.create({ messages: [{ role: "system", content: sys }, { role: "user", content: this.prompt }], stream: true });
                    this.contentEl.innerHTML = ''; 
                    for await (const chunk of chunks) { this.fullMarkdown += chunk.choices[0]?.delta?.content || ""; this.contentEl.textContent = this.fullMarkdown; this.contentEl.appendChild(this.cursor); }
                    this.cursor.remove(); this.replaceWithParsedBlocks();
                } catch (e) { this.contentEl.textContent = "Error: " + e.message; this.cursor.remove(); }
            }
            replaceWithParsedBlocks() {
                const blocksToInsert = [];
                this.fullMarkdown.split(/(?=\[COMPUTE\])|(?<=\[\/COMPUTE\])|\n\n/).forEach(section => {
                    const trimmed = section.trim(); if (!trimmed) return;
                    if (trimmed.startsWith('[COMPUTE]') && trimmed.endsWith('[/COMPUTE]')) { blocksToInsert.push({ type: 'compute', data: { code: trimmed.replace('[COMPUTE]', '').replace('[/COMPUTE]', '').trim() } }); return; }
                    const headerMatch = trimmed.match(/^(#{1,6})\s+(.*)/);
                    if (headerMatch) { blocksToInsert.push({ type: 'header', data: { text: headerMatch[2], level: Math.min(headerMatch[1].length, 3) } }); return; }
                    if (trimmed.match(/^-\s*\[[ xX]\]/)) { blocksToInsert.push({ type: 'checklist', data: { items: trimmed.split('\n').filter(l => l.trim()).map(line => ({ text: line.replace(/^-\s*\[[ xX]\]\s*/, '').trim(), checked: line.includes('[x]') || line.includes('[X]') })) } }); return; }
                    if (trimmed.startsWith('- ') || trimmed.startsWith('* ') || /^\d+\.\s/.test(trimmed)) { blocksToInsert.push({ type: 'list', data: { style: /^\d+\.\s/.test(trimmed) ? 'ordered' : 'unordered', items: trimmed.split('\n').filter(l => l.trim()).map(line => ({ content: line.replace(/^[-*]\s|^\d+\.\s/, '').trim() })) } }); return; }
                    blocksToInsert.push({ type: 'paragraph', data: { text: trimmed.replace(/\n/g, '<br>') } });
                });
                const currentIndex = this.api.getIndex(this); this.api.deleteBlock(currentIndex);
                blocksToInsert.forEach((block, idx) => { this.api.insertBlock(block.type, block.data, currentIndex + idx, false); });
                this.api.onChange();
            }
            save() { return { prompt: this.prompt, markdown: this.fullMarkdown }; }
        }

                            if (b.type === 'compute' || b.type === 'recall') return; 
                            let text = JSON.stringify(b.data).toLowerCase();
                            if (text.includes(q)) {
                                if (b.data.text) results.push(b.data.text.replace(/<[^>]*>?/gm, ''));
                                else if (b.data.items) results.push(...b.data.items.map(i=>i.content||i.text).join(' '));
                                else if (b.data.title) results.push(b.data.title);
                            }
                        });
                    }); return results;
                };
                const nums = (query) => { let texts = find(query); let numbers = []; texts.forEach(t => { let matches = t.match(/-?\d+(\.\d+)?/g); if (matches) numbers.push(...matches.map(Number)); }); return numbers; };
                const sum = (query) => nums(query).reduce((a,b)=>a+b, 0); const avg = (query) => { let n = nums(query); return n.length ? sum(query)/n.length : 0; };
                const allowed = { Math, Date, Number, String, Array, sum, avg, nums, find };
                const ctx = new Proxy({}, { has: () => true, get: (target, prop) => { if (prop === Symbol.unscopables) return undefined; if (prop in allowed) return allowed[prop]; if (typeof prop === 'string') return sum(prop.toLowerCase()); return undefined; } });

                try {
                    const fn = new (Object.getPrototypeOf(async function(){}).constructor)('ctx', `with (ctx) { return eval(${JSON.stringify(this.data.code)}); }`);
                    const result = await fn(ctx);
                    if (result === undefined || result === null || Number.isNaN(result)) { this.output.innerHTML = ''; this.data.output = ''; } 
                    else if (Array.isArray(result) && result.length >= 2 && result.every(n => typeof n === 'number')) {
                        const min = Math.min(...result); const max = Math.max(...result); const range = (max - min) || 1;
                        const points = result.map((val, i) => `${(i / (result.length - 1)) * 100},${40 - ((val - min) / range) * 40}`).join(' ');
                        this.data.output = `<div style="font-size: 11px; margin-bottom: 8px;">ARRAY: [${result.join(', ')}]</div><svg viewBox="0 -5 100 50" style="width: 100%; height: 60px; overflow: visible;" preserveAspectRatio="none"><polyline fill="none" stroke="var(--text-color)" stroke-width="2" points="${points}"></polyline></svg>`;
                        this.output.innerHTML = this.data.output; 
                    } else { this.data.output = typeof result === 'object' ? JSON.stringify(result) : String(result); this.output.innerHTML = this.data.output; }
                } catch(e) { this.data.output = `<span style="color: #ef4444">${e.message}</span>`; this.output.innerHTML = this.data.output; }
                this.api.onChange();
            }
            save() { return this.data; }
        }

                else {

                            this.recorder.start(); this.isRecording = true; this.updateUI();
                        } catch (err) { this.statusText.innerText = 'DENIED'; }
                    }
                }
            }
            destroy() { if (this.recorder && this.recorder.state !== 'inactive') this.recorder.stop(); if (this.recorder && this.recorder.stream) this.recorder.stream.getTracks().forEach(track => track.stop()); this.audio.pause(); }

        }

        class RecallTool {
            constructor({data, api, readOnly}) { 
                this.api = api; this.readOnly = readOnly; 
                this.data = data && data.recalled ? data : { recalled: false, sourceDate: null, sourceTime: null, sourceBlock: null, title: data?.title || '' }; 
                this.wrapper = createEl('div', 'tool-box'); 
            }
            render() {
                this.wrapper.innerHTML = '';
                const header = createEl('div', 'tool-header');
                this.titleInput = createEl('input', 'tool-title-input', { value: this.data.title || '', placeholder: 'RECALL TITLE...' });

                header.append(this.titleInput, createEl('div', 'tool-controls', { innerHTML: `<div style="padding: 4px; color: var(--muted-text);">${ICONS.recall}</div>` }));
                this.wrapper.appendChild(header);

                const body = createEl('div', '', { style: 'display: flex; flex-direction: column;' });
                if (this.data.recalled) { body.appendChild(this.renderRecalledState()); } 
                else if (!this.readOnly) { body.appendChild(this.renderSearchState()); } 
                else { body.innerHTML = '<div style="padding: 12px; color: var(--muted-text);">Empty Recall</div>'; }
                this.wrapper.appendChild(body);
                return this.wrapper;
            }
            focus() { if(this.titleInput) this.titleInput.focus(); }
            renderSearchState() {
                const searchWrapper = createEl('div');
                const row = createEl('div', 'flat-row', {style: 'padding: 12px; gap: 8px;'});
                const input = createEl('input', 'flat-input', { type: 'text', placeholder: 'Semantic Search your past notes...' });
                const dropdown = createEl('div', 'recall-dropdown');

                input.addEventListener('focus', async () => { if (window.editor) { appDB.cache[window.currentDateStr] = await window.editor.save(); } });
                
                let searchTimeout;
                input.addEventListener('input', (e) => {
                    clearTimeout(searchTimeout);
                    const query = e.target.value.toLowerCase().trim(); 
                    if (!query) { dropdown.innerHTML = ''; dropdown.classList.remove('active'); return; }
                    
                    searchTimeout = setTimeout(async () => {
                        dropdown.innerHTML = '';
                        dropdown.appendChild(createEl('div', 'recall-item', {textContent: 'Searching...', style: 'color: var(--muted-text); cursor: default;'}));
                        dropdown.classList.add('active');

                        let results = [];
                        const isSemantic = !!embedPipeline;
                        let queryVec = null;
                        
                        if (isSemantic) {
                            dropdown.firstChild.textContent = 'Semantic Search...';
                            queryVec = await generateEmbedding(query);
                        }

                        Object.entries(appDB.cache).forEach(([dateStr, dayData]) => {
                            if (!dayData.blocks) return;
                            dayData.blocks.forEach(block => {
                                if (block.type === 'recall') return; 
                                
                                if (isSemantic && queryVec && block.data._embedding) {
                                    const score = cosineSimilarity(queryVec, block.data._embedding);
                                    if (score > 0.25) { // Vector similarity threshold
                                        results.push({ date: dateStr, block: block, timestamp: dayData.timestamps?.[block.id], score: score });
                                    }
                                } else {
                                    // Fallback to text matching
                                    let searchableText = getBlockText(block).toLowerCase();
                                    if (searchableText.includes(query)) { 
                                        results.push({ date: dateStr, block: block, timestamp: dayData.timestamps?.[block.id], score: 1.0 }); 
                                    }
                                }
                            });
                        });
                        
                        // Sort by Semantic Score, then by Recency
                        results.sort((a, b) => { 
                            if (Math.abs(b.score - a.score) > 0.05) return b.score - a.score;
                            const dateDiff = new Date(b.date).getTime() - new Date(a.date).getTime(); 
                            if (dateDiff !== 0) return dateDiff; 
                            return (b.timestamp || 0) - (a.timestamp || 0); 
                        });

                        dropdown.innerHTML = '';
                        if (results.length > 0) {
                            results.slice(0, 10).forEach(res => {
                                const item = createEl('div', 'recall-item');
                                const displayDate = new Date(res.date + 'T00:00:00').toLocaleDateString(undefined, {month: 'short', day: 'numeric', year: 'numeric'});
                                let snippet = "📄 " + res.block.type.toUpperCase();
                                if (res.block.data.text) snippet = res.block.data.text.replace(/<[^>]*>?/gm, '');
                                else if (res.block.data.title) snippet = res.block.data.title;
                                else if (res.block.data.items) snippet = res.block.data.items.map(i=>i.content || i.text || '').join(', ').replace(/<[^>]*>?/gm, '');
                                
                                const matchType = res.score !== 1.0 ? `✨ ${Math.round(res.score * 100)}% Match` : 'Exact Match';

                                item.appendChild(createEl('div', 'flat-row', {style: 'justify-content: space-between;'}, [
                                    createEl('div', '', {textContent: `${displayDate}`, style: 'font-size: 10px; font-weight: bold;'}),
                                    createEl('div', '', {textContent: matchType, style: 'font-size: 10px; color: var(--muted-text);'})
                                ]));
                                item.appendChild(createEl('div', '', {textContent: snippet.substring(0, 50) + '...', style: 'font-size: 14px;'}));
                                item.onclick = () => { this.data = { recalled: true, sourceDate: res.date, sourceTime: res.timestamp, sourceBlock: res.block, title: this.data.title }; this.render(); this.api.onChange(); };
                                dropdown.appendChild(item);
                            });
                        } else { dropdown.appendChild(createEl('div', 'recall-item', {textContent: 'No matches found'})); }
                    }, 400); // Debounce to prevent lag while typing
                });

                row.append(createEl('div', '', {innerHTML: ICONS.search}), input); searchWrapper.append(row, dropdown); setTimeout(() => input.focus(), 50); return searchWrapper;
            }
            renderRecalledState() {
                const container = createEl('div');
                const displayDate = new Date(this.data.sourceDate + 'T00:00:00').toLocaleDateString(undefined, {month: 'short', day: 'numeric', year: 'numeric'});
                const meta = createEl('div', 'flat-row', {style: 'padding: 8px 12px; background: var(--text-color); color: var(--bg-color); font-size: 10px; font-weight: bold;'});
                meta.appendChild(createEl('div', '', {innerHTML: ICONS.recall, style: 'color: var(--bg-color);'})); meta.appendChild(createEl('span', '', {textContent: `RECALLED FROM ${displayDate}`})); container.appendChild(meta);

                const TargetClass = window.EDITOR_TOOLS[this.data.sourceBlock.type];
                if (TargetClass) {
                    try {
                        const instance = new TargetClass({ data: this.data.sourceBlock.data, readOnly: true, api: this.api });
                        const renderedNode = instance.render();
                        renderedNode.style.pointerEvents = this.data.sourceBlock.type === 'voice' ? 'auto' : 'none';

                    } catch (e) { container.appendChild(createEl('div', '', {textContent: 'Error rendering block.'})); }
                }
                return container;
            }
            save() { return this.data; }
        }

            renderUniversalCanvas() {

                this.mediaContainer = createEl('div', 'leaflet-container', {style: 'width: 100%; min-height: 400px; display: block; z-index: 1; border: none; touch-action: none;'}); 
                this.wrapper.appendChild(this.mediaContainer);
                
                requestAnimationFrame(() => {
                    if (!this.mediaContainer.isConnected) return;
                    if (this.data.mode === 'map') {
                        this.map = L.map(this.mediaContainer, { zoomControl: false, attributionControl: false }).setView([this.data.lat, this.data.lng], this.data.zoom);
                        const tileUrl = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png' : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
                        L.tileLayer(tileUrl, { maxZoom: 20 }).addTo(this.map);
                    } else {
                        this.map = L.map(this.mediaContainer, { crs: L.CRS.Simple, zoomControl: false, attributionControl: false, minZoom: -4 });
                        if (this.data.mode === 'image' && this.data.baseImage) {
                            const bounds = [[0, 0], [this.data.imgHeight || 600, this.data.imgWidth || 800]];
                            L.imageOverlay(this.data.baseImage, bounds).addTo(this.map);
                            if (!this.data.hasInitializedView && !this.readOnly) { this.map.fitBounds(bounds); this.data.hasInitializedView = true; this.api.onChange(); } 
                            else { this.map.setView([this.data.lat, this.data.lng], this.data.zoom); }
                        } else { this.map.setView([this.data.lat || 0, this.data.lng || 0], this.data.zoom || 0); }
                    }
                    this.renderExistingLines(); this.initDrawingTracker(); this.updateInteractions();
                    this.map.on('moveend', () => this.api.onChange());
                    
                    const ro = new ResizeObserver(() => { if (this.map) this.map.invalidateSize(); });
                    ro.observe(this.mediaContainer); this.resizeObserver = ro;

            renderExistingLines() {
                this.lineLayers.forEach(layer => this.map.removeLayer(layer)); this.lineLayers = [];

            }
            initDrawingTracker() {
                if (this.readOnly) return; let isPointerDown = false;
                
                this.mediaContainer.addEventListener('pointerdown', (e) => {
                    if (!this.data.isDrawingActive) return; 
                    isPointerDown = true; 
                    this.mediaContainer.setPointerCapture(e.pointerId);
                    this.currentPoints = [this.map.mouseEventToLatLng(e)];
                    this.currentPolyline = L.polyline(this.currentPoints, { color: this.currentColor, weight: 4, lineCap: 'round', lineJoin: 'round', smoothFactor: 1.5 }).addTo(this.map);

                const endDraw = () => {
                    if (!isPointerDown) return; 
                    isPointerDown = false; 
                    if (!this.currentPolyline || !this.data.isDrawingActive) return;
                    this.data.lines.push({ color: this.currentColor, weight: 4, points: this.currentPoints.map(p => [p.lat, p.lng]) });
                    this.lineLayers.push(this.currentPolyline); this.currentPolyline = null; this.currentPoints = []; this.api.onChange();
                };

                this.mediaContainer.addEventListener('pointerup', endDraw);
                this.mediaContainer.addEventListener('pointercancel', endDraw);
            }
            updateInteractions() {
                if (!this.map) return; this.mediaContainer.classList.remove('drawing-mode');
                const disableAll = () => { this.map.dragging.disable(); this.map.touchZoom.disable(); this.map.doubleClickZoom.disable(); this.map.scrollWheelZoom.disable(); this.map.boxZoom.disable(); this.map.keyboard.disable(); if (this.map.tap) this.map.tap.disable(); };
                const enableAll = () => { this.map.dragging.enable(); this.map.touchZoom.enable(); this.map.doubleClickZoom.enable(); this.map.scrollWheelZoom.enable(); this.map.boxZoom.enable(); this.map.keyboard.enable(); if (this.map.tap) this.map.tap.enable(); };

                if (this.readOnly) { disableAll(); return; }
                if (!this.data.isLocked) {
                    this.data.isDrawingActive = false; enableAll();
                    if (this.lockBtn) this.lockBtn.innerHTML = ICONS.unlock;
                    if (this.drawBtn) { this.drawBtn.style.display = 'none'; this.colorPicker.style.display = 'none'; this.drawBtn.classList.remove('active'); }
                } else {
                    disableAll();
                    if (this.lockBtn) this.lockBtn.innerHTML = ICONS.lock;
                    if (this.drawBtn) { 
                        this.drawBtn.style.display = 'flex'; 
                        this.colorPicker.style.display = this.data.isDrawingActive ? 'block' : 'none'; 
                        if (this.data.isDrawingActive) this.mediaContainer.classList.add('drawing-mode');
                    }
                }
            }
            save() { if (this.map && this.data.mode) { const center = this.map.getCenter(); this.data.lat = center.lat; this.data.lng = center.lng; this.data.zoom = this.map.getZoom(); } return this.data; }
            destroy() { if (this.resizeObserver) this.resizeObserver.disconnect(); if (this.map) { this.map.remove(); this.map = null; } }
        }

        window.EDITOR_TOOLS = {
            paragraph: ParagraphBlock, header: HeaderBlock, checklist: ChecklistBlock, list: ListBlock,
            scan: ScanTool, compute: ComputeTool, smartCanvas: SmartCanvasTool, calendar: CalendarTool,
            voice: VoiceMemo, recall: RecallTool, aiStream: AIStreamBlock
        };

        // ============================================================================
        // CORE BLOCK MANAGER
        // ============================================================================
        class BlockManager {
            constructor(containerId, options) {
                this.container = document.getElementById(containerId);
                this.readOnly = options.readOnly || false;
                this.onChange = options.onChange || function(){};
                this.blocks = []; this.menu = document.getElementById('block-menu'); this.menuTargetIndex = -1;
                
                this.initMenu(); this.container.innerHTML = '';
                const dataBlocks = options.data?.blocks || [];
                if (dataBlocks.length === 0 && !this.readOnly) { this.insertBlock('paragraph', {}, 0, false); } 
                else { dataBlocks.forEach((b, i) => this.insertBlock(b.type, b.data, i, false)); }

                document.addEventListener('click', (e) => { if (!this.menu.contains(e.target) && !e.target.closest('.add-btn')) this.closeMenu(); });
            }

            initMenu() {
                const types = [
                    {id: 'paragraph', icon: ICONS.text, name: 'Text'}, {id: 'header', icon: ICONS.header, name: 'Header'},
                    {id: 'list', icon: ICONS.list, name: 'List'}, {id: 'checklist', icon: ICONS.check, name: 'Checklist'},
                    {id: 'smartCanvas', icon: ICONS.pen, name: 'Canvas'}, {id: 'scan', icon: ICONS.scan, name: 'Scan'},
                    {id: 'compute', icon: ICONS.compute, name: 'Compute'}, {id: 'calendar', icon: ICONS.calendar, name: 'Calendar'},
                    {id: 'voice', icon: ICONS.mic, name: 'Voice'}, {id: 'recall', icon: ICONS.recall, name: 'Recall'}
                ];
                types.forEach(t => {
                    const item = createEl('div', 'menu-item', {}, [ createEl('div', '', {innerHTML: t.icon}), createEl('span', '', {textContent: t.name}) ]);
                    item.onclick = () => { this.insertBlock(t.id, {}, this.menuTargetIndex, true); this.closeMenu(); }; this.menu.appendChild(item);
                });
            }

            openMenu(index, buttonEl) {
                this.menuTargetIndex = index; const rect = buttonEl.getBoundingClientRect();
                this.menu.style.top = `${rect.bottom + window.scrollY + 5}px`;
                
                let leftPos = rect.right - 280; 
                if (leftPos < 16) leftPos = 16;
                this.menu.style.left = `${leftPos}px`;
                
                this.menu.classList.add('active');
            }
            closeMenu() { this.menu.classList.remove('active'); }

            createBlockAPI(instanceId) {
                return {
                    onChange: () => this.onChange(),
                    getIndex: (instance) => { for(let i=0; i<this.blocks.length; i++) { if (this.blocks[i].instance === instance) return i; } return -1; },
                    insertBlock: (type, data, index, focus) => {
                        const block = this.insertBlock(type, data, index, focus);
                        if (!['paragraph', 'header', 'list', 'checklist'].includes(type) && !this.readOnly) {
                            this.insertBlock('paragraph', {}, index + 1, false);
                        }
                        return block;
                    },
                    deleteBlock: (index) => this.deleteBlock(index),
                    focus: (index) => this.focus(index)
                };
            }

            insertBlock(type, data, index = this.blocks.length, focus = true) {
                const BlockClass = window.EDITOR_TOOLS[type]; if (!BlockClass) return;

                const blockId = crypto.randomUUID(); const api = this.createBlockAPI(blockId);
                const instance = new BlockClass({ data, api, readOnly: this.readOnly });
                const wrapper = createEl('div', 'block-wrapper'); wrapper.dataset.id = blockId;
                
                if (!this.readOnly) {
                    const actions = createEl('div', 'block-actions');
                    const addBtn = createEl('button', 'action-btn add-btn', {innerHTML: ICONS.plus, title: 'ADD BLOCK'});
                    const delBtn = createEl('button', 'action-btn del-btn', {innerHTML: ICONS.trash, title: 'DELETE BLOCK'});
                    addBtn.onclick = (e) => { e.stopPropagation(); this.openMenu(this.blocks.findIndex(b => b.id === blockId) + 1, addBtn); };
                    delBtn.onclick = (e) => { e.stopPropagation(); this.deleteBlock(this.blocks.findIndex(b => b.id === blockId)); };
                    actions.append(addBtn, delBtn); wrapper.appendChild(actions);
                }

                wrapper.append(createEl('div', 'block-content', {}, [instance.render()]), createEl('div', 'block-time'));
                const blockDef = { id: blockId, type, instance, wrapper };
                
                if (index >= this.blocks.length) { this.blocks.push(blockDef); this.container.appendChild(wrapper); } 
                else { this.blocks.splice(index, 0, blockDef); this.container.insertBefore(wrapper, this.container.children[index]); }

                if (focus && typeof instance.focus === 'function') setTimeout(() => instance.focus(), 0);
                this.onChange(); return blockDef;
            }

            deleteBlock(index) {
                if (index < 0 || index >= this.blocks.length) return; const block = this.blocks[index];
                if (typeof block.instance.destroy === 'function') block.instance.destroy();
                block.wrapper.remove(); this.blocks.splice(index, 1);
                if (this.blocks.length === 0 && !this.readOnly) this.insertBlock('paragraph', {}, 0, true);
                this.onChange();
            }

            focus(index) { if (index >= 0 && index < this.blocks.length && typeof this.blocks[index].instance.focus === 'function') { this.blocks[index].instance.focus(); } }
            async save() {
                const output = [];
                for (let block of this.blocks) { if (typeof block.instance.save === 'function') { output.push({ id: block.id, type: block.type, data: await block.instance.save() }); } }
                return { blocks: output };
            }
            destroy() { this.blocks.forEach(b => { if (typeof b.instance.destroy === 'function') b.instance.destroy(); }); this.container.innerHTML = ''; this.blocks = []; }
        }

        // ============================================================================
        // CORE APP LIFECYCLE 
        // ============================================================================
        window.editor = null; 
        let timestamps = {}, updateRaf, saveTimeout, isSaving = false, hasPendingSave = false;
        let todayStr = getLocalYYYYMMDD(new Date()); window.currentDateStr = todayStr;

        function getDisplayDate(dateStr) { const [y, m, d] = dateStr.split('-'); const date = new Date(y, m - 1, d); return `${date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })}<br>${date.toLocaleDateString(undefined, { weekday: 'long' })}`; }
        document.getElementById('date-header').innerHTML = getDisplayDate(window.currentDateStr);

        const domObserver = new MutationObserver(() => { cancelAnimationFrame(updateRaf); updateRaf = requestAnimationFrame(updateAllTimestamps); });

        function updateAllTimestamps() {
            document.querySelectorAll('.block-wrapper').forEach(block => {
                const id = block.getAttribute('data-id'); if (!id) return;
                let timeEl = block.querySelector('.block-time');
                if (timestamps[id]) { timeEl.textContent = new Date(timestamps[id]).toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' }); } 
                else if (window.currentDateStr === todayStr && window.editor) { timestamps[id] = Date.now(); timeEl.textContent = new Date(timestamps[id]).toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' }); scheduleSave(); }
            });
        }

        function executeSave() {
            if (!window.editor || window.currentDateStr !== todayStr) { isSaving = false; hasPendingSave = false; return; }
            isSaving = true;
            window.editor.save().then(outputData => {
                outputData.timestamps = timestamps; return appDB.save(window.currentDateStr, outputData);
            }).then(() => {
                const indicator = document.getElementById('save-indicator');
                if (indicator && !appDB.isMemoryOnly) { indicator.classList.add('visible'); setTimeout(() => indicator.classList.remove('visible'), 1500); }
            }).catch(e => console.error("Save failed:", e)).finally(() => { isSaving = false; if (hasPendingSave) { hasPendingSave = false; executeSave(); } });
        }

        function scheduleSave(immediate = false) {
            if (appDB.isMemoryOnly) return; clearTimeout(saveTimeout);
            if (immediate) { if (isSaving) hasPendingSave = true; else executeSave(); } else { saveTimeout = setTimeout(() => { if (isSaving) hasPendingSave = true; else executeSave(); }, 800); }
        }

        document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') scheduleSave(true); }); window.addEventListener('pagehide', () => scheduleSave(true));
        
        document.getElementById('date-header').onclick = () => {
            scheduleSave(true); const [y, m, d] = window.currentDateStr.split('-').map(Number);
            DatePicker.open(new Date(y, m - 1, d), (selectedDate) => {
                const selectedStr = getLocalYYYYMMDD(selectedDate);
                if (window.currentDateStr !== selectedStr) { window.currentDateStr = selectedStr; document.getElementById('date-header').innerHTML = getDisplayDate(selectedStr); initEditor(selectedStr); }
            }, { showTime: false, disableFuture: true, onlyNotes: true }); 
        };

        // ============================================================================
        // EDITOR INITIALIZATION
        // ============================================================================
        async function initEditor(date) {
            if (window.editor) { scheduleSave(true); domObserver.disconnect(); window.editor.destroy(); window.editor = null; }
            const isToday = date === todayStr; let cachedData = appDB.cache[date];
            let editorData = cachedData ? { blocks: [...cachedData.blocks], timestamps: {...cachedData.timestamps} } : { blocks: [] };
            timestamps = editorData.timestamps || {};
            window.editor = new BlockManager('editor-container', { readOnly: !isToday, data: editorData, onChange: () => { if (isToday) scheduleSave(); } });
            domObserver.observe(document.getElementById('editor-container'), { childList: true, subtree: true }); updateAllTimestamps();
        }

        appDB.init().then(() => { initEditor(window.currentDateStr); });
    </script>
</body>
</html>
