                    this.data.lines = [];
                }
                if (!this.data.drawItems) this.data.drawItems = [];
            }

            render() {
                this.wrapper.innerHTML = ''; 
                if (this.needsSetup()) { if (this.readOnly) this.wrapper.innerHTML = '<div style="padding: 24px; text-align: center;">Empty Block</div>'; else this.renderSetup(); return this.wrapper; }

                let controls = [];
                
                this.fullScreenBtn = createEl('button', 'tool-icon-btn', { innerHTML: ICONS.maximize, title: 'Toggle Fullscreen' });
                this.fullScreenBtn.onclick = () => {
                    this.wrapper.classList.toggle('widget-fullscreen');
                    this.fullScreenBtn.innerHTML = this.wrapper.classList.contains('widget-fullscreen') ? ICONS.minimize : ICONS.maximize;
                    setTimeout(() => { if (this.map) this.map.invalidateSize(); }, 300);
                };
                controls.push(this.fullScreenBtn);

                if (!this.readOnly) {
                    this.colorPicker = createEl('input', '', { type: 'color', value: this.currentColor, style: 'width: 28px; height: 28px; border: none; padding: 0; background: transparent; cursor: pointer; display: none;' });
                    this.colorPicker.addEventListener('input', (e) => { this.currentColor = e.target.value; });
                    
                    this.toolPicker = createEl('div', 'tool-controls', { style: 'display: none; background: var(--muted-bg); border-radius: 4px; padding: 2px;' });
                    
                    const tools = [
                        { id: 'pen', icon: ICONS.pen },
                        { id: 'rect', icon: ICONS.rectTool },
                        { id: 'circle', icon: ICONS.circleTool }
                    ];
                    
                    this.toolBtns = {};
                    tools.forEach(t => {
                        const btn = createEl('button', 'tool-icon-btn', { innerHTML: t.icon, style: 'width: 24px; height: 24px; padding: 2px;' });
                        btn.onclick = () => { 
                            this.activeToolType = t.id; 
                            Object.values(this.toolBtns).forEach(b => b.classList.remove('active'));
                            btn.classList.add('active');
                        };
                        this.toolBtns[t.id] = btn;
                        this.toolPicker.appendChild(btn);
                    });
                    this.toolBtns['pen'].classList.add('active');

                    this.drawBtn = createEl('button', 'tool-icon-btn', { innerHTML: ICONS.pen, style: 'display: none;' });
                    this.drawBtn.onclick = () => { this.data.isDrawingActive = !this.data.isDrawingActive; if (this.data.isDrawingActive) this.drawBtn.classList.add('active'); else this.drawBtn.classList.remove('active'); this.updateInteractions(); this.api.onChange(); };
                    
                    this.undoBtn = createEl('button', 'tool-icon-btn', { innerHTML: ICONS.undo, style: 'display: none;', title: 'Undo Last Action' });
                    this.undoBtn.onclick = () => { 
                        if (this.data.drawItems?.length > 0) { 
                            this.data.drawItems.pop(); 
                            this.renderExistingItems(); 
                            this.api.onChange(); 
                        } else if (this._clearedItems && this._clearedItems.length > 0) {
                            // Magic un-clear: restores drawings if you hit undo after hitting clear
                            this.data.drawItems = [...this._clearedItems];
                            this._clearedItems = null;
                            this.renderExistingItems();
                            this.api.onChange();
                        }
                    };

                    this.clearBtn = createEl('button', 'tool-icon-btn', { innerHTML: ICONS.trash, style: 'display: none;', title: 'Clear All Drawings' });
                    this.clearBtn.onclick = () => {
                        if (this.data.drawItems?.length > 0) {
                            this._clearedItems = [...this.data.drawItems]; // Cache in case of accidental wipe
                            this.data.drawItems = [];
                            this.renderExistingItems();
                            this.api.onChange();
                        }
                    };

                    this.lockBtn = createEl('button', 'tool-icon-btn', { innerHTML: this.data.isLocked ? ICONS.lock : ICONS.unlock });
                    this.lockBtn.onclick = () => { this.data.isLocked = !this.data.isLocked; this.updateInteractions(); this.api.onChange(); };
                    
                    controls.push(this.colorPicker, this.toolPicker, this.undoBtn, this.clearBtn, this.drawBtn, this.lockBtn);
                }
                
                this.wrapper.appendChild(this.buildHeader(controls)); this.renderUniversalCanvas(); return this.wrapper;
            }

            renderUniversalCanvas() {
                if (this.map) { this.map.remove(); this.map = null; }
                this.canvasWrapper = createEl('div', 'canvas-wrapper', { style: 'position: relative; width: 100%; height: 400px;' });
                this.mediaContainer = createEl('div', 'leaflet-container', {style: 'width: 100%; height: 100%; display: block; z-index: 1; border: none;'}); 
                this.drawOverlay = createEl('div', '', {style: 'position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 1000; display: none; touch-action: none; cursor: crosshair;'});
                
                this.canvasWrapper.append(this.mediaContainer, this.drawOverlay); this.wrapper.appendChild(this.canvasWrapper);
                
                requestAnimationFrame(() => {
                    if (!this.mediaContainer.isConnected) return;
                    this.setupMap(); this.renderExistingItems(); this.initDrawingTracker(); this.updateInteractions();
                    this.map.on('moveend', () => this.api.onChange()); setTimeout(() => { if (this.map) this.map.invalidateSize(); }, 100);
                });
            }

            setupMap() {}

            renderExistingItems() {
                this.drawLayers.forEach(layer => this.map.removeLayer(layer)); 
                this.drawLayers = [];
                
                this.data.lines?.forEach(line => { 
                    this.drawLayers.push(L.polyline(line.points, { color: line.color, weight: line.weight, lineCap: 'round', lineJoin: 'round', smoothFactor: 1.5 }).addTo(this.map)); 
                });

                this.data.drawItems?.forEach(item => {
                    let layer;
                    if (item.type === 'line') layer = L.polyline(item.points, { color: item.color, weight: item.weight || 4, lineCap: 'round', lineJoin: 'round', smoothFactor: 1.5 });
                    else if (item.type === 'rect') layer = L.rectangle(item.bounds, { color: item.color, weight: 2, fillOpacity: 0.1 });
                    else if (item.type === 'circle') layer = L.circle(item.center, { radius: item.radius, color: item.color, weight: 2, fillOpacity: 0.1 });
                    else if (item.type === 'text') layer = L.marker(item.latlng, { icon: L.divIcon({ className: '', html: `<div style="color:${item.color}; font-size:16px; font-family: monospace; font-weight:bold; white-space:nowrap; text-shadow: 1px 1px 2px var(--bg-color);">${item.text}</div>` }) });
                    
                    if (layer) { layer.addTo(this.map); this.drawLayers.push(layer); }
                });
            }

            initDrawingTracker() {
                if (this.readOnly || !this.map || !this.drawOverlay) return; 
                let isPointerDown = false;
                let startLatLng = null;
                
                this.drawOverlay.addEventListener('pointerdown', (e) => {
                    if (!this.data.isDrawingActive || !this.data.isLocked) return; 
                    isPointerDown = true; this.drawOverlay.setPointerCapture(e.pointerId);
                    const rect = this.drawOverlay.getBoundingClientRect();
                    startLatLng = this.map.containerPointToLatLng([e.clientX - rect.left, e.clientY - rect.top]);
                    
                    if (this.activeToolType === 'pen') {
                        this.currentPoints = [startLatLng];
                        this.currentShape = L.polyline(this.currentPoints, { color: this.currentColor, weight: 4, lineCap: 'round', lineJoin: 'round', smoothFactor: 1.5 }).addTo(this.map);
                    } else if (this.activeToolType === 'rect') {
                        this.currentShape = L.rectangle([startLatLng, startLatLng], { color: this.currentColor, weight: 2, fillOpacity: 0.1 }).addTo(this.map);
                    } else if (this.activeToolType === 'circle') {
                        this.currentShape = L.circle(startLatLng, { radius: 0, color: this.currentColor, weight: 2, fillOpacity: 0.1 }).addTo(this.map);
                    }
                });
                
                this.drawOverlay.addEventListener('pointermove', (e) => {
                    if (!this.data.isDrawingActive || !isPointerDown || !this.currentShape) return;
                    const rect = this.drawOverlay.getBoundingClientRect();
                    const currentLatLng = this.map.containerPointToLatLng([e.clientX - rect.left, e.clientY - rect.top]);
                    
                    if (this.activeToolType === 'pen') {
                        this.currentPoints.push(currentLatLng); 
                        this.currentShape.setLatLngs(this.currentPoints);
                    } else if (this.activeToolType === 'rect') {
                        this.currentShape.setBounds([startLatLng, currentLatLng]);
                    } else if (this.activeToolType === 'circle') {
                        const radius = this.map.distance(startLatLng, currentLatLng);
                        this.currentShape.setRadius(radius);
                    }
                });
                
                const endDraw = (e) => {
                    if (!isPointerDown) return; 
                    isPointerDown = false; this.drawOverlay.releasePointerCapture(e.pointerId);
                    if (!this.currentShape || !this.data.isDrawingActive) return;
                    
                    if (this.activeToolType === 'pen') {
                        this.data.drawItems.push({ type: 'line', color: this.currentColor, weight: 4, points: this.currentPoints.map(p => [p.lat, p.lng]) });
                    } else if (this.activeToolType === 'rect') {
                        const bounds = this.currentShape.getBounds();
                        this.data.drawItems.push({ type: 'rect', color: this.currentColor, bounds: [[bounds.getSouthWest().lat, bounds.getSouthWest().lng], [bounds.getNorthEast().lat, bounds.getNorthEast().lng]] });
                    } else if (this.activeToolType === 'circle') {
                        this.data.drawItems.push({ type: 'circle', color: this.currentColor, center: [startLatLng.lat, startLatLng.lng], radius: this.currentShape.getRadius() });
                    }
                    
                    this._clearedItems = null; // Clear the undo cache when a new item is drawn
                    this.drawLayers.push(this.currentShape); 
                    this.currentShape = null; 
                    this.currentPoints = []; 
                    this.api.onChange();
                };
                
                this.drawOverlay.addEventListener('pointerup', endDraw); this.drawOverlay.addEventListener('pointercancel', endDraw);
            }

            updateInteractions() {
                if (!this.map) return;
                const disableAll = () => { this.map.dragging.disable(); this.map.touchZoom.disable(); this.map.doubleClickZoom.disable(); this.map.scrollWheelZoom.disable(); this.map.boxZoom.disable(); this.map.keyboard.disable(); if (this.map.tap) this.map.tap.disable(); };
                const enableAll = () => { this.map.dragging.enable(); this.map.touchZoom.enable(); this.map.doubleClickZoom.enable(); this.map.scrollWheelZoom.enable(); this.map.boxZoom.enable(); this.map.keyboard.enable(); if (this.map.tap) this.map.tap.enable(); };

                if (this.readOnly) { disableAll(); if (this.drawOverlay) this.drawOverlay.style.display = 'none'; return; }
                if (!this.data.isLocked) {
                    this.data.isDrawingActive = false; enableAll();
                    if (this.drawOverlay) this.drawOverlay.style.display = 'none';
                    if (this.lockBtn) this.lockBtn.innerHTML = ICONS.unlock;
                    if (this.drawBtn) { 
                        this.drawBtn.style.display = 'none'; 
                        this.colorPicker.style.display = 'none'; 
                        if (this.toolPicker) this.toolPicker.style.display = 'none';
                        if (this.undoBtn) this.undoBtn.style.display = 'none';
                        if (this.clearBtn) this.clearBtn.style.display = 'none';
                        this.drawBtn.classList.remove('active'); 
                    }
                } else {

        class MapTool extends BaseCanvasTool {
            getCanvasDefaultData(data) { return { lat: data?.lat ?? null, lng: data?.lng ?? null, zoom: data?.zoom ?? 16, isLocationSet: data?.isLocationSet || false }; }
            getPlaceholder() { return 'MAP TITLE...'; }
            
            setTileLayer() {
                const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                const tileUrl = isDark ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png' : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
                if (this.tileLayer) {
                    this.tileLayer.setUrl(tileUrl);
                } else {
                    this.tileLayer = L.tileLayer(tileUrl, { maxZoom: 20 }).addTo(this.map);
                }
            }

            setupMap() {
                const startLat = this.data.lat !== null ? this.data.lat : 51.505;
                const startLng = this.data.lng !== null ? this.data.lng : -0.09;

                this.map = L.map(this.mediaContainer, { zoomControl: false, attributionControl: false }).setView([startLat, startLng], this.data.zoom);
                
                this.setTileLayer();
                
                this.themeQuery = window.matchMedia('(prefers-color-scheme: dark)');
                this.themeListener = () => this.setTileLayer();
                this.themeQuery.addEventListener('change', this.themeListener);

                if (!this.data.isLocationSet && navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition((pos) => {
                        this.data.lat = pos.coords.latitude;
                        this.data.lng = pos.coords.longitude;
                        this.data.isLocationSet = true;
                        if (this.map) {
                            this.map.setView([this.data.lat, this.data.lng], 16);
                            this.api.onChange();
                        }
                    }, () => {
                        this.data.lat = startLat;
                        this.data.lng = startLng;
                        this.data.isLocationSet = true;
                        this.api.onChange();
                    });
                }
            }

            destroy() {
                if (this.themeQuery && this.themeListener) {
                    this.themeQuery.removeEventListener('change', this.themeListener);
                }
                super.destroy();
            }
        }

        // ============================================================================
        // 🧠 PERSONAS DIRECTORY WITH KNOWLEDGE SEARCH (PGVECTOR)
        // ============================================================================
        function renderPersonasIndex() {
            const container = document.getElementById('editor-container'); container.innerHTML = '';
            
            const searchWrapper = createEl('div', '', { style: 'margin-bottom: 24px;' });
            const searchInput = createEl('input', 'flat-input', { type: 'text', placeholder: 'SEARCH DIRECTORY...', style: 'font-size: 2em; font-weight: 900; border-bottom: 4px solid var(--text-color); padding-bottom: 8px; text-transform: uppercase; border-radius: 0;' });
            const ragResults = createEl('div', '', { style: 'margin-top: 16px; display: flex; flex-direction: column; gap: 8px;' });
            
            searchWrapper.append(searchInput, ragResults);
            
            const grid = createEl('div', '', { style: 'display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px;' });
            
            const tags = TagIndex.getTags().filter(t => t.toLowerCase() !== '#personas'); 
            const rootTagsSet = new Set(); tags.forEach(t => rootTagsSet.add(t.split('.')[0]));
            const rootTags = Array.from(rootTagsSet).sort();
            
            const renderGrid = (query) => {
                grid.innerHTML = ''; const q = query.toLowerCase();
                const filtered = rootTags.filter(t => t.toLowerCase().includes(q));
                
                if (filtered.length === 0) { grid.appendChild(createEl('div', '', { textContent: 'NO PERSONAS FOUND.', style: 'color: var(--muted-text); font-weight: bold;' })); return; }

                filtered.forEach(t => {
                    const tagBtn = createEl('button', 'flat-btn', { textContent: t, style: 'justify-content: flex-start; text-transform: uppercase; font-family: monospace; font-size: 16px; padding: 16px;' });
                    tagBtn.onclick = () => window.loadVirtualPage('tag-' + t.replace('#', '').toLowerCase());
                    grid.appendChild(tagBtn);
                });
            };

            searchInput.addEventListener('input', (e) => renderGrid(e.target.value));
            
            let currentSearchId = 0;
            searchInput.addEventListener('input', debounce(async (e) => {
                const query = e.target.value.trim();
                const thisSearchId = ++currentSearchId;
                
                if (!query) { ragResults.innerHTML = ''; return; }
                
                ragResults.innerHTML = '<div style="color: var(--text-color); font-size: 12px; font-weight: bold;">QUERYING INDEX...</div>';
                
                try {
                    const scored = await AIEngine.semanticSearch(query, { limit: 5, threshold: 0.35, requireTag: true });
                    if (thisSearchId !== currentSearchId) return; // Prevent async race replacement
                    
                    ragResults.innerHTML = '';
                    if (scored.length === 0) {
                        ragResults.innerHTML = '<div style="color: var(--muted-text); font-size: 12px; font-weight: bold;">NO RELEVANT KNOWLEDGE FOUND.</div>';
                        return;
                    }
                    
                    const tagRegex = /#[a-zA-Z0-9_.]+/;
                    scored.forEach(res => {
                        const matchTag = res.content.match(tagRegex)?.[0] || 'Unknown';
                        const item = createEl('div', 'tool-box', { style: 'padding: 12px; cursor: pointer; border-left: 4px solid var(--text-color); transition: background 0.1s;' });
                        item.onmouseover = () => item.style.background = 'var(--muted-bg)'; item.onmouseout = () => item.style.background = 'transparent';
                        
                        item.innerHTML = `
                            <div style="font-size: 10px; font-weight: bold; font-family: monospace; color: var(--muted-text); margin-bottom: 4px;">
                                ${matchTag} • ${(res.score*100).toFixed(0)}% MATCH • ${res.date_str}
                            </div>
                            <div style="font-size: 14px;">${res.content.replace(tagRegex, '').substring(0, 150)}...</div>
                        `;
                        item.onclick = () => window.loadVirtualPage(res.date_str);
                        ragResults.appendChild(item);
                    });
                } catch(err) {
                    if (thisSearchId !== currentSearchId) return;
                    ragResults.innerHTML = `<div style="color: #ef4444; font-size: 12px; font-weight: bold;">Search Failed: ${err.message}</div>`;
                }
            }, 500));
            
            container.append(searchWrapper, grid);
            renderGrid(''); setTimeout(() => searchInput.focus(), 50);
        }

        // ============================================================================
        // CORE BLOCK MANAGER
        // ============================================================================
        class BlockManager {
            constructor(containerId, options) {
                this.container = document.getElementById(containerId); this.readOnly = options.readOnly || false; this.onChange = options.onChange || function(){};
                this.blocks = []; 
                
                this.slashMenuEl = document.getElementById('slash-menu'); this.slashActiveBlock = null; this.slashSelectedIndex = 0;
                
                this.slashOptions = [
                    {id: 'map', icon: ICONS.map, name: 'Map Location', keywords: 'map location geography'},
                    {id: 'photo', icon: ICONS.image, name: 'Photo Annotation', keywords: 'photo image picture paint draw'},
                    {id: 'blankCanvas', icon: ICONS.canvas, name: 'Blank Canvas', keywords: 'draw paint sketch blank empty whiteboard'},
                    {id: 'scan', icon: ICONS.scan, name: 'Scan OCR', keywords: 'photo text document read'},
                    {id: 'compute', icon: ICONS.compute, name: 'Compute Logic', keywords: 'math calc logic sum code function'},
                    {id: 'calendar', icon: ICONS.calendar, name: 'Event', keywords: 'date time schedule notify reminder'},
                    {id: 'voice', icon: ICONS.mic, name: 'Voice Memo', keywords: 'audio record memo dictation sound'},
                    {id: 'recall', icon: ICONS.recall, name: 'Recall Database', keywords: 'search find past semantic query historical'}
                ];
                this.slashFiltered = [...this.slashOptions];

                this.tagMenuEl = document.getElementById('tag-menu'); this.tagActiveBlock = null; this.tagSelectedIndex = 0; this.tagFiltered = []; this.tagCallback = null;
                
                this.container.innerHTML = '';
                const dataBlocks = options.data?.blocks || [];
                if (dataBlocks.length === 0 && !this.readOnly) this.insertBlock('paragraph', {}, 0, false); 
                else dataBlocks.forEach((b, i) => this.insertBlock(b.type, b.data, i, false, b.dynamicInfo));

                document.addEventListener('click', (e) => { 
                    if (!this.slashMenuEl.contains(e.target)) this.hideSlashMenu(); 
                    if (!this.tagMenuEl.contains(e.target)) this.hideTagMenu();
                });
            }

            createBlockAPI(instanceId) {
                return {
                    onChange: () => this.onChange(),
                    getIndex: (instance) => { for(let i=0; i<this.blocks.length; i++) { if (this.blocks[i].instance === instance) return i; } return -1; },
                    getBlock: (index) => this.blocks[index],
                    getBlockCount: () => this.blocks.length,
                    insertBlock: (type, data, index, focus) => {
                        const block = this.insertBlock(type, data, index, focus);
                        if (TEXT_BLOCK_TYPES.includes(type) && !this.readOnly) this.insertBlock('paragraph', {}, index + 1, false);
                        return block;
                    },
                    deleteBlock: (index) => this.deleteBlock(index),
                    focus: (index) => this.focus(index),
                    focusNext: (instance) => {
                        const idx = this.createBlockAPI().getIndex(instance);
                        if (idx === this.blocks.length - 1) this.insertBlock('paragraph', {}, idx + 1, true);
                        else if (idx !== -1) { const nextBlock = this.blocks[idx + 1]; if (typeof nextBlock.instance.focus === 'function') nextBlock.instance.focus(false); }
                    },
                    focusPrev: (instance) => {
                        const idx = this.createBlockAPI().getIndex(instance);
                        if (idx > 0) { const prevBlock = this.blocks[idx - 1]; if (typeof prevBlock.instance.focus === 'function') prevBlock.instance.focus(true); }
                    },
                    showSlashMenu: (block, rect, query) => this.showSlashMenu(block, rect, query), hideSlashMenu: () => this.hideSlashMenu(), isSlashMenuVisible: () => this.slashMenuEl.classList.contains('active'), slashNavigate: (dir) => this.slashNavigate(dir), slashExecute: (block) => this.slashExecute(block),
                    showTagMenu: (block, rect, query, cb) => this.showTagMenu(block, rect, query, cb), hideTagMenu: () => this.hideTagMenu(), isTagMenuVisible: () => this.tagMenuEl.classList.contains('active'), tagNavigate: (dir) => this.tagNavigate(dir), tagExecute: () => this.tagExecute(),
                };
            }

            showSlashMenu(blockInstance, rect, query) {
                this.slashActiveBlock = blockInstance; this.slashMenuEl.style.top = `${rect.bottom + window.scrollY + 5}px`; this.slashMenuEl.style.left = `${Math.max(rect.left, 16)}px`;
                this.slashFiltered = this.slashOptions.filter(o => o.name.toLowerCase().includes(query) || o.keywords.includes(query));
                if (this.slashFiltered.length === 0) { this.hideSlashMenu(); return; }
                this.slashSelectedIndex = 0; this.renderSlashMenu(); this.slashMenuEl.classList.add('active');
            }
            hideSlashMenu() { this.slashMenuEl.classList.remove('active'); this.slashActiveBlock = null; }
            renderSlashMenu() {
                this.slashMenuEl.innerHTML = '';
                this.slashFiltered.forEach((opt, idx) => {
                    const item = createEl('div', `slash-item ${idx === this.slashSelectedIndex ? 'selected' : ''}`, {}, [createEl('div', '', {innerHTML: opt.icon}), createEl('span', '', {textContent: opt.name})]);
                    item.onmousedown = (e) => { e.preventDefault(); this.slashSelectedIndex = idx; this.slashExecute(this.slashActiveBlock); };
                    this.slashMenuEl.appendChild(item);
                });
            }
            slashNavigate(dir) { this.slashSelectedIndex = (this.slashSelectedIndex + dir + this.slashFiltered.length) % this.slashFiltered.length; this.renderSlashMenu(); const selectedEl = this.slashMenuEl.children[this.slashSelectedIndex]; if (selectedEl) selectedEl.scrollIntoView({ block: 'nearest' }); }
            slashExecute(blockInstance) {
                const selected = this.slashFiltered[this.slashSelectedIndex]; this.hideSlashMenu();
                if (selected && blockInstance) {
                    const idx = this.createBlockAPI().getIndex(blockInstance); this.deleteBlock(idx); this.insertBlock(selected.id, {}, idx, true);
                    if (!this.readOnly) this.insertBlock('paragraph', {}, idx + 1, false);
                }
            }

            showTagMenu(blockInstance, rect, query, cb) {
                this.tagActiveBlock = blockInstance; this.tagCallback = cb; this.tagMenuEl.style.top = `${rect.bottom + window.scrollY + 5}px`; this.tagMenuEl.style.left = `${Math.max(rect.left, 16)}px`;
                this.tagFiltered = TagIndex.getTags().filter(t => t.toLowerCase().includes(query.toLowerCase()) && t !== query);
                if (this.tagFiltered.length === 0) { this.hideTagMenu(); return; }
                this.tagSelectedIndex = 0; this.renderTagMenu(); this.tagMenuEl.classList.add('active');
            }
            hideTagMenu() { this.tagMenuEl.classList.remove('active'); this.tagActiveBlock = null; this.tagCallback = null; }
            renderTagMenu() {
                this.tagMenuEl.innerHTML = '';
                this.tagFiltered.forEach((opt, idx) => {
                    const item = createEl('div', `slash-item ${idx === this.tagSelectedIndex ? 'selected' : ''}`, {}, [createEl('span', '', {textContent: opt, style: 'font-family: monospace; letter-spacing: 1px;'})]);
                    item.onmousedown = (e) => { e.preventDefault(); this.tagSelectedIndex = idx; this.tagExecute(); };
                    this.tagMenuEl.appendChild(item);
                });
            }
            tagNavigate(dir) { this.tagSelectedIndex = (this.tagSelectedIndex + dir + this.tagFiltered.length) % this.tagFiltered.length; this.renderTagMenu(); const selectedEl = this.tagMenuEl.children[this.tagSelectedIndex]; if (selectedEl) selectedEl.scrollIntoView({ block: 'nearest' }); }
            tagExecute() { const selected = this.tagFiltered[this.tagSelectedIndex]; const cb = this.tagCallback; this.hideTagMenu(); if (selected && cb) cb(selected); }

            insertBlock(type, data, index = this.blocks.length, focus = true, dynamicInfo = null) {
                const BlockClass = window.EDITOR_TOOLS[type]; if (!BlockClass) return;
                const blockId = crypto.randomUUID(); const api = this.createBlockAPI(blockId);
                const isBlockReadOnly = this.readOnly || !!dynamicInfo; 
                
                const instance = new BlockClass({ data, api, readOnly: isBlockReadOnly });
                const wrapper = createEl('div', `block-wrapper ${isBlockReadOnly ? 'is-readonly' : ''}`); wrapper.dataset.id = blockId;
                
                if (isBlockReadOnly && dynamicInfo && dynamicInfo.source) { wrapper.onclick = (e) => { if (!e.target.closest('a') && !e.target.closest('button') && !e.target.closest('input') && !e.target.closest('.tool-controls') && !dynamicInfo.isSection) window.loadVirtualPage(dynamicInfo.source); }; }

                let timeEl = createEl('div', 'block-time');
                if (dynamicInfo) {
                    if (!dynamicInfo.isSection) {
                        const dateObj = dynamicInfo.timestamp ? new Date(dynamicInfo.timestamp) : new Date(...dynamicInfo.source.split('-').map((v, i) => i === 1 ? v - 1 : v), 12, 0);
                        timeEl = createEl('a', 'block-time v-link', { textContent: `${dateObj.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' })} @ ${dateObj.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' })}`, 'data-target': dynamicInfo.source });
                        timeEl.title = 'Jump to Date'; timeEl.onclick = (e) => { e.preventDefault(); window.loadVirtualPage(dynamicInfo.source); };
                    }
                } else {
                    if (window.timestamps && window.timestamps[blockId]) timeEl.textContent = new Date(window.timestamps[blockId]).toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
                    else if (!this.readOnly && window.timestamps) { window.timestamps[blockId] = Date.now(); timeEl.textContent = new Date(window.timestamps[blockId]).toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' }); }
                }

                wrapper.append(createEl('div', 'block-content', {}, [instance.render()]), timeEl);
                const blockDef = { id: blockId, type, instance, wrapper, dynamicInfo };
                
                if (index >= this.blocks.length) { this.blocks.push(blockDef); this.container.appendChild(wrapper); } 
                else { this.blocks.splice(index, 0, blockDef); this.container.insertBefore(wrapper, this.container.children[index]); }

                if (focus && typeof instance.focus === 'function' && !isBlockReadOnly) setTimeout(() => instance.focus(), 0);
                this.onChange(); return blockDef;
            }

            deleteBlock(index) {
                if (index < 0 || index >= this.blocks.length) return; const block = this.blocks[index];
                if (typeof block.instance.destroy === 'function') block.instance.destroy();
                block.wrapper.remove(); this.blocks.splice(index, 1);
                if (this.blocks.length === 0 && !this.readOnly) this.insertBlock('paragraph', {}, 0, true);
                this.onChange();
            }

            focus(index) { if (index >= 0 && index < this.blocks.length && typeof this.blocks[index].instance.focus === 'function') this.blocks[index].instance.focus(); }
            async save() { const output = []; for (let block of this.blocks) { if (!block.dynamicInfo && typeof block.instance.save === 'function') output.push({ id: block.id, type: block.type, data: await block.instance.save() }); } return { blocks: output }; }
            destroy() { this.hideSlashMenu(); this.hideTagMenu(); InlineToolbar.hide(); this.blocks.forEach(b => { if (typeof b.instance.destroy === 'function') b.instance.destroy(); }); this.container.innerHTML = ''; this.blocks = []; }
        }

        // ============================================================================
        // CORE APP LIFECYCLE & ASYNC STORAGE QUEUE
        // ============================================================================
        window.editor = null; window.timestamps = {};
        let activeSavePromise = Promise.resolve();
        let todayStr = getLocalYYYYMMDD(new Date()); window.currentDateStr = todayStr;

        function getDisplayDate(dateStr) { const [y, m, d] = dateStr.split('-'); const date = new Date(y, m - 1, d); return `${date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })}<br>${date.toLocaleDateString(undefined, { weekday: 'long' })}`; }

        function executeSave(targetKey = window.currentDateStr) {
            if (!window.editor) return Promise.resolve();
            activeSavePromise = activeSavePromise.then(async () => {
                if (!window.editor) return; 
                try {
                    const outputData = await window.editor.save(); outputData.timestamps = { ...window.timestamps };
                    
                    await appDB.save(targetKey, outputData);
                    
                    outputData.blocks.forEach(b => {
                        if (TEXT_BLOCK_TYPES.includes(b.type) && !b.dynamicInfo) {
                            const text = extractBlockText(b);
                            if (text.trim()) EmbeddingQueue.add(b.id, targetKey, b.type, text, b);
                        }
                    });

                    const indicator = document.getElementById('save-indicator');
                    if (indicator && !appDB.isMemoryOnly) { indicator.classList.add('visible'); setTimeout(() => indicator.classList.remove('visible'), 1500); }
                } catch(e) { console.error("Save Error:", e); }
            });
            return activeSavePromise;
        }

        const scheduleSave = debounce((immediate = false) => { if (!appDB.isMemoryOnly) executeSave(window.currentDateStr); }, 800);

        document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') scheduleSave(true); }); 
        window.addEventListener('pagehide', () => scheduleSave(true));
        
        document.getElementById('date-header').onclick = () => {
            scheduleSave(true); 
            if (window.currentDateStr === 'tag-personas') { window.loadVirtualPage(getLocalYYYYMMDD(new Date())); return; }
            if (window.currentDateStr.startsWith('tag-')) { window.loadVirtualPage('tag-personas'); return; }
            
            let dateToOpen = new Date();
            if (/^\d{4}-\d{2}-\d{2}$/.test(window.currentDateStr)) { const [y, m, d] = window.currentDateStr.split('-').map(Number); dateToOpen = new Date(y, m - 1, d); }
            DatePicker.open(dateToOpen, (selectedDate) => { const selectedStr = getLocalYYYYMMDD(selectedDate); if (window.currentDateStr !== selectedStr) window.loadVirtualPage(selectedStr); }, { showTime: false, disableFuture: true, onlyNotes: false }); 
        };

        // ============================================================================
        // VIRTUAL ROUTING & EDITOR INITIALIZATION
        // ============================================================================
        window.loadVirtualPage = async function(key) {
            const oldStorageKey = window.currentDateStr; 
            let storageKey = key; 
            let tagParts = [];
            
            if (key.startsWith('tag-')) { 
                tagParts = key.substring(4).split('.').filter(Boolean); 
                storageKey = 'tag-' + tagParts[0]; 
            }
            window.currentDateStr = storageKey; 
            const dateHeader = document.getElementById('date-header');
            
            if (/^\d{4}-\d{2}-\d{2}$/.test(storageKey)) dateHeader.innerHTML = getDisplayDate(storageKey);
            else if (storageKey === 'tag-personas') dateHeader.innerHTML = '#PERSONAS';
            else if (storageKey.startsWith('tag-')) dateHeader.innerHTML = '#' + tagParts[0].toUpperCase();
            else dateHeader.innerHTML = storageKey.toUpperCase();

            if (storageKey === 'tag-personas') {
                if (window.editor) { await executeSave(oldStorageKey); window.editor.destroy(); window.editor = null; }
                renderPersonasIndex();
            } else {
                await initEditor(storageKey, oldStorageKey);
                
                // If specific sub-section was requested (e.g. #persona.section), scroll to it directly
                if (tagParts.length > 1) {
                    setTimeout(() => {
                        const targetName = tagParts.slice(1).join(' ').toUpperCase();
                        const headers = Array.from(document.querySelectorAll('.native-header-2'));
                        const targetEl = headers.find(h => h.textContent.trim().toUpperCase() === targetName);
                        
                        if (targetEl) {
                            targetEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
                            targetEl.style.backgroundColor = 'var(--text-color)';
                            targetEl.style.color = 'var(--bg-color)';
                            setTimeout(() => { targetEl.style.backgroundColor = ''; targetEl.style.color = ''; }, 800);
                        }
                    }, 150);
                }
            }
        };

        async function initEditor(newStorageKey, oldStorageKey) {
            if (window.editor) { await executeSave(oldStorageKey); window.editor.destroy(); window.editor = null; }
            
            const isEditable = /^\d{4}-\d{2}-\d{2}$/.test(newStorageKey) ? newStorageKey === todayStr : true; 
            let cachedData = appDB.cache[newStorageKey];
            let editorData = cachedData ? { blocks: JSON.parse(JSON.stringify(cachedData.blocks)), timestamps: {...cachedData.timestamps} } : { blocks: [] };
            window.timestamps = editorData.timestamps || {};

            if (newStorageKey.startsWith('tag-')) {
                const baseTag = newStorageKey.substring(4); 
                
                if (editorData.blocks.length === 0) editorData.blocks.push({ type: 'paragraph', data: {}, id: crypto.randomUUID() });

                const mentions = TagIndex.getMentionsForRoot(baseTag);
                const groups = { '': [] };

                // Radically simplified flat grouping logic by section
                mentions.forEach(m => {
                    const parts = m.fullTag.replace('#', '').split('.');
                    const section = parts.length > 1 ? parts.slice(1).join(' ').toUpperCase() : '';
                    
                    if (!groups[section]) groups[section] = [];
                    // Deduplicate in case a block has two tags in the same section e.g. #bob.ideas and #bob.ideas 
                    if (!groups[section].some(existing => existing.block.id === m.block.id)) groups[section].push(m);
                });

                Object.keys(groups).sort().forEach(section => {
                    if (groups[section].length === 0) return;
                    
                    let insertIdx = editorData.blocks.length;

                    if (section !== '') {
                        // Find existing permanent H2 for this section
                        let sectionH2Idx = editorData.blocks.findIndex(b => b.type === 'header' && b.data.level === 2 && !b.dynamicInfo && (b.data.text || '').replace(/<[^>]*>?/gm, '').trim().toUpperCase() === section);

                        if (sectionH2Idx === -1) {
                            // Create permanent H2 and a blank paragraph for user to type
                            editorData.blocks.push({ type: 'header', data: { text: section, level: 2 }, id: crypto.randomUUID() });
                            editorData.blocks.push({ type: 'paragraph', data: {}, id: crypto.randomUUID() });
                            insertIdx = editorData.blocks.length;
                        } else {
                            // Find where this section ends (right before the next H1/H2)
                            insertIdx = sectionH2Idx + 1;
                            while (insertIdx < editorData.blocks.length) {
                                const b = editorData.blocks[insertIdx];
                                if (b.type === 'header' && b.data.level <= 2 && !b.dynamicInfo) break;
                                insertIdx++;
                            }
                        }
                    } else {
                        // Base mentions go right before the first H2
                        const firstH2Idx = editorData.blocks.findIndex(b => b.type === 'header' && b.data.level === 2 && !b.dynamicInfo);
                        insertIdx = firstH2Idx !== -1 ? firstH2Idx : editorData.blocks.length;
                    }

                    const dynamicBlocks = groups[section].sort((a,b) => (b.timestamp || new Date(b.day).getTime()) - (a.timestamp || new Date(a.day).getTime())).map(m => {
                        const blockClone = JSON.parse(JSON.stringify(m.block));
                        blockClone.dynamicInfo = { source: m.day, timestamp: m.timestamp }; 
                        blockClone.id = 'dyn-' + crypto.randomUUID();
                        return blockClone;
                    });

                    editorData.blocks.splice(insertIdx, 0, ...dynamicBlocks);
                });
            }

            window.editor = new BlockManager('editor-container', { readOnly: !isEditable, data: editorData, onChange: () => { if (isEditable) scheduleSave(); } });
        }

        appDB.init().then(() => { TagIndex.build(); window.loadVirtualPage(window.currentDateStr); AIEngine.init(); });
    </script>
</body>
