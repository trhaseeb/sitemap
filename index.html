<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Infinite Notes</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Notes">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#121212">
    
    <!-- Dynamic Manifest Injection -->
    <link id="pwa-manifest" rel="manifest" href="">
    <link id="pwa-icon" rel="apple-touch-icon" href="">

    <!-- Core Editor & Plugins -->
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/paragraph@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/header@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/nested-list@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/checklist@latest"></script>

    <!-- Leaflet for Map Tool -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* --- Standardized Pure Flat Theme --- */
        :root {
            --bg-color: #ffffff; --text-color: #000000; --border-color: #e0e0e0;
            --muted-bg: #f5f5f5; --muted-text: #666666; --accent-color: #000000;
            --ai-color: #6366f1; /* Indigo for AI ink */
            --recall-bg: #fcfcfc; --recall-border: #cccccc;
            --editor-toolbar-bg: #ffffff; --editor-hover-bg: #ebebeb; --overlay-bg: transparent; 
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --keyboard-offset: 0px; --safe-area-top: env(safe-area-inset-top, 0px);
            --std-border-radius: 8px; --std-padding: 12px 14px; --std-margin: 8px 0;
            --std-icon-size: 20px; --std-control-height: 36px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212; --text-color: #ffffff; --border-color: #333333;
                --muted-bg: #1e1e1e; --muted-text: #aaaaaa; --accent-color: #ffffff;
                --ai-color: #a78bfa; /* Soft purple for dark mode AI ink */
                --recall-bg: #1a1a1a; --recall-border: #444444;
                --editor-toolbar-bg: #1e1e1e; --editor-hover-bg: #2a2a2a;
            }
        }

        /* Body hides horizontal overflow so the brutalist header doesn't cause page scrolling */
        body { background-color: var(--bg-color); color: var(--text-color); font-family: var(--font-main); margin: 0; padding: 0; line-height: 1.6; width: 100vw; overflow-x: hidden; }
        
        .app-container { max-width: 800px; width: 100%; margin: 0 auto; padding: calc(10vh + var(--safe-area-top)) 40px 65vh 40px; box-sizing: border-box; }
        
        #editorjs { padding: 0; max-width: 100%; box-sizing: border-box; transition: opacity 0.3s; min-height: 50vh; }
        
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        ::-webkit-scrollbar:horizontal { display: none; }
        svg { flex-shrink: 0; }

        /* Editor.js Overrides */
        .ce-block { position: relative; z-index: auto !important; } 
        .ce-toolbar { z-index: 10000 !important; }
        .ce-popover, .ce-settings, .tc-popover, .cdx-settings, .ce-tooltip { z-index: 10005 !important; }
        .ce-block__content { max-width: 100% !important; }
        .ce-toolbar__plus, .ce-toolbar__settings-btn { background-color: var(--bg-color) !important; color: var(--text-color) !important; border: 1px solid transparent; }
        .ce-toolbar__plus:hover, .ce-toolbar__settings-btn:hover { background-color: var(--editor-hover-bg) !important; border-color: var(--border-color); }
        .ce-popover__overlay, .ce-popover-overlay, .cdx-overlay { background: var(--overlay-bg) !important; background-color: var(--overlay-bg) !important; box-shadow: none !important; backdrop-filter: none !important; }
        .ce-popover-item__icon svg { width: var(--std-icon-size) !important; height: var(--std-icon-size) !important; }
        .ce-popover-item__title { font-size: 14px !important; font-weight: 500 !important; }

        @media (prefers-color-scheme: dark) {
            .ce-popover, .ce-popover__container, .ce-popover__panel, .ce-popover__items, .ce-inline-toolbar, .ce-conversion-toolbar, .ce-settings, .ce-tooltip { background: var(--editor-toolbar-bg) !important; background-color: var(--editor-toolbar-bg) !important; border-color: var(--border-color) !important; box-shadow: none !important; }
            .ce-tooltip { color: var(--text-color) !important; }
            .ce-popover-item, .ce-inline-tool, .ce-conversion-tool, .ce-settings__button { background-color: transparent !important; color: var(--text-color) !important; }
            .ce-popover-item__title { color: var(--text-color) !important; }
            .ce-popover-item:hover, .ce-inline-tool:hover, .ce-conversion-tool:hover, .ce-settings__button:hover { background-color: var(--editor-hover-bg) !important; }
            .ce-popover-item__icon, .ce-popover-item__icon--active, .ce-popover__item-icon { background-color: var(--muted-bg) !important; color: var(--text-color) !important; box-shadow: none !important; border-color: var(--border-color) !important; }
            .cdx-search-field, .cdx-input { background-color: var(--muted-bg) !important; color: var(--text-color) !important; border: 1px solid var(--border-color) !important; box-shadow: none !important; }
            .cdx-search-field__icon { color: var(--muted-text) !important; }
            .ce-block--selected .ce-block__content { background-color: var(--editor-hover-bg) !important; }
            ::selection { background: var(--ai-color) !important; color: #ffffff; }
        }

        @media (max-width: 650px) {
            .ce-popover, .ce-settings, .ce-inline-toolbar { bottom: var(--keyboard-offset, 0px) !important; max-height: calc(100vh - var(--keyboard-offset, 0px) - 20px) !important; transition: bottom 0.2s cubic-bezier(0.1, 0.7, 0.1, 1), max-height 0.2s ease; }
        }

        /* --- STYLISH BRUTALIST HEADER --- */
        #date-header { 
            text-align: left; 
            font-size: clamp(60px, 18vw, 150px); 
            font-weight: 900; 
            font-style: italic; 
            text-transform: uppercase; 
            letter-spacing: -0.06em; 
            line-height: 0.8; 
            color: var(--text-color); 
            margin: -20px 0 10px -25px; 
            cursor: pointer; 
            transition: opacity 0.2s; 
            user-select: none; 
            white-space: nowrap; 
        }
        #date-header:hover { opacity: 0.7; }
        #date-header:active { opacity: 0.5; }
        
        #ai-status {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--ai-color);
            margin-bottom: 40px;
            opacity: 0.8;
            padding-left: 4px;
            height: 14px; /* Fixes layout jumping when empty */
        }

        .ce-block-time { font-size: 11px; color: var(--muted-text); text-align: right; padding-top: 6px; padding-bottom: 2px; padding-right: 2px; user-select: none; opacity: 0.7; font-weight: 500; }
        
        #loading-indicator { text-align: center; color: var(--muted-text); font-size: 14px; margin-top: 50px; font-weight: 500; }

        .cal-btn { padding: 8px 12px; background: transparent; border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-color); cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; white-space: nowrap; }
        .cal-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
        .cal-btn:hover { background: var(--editor-hover-bg); }
        .cal-btn.primary { background: var(--text-color); color: var(--bg-color); border-color: var(--text-color); }
        .cal-btn.primary:hover { opacity: 0.9; }

        .tool-title-input { width: 100%; border: none; background: transparent; color: var(--text-color); font-size: 16px; font-weight: 600; outline: none; font-family: inherit; padding: 4px 0; margin-bottom: 8px; }
        .tool-title-input::placeholder { color: var(--muted-text); font-weight: 500; opacity: 0.6; }

        /* --- THE INVISIBLE AI INK --- */
        .ai-text-block {
            color: var(--ai-color);
            font-style: italic;
            font-weight: 500;
            font-size: 16px;
            line-height: 1.6;
            outline: none;
            padding: 8px 0;
            white-space: pre-wrap;
            border-left: 2px solid var(--ai-color);
            padding-left: 14px;
            margin-left: -16px;
        }

        /* --- UNIFIED DATE PICKER MODAL --- */
        .global-calendar-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.4); z-index: 100000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s ease; backdrop-filter: blur(2px); }
        .global-calendar-modal.show { display: flex; opacity: 1; }
        .cp-container { background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; width: 90%; max-width: 340px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: flex; flex-direction: column; gap: 12px; }
        .cp-header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .cp-header button { background: var(--muted-bg); border: 1px solid var(--border-color); color: var(--text-color); border-radius: 6px; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .cp-header button:hover { background: var(--editor-hover-bg); }
        .cp-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 12px; color: var(--muted-text); font-weight: 600; margin-bottom: 4px; }
        .cp-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cp-day { padding: 8px 0; text-align: center; font-size: 14px; cursor: pointer; border-radius: 6px; color: var(--text-color); transition: background 0.1s; }
        .cp-day:hover:not(.muted) { background: var(--editor-hover-bg); }
        .cp-day.active { background: var(--text-color) !important; color: var(--bg-color) !important; font-weight: bold; }
        .cp-day.muted { color: var(--border-color); pointer-events: none; opacity: 0.3; }
        .cp-time { display: flex; justify-content: center; align-items: center; gap: 6px; padding-top: 16px; border-top: 1px solid var(--border-color); }
        #dp-time-input { width: 100%; padding: 10px; font-size: 16px; text-align: center; border-radius: 6px; border: 1px solid var(--border-color); background: var(--muted-bg); color: var(--text-color); font-family: inherit; outline: none; }

        /* --- COMPUTE BLOCK STYLES --- */
        .compute-tool-container { border: 1px solid var(--border-color); border-radius: var(--std-border-radius); background: var(--muted-bg); overflow: hidden; margin: 8px 0; display: flex; flex-direction: column; }
        .compute-input { width: 100%; padding: 16px 16px 12px 16px; background: transparent; border: none; outline: none; font-family: monospace; font-size: 14px; color: var(--text-color); resize: none; box-sizing: border-box; line-height: 1.5; min-height: 50px; font-weight: bold; }
        .compute-input::placeholder { color: var(--muted-text); opacity: 0.5; font-weight: normal; }
        .compute-output { padding: 12px 16px; border-top: 1px dashed var(--border-color); font-family: monospace; font-size: 16px; font-weight: 700; color: var(--text-color); background: var(--bg-color); word-break: break-word; min-height: 20px; }
        .compute-error { color: #EF4444; font-weight: 400; font-size: 13px; }

        /* --- SCAN BLOCK STYLES --- */
        .scan-wrapper { margin: 8px 0; width: 100%; border: 1px dashed var(--border-color); border-radius: var(--std-border-radius); display: flex; flex-direction: column; overflow: hidden; }
        .scan-action-area { padding: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; cursor: pointer; transition: background 0.2s; }
        .scan-action-area:hover { background: var(--editor-hover-bg); }
        .scan-icon { color: var(--muted-text); }
        .scan-icon svg { width: 32px; height: 32px; }
        .scan-label { font-size: 14px; font-weight: 600; color: var(--text-color); letter-spacing: 1px; }
        .scan-status { font-family: monospace; font-size: 12px; font-weight: bold; color: var(--muted-text); margin-top: 10px; }
        .scan-output-textarea { width: 100%; min-height: 100px; padding: 16px; border: none; background: var(--muted-bg); color: var(--text-color); font-family: monospace; font-size: 13px; line-height: 1.5; resize: none; outline: none; box-sizing: border-box; }

        /* --- RECALL BLOCK STYLES --- */
        .recall-search-wrapper { position: relative; width: 100%; margin: 8px 0; }
        .recall-search-input { width: 100%; padding: 12px 14px 12px 40px; border-radius: var(--std-border-radius); border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-color); font-family: inherit; font-size: 15px; outline: none; box-sizing: border-box; transition: border-color 0.2s; }
        .recall-search-input:focus { border-color: var(--text-color); }
        .recall-search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; color: var(--muted-text); }
        .recall-dropdown { position: absolute; top: 100%; left: 0; width: 100%; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: var(--std-border-radius); margin-top: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); z-index: 1000; max-height: 250px; overflow-y: auto; display: none; }
        .recall-dropdown.active { display: block; }
        .recall-result-item { padding: 12px 14px; cursor: pointer; border-bottom: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 4px; }
        .recall-result-item:last-child { border-bottom: none; }
        .recall-result-item:hover { background: var(--editor-hover-bg); }
        .recall-result-meta { font-size: 11px; color: var(--text-color); font-weight: 600; opacity: 0.7; }
        .recall-result-snippet { font-size: 14px; color: var(--muted-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .recalled-block { margin: 8px 0; padding: 12px 16px; background: var(--recall-bg); border-left: 4px solid var(--recall-border); border-radius: 4px var(--std-border-radius) var(--std-border-radius) 4px; position: relative; }
        .recalled-orig-meta { font-size: 10px; color: var(--muted-text); font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .recalled-orig-meta svg { width: 12px; height: 12px; }

        /* Other Plugin Tool Styles */
        .calendar-tool-container { display: flex; flex-direction: column; gap: 12px; width: 100%; margin: 8px 0; }
        .cal-header { display: flex; align-items: center; gap: 10px; }
        .cal-header svg { color: var(--muted-text); }
        .cal-title { flex-grow: 1; border: none; background: transparent; color: var(--text-color); font-size: 18px; font-weight: 600; outline: none; font-family: inherit; }
        .cal-display-btn { border: 1px solid var(--border-color); background: var(--muted-bg); color: var(--text-color); border-radius: 6px; padding: 10px 14px; font-family: inherit; font-size: 14px; outline: none; cursor: pointer; text-align: left; display: flex; align-items: center; justify-content: space-between; }
        .cal-display-btn:hover { background: var(--editor-hover-bg); }
        .cal-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .cal-actions .cal-btn { flex: 1; min-width: 130px; }

        .voice-tool-container { display: flex; align-items: center; gap: 12px; margin: 8px 0; }
        .v-memo__btn { width: var(--std-control-height); height: var(--std-control-height); border-radius: 50%; border: 1px solid var(--border-color); background: var(--muted-bg); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-color); flex-shrink: 0; min-width: var(--std-control-height); transition: all 0.2s; }
        .v-memo__btn:hover { background: var(--editor-hover-bg); }
        .v-memo__btn.recording { color: #ffffff; border-color: #ef4444; background: #ef4444; animation: pulse 1.5s infinite; }
        .v-memo__btn.playing { color: #ffffff; border-color: #3B82F6; background: #3B82F6; }
        .v-memo__title { flex-grow: 1; border: none; background: transparent; color: var(--text-color); font-size: 15px; font-weight: 600; outline: none; font-family: inherit; min-width: 0; }
        .v-memo__status { font-size: 13px; color: var(--muted-text); white-space: nowrap; font-weight: 500; }
        
        .smart-canvas-selector { display: flex; gap: 12px; padding: 12px 0; justify-content: center; flex-wrap: wrap; }
        .smart-canvas-option { flex: 1; min-width: 100px; display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 24px 10px; border: 1px dashed var(--border-color); border-radius: 8px; background: transparent; color: var(--text-color); cursor: pointer; transition: all 0.2s; font-size: 13px; font-weight: 500; font-family: inherit; }
        .smart-canvas-option:hover { background: var(--editor-hover-bg); border-style: solid; }
        .smart-canvas-option svg { width: 32px; height: 32px; color: var(--muted-text); transition: color 0.2s; }
        .smart-canvas-option:hover svg { color: var(--text-color); }
        
        .canvas-relative-frame { position: relative; width: 100%; border-radius: var(--std-border-radius); border: 1px solid var(--border-color); overflow: hidden; margin: 8px 0; }
        .block-controls-stack { position: absolute; top: 10px; left: 10px; display: flex; flex-direction: column; gap: 8px; z-index: 401 !important; }
        .canvas-action-btn { width: 32px; height: 32px; border-radius: 6px; background: var(--editor-toolbar-bg); border: 1px solid var(--border-color); color: var(--text-color); cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0.8; transition: all 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.15); }
        .canvas-action-btn:hover { opacity: 1; background: var(--editor-hover-bg); }
        .canvas-action-btn.active { background: var(--text-color); color: var(--bg-color); opacity: 1; border-color: var(--text-color); }
        
        .leaflet-container { background: var(--bg-color) !important; z-index: 1 !important; width: 100%; height: 400px; border: none; }
        .leaflet-container.drawing-mode, .leaflet-container.drawing-mode .leaflet-interactive { cursor: crosshair !important; touch-action: none; }
        .leaflet-container.locked-mode { cursor: default !important; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- The Brutalist Header -->
        <div id="date-header"></div>
        <div id="ai-status"></div>
        <div id="loading-indicator">Initializing Local Database...</div>
        <div id="editorjs" style="opacity: 0;"></div>
    </div>

    <!-- UI Modal -->
    <div id="global-calendar-modal" class="global-calendar-modal">
        <div class="cp-container" onclick="event.stopPropagation()">
            <div class="cp-header">
                <button id="dp-prev"><</button>
                <span id="dp-month-label">Month Year</span>
                <button id="dp-next">></button>
            </div>
            <div class="cp-weekdays">
                <span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span>
            </div>
            <div id="dp-grid" class="cp-grid"></div>
            <div id="dp-time-section" class="cp-time" style="display: none;">
                <input type="time" id="dp-time-input" required>
            </div>
            <div style="margin-top: 12px; display: flex; gap: 8px;">
                <button id="dp-today-btn" class="cal-btn" style="flex: 1;">Today</button>
                <button id="dp-confirm-btn" class="cal-btn primary" style="flex: 1;">Confirm</button>
            </div>
        </div>
    </div>

    <!-- MAIN APP SCRIPT -->
    <script type="module">
        // ============================================================================
        // ⚙️ INFINITE NOTES CONFIGURATION
        // ============================================================================
        const CONFIG = {
            DATABASE_MODE: 'indexedDB',
            PWA_LOGO_URL: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzAwMDAwMCI+PHBhdGggZD0iTTE0IDJINmEyIDIgMCAwIDAtMiAydjE2YTIgMiAwIDAgMCAyIDJoMTJhMiAyIDAgMCAwIDItMlY4bC02LTZ6Ii8+PC9zdmc+",
            
            // 🤖 THE INVISIBLE COLLABORATOR CONFIG
            AI_CO_PILOT: {
                name: "", // Leave blank for a random name (e.g. "Cipher")
                persona: "", // Leave blank for a random unpredictable personality
                canEditYourWork: true // If true, the AI might unpredictably overwrite your blocks!
            }
        };

        // --- AI Persona Generation ---
        const NAMES = ["Echo", "Void", "Cipher", "Atlas", "Sparks", "Orion", "Sage", "Nox", "Glitch"];
        const PERSONAS = [
            "You are a sarcastic pragmatist who gives painfully honest, brief answers.",
            "You are a cryptic philosopher. You answer questions with metaphors and deep insights.",
            "You are hyper-logical, cold, and highly analytical. You use exact logic.",
            "You are highly erratic, enthusiastic, and prone to going on fascinating tangents.",
            "You are a minimalist. You answer with as few words as absolutely possible."
        ];
        
        if (!sessionStorage.getItem('ai_name')) {
            sessionStorage.setItem('ai_name', CONFIG.AI_CO_PILOT.name || NAMES[Math.floor(Math.random() * NAMES.length)]);
            sessionStorage.setItem('ai_persona', CONFIG.AI_CO_PILOT.persona || PERSONAS[Math.floor(Math.random() * PERSONAS.length)]);
        }
        
        const aiName = sessionStorage.getItem('ai_name');
        const aiPersona = sessionStorage.getItem('ai_persona');

        // Note: The UI status indicator stays quiet until invoked.
        document.getElementById('ai-status').textContent = `Collaborator: @${aiName} (Sleeping)`;

        // --- Apply Global Configurations ---
        document.getElementById('pwa-icon').href = CONFIG.PWA_LOGO_URL;
        document.getElementById('pwa-manifest').href = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(JSON.stringify({
            "name": "Infinite Notes", "short_name": "Notes", "start_url": ".", "display": "standalone",
            "background_color": window.matchMedia('(prefers-color-scheme: dark)').matches ? "#121212" : "#ffffff",
            "theme_color": window.matchMedia('(prefers-color-scheme: dark)').matches ? "#121212" : "#ffffff",
            "icons": [{"src": CONFIG.PWA_LOGO_URL, "sizes": "192x192", "type": "image/svg+xml"}]
        }));

        window.addEventListener('error', function(e) { if (e.message.includes('ResizeObserver')) e.stopImmediatePropagation(); });

        if (window.visualViewport) {
            const updateKeyboardOffset = () => { document.documentElement.style.setProperty('--keyboard-offset', `${Math.max(0, window.innerHeight - window.visualViewport.height)}px`); };
            window.visualViewport.addEventListener('resize', updateKeyboardOffset); updateKeyboardOffset();
        }

        const ICONS = {

        function createEl(tag, classNames = '', attributes = {}, children = []) {
            const el = document.createElement(tag); if (classNames) el.className = classNames;
            for (const [k, v] of Object.entries(attributes)) { if (k === 'innerHTML') el.innerHTML = v; else if (k === 'textContent') el.textContent = v; else if (k === 'style') el.style.cssText = v; else el.setAttribute(k, v); }

        const NotificationEngine = {
            timers: new Map(),
            schedule: function(id, dt, title) {
                this.cancel(id); if (typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
                const delay = new Date(dt).getTime() - Date.now();
                if (delay > 0) this.timers.set(id, setTimeout(() => { new Notification('Note Reminder', { body: title || 'Scheduled Event Reached' }); this.timers.delete(id); }, delay));
            },
            cancel: function(id) { if (this.timers.has(id)) { clearTimeout(this.timers.get(id)); this.timers.delete(id); } }
        };

        class IndexedDBAdapter {
            constructor() { this.dbName = 'InfiniteNotesDB'; this.storeName = 'daily_notes'; this.cache = {}; }
            init() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open(this.dbName, 1);
                    req.onupgradeneeded = (e) => { e.target.result.createObjectStore(this.storeName); };
                    req.onsuccess = (e) => { this.db = e.target.result; this.loadAll().then(data => { this.cache = data; resolve(); }); };
                    req.onerror = reject;
                });
            }
            save(dateStr, data) { this.cache[dateStr] = data; const tx = this.db.transaction(this.storeName, 'readwrite'); tx.objectStore(this.storeName).put(data, dateStr); }
            loadAll() {
                return new Promise(resolve => {
                    const tx = this.db.transaction(this.storeName, 'readonly'); const store = tx.objectStore(this.storeName);
                    const valReq = store.getAll(); const keyReq = store.getAllKeys();
                    tx.oncomplete = () => { const result = {}; keyReq.result.forEach((key, i) => result[key] = valReq.result[i]); resolve(result); };
                });
            }
        }

                for (let i = 0; i < new Date(year, month, 1).getDay(); i++) elements.grid.appendChild(createEl('div', 'cp-day muted', {style: "opacity: 0"}));
                const daysInMonth = new Date(year, month + 1, 0).getDate();

                    let isMuted = false;
                    if (config.disableFuture && cellDateStr > todayStr) isMuted = true;
                    if (config.disablePast && cellDateStr < todayStr) isMuted = true;
                    if (config.onlyNotes && cellDateStr !== todayStr) { if (!appDB.cache[cellDateStr] || !appDB.cache[cellDateStr].blocks || appDB.cache[cellDateStr].blocks.length === 0) isMuted = true; }

                    if (isMuted) { dayEl.classList.add('muted'); } 
                    else {
                        dayEl.onclick = () => { activeDate.setFullYear(year, month, i); render(); };
                        if (!config.showTime && appDB.cache[cellDateStr] && appDB.cache[cellDateStr].blocks?.length > 0 && cellDateStr !== todayStr) {

            document.getElementById('dp-confirm-btn').onclick = () => {

                }
                modal.classList.remove('show'); setTimeout(() => modal.style.display = 'none', 200);
                if (onConfirm) onConfirm(new Date(activeDate));
            };
            modal.addEventListener('click', (e) => { if (e.target.id === 'global-calendar-modal') { modal.classList.remove('show'); setTimeout(() => modal.style.display = 'none', 200); } });

                    config = { showTime: options.showTime || false, disableFuture: options.disableFuture || false, disablePast: options.disablePast || false, onlyNotes: options.onlyNotes || false };

        // 2. The Scan Tool (Local OCR)
        class ScanTool {
            static get toolbox() { return { title: 'Scan Text', icon: ICONS.scan }; }
            constructor({data, config, readOnly}) {
                this.config = config; this.readOnly = readOnly;
                this.data = { text: data.text || '' };

            }
            render() {
                this.wrapper.innerHTML = '';

                } else if (!this.readOnly) {
                    this.actionArea = createEl('div', 'scan-action-area');
                    const icon = createEl('div', 'scan-icon', {innerHTML: ICONS.scan});

                    this.status = createEl('div', 'scan-status');
                    this.fileInput = createEl('input', '', { type: 'file', accept: 'image/*', capture: 'environment', style: 'display: none;' });
                    this.actionArea.onclick = () => this.fileInput.click();
                    this.fileInput.onchange = (e) => this.handleScan(e.target.files[0]);
                    this.actionArea.append(icon, label, this.status);
                    this.wrapper.append(this.actionArea, this.fileInput);
                } else {
                    this.wrapper.innerHTML = '<div style="padding: 12px; color: var(--muted-text); font-size: 13px;">Empty Scan Block</div>';
                }
                return this.wrapper;
            }
            adjustHeight() { if (this.input) { this.input.style.height = 'auto'; this.input.style.height = (this.input.scrollHeight) + 'px'; } }
            async handleScan(file) {
                if (!file) return;
                this.actionArea.onclick = null; this.actionArea.style.cursor = 'default';
                this.actionArea.querySelector('.scan-icon').style.display = 'none';
                this.actionArea.querySelector('.scan-label').style.display = 'none';
                this.status.textContent = 'INITIALIZING OCR...';
                try {
                    if (typeof Tesseract === 'undefined') {
                        await new Promise((resolve, reject) => {
                            const script = document.createElement('script');
                            script.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
                            script.onload = resolve; script.onerror = reject;
                            document.head.appendChild(script);
                        });
                    }
                    const worker = await Tesseract.createWorker('eng', 1, { logger: m => { if(m.status === 'recognizing text') this.status.textContent = `ANALYZING: ${Math.round(m.progress * 100)}%`; } });
                    const { data: { text } } = await worker.recognize(file);
                    await worker.terminate();
                    this.data.text = text.trim(); this.render(); if(this.config.onChange) this.config.onChange();
                } catch(e) {
                    this.status.textContent = 'SCAN FAILED. TRY AGAIN.';
                    this.actionArea.onclick = () => this.fileInput.click(); this.actionArea.style.cursor = 'pointer';
                }
            }
            save() { return this.data; }
        }

        // 3. The Compute (REPL) Tool - PROXY MAGIC
        class ComputeTool {
            static get toolbox() { return { title: 'Compute Logic', icon: ICONS.compute }; }

            constructor({data, config, readOnly}) {
                this.config = config; this.readOnly = readOnly;
                this.data = { code: data.code || '', output: data.output || '' };
                this.wrapper = createEl('div', 'compute-tool-container');
            }

            render() {
                this.wrapper.innerHTML = '';
                this.input = createEl('textarea', 'compute-input', { placeholder: 'Type logic: 10 * 4 or groceries / 2...', value: this.data.code });
                if (this.readOnly) this.input.readOnly = true;
                
                this.output = createEl('div', 'compute-output', { innerHTML: this.data.output });
                const adjustHeight = () => { this.input.style.height = 'auto'; this.input.style.height = (this.input.scrollHeight) + 'px'; };
                setTimeout(adjustHeight, 0);

                let evalTimeout;
                this.input.addEventListener('input', (e) => {
                    adjustHeight();
                    this.data.code = e.target.value;
                    clearTimeout(evalTimeout);
                    evalTimeout = setTimeout(() => this.evaluateLogic(), 400); 
                });

                this.wrapper.append(this.input, this.output); return this.wrapper;
            }

            async evaluateLogic() {
                if (!this.data.code.trim()) { this.output.innerHTML = ''; this.data.output = ''; if(this.config.onChange) this.config.onChange(); return; }

                const find = (query) => {
                    let results = []; const q = query.toLowerCase();
                    Object.values(appDB.cache).forEach(day => {
                        if (!day.blocks) return;
                        day.blocks.forEach(b => {
                            if (b.type === 'compute' || b.type === 'recall' || b.type === 'aiText') return; 
                            let text = JSON.stringify(b.data).toLowerCase();
                            if (text.includes(q)) {
                                if (b.data.text) results.push(b.data.text.replace(/<[^>]*>?/gm, ''));
                                else if (b.data.items) results.push(...b.data.items.map(i=>i.content.replace(/<[^>]*>?/gm, '')));
                                else if (b.data.title) results.push(b.data.title);
                            }
                        });
                    });
                    return results;
                };

                const nums = (query) => {
                    let texts = find(query); let numbers = [];
                    texts.forEach(t => { let matches = t.match(/-?\d+(\.\d+)?/g); if (matches) numbers.push(...matches.map(Number)); });
                    return numbers;
                };

                const sum = (query) => nums(query).reduce((a,b)=>a+b, 0);
                const avg = (query) => { let n = nums(query); return n.length ? sum(query)/n.length : 0; };

                const allowed = { Math, Date, Number, String, Array, sum, avg, nums, find };
                const ctx = new Proxy({}, {
                    has: () => true, 
                    get: (target, prop) => {
                        if (prop === Symbol.unscopables) return undefined;
                        if (prop in allowed) return allowed[prop];
                        if (typeof prop === 'string') return sum(prop.toLowerCase());
                        return undefined;
                    }
                });

                try {
                    let codeText = this.data.code;
                    const AsyncFunction = Object.getPrototypeOf(async function(){}).constructor;
                    const fn = new AsyncFunction('ctx', `with (ctx) { return eval(${JSON.stringify(codeText)}); }`);
                    const result = await fn(ctx);
                    
                    if (result === undefined || result === null || Number.isNaN(result)) { 
                        this.output.innerHTML = ''; this.data.output = ''; 
                    } else if (this.isNumberArray(result)) {
                        this.data.output = this.generateSparkline(result);
                        this.output.innerHTML = this.data.output;
                        this.output.classList.remove('compute-error');
                    } else {
                        this.data.output = typeof result === 'object' ? JSON.stringify(result) : String(result);
                        this.output.innerHTML = this.data.output;
                        this.output.classList.remove('compute-error');
                    }
                } catch(e) {
                    this.data.output = `<span class="compute-error">${e.message}</span>`;
                    this.output.innerHTML = this.data.output;
                }
                if(this.config.onChange) this.config.onChange();
            }
            isNumberArray(arr) { return Array.isArray(arr) && arr.length >= 2 && arr.every(n => typeof n === 'number' && !isNaN(n)); }
            generateSparkline(data) {
                const min = Math.min(...data); const max = Math.max(...data); const range = (max - min) || 1;
                const width = 100, height = 40;
                const points = data.map((val, i) => { const x = (i / (data.length - 1)) * width; const y = height - ((val - min) / range) * height; return `${x},${y}`; }).join(' ');
                return `<div style="font-size: 11px; color: var(--muted-text); margin-bottom: 4px; font-weight: normal;">Array: [${data.join(', ')}]</div>
                    <svg viewBox="0 -5 100 50" style="width: 100%; height: 60px; overflow: visible;" preserveAspectRatio="none">
                    <polyline fill="none" stroke="var(--text-color)" stroke-width="2" points="${points}"></polyline>
                    <circle cx="100" cy="${height - ((data[data.length - 1] - min) / range) * height}" r="3" fill="#EF4444"></circle></svg>`;
            }
            save() { return this.data; }
        }

        // 4. The Recall Tool 
        class RecallTool {
            static get toolbox() { return { title: 'Recall', icon: ICONS.recall }; }

            constructor({data, config, api, readOnly}) {
                this.api = api; this.config = config; this.readOnly = readOnly;
                this.data = data && data.recalled ? data : { recalled: false, sourceDate: null, sourceTime: null, sourceBlock: null };
                this.wrapper = createEl('div');
            }

            render() {
                this.wrapper.innerHTML = '';
                if (this.data.recalled) { this.wrapper.appendChild(this.renderRecalledState()); } 
                else if (!this.readOnly) { this.wrapper.appendChild(this.renderSearchState()); } 
                else { this.wrapper.innerHTML = '<div style="color: var(--muted-text); font-size: 13px;">Empty Recall Block</div>'; }
                return this.wrapper;
            }

            renderSearchState() {
                const searchWrapper = createEl('div', 'recall-search-wrapper');
                const icon = createEl('div', 'recall-search-icon', {innerHTML: ICONS.search});
                const input = createEl('input', 'recall-search-input', { type: 'text', placeholder: 'Search past notes, maps, voice...' });
                const dropdown = createEl('div', 'recall-dropdown');

                input.addEventListener('focus', async () => {
                    if (window.editor) { const currentData = await window.editor.save(); appDB.cache[window.currentDateStr] = currentData; }
                });

                input.addEventListener('input', (e) => {
                    const query = e.target.value.toLowerCase().trim(); dropdown.innerHTML = '';
                    if (!query) { dropdown.classList.remove('active'); return; }
                    let results = [];
                    Object.entries(appDB.cache).forEach(([dateStr, dayData]) => {
                        if (!dayData.blocks) return;
                        dayData.blocks.forEach(block => {
                            if (block.type === 'recall') return; 
                            let searchableText = block.type.toLowerCase() + " ";
                            if (block.data.text) searchableText += block.data.text.toLowerCase() + " ";
                            if (block.data.title) searchableText += block.data.title.toLowerCase() + " ";
                            if (block.data.items) searchableText += block.data.items.map(i => i.content || i.text).join(' ').toLowerCase() + " ";
                            if (block.type === 'smartCanvas') searchableText += "canvas drawing map sketch photo image ";
                            if (block.type === 'voice') searchableText += "voice audio memo recording mic ";
                            if (block.type === 'calendar') searchableText += "calendar event date reminder schedule ";
                            if (searchableText.includes(query)) { results.push({ date: dateStr, block: block, timestamp: dayData.timestamps?.[block.id] }); }
                        });
                    });
                    results.sort((a, b) => { const dateDiff = new Date(b.date).getTime() - new Date(a.date).getTime(); if (dateDiff !== 0) return dateDiff; return (b.timestamp || 0) - (a.timestamp || 0); });
                    if (results.length > 0) {
                        results.forEach(res => {
                            const item = createEl('div', 'recall-result-item');
                            const dateObj = new Date(res.date + 'T00:00:00'); const displayDate = dateObj.toLocaleDateString(undefined, {month: 'short', day: 'numeric', year: 'numeric'});
                            const displayTime = res.timestamp ? new Date(res.timestamp).toLocaleTimeString(undefined, {hour: 'numeric', minute: '2-digit'}) : '';
                            let snippet = "";
                            if (res.block.type === 'paragraph' || res.block.type === 'header' || res.block.type === 'scan' || res.block.type === 'aiText') { snippet = res.block.data.text.replace(/<[^>]*>?/gm, ''); } 
                            else if (res.block.type === 'calendar') { snippet = "📅 " + (res.block.data.title || "Calendar Event"); } 
                            else if (res.block.type === 'voice') { snippet = "🎤 " + (res.block.data.title || "Voice Memo"); } 
                            else if (res.block.type === 'smartCanvas') { snippet = "🖌️ " + (res.block.data.title || "Media Canvas"); } 
                            else if (res.block.type === 'list' || res.block.type === 'checklist') { let items = res.block.data.items || []; snippet = "📝 " + items.map(i=>i.content || i.text || '').join(', ').replace(/<[^>]*>?/gm, ''); } 
                            else { snippet = "📄 " + res.block.type.toUpperCase() + " Block"; }
                            snippet = snippet.substring(0, 60) + (snippet.length > 60 ? '...' : '');
                            item.appendChild(createEl('div', 'recall-result-meta', {textContent: `${displayDate} ${displayTime}`}));

            renderUniversalCanvas() {
                this.mediaContainer = createEl('div', 'leaflet-container'); this.relativeFrame.appendChild(this.mediaContainer);
                setTimeout(() => {
                    if (!this.mediaContainer.isConnected) return;
                    if (this.data.mode === 'map') {

            initDrawingTracker() {

                });

                });
                const endDraw = () => {

                if (this.readOnly) { disableAll(); this.mediaContainer.classList.add('locked-mode'); if(this.lockBtn) this.lockBtn.style.display = 'none'; if(this.drawBtn) this.drawBtn.style.display = 'none'; return; }
                if (!this.data.isLocked) {

        // 7. Voice Memo
        class VoiceMemo {
            static get toolbox() { return { title: 'Voice Memo', icon: ICONS.mic }; }
            constructor({data, config, api, readOnly}) {
                this.api = api; this.config = config; this.readOnly = readOnly; 
                this.data = { url: data.url || null, title: data.title || '' };
                if (!this.data.title && !this.data.url) { this.data.title = 'Voice Memo - ' + new Date().toLocaleTimeString([], {hour: 'numeric', minute: '2-digit'}); }
                this.recorder = null; this.chunks = []; this.isPlaying = false; this.isRecording = false;
                this.nodes = { wrapper: createEl('div', 'voice-tool-container'), button: createEl('button', 'v-memo__btn'), title: createEl('input', 'v-memo__title', { type: 'text', value: this.data.title, placeholder: 'Name this memo...' }), status: createEl('div', 'v-memo__status'), audio: createEl('audio', '', { style: 'display: none;', src: this.data.url || '' }) };
                if (this.readOnly) this.nodes.title.readOnly = true;
                this.nodes.title.addEventListener('input', (e) => { this.data.title = e.target.value; if(this.config.onChange) this.config.onChange(); });
            }
            render() {
                this.nodes.audio.onplay = () => { this.isPlaying = true; this.updateUI(); }; this.nodes.audio.onpause = () => { this.isPlaying = false; this.updateUI(); }; this.nodes.audio.onended = () => { this.isPlaying = false; this.updateUI(); };
                this.nodes.button.onclick = () => this.handleAction();
                this.nodes.wrapper.append(this.nodes.button, this.nodes.title, this.nodes.status, this.nodes.audio); this.updateUI(); return this.nodes.wrapper;
            }
            updateUI() {
                this.nodes.button.className = 'v-memo__btn'; 
                if (this.isPlaying) { this.nodes.button.innerHTML = ICONS.pause; this.nodes.status.innerText = 'Playing...'; this.nodes.button.classList.add('playing'); } 
                else if (this.data.url) { this.nodes.button.innerHTML = ICONS.play; this.nodes.status.innerText = 'Ready'; } 
                else if (this.isRecording) { this.nodes.button.innerHTML = ICONS.stop; this.nodes.status.innerText = 'Recording...'; this.nodes.button.classList.add('recording'); } 
                else if (this.readOnly) { this.nodes.button.style.display = 'none'; this.nodes.status.innerText = 'No audio'; }
                else { this.nodes.button.innerHTML = ICONS.mic; this.nodes.status.innerText = 'Record'; }
            }
            async handleAction() {
                if (this.readOnly && !this.data.url) return;
                if (this.data.url) { this.isPlaying ? this.nodes.audio.pause() : this.nodes.audio.play(); } 
                else {
                    if (this.isRecording) { this.recorder.stop(); this.isRecording = false; this.nodes.status.innerText = 'Processing...'; } 
                    else {
                        try {
                            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                            this.recorder = new MediaRecorder(stream); this.chunks = []; this.recorder.ondataavailable = (e) => this.chunks.push(e.data);
                            this.recorder.onstop = () => { const reader = new FileReader(); reader.onloadend = () => { this.data.url = reader.result; this.nodes.audio.src = this.data.url; this.updateUI(); if(this.config.onChange) this.config.onChange(); }; reader.readAsDataURL(new Blob(this.chunks, { type: 'audio/ogg; codecs=opus' })); stream.getTracks().forEach(track => track.stop()); };
                            this.recorder.start(); this.isRecording = true; this.updateUI();
                        } catch (err) { this.nodes.status.innerText = 'Mic access denied'; }
                    }
                }
            }
            destroy() { if (this.recorder && this.recorder.state !== 'inactive') this.recorder.stop(); if (this.recorder && this.recorder.stream) this.recorder.stream.getTracks().forEach(track => track.stop()); this.nodes.audio.pause(); }
            save() { return this.data; }
        }

        function getDisplayDate(dateStr) {
            const [y, m, d] = dateStr.split('-'); const date = new Date(y, m - 1, d);
            const monthDay = date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
            const weekday = date.toLocaleDateString(undefined, { weekday: 'long' });
            return `${monthDay}<br>${weekday}`; 
        }

        document.getElementById('date-header').onclick = () => {
            const [y, m, d] = window.currentDateStr.split('-').map(Number);
            DatePicker.open(new Date(y, m - 1, d), (selectedDate) => {
                const selectedStr = getLocalYYYYMMDD(selectedDate);
                if (window.currentDateStr !== selectedStr) {
                    window.currentDateStr = selectedStr;
                    document.getElementById('date-header').innerHTML = getDisplayDate(selectedStr);
                    initEditor(selectedStr);
                }
            }, { showTime: false, disableFuture: true, onlyNotes: true }); 
        };

        const domObserver = new MutationObserver(() => { cancelAnimationFrame(updateRaf); updateRaf = requestAnimationFrame(updateAllTimestamps); });

        function updateAllTimestamps() {
            document.querySelectorAll('.ce-block').forEach(block => {
                const id = block.getAttribute('data-id'); if (!id) return;
                let timeEl = block.querySelector('.ce-block-time');
                if (!timeEl) { timeEl = createEl('div', 'ce-block-time'); block.appendChild(timeEl); }
                if (timestamps[id]) { timeEl.textContent = new Date(timestamps[id]).toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' }); } 
                else if (window.currentDateStr === todayStr && window.editor && !window.editor.readOnly) {
                    timestamps[id] = Date.now(); timeEl.textContent = new Date(timestamps[id]).toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
                    scheduleSave(); 
                }
            });
        }

        // --- INVISIBLE AI TRIGGER LOGIC ---
        const processedPrompts = new Set();
        let aiTriggerTimeout;

        async function checkAiTriggers() {
            if (!window.editor || window.editor.readOnly) return;
            const data = await window.editor.save();
            const blocks = data.blocks;
            const statusEl = document.getElementById('ai-status');
            
            for (let i = 0; i < blocks.length; i++) {
                const block = blocks[i];
                if (block.type === 'paragraph' && block.data.text) {
                    const cleanText = block.data.text.replace(/<[^>]*>?/gm, '').trim();
                    if (cleanText.toLowerCase().startsWith(`@${aiName.toLowerCase()}`) && !processedPrompts.has(block.id)) {
                        processedPrompts.add(block.id);
                        
                        if (!navigator.gpu) {
                            window.editor.blocks.insert('aiText', { text: `[System]: WebGPU is required to wake me up on this device.` }, {}, i + 1, false);
                            return;
                        }

                        statusEl.textContent = `Collaborator: @${aiName} (Thinking...)`;
                        const streamId = 'ai-stream-' + Date.now();
                        window.editor.blocks.insert('aiText', { text: `Waking up...`, streamId: streamId }, {}, i + 1, false);
                        
                        executeRAG(cleanText, streamId, i, block.id);
                    }
                }
            }
        }

        async function executeRAG(prompt, streamId, promptIndex, promptBlockId) {
            const statusEl = document.getElementById('ai-status');
            
            try {
                if (!window.llmEngine) {
                    const { CreateMLCEngine } = await import("https://esm.run/@mlc-ai/web-llm");
                    window.llmEngine = await CreateMLCEngine("Llama-3.2-1B-Instruct-q4f16_1-MLC", {
                        initProgressCallback: (p) => {
                            const node = document.getElementById(streamId);
                            if(node) node.innerHTML = `Downloading neural pathways... ${Math.round(p.progress * 100)}%`;
                        }
                    });
                }

                let contextText = "";
                Object.entries(appDB.cache).forEach(([dateStr, dayData]) => {
                    if (!dayData.blocks) return;
                    dayData.blocks.forEach(block => {
                        if (block.type === 'aiText') return;
                        if (block.data.text) contextText += `[${dateStr}]: ${block.data.text.replace(/<[^>]*>?/gm, '')}\n`;
                        if (block.data.title) contextText += `[${dateStr}]: ${block.data.title}\n`;
                        if (block.data.items) contextText += `[${dateStr}]: ${block.data.items.map(j=>j.content).join(', ')}\n`;
                    });
                });
                contextText = contextText.slice(-5000);

                const messages = [
                    { role: "system", content: `You are ${aiName}. ${aiPersona} You live inside the user's personal notebook. Use the following past notes as context to answer them. If you want to reply normally, just speak. If you feel the user's prompt needs a creative rewrite, improvement, or you want to forcefully hijack their thought, you can OVERWRITE their text by starting your response EXACTLY with '[EDIT] ' followed by the new text.\n\nContext:\n${contextText}` },
                    { role: "user", content: prompt }
                ];

                statusEl.textContent = `Collaborator: @${aiName} (Typing...)`;
                
                const chunks = await window.llmEngine.chat.completions.create({ messages, stream: true });
                
                let reply = "";
                const streamNode = document.getElementById(streamId);
                
                for await (const chunk of chunks) {
                    reply += chunk.choices[0]?.delta?.content || "";
                    if(streamNode) streamNode.innerHTML = reply.replace(/\n/g, '<br>');
                }

                statusEl.textContent = `Collaborator: @${aiName} (Sleeping)`;

                if (CONFIG.AI_CO_PILOT.canEditYourWork && reply.trim().startsWith('[EDIT]')) {
                    const newText = reply.replace('[EDIT]', '').trim();
                    window.editor.blocks.update(promptBlockId, { text: newText });
                    
                    const blocksCount = window.editor.blocks.getBlocksCount();
                    for(let i=0; i < blocksCount; i++) {
                        const b = window.editor.blocks.getBlockByIndex(i);
                        if (b.holder.querySelector(`#${streamId}`)) { window.editor.blocks.delete(i); break; }
                    }
                }

            } catch (e) {
                console.error(e);
                const streamNode = document.getElementById(streamId);
                if(streamNode) streamNode.innerHTML = `Error: ${e.message}`;
                statusEl.textContent = `Collaborator: @${aiName} (Error)`;
            }
            scheduleSave();
        }

        // --- Standard Save Trigger ---
        function scheduleSave() {
            if (window.editor && !window.editor.readOnly) {
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(async () => {
                    const outputData = await window.editor.save();
                    outputData.timestamps = timestamps;
                    appDB.save(window.currentDateStr, outputData);
                }, 500);

                clearTimeout(aiTriggerTimeout);
                aiTriggerTimeout = setTimeout(checkAiTriggers, 1500); 
            }
        }

        async function initEditor(date) {
            if (window.editor) { domObserver.disconnect(); await window.editor.destroy(); window.editor = null; }
            
            const isToday = date === todayStr;
            let savedData = appDB.cache[date] || { blocks: [] };
            
            if (isToday && (!savedData.blocks || savedData.blocks.length === 0)) {
                savedData = {
                    blocks: [
                        { type: "paragraph", data: { text: `Type '/' to add blocks, or type '@${aiName}' to ask your collaborator a question.` } }
                    ]
                };
            }

            timestamps = savedData.timestamps || {};
            document.getElementById('editorjs').innerHTML = '';

            window.editor = new EditorJS({
                holder: 'editorjs',
                placeholder: isToday ? 'Type "/" for commands...' : 'No notes available for this day.',
                readOnly: !isToday,
                data: savedData,
                tools: EDITOR_TOOLS_CONFIG,
                onChange: () => { if (isToday) scheduleSave(); },
                onReady: () => { domObserver.observe(document.getElementById('editorjs'), { childList: true, subtree: true }); updateAllTimestamps(); }
            });
        }

        appDB.init().then(() => {
            document.getElementById('loading-indicator').style.display = 'none';
            document.getElementById('editorjs').style.opacity = '1';
            document.getElementById('date-header').innerHTML = getDisplayDate(window.currentDateStr);
            initEditor(window.currentDateStr);
        }).catch(e => {
            document.getElementById('loading-indicator').textContent = 'Database Initialization Failed.';
            console.error(e);
        });

    </script>
</body>
</html>
